<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>clock</title>
  <link rel="icon" href="https://emojicdn.elk.sh/⏱️">
  <link rel="apple-touch-icon" href="https://emojicdn.elk.sh/⏱️">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1c1c1e;
      --card: #2c2c2e;
      --raised: #3a3a3c;
      --text-1: #e8e3d9;
      --text-2: #aeaeb2;
      --text-3: #636366;
      --honey: #c79968;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--sans);
      padding: 2rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--raised);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* ring */
    .ring-wrapper {
      position: relative;
      width: 220px;
      height: 220px;
    }
    .ring-wrapper svg {
      transform: rotate(-90deg);
      position: absolute;
      top: 0; left: 0;
    }
    .ring-bg { fill: none; stroke: var(--raised); stroke-width: 10; }
    .ring-fg {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.25s linear, stroke 0.5s ease;
    }
    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .time-display {
      font-family: var(--mono);
      font-size: 3rem;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -0.02em;
      transition: color 0.5s;
    }
    .time-display.phase-workout { color: var(--honey); }
    .time-display.phase-rest    { color: var(--text-1); }

    .sub-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--text-2);
    }

    /* round counter */
    .round-info {
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
    }
    .round-info span {
      font-family: var(--mono);
      font-size: 3rem;
      font-weight: 700;
      color: var(--text-1);
      display: block;
      line-height: 1;
      margin-top: 4px;
    }

    /* buttons */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      width: 100%;
    }
    .btn {
      flex: 1;
      height: 44px;
      border: none;
      border-radius: 8px;
      font-family: var(--mono);
      font-variant-emoji: text;
      font-size: 1.4rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary {
      background: var(--honey);
      color: #1c1c1e;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--raised);
      color: var(--text-1);
    }
    .btn-secondary:hover { background: var(--raised); }

    /* iOS-style picker */
    .picker-section {
      display: flex;
      gap: 1rem;
      width: 100%;
      height: 220px;
    }
    .picker-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .picker-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-2);
    }
    .picker-wrap {
      position: relative;
      width: 100%;
      flex: 1;
      overflow: hidden;
      border-radius: 8px;
    }
    .picker-mask-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to bottom, var(--card) 20%, transparent);
      z-index: 2;
      pointer-events: none;
    }
    .picker-mask-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to top, var(--card) 20%, transparent);
      z-index: 2;
      pointer-events: none;
    }
    .picker-highlight {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      height: 44px;
      border-top: 1px solid var(--raised);
      border-bottom: 1px solid var(--raised);
      pointer-events: none;
      z-index: 1;
    }
    .picker-list {
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .picker-list::-webkit-scrollbar { display: none; }
    .picker-item {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-1);
    }
  </style>
</head>
<body>

<div class="card phase-idle" id="card">
  <div class="ring-wrapper" id="ring-section">
    <svg width="220" height="220" viewBox="0 0 220 220">
      <circle class="ring-bg" cx="110" cy="110" r="96"/>
      <circle class="ring-fg" id="interval-ring" cx="110" cy="110" r="96"
              stroke-dasharray="603" stroke-dashoffset="0"/>
    </svg>
    <div class="ring-center">
      <div class="time-display" id="interval-display">01:00</div>
      <div class="sub-label" id="interval-sub">READY</div>
    </div>
  </div>

  <div class="picker-section" id="picker-section" style="display:none">
    <div class="picker-col">
      <div class="picker-label">Work</div>
      <div class="picker-wrap">
        <div class="picker-mask-top"></div>
        <div class="picker-highlight"></div>
        <div class="picker-mask-bottom"></div>
        <div class="picker-list" id="picker-work"></div>
      </div>
    </div>
    <div class="picker-col">
      <div class="picker-label">Rest</div>
      <div class="picker-wrap">
        <div class="picker-mask-top"></div>
        <div class="picker-highlight"></div>
        <div class="picker-mask-bottom"></div>
        <div class="picker-list" id="picker-rest"></div>
      </div>
    </div>
  </div>

  <div class="round-info">Round <span id="round-count">1</span></div>

  <div class="btn-row">
    <button class="btn btn-primary" id="interval-start" title="Start" aria-label="Start">▸</button>
    <button class="btn btn-secondary" id="interval-reset" title="Reset" aria-label="Reset">↻</button>
  </div>
</div>

<script>
  const CIRC = 2 * Math.PI * 96;
  const ITEM_H = 44;
  const ICON_PLAY = '▸';
  const ICON_PAUSE = '‖';

  // Values: 5s to 600s in 5s steps
  const VALUES = Array.from({length: 120}, (_, i) => (i + 1) * 5);

  function fmtVal(s) {
    const m = Math.floor(s / 60), sec = s % 60;
    return m > 0 ? (sec > 0 ? `${m}m ${sec}s` : `${m}m`) : `${sec}s`;
  }

  function buildPicker(listEl, defaultVal) {
    const spacer = () => { const d = document.createElement('div'); d.style.height = ITEM_H * 2 + 'px'; return d; };
    listEl.appendChild(spacer());
    VALUES.forEach(v => {
      const el = document.createElement('div');
      el.className = 'picker-item';
      el.textContent = fmtVal(v);
      listEl.appendChild(el);
    });
    listEl.appendChild(spacer());
    const idx = VALUES.indexOf(defaultVal);
    listEl.scrollTop = idx * ITEM_H;
  }

  function getPickerValue(listEl) {
    const idx = Math.round(listEl.scrollTop / ITEM_H);
    return VALUES[Math.max(0, Math.min(idx, VALUES.length - 1))];
  }

  (() => {
    let WORKOUT = 60, REST = 30;
    let phase = 'idle', remaining = WORKOUT, round = 1;
    let running = false, raf = null, startTs = 0, startRemaining = WORKOUT;

    const display      = document.getElementById('interval-display');
    const sub          = document.getElementById('interval-sub');
    const ring         = document.getElementById('interval-ring');
    const rndCount     = document.getElementById('round-count');
    const btnStart     = document.getElementById('interval-start');
    const btnReset     = document.getElementById('interval-reset');
    const ringSection  = document.getElementById('ring-section');
    const pickerSection= document.getElementById('picker-section');
    const pickerWork   = document.getElementById('picker-work');
    const pickerRest   = document.getElementById('picker-rest');

    buildPicker(pickerWork, WORKOUT);
    buildPicker(pickerRest, REST);

    function pad(n) { return String(n).padStart(2,'0'); }
    function fmtSec(s) { return `${pad(Math.floor(s/60))}:${pad(s%60)}`; }

    function setBtnIcon(state) {
      if (state === 'pause') {
        btnStart.textContent = ICON_PAUSE;
        btnStart.title = 'Pause';
        btnStart.setAttribute('aria-label', 'Pause');
      } else {
        btnStart.textContent = ICON_PLAY;
        const label = phase === 'idle' ? 'Start' : 'Resume';
        btnStart.title = label;
        btnStart.setAttribute('aria-label', label);
      }
    }

    function showPicker() {
      ringSection.style.display = 'none';
      pickerSection.style.display = 'flex';
      requestAnimationFrame(() => {
        pickerWork.scrollTop = VALUES.indexOf(WORKOUT) * ITEM_H;
        pickerRest.scrollTop = VALUES.indexOf(REST) * ITEM_H;
      });
    }
    function showRing() {
      pickerSection.style.display = 'none';
      ringSection.style.display = 'block';
    }

    function applyPhase(p) {
      phase = p;
      const cls = p === 'workout' ? 'phase-workout' : p === 'rest' ? 'phase-rest' : 'phase-idle';
      display.className = `time-display ${cls}`;

      if (p === 'workout') {
        ring.style.stroke = '#c79968';
        sub.textContent = fmtVal(WORKOUT);
      } else if (p === 'rest') {
        ring.style.stroke = '#e8e3d9';
        sub.textContent = fmtVal(REST);
      } else {
        ring.style.stroke = '#3a3a3c';
        sub.textContent = 'READY';
      }
    }

    function render(rem) {
      display.textContent = fmtSec(Math.ceil(rem));
      const total = phase === 'rest' ? REST : WORKOUT;
      const frac  = Math.max(0, rem) / total;
      ring.style.strokeDashoffset = CIRC * (1 - frac);
    }

    function nextPhase() {
      if (phase === 'workout') {
        remaining = REST;
        applyPhase('rest');
      } else {
        remaining = WORKOUT;
        round++;
        rndCount.textContent = round;
        applyPhase('workout');
      }
      startTs = performance.now();
      startRemaining = remaining;
    }

    function tick() {
      const elapsed = (performance.now() - startTs) / 1000;
      remaining = startRemaining - elapsed;
      if (remaining <= 0) {
        remaining = 0;
        render(0);
        nextPhase();
      } else {
        render(remaining);
      }
      raf = requestAnimationFrame(tick);
    }

    btnStart.addEventListener('click', () => {
      if (!running) {
        if (phase === 'idle') {
          WORKOUT = getPickerValue(pickerWork);
          REST    = getPickerValue(pickerRest);
          remaining = WORKOUT;
          startRemaining = WORKOUT;
          showRing();
          applyPhase('workout');
        }
        running = true;
        startTs = performance.now();
        startRemaining = remaining;
        setBtnIcon('pause');
        tick();
      } else {
        cancelAnimationFrame(raf);
        running = false;
        setBtnIcon('start');
      }
    });

    btnReset.addEventListener('click', () => {
      cancelAnimationFrame(raf);
      running = false;
      round = 1;
      setBtnIcon('start');
      rndCount.textContent = 1;
      applyPhase('idle');
      showPicker();
    });

    applyPhase('idle');
    showPicker();
  })();
</script>
</body>
</html>
