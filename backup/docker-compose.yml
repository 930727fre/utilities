services:
  backup:
    build: .
    container_name: backup
    volumes:
      # one entry per tool with persistent data — mount path must be /tools/<tool>/data
      - ../flashcard/data:/tools/flashcard/data
      - ../free2speak/data:/tools/free2speak/data
    environment:
      # space-separated list of tools to back up; must match volume mount names above
      - TOOLS=flashcard free2speak
      - RCLONE_CONFIG_R2_TYPE=${RCLONE_CONFIG_R2_TYPE:?RCLONE_CONFIG_R2_TYPE env var is required}
      - RCLONE_CONFIG_R2_PROVIDER=${RCLONE_CONFIG_R2_PROVIDER:?RCLONE_CONFIG_R2_PROVIDER env var is required}
      - RCLONE_CONFIG_R2_ACCESS_KEY_ID=${RCLONE_CONFIG_R2_ACCESS_KEY_ID:?RCLONE_CONFIG_R2_ACCESS_KEY_ID env var is required}
      - RCLONE_CONFIG_R2_SECRET_ACCESS_KEY=${RCLONE_CONFIG_R2_SECRET_ACCESS_KEY:?RCLONE_CONFIG_R2_SECRET_ACCESS_KEY env var is required}
      - RCLONE_CONFIG_R2_ENDPOINT=${RCLONE_CONFIG_R2_ENDPOINT:?RCLONE_CONFIG_R2_ENDPOINT env var is required}
      - R2_BUCKET=${R2_BUCKET:?R2_BUCKET env var is required}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN env var is required}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:?TELEGRAM_CHAT_ID env var is required}
    restart: unless-stopped
