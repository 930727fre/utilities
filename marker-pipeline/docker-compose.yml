services:
  marker-pipeline-backend:
    build: ./backend
    container_name: marker-pipeline-backend
    volumes:
      - ./data:/data
      - model-cache:/root/.cache
    environment:
      - DATA_DIR=/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - default
      - my_network

  marker-pipeline-frontend:
    build: ./frontend
    container_name: marker-pipeline-frontend
    environment:
      - BACKEND_URL=http://marker-pipeline-backend:8000
    depends_on:
      - marker-pipeline-backend
    networks:
      - default
      - my_network

volumes:
  model-cache:

networks:
  my_network:
    external: true
