services:
  transcribe-app:
    build: .
    container_name: transcribe-app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./data:/app/data
      - ./data/models:/root/.cache/whisper
    environment:
      - JOBS_FILE=/app/data/jobs.json
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY must be exported before docker compose up}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - default
      - my_network

  transcribe-frontend:
    build: ./frontend
    container_name: transcribe-frontend
    environment:
      - BACKEND_URL=http://transcribe-app:8000
    depends_on:
      - transcribe-app
    restart: unless-stopped
    networks:
      - default
      - my_network

networks:
  my_network:
    external: true
