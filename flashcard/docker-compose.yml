services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./data:/data
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: flashcard-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - default
      - my_network

networks:
  my_network:
    external: true
