services:
  flashcard-backend:
    build: ./backend
    container_name: flashcard-backend
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:?GEMINI_API_KEY not exported in shell}
    volumes:
      - ./data:/data
    expose:
      - "8000"
    networks:
      - default
      - my_network

  flashcard-frontend:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: flashcard-frontend
    restart: unless-stopped
    depends_on:
      - flashcard-backend
    networks:
      - default
      - my_network

networks:
  my_network:
    external: true
