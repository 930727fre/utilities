<section epub:type="chapter">
<header>
<h1><span epub:type="pagebreak" title="73" id="Page_73"/><a id="c05"/><span class="chapterNumber"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.1.1">Chapter 5</span></span><br/><span class="chapterTitle"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.2.1">Money and Time Preference</span></span></h1>
</header>
<section><span id="c05-sec-0001"/>
<p id="c05-para-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.1">Sound money is chosen freely on the market for its salability, because it holds its value across time, because it can transfer value effectively across space, and because it can be divided and grouped into small and large scales. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.2">It is money whose supply cannot be manipulated by a coercive authority that imposes its use on others. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.3">From the preceding discussion, and from the understanding of monetary economics afforded to us by Austrian economics, the importance of sound money can be explained for three broad reasons: first, it protects value across time, which gives people a bigger incentive to think of their future, and lowers their time preference. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.4">The lowering of the time preference is what initiates the process of human civilization and allows for humans to cooperate, prosper, and live in peace. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.5">Second, sound money allows for trade to be based on a stable unit of measurement, facilitating ever‐larger markets, free from government control and coercion, and with free trade comes peace and prosperity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.6">Further, a unit of account is essential for all forms</span><span epub:type="pagebreak" title="74" id="Page_74"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.1"> of economic calculation and planning, and unsound money makes economic calculation unreliable and is the root cause of economic recessions and crises. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.2">Finally, sound money is an essential requirement for individual freedom from despotism and repression, as the ability of a coercive state to create money can give it undue power over its subjects, power which by its very nature will attract the least worthy, and most immoral, to take its reins.</span></p>
<p id="c05-para-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.5.1">Sound money is a prime factor in determining individual </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.1">time preference</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.7.1">, an enormously important and widely neglected aspect of individual decision making. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.7.2">Time preference refers to the ratio at which individuals value the present compared to the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.7.3">Because humans do not live eternally, death could come to us at any point in time, making the future uncertain. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.7.4">And because consumption is necessary for survival, people always value present consumption more than future consumption, as the lack of present consumption could make the future never arrive. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.7.5">In other words, time preference is positive for all humans; there is always a discount on the future compared to the present.</span></p>
<p id="c05-para-0003"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.1">Further, because more goods can be produced with time and resources, rational individuals would always prefer to have a given quantity of resources in the present than in the future, as they could use them to produce more. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.2">For an individual to be willing to defer her receipt of a good by a year, she would have to be offered a larger quantity of the good. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.3">The increase necessary to tempt an individual to delay her receipt of the good is what determines her time preference. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.4">All rational individuals have a nonzero time preference, but the time preference varies from one individual to another.</span></p>
<p id="c05-para-0004"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.1">Animals' time preference is far higher than humans', as they act to the satisfaction of their immediate instinctive impulses and have little conception of the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.2">A few animals are capable of building nests or homes that can last for the future, and these have a lower time preference than the animals that act to the satisfaction of their immediate needs such as hunger and aggression. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.3">Human beings' lower time preference allows us to curb our instinctive and animalistic impulses, think of what is better for our future, and act rationally rather than impulsively. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.4">Instead of spending all our time producing goods for immediate consumption, we can choose to spend time engaged in production of goods that will take longer to complete, if they are superior goods. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.5">As humans reduce their time preference, they develop</span><span epub:type="pagebreak" title="75" id="Page_75"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.1"> the scope for carrying out tasks over longer time horizons, for satisfaction of ever‐more remote needs, and they develop the mental capacity to create goods not for immediate consumption but for the production of future goods, in other words, to create </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.11.1">capital goods</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.1">.</span></p>
<p id="c05-para-0005"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.1">Whereas animals and humans can both hunt, humans differentiated themselves from animals by spending time developing tools for hunting. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.2">Some animals may occasionally use a tool in hunting another animal, but they have no capacity for owning these tools and maintaining them for long‐term use. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.3">Only through a lower time preference can a human decide to take time away from hunting and dedicate that time to building a spear or fishing rod that cannot be eaten itself, but can allow him to hunt more proficiently. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.4">This is the essence of </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.14.1">investment</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.15.1">: as humans delay immediate gratification, they invest their time and resources in the production of capital goods which will make production more sophisticated or technologically advanced and extend it over a longer time‐horizon. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.15.2">The only reason that an individual would choose to delay his gratification to engage in risky production over a longer period of time is that these longer processes will generate more output and superior goods. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.15.3">In other words, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.16.1">investment raises the productivity of the producer</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.17.1">.</span></p>
<p id="c05-para-0006"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.1">Economist Hans‐Hermann Hoppe explains that once time preference drops enough to allow for any savings and capital or durable consumer‐goods formation at all, the tendency is for time preference to drop even further as a “process of civilization” is initiated.</span><sup><a id="fn-1" href="#fn1"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.19.1">1</span></a></sup></p>
<p id="c05-para-0007"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.1">The fisherman who builds a fishing rod is able to catch more fish per hour than the fisherman hunting with his bare hands. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.2">But the only way to build the fishing rod is to dedicate an initial amount of time to work that does not produce edible fish, but instead produces a fishing rod. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.3">This is an uncertain process, for the fishing rod might not work and the fisherman will have wasted his time to no avail. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.4">Not only does investment require delaying gratification, it also always carries with it a risk of failure, which means the investment will only be undertaken with an expectation of a reward. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.5">The lower an individual's time preference, the more likely he is to engage in investment, to delay gratification, and to accumulate capital. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.6">The more capital</span><span epub:type="pagebreak" title="76" id="Page_76"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.1"> is accumulated, the higher the productivity of labor, and the longer the time horizon of production.</span></p>
<p id="c05-para-0008"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.1">To understand the difference more vividly, contrast two hypothetical individuals who start off with nothing but their bare hands, and differing time preferences: Harry has a higher time preference than Linda. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.2">Harry chooses to only spend his time catching fish with his hands, needing about eight hours a day to catch enough fish to feed himself for the day. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.3">Linda, on the other hand, having a lower time preference, spends only six hours catching fish, making do with a smaller amount of fish every day, and spends the other two hours working on building a fishing rod. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.4">After a week has passed, Linda has succeeded in building a working fishing rod. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.5">In the second week, she can catch in eight hours double the quantity of fish which Harry catches. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.6">Linda's investment in the fishing rod could allow her to work for only four hours a day and eat the same amount of fish Harry eats, but because she has a lower time preference, she will not rest on her laurels. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.7">She will instead spend four hours catching as many fish as Harry catches in eight hours, and then spend another four hours engaged in further capital accumulation, building herself a fishing boat, for instance. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.8">A month later, Linda has a fishing rod and a boat that allows her to go deeper into the sea, to catch fish that Harry had never even seen. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.9">Linda's productivity is not just higher per hour; her fish are different from, and superior to, the ones Harry catches. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.10">She now only needs one hour of fishing to secure her food for a day, and so she dedicates the rest of her time to even more capital accumulation, building better and bigger fishing rods, nets, and boats, which in turn increases her productivity further and improves the quality of her life.</span></p>
<p id="c05-para-0009"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.1">Should Harry and his descendants continue to work and consume with the same time preference, they will continue to live the same life he lived, with the same level of consumption and productivity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.2">Should Linda and her descendants continue with the same lower time preference, they will continuously improve their quality of life over time, increasing their stock of capital and engaging in labor with ever‐higher levels of productivity, in processes that take far longer to complete. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.3">The real‐life equivalents of the descendants of Linda would today be the owners of </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.1">Annelies Ilena</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.1">, the world's largest fishing trawler. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.2">This formidable machine took decades to conceive, design, and build before it was completed in the year 2000, and it will continue to operate for decades to offer the lower‐time‐preference investors</span><span epub:type="pagebreak" title="77" id="Page_77"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.1"> in it a return on the capital they provided to the building process many decades ago. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.2">The process of producing fish for Linda's descendants has become so long and sophisticated it takes decades to complete, whereas Harry's descendants still complete their process in a few hours every day. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.3">The difference, of course, is that Linda's descendants have vastly higher productivity than Harry's, and that's what makes engaging in the longer process worthwhile.</span></p>
<p id="c05-para-0010"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.27.1">An important demonstration of the importance of time preference comes from the famous Stanford marshmallow experiment,</span><sup><a id="fn-2" href="#fn2"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.28.1">2</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.1"> conducted in the late 1960s. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.2">Psychologist Walter Mischel would leave children in a room with a piece of marshmallow or a cookie, and tell the kids they were free to have it if they wanted, but that he will come back in 15 minutes, and if the children had not eaten the candy, he would offer them a second piece as a reward. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.3">In other words, the children had the choice between the immediate gratification of a piece of candy, or delaying gratification and receiving two pieces of candy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.4">This is a simple way of testing children's time preference: students with a lower time preference were the ones who could wait for the second piece of candy, whereas the students with the higher time preference could not. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.5">Mischel followed up with the children decades later and found significant correlation between having a low time preference as measured with the marshmallow test and good academic achievement, high SAT score, low body mass index, and lack of addiction to drugs.</span></p>
<p id="c05-para-0011"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.1">As an economics professor, I make sure to teach the marshmallow experiment in every course I teach, as I believe it is the single most important lesson economics can teach to individuals, and am astounded that university curricula in economics have almost entirely ignored this lesson, to the point that many academic economists have no familiarity with the term </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.31.1">time preference</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.1"> altogether or its significance.</span></p>
<p id="c05-para-0012"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.1">While microeconomics has focused on transactions between individuals, and macroeconomics on the role of government in the economy, the reality is that the most important economic decisions to any individual's well‐being are the ones they conduct in their trade‐offs with their future self. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.2">Every day, an individual will conduct a few economic transactions with other</span><span epub:type="pagebreak" title="78" id="Page_78"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.34.1"> people, but they will partake in a far larger number of transactions with their future self. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.34.2">The examples of these trades are infinite: deciding to save money rather than spend it; deciding to invest in acquiring skills for future employment rather than seeking immediate employment with low pay; buying a functional and affordable car rather than getting into debt for an expensive car; working overtime rather than going out to party with friends; or, my favorite example to use in class: deciding to study the course material every week of the semester rather than cramming the night before the final exam.</span></p>
<p id="c05-para-0013"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.1">In each of these examples, there is nobody forcing the decision on the individual, and the prime beneficiary or loser from the consequences of these choices is the individual himself. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.2">The main factor determining a man's choices in life is his time preference. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.3">While people's time preference and self‐control will vary from one situation to the other, in general, a strong correlation can be found across all aspects of decision making. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.4">The sobering reality to keep in mind is that a man's lot in life will be largely determined by these trades between him and his future self. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.5">As much as he'd like to blame others for his failures, or credit others with his success, the infinite trades he took with himself are likely to be more significant than any outside circumstances or conditions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.6">No matter how circumstances conspire against the man with a low time preference, he will probably find a way to keep prioritizing his future self until he achieves his objectives. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.7">And no matter how much fortune favors the man with a high time preference, he will find a way to continue sabotaging and shortchanging his future self. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.8">The many stories of people who have triumphed against all odds and unfavorable circumstances stand in stark contrast to the stories of people blessed with skills and talent that rewarded them handsomely, who nonetheless managed to waste all that talent and achieve no lasting good for themselves. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.9">Many professional athletes and entertainers, gifted with talents that earn them large sums of money, nevertheless die penniless as their high time preference gets the better of them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.10">On the other hand, many ordinary people with no special talents work diligently and save and invest for a lifetime to achieve financial security and bequeath their children a life better than the one they inherited.</span></p>
<p id="c05-para-0014"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.1">It is only through the lowering of time preference that individuals begin to appreciate investing in the long run and start prioritizing future outcomes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.2">A society in which individuals</span><span epub:type="pagebreak" title="79" id="Page_79"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.1"> bequeath their children more than what they received from their parents is a civilized society: it is a place where life is improving, and people live with a purpose of making the next generation's lives better. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.2">As society's capital levels continue to increase, productivity increases and, along with it, quality of life. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.3">The security of their basic needs assured, and the dangers of the environment averted, people turn their attention toward more profound aspects of life than material well‐being and the drudgery of work. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.4">They cultivate families and social ties; undertake cultural, artistic, and literary projects; and seek to offer lasting contributions to their community and the world. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.5">Civilization is not about more capital accumulation per se; rather, it is about what capital accumulation allows humans to achieve, the flourishing and freedom to seek higher meaning in life when their base needs are met and most pressing dangers averted.</span></p>
<p id="c05-para-0015"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.1">There are many factors that come into play in determining the time preference of individuals.</span><sup><a id="fn-3" href="#fn3"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.1">3</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.1"> Security of people in their person and property is arguably one of the most important. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.2">Individuals who live in areas of conflict and crime will have a significant chance of losing their life and are thus likely to more highly discount the future, resulting in a higher time preference than those who live in peaceful societies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.3">Security of property is another major factor influencing individuals' time preference: societies where governments or thieves are likely to expropriate individuals' property capriciously would have higher time preference, as such actions would drive individuals to prioritize spending their resources on immediate gratification rather than investing them in property which could be appropriated at any time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.4">Tax rates will also adversely affect time preference: the higher the taxes, the less of their income that individuals are allowed to keep; this would lead to individuals working less at the margin and saving less for their future, because the burden of taxes is more likely to reduce savings than consumption, particularly for those with a low income, most of which is needed for basic survival.</span></p>
<p id="c05-para-0016"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.1">The factor affecting time preference that is most relevant to our discussion, however, is the expected future value of money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.2">In a free market where people are free to choose their</span><span epub:type="pagebreak" title="80" id="Page_80"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.1"> money, they will choose the form of money most likely to hold its value over time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.2">The better the money is at holding its value, the more it incentivizes people to delay consumption and instead dedicate resources for production in the future, leading to capital accumulation and improvement of living standards, while also engendering in people a low time preference in other, non‐economic aspects of their life. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.3">When economic decision making is geared toward the future, it is natural that all manner of decisions are geared toward the future as well. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.4">People become more peaceful and cooperative, understanding that cooperation is a far more rewarding long‐term strategy than any short‐term gains from conflict. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.5">People develop a strong sense of morality, prioritizing the moral choices that will cause the best long‐term outcomes for them and their children. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.6">A person who thinks of the long run is less likely to cheat, lie, or steal, because the reward for such activities may be positive in the short run, but can be devastatingly negative in the long run.</span></p>
<p id="c05-para-0017"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.1">The reduction in the purchasing power of money is similar to a form of taxation or expropriation, reducing the real value of one's money even while the nominal value is constant. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.2">In modern economies government‐issued money is inextricably linked to artificially lower interest rates, which is a desirable goal for modern economists because it promotes borrowing and investing. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.3">But the effect of this manipulation of the price of capital is to artificially reduce the interest rate that accrues to savers and investors, as well as the one paid by borrowers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.4">The natural implication of this process is to reduce savings and increase borrowing. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.5">At the margin, individuals will consume more of their income and borrow more against the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.6">This will not just have implications on their time preference in financial decisions; it will likely reflect on everything in their lives.</span></p>
<p id="c05-para-0018"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.44.1">The move from money that holds its value or appreciates to money that loses its value is very significant in the long run: society saves less, accumulates less capital, and possibly begins to consume its capital; worker productivity stays constant or declines, resulting in the stagnation of real wages, even if nominal wages can be made to increase through the magical power of printing ever more depreciating pieces of paper money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.44.2">As people start spending more and saving less, they become more present‐oriented in all their decision making, resulting in moral failings and a likelihood to</span><span epub:type="pagebreak" title="81" id="Page_81"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.45.1"> engage in conflict and destructive and self‐destructive behavior.</span></p>
<p id="c05-para-0019"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.46.1">This helps explain why civilizations prosper under a sound monetary system, but disintegrate when their monetary systems are debased, as was the case with the Romans, the Byzantines, and modern European societies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.46.2">The contrast between the nineteenth and twentieth centuries can be understood in the context of the move away from sound money and all the attendant problems that creates.</span></p></section>
<section><span id="c05-sec-0002"/>
<h2 id="head-2-14"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.47.1">Monetary Inflation</span></h2>
<p id="c05-para-0020"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.1">The simple reality, demonstrated throughout history, is that any person who finds a way to create the monetary medium will try to do it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.2">The temptation to engage in this is too strong, but the creation of the monetary medium is not an activity that is productive to society, as any supply of money is sufficient for any economy of any size. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.3">The more that a monetary medium restrains this drive for its creation, the better it is as a medium of exchange and stable store of value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.4">Unlike all other goods, money's functions as a medium of exchange, store of value, and unit of account are completely orthogonal to its quantity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.5">What matters in money is its purchasing power, not its quantity, and as such, any quantity of money is enough to fulfil the monetary functions, as long as it is divisible and groupable enough to satisfy holders' transaction and storage needs. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.6">Any quantity of economic transactions could be supported by a money supply of any size as long as the units are divisible enough.</span></p>
<p id="c05-para-0021"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.1">A theoretically ideal money would be one whose supply is fixed, meaning nobody could produce more of it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.2">The only noncriminal way to acquire money in such a society would be to produce something of value to others and exchange it with them for money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.3">As everyone seeks to acquire more money, everyone works more and produces more, leading to improving material well‐being for everyone, which in turn allows people to accumulate more capital and increase their productivity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.4">Such a money would also work perfectly well as a store of value, by preventing others from increasing the money supply; the wealth stored into it would not depreciate over time, incentivizing people to save and allowing them to think more of the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.5">With growing wealth and productivity and an increased ability to focus on the</span><span epub:type="pagebreak" title="82" id="Page_82"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.50.1"> future, people begin to reduce their time preference and can focus on improving non‐material aspects of their life, including spiritual, social, and cultural endeavors.</span></p>
<p id="c05-para-0022"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.1">It had, however, proved impossible to come up with a form of money of which more cannot be created. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.2">Whatever gets chosen as a medium of exchange will appreciate in value and lead to more people trying to produce more of it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.3">The best form of money in history was the one that would cause the new supply of money to be the least significant compared to the existing stockpiles, and thus make its creation not a good source of profit. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.4">Seeing as gold is indestructible, it is the one metal whose stockpiles have only been growing since the first human mined it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.5">Seeing as this mining has been going on for thousands of years, and alchemy has yet to prove large‐scale commercial viability, new mining supply continues to be a reliably tiny fraction of existing stockpiles.</span></p>
<p id="c05-para-0023"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.1">This property is why gold has been synonymous with sound money: it is money whose supply is guaranteed, thanks to the ironclad rules of physics and chemistry, to never be significantly increased. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.2">Try as they might, humans have for centuries failed to produce a form of money more sound than gold, and that is why it has been the prime monetary instrument used by most human civilizations throughout history. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.3">Even as the world has transitioned to government money as a store of value, medium of exchange, and unit of account, governments themselves continue to hold a significant percentage of their reserves in gold, constituting a significant percentage of total gold supply.</span></p>
<p id="c05-para-0024"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.1">Keynes complained about goldmining being a wasteful activity that consumed a lot of resources while adding nothing to real wealth. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.2">While his critique does contain a kernel of truth, in the sense that increasing the supply of the monetary medium does not increase the wealth of the society using it, he misses the point that gold's monetary role is a result of it being the metal likely to attract the </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.54.1">least</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.1"> human and capital resources toward its mining and prospecting, compared to all others. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.2">Because the supply of gold can only be increased by very small quantities, even with price spikes, and as gold is very rare and difficult to find, mining monetary gold would be less profitable than mining any other metal assuming a monetary role, leading to the least amount of human time and resources going to mining it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.3">Were any other metal used as the monetary medium, whenever society's time preference drops and more people purchase the metal for savings, raising</span><span epub:type="pagebreak" title="83" id="Page_83"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.1"> its price, there would be a significant opportunity for profit in producing more of the metal. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.2">Because the metal is perishable, the new production will always be far larger (relative to gold) as a percentage of existing stockpiles, as in the copper example above, bringing the price down and devaluing the savings of the holders. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.3">In such a society, savings would be effectively stolen from savers to reward people who engage in mining metals at quantities far beyond their economic use. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.4">Little saving and useful production would take place in such a society, impoverishment would ensue from the obsession with producing monetary media, and the society would be ripe for being overtaken and conquered by more productive societies whose individuals have better things to do than produce more monetary media.</span></p>
<p id="c05-para-0025"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.1">The reality of monetary competition constantly has disadvantaged individuals and societies that invest their savings in metals other than gold while rewarding those who invest their savings in gold, because it cannot be inflated easily and because it forces people to direct their energies away from producing a monetary good and toward producing more useful goods and services. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.2">This helps explain why Arab polymath Ibn Khaldun referred to gold prospecting and mining as the least respectable of professions, after kidnapping for ransom.</span><sup><a id="fn-4" href="#fn4"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.58.1">4</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.59.1"> The folly of Keynes condemning gold as money because its mining is wasteful is that it is the </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.1">least</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.1"> wasteful of all potential metals to use as money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.2">But the folly is doubly compounded by Keynes's “solution” to this shortcoming of gold being to propose a fiat monetary standard which has ended up dedicating far more human time, labor, and resources toward the management of the issuance of the money supply and the profiting from it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.3">Never in the history of gold as a monetary medium did it employ as many miners and workers as today's central banks and all the associated banks and businesses profiting from having close access to the monetary printing presses, as will be discussed in </span><a href="c07.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.1">Chapter 7</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.1">.</span></p>
<p id="c05-para-0026"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.1">When new supply is insignificant compared to existing supply, the market value of a form of money is determined through people's willingness to hold money and their desire to spend it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.2">Such factors will vary significantly with time for each individual, as individuals' personal circumstances go from periods where they prioritize holding a lot of money to periods of holding less. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.3">But</span><span epub:type="pagebreak" title="84" id="Page_84"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.65.1"> in the aggregate, they will vary slightly for society as a whole, because money is the market good with the least diminishing </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.1">marginal utility</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.2">One of the fundamental laws of economics is the law of diminishing marginal utility, which means that acquiring more of any good reduces the marginal utility of each extra unit. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.3">Money, which is held not for its own sake, but for the sake of being exchanged with other goods, will have its utility diminish slower than any other good, because it can always be exchanged for any other good. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.4">As an individual's holdings of houses, cars, TVs, apples, or diamonds increases, the marginal valuation they put on each extra unit decreases, leading to a decreasing desire to accumulate more of each. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.5">But more money is not like any of these goods, because as more of it is held, the holder can simply exchange the money for more of the next good they value the most. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.6">The marginal utility of money does in fact decline, as evidenced by the fact that an extra dollar of income means a lot more to a person whose daily income is $1 than one whose daily income is $1,000. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.7">But money's marginal utility declines far slower than any other good, because it declines along with the utility of wanting any good, not one particular good.</span></p>
<p id="c05-para-0027"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.1">The slowly declining marginal utility of holding money means demand for money at the margin will not vary significantly. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.2">Combining this with an almost constant supply results in a relatively stable market value for money in terms of goods and services. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.3">This means money is unlikely to appreciate or depreciate significantly, making it a lousy long‐term investment but a good store of value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.4">An investment would be expected to have a significant appreciation potential, but also carry a significant risk of loss or depreciation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.5">Investment is a reward for taking risk, but sound money, having the least risk, offers no reward.</span></p>
<p id="c05-para-0028"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.1">In the aggregate, demand for money will likely vary only with variance in time preference. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.2">As people develop a lower time preference overall, more people are likely to want to hold money, causing a rise in its market value compared to other goods and services, further rewarding its holders. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.3">A society that develops a higher time preference, on the other hand, would tend to decrease its holdings of money, slightly dropping its market value at the margin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.4">In either case, holding money would remain the least risky and rewarding asset overall, and that in essence is the root cause for demand for it.</span></p>
<p id="c05-para-0029"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.70.1">This analysis helps explain the</span><span epub:type="pagebreak" title="85" id="Page_85"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.1"> remarkable ability of gold to hold its value over years, decades, and centuries. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.2">Observing prices of agricultural commodities in the Roman empire in terms of grams of gold shows they bear remarkable similarity to prices today. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.3">Examining Diocletian's edict</span><sup><a id="fn-5" href="#fn5"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.1">5</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.1"> of prices from 301 AD and converting gold prices to their modern‐day U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.2">dollar equivalent, we find that a pound of beef cost around $4.50, while a pint of beer cost around $2, a pint of wine around $13 for high quality wine and $9 for lower quality, and a pint of olive oil cost around $20. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.3">Comparisons of various data for salaries of certain professions shows similar patterns, but these individual data points, while indicative, cannot be taken as a definitive settlement of the question.</span></p>
<p id="c05-para-0030"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.1">Roy Jastram has produced a systematic study of the purchasing power of gold over the longest consistent datasets available.</span><sup><a id="fn-6" href="#fn6"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.1">6</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.1"> Observing English data from 1560 to 1976 to analyze the change in gold's purchasing power in terms of commodities, Jastram finds gold dropping in purchasing power during the first 140 years, but then remaining relatively stable from 1700 to 1914, when Britain went off the gold standard. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.2">For more than two centuries during which Britain primarily used gold as money, its purchasing power remained relatively constant, as did the price of wholesale commodities. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.3">After Britain effectively went off the gold standard in the wake of World War I, the purchasing power of gold increased, as did the index of wholesale prices. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.4">(See </span><a id="R_c05-fig-0001" href="#c05-fig-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.1">Figure 8</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.78.1">.</span><sup><a id="fn-7" href="#fn7"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.1">7</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.1">)</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.1"><img alt="Graphical illustration of purchasing power of gold and wholesale commodity index in England, 1560–1976." src="images/c05f001.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c05-fig-0001" id="c05-fig-0001"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.82.1">Figure 8</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.1"> Purchasing power of gold and wholesale commodity index in England, 1560–1976.</span></p></figcaption></figure>
<p id="c05-para-0031"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.1">It's important to understand that for a monetary medium to remain perfectly constant in value is not even theoretically possible or determinable. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.2">Goods and services which money purchases will change over time as new technologies introduce new goods that replace old ones, and as the conditions of supply and demand of different goods will vary over time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.3">One of the prime functions of the monetary unit is to serve as the unit of measure for economic goods, whose value is constantly changing. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.4">It is thus not possible to satisfactorily measure the price of a monetary good precisely, although over long time horizons, studies similar to Jastram's can be indicative of an overall trend for a medium of exchange to hold its value, particularly when compared to other forms of money.</span></p>
<p id="c05-para-0032"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.1">More recent data from the United States, focused on the last two centuries, which witnessed faster economic growth than the period covered in Jastram's data, shows that gold has even increased in value in terms of commodities, whose prices rose dramatically in terms of U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.2">dollars. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.3">This is perfectly consistent with gold being the hardest money available. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.4">It is easier to keep increasing the supply of all commodities than gold, and so over time, all these other commodities will become relatively more abundant than gold, causing a rise in gold's purchasing power over time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.5">As can be seen in </span><a id="R_c05-fig-0002" href="#c05-fig-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.1">Figure 9</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.1">,</span><sup><a id="fn-8" href="#fn8"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.1">8</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.1"> the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.2">dollar was also gaining value against commodities whenever it was tied to gold, but lost value significantly when its connection to gold was severed, as was the case during the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.3">Civil War and the printing of greenbacks, and in the period after the 1934 devaluation of the dollar and confiscation of citizen gold.</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.90.1"><img alt="Graphical illustration of the price of commodities in gold and in U.S. dollars, 1792–2016." src="images/c05f002.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c05-fig-0002" id="c05-fig-0002"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.1">Figure 9</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.92.1"> Price of commodities in gold and in U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.92.2">dollars, in log scale, 1792–2016.</span></p></figcaption></figure>
<p id="c05-para-0033"><span epub:type="pagebreak" title="86" id="Page_86"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.1">The period between 1931 and 1971 was one in which money was nominally linked to gold, but only through various government arrangements that allowed for the exchange of gold for paper money under arcane conditions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.2">This period witnessed instability in the value of both government money and gold</span><span epub:type="pagebreak" title="87" id="Page_87"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.94.1"> along with the policy changes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.94.2">For a comparison between gold and government money, it is more useful to look at the period from 1971 to the modern day, where free‐floating national currencies have traded in markets with central banks tasked with guaranteeing their purchasing power. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.94.3">(See </span><a id="R_c05-fig-0003" href="#c05-fig-0003"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.1">Figure 10</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.96.1">.</span><sup><a id="fn-9" href="#fn9"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.1">9</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.98.1">)</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.1"><img alt="Graphical illustration of major currencies priced in gold, 1971–2017." src="images/c05f003.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c05-fig-0003" id="c05-fig-0003"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.100.1">Figure 10</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.101.1"> Major currencies priced in gold, 1971–2017.</span></p></figcaption></figure>
<p id="c05-para-0034"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.1">Even the best‐performing and most stable government forms of money have witnessed their value decimated compared to gold, with their value currently running at around 2–3% of their value in 1971 when they were all delinked from gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.2">This does not represent a rise in the market value of gold, but rather a drop in the value of fiat currencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.3">When comparing prices of goods and services to the value of government money and gold, we find a significant rise in their prices as expressed in government money, but relative stability in their prices in gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.4">The price of a barrel of oil, for instance, which is one of the key commodities of modern industrial society, has been relatively constant in terms of gold since 1971, while increasing by several orders of magnitude in terms of government money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.5">(See </span><a id="R_c05-fig-0004" href="#c05-fig-0004"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.103.1">Figure 11</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.104.1">.</span><sup><a id="fn-10" href="#fn10"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.1">10</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.1">)</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.107.1"><img alt="Graphical illustration of oil priced in U.S. dollars and ounces of gold, 1861–2017." src="images/c05f004.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c05-fig-0004" id="c05-fig-0004"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.108.1">Figure 11</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.109.1"> Oil priced in U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.109.2">dollars and ounces of gold, 1861–2017, as multiple of price in 1971.</span></p></figcaption></figure>
<p id="c05-para-0035"><span epub:type="pagebreak" title="88" id="Page_88"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.110.1">Hard money, whose supply cannot be expanded easily, will likely be more stable in value than easy money because its supply is largely inelastic while societal demand for</span><span epub:type="pagebreak" title="89" id="Page_89"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.1"> money varies little over time as time preference varies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.2">Easy money, on the other hand, because of the ability of its producers to vary its quantity drastically, will engender widely fluctuating demand from holders as the quantity varies and its reliability as a store of value falls and rises.</span></p>
<p id="c05-para-0036"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.1">Relative stability of value is not just important to preserve the purchasing power of holders' savings, it is arguably more important for preserving the integrity of the monetary unit as a unit of account. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.2">When money is predictably stable in value due to the small variation in supply and demand, it can act as a reliable signal for changes in prices of other goods and services, as was the case with gold.</span></p>
<p id="c05-para-0037"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.113.1">In the case of government money, on the other hand, the money supply increases through the expansion of the supply by the central bank and commercial banks, and contracts through deflationary recessions and bankruptcies, while the demand for money can vary even more unpredictably depending on people's expectations of the value of the money and the policies of the central bank. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.113.2">This highly volatile combination results in government money being unpredictable in value over the long term. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.113.3">Central banks' mission of ensuring price stability has them constantly managing the supply of money through their various tools to ensure price stability, making many major currencies appear less volatile in the short run compared to gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.113.4">But in the long run, the constant increase in the supply of government money compared to gold's steady and slow increase makes gold's value more predictable.</span></p>
<p id="c05-para-0038"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.1">Sound money, chosen on a free market precisely for its likelihood to hold value over time, will naturally have a better stability than unsound money whose use is enforced through government coercion. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.2">Had government money been a superior unit of account and store of value, it would not need government legal tender laws to enforce it, nor would governments worldwide have had to confiscate large quantities of gold and continue to hold them in their central bank reserves. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.3">The fact that central banks continue to hold onto their gold, and have even started increasing their reserves, testifies to the confidence they have in their own currencies in the long term, and in the inescapable monetary role of gold as the value of paper currencies continues to plumb new depths.</span></p></section>
<section><span id="c05-sec-0003"/>
<h2 id="head-2-15"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.1">Saving and Capital Accumulation</span></h2>
<p id="c05-para-0039"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.116.1">One of the key problems caused by a</span><span epub:type="pagebreak" title="90" id="Page_90"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.117.1"> currency whose value is diminishing is that it negatively incentivizes saving for the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.117.2">Time preference is universally positive: given the choice between the same good today or in the future, any sane person would prefer to have it today. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.117.3">Only by increasing the return in the future will people consider delaying gratification. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.117.4">Sound money is money that gains in value slightly over time, meaning that holding onto it is likely to offer an increase in purchasing power. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.117.5">Unsound money, being controlled by central banks whose express mission is to keep inflation positive, will offer little incentive for holders to keep it, as they become more likely to spend it or to borrow it.</span></p>
<p id="c05-para-0040"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.118.1">When it comes to investment, sound money creates an economic environment where any positive rate of return will be favorable to the investor, as the monetary unit is likely to hold onto its value, if not appreciate, thus strengthening the incentive to invest. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.118.2">With unsound money, on the other hand, only returns that are higher than the rate of depreciation of the currency will be positive in real terms, creating incentives for high‐return but high‐risk investment and spending. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.118.3">Further, as increases in the money supply effectively mean low interest rates, the incentive to save and invest is diminished while the incentive to borrow increases.</span></p>
<p id="c05-para-0041"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.119.1">The track record of the 46‐year experiment with unsound money bears out this conclusion. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.119.2">Savings rates have been declining across the developed countries, dropping to very low levels, while personal, municipal, and national debts have increased to levels which would have seemed unimaginable in the past. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.119.3">(See </span><a id="R_c05-fig-0005" href="#c05-fig-0005"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.120.1">Figure 12</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.121.1">.</span><sup><a id="fn-11" href="#fn11"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.122.1">11</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.123.1">)</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.124.1"><img alt="Graphical illustration of national savings rates in major economies, 1970–2016." src="images/c05f005.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c05-fig-0005" id="c05-fig-0005"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.125.1">Figure 12</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.126.1"> National savings rates in major economies, 1970–2016, %.</span></p></figcaption></figure>
<p id="c05-para-0042"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.127.1">Only Switzerland, which remained on an official gold standard until 1934, and continued to back its currency with large reserves of gold until the early 1990s, has continued to have a high savings rate, standing as the last bastion of low‐time‐preference Western civilization with a savings rate in the double digits, as every other Western economy has plummeted into the single digits and even to negative saving rates in some cases. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.127.2">The average savings rate of the seven largest advanced economies</span><sup><a id="fn-12" href="#fn12"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.1">12</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.129.1"> was 12.66% in 1970, but</span><span epub:type="pagebreak" title="91" id="Page_91"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.130.1"> has dropped to 3.39% in 2015, a fall of almost three‐quarters.</span></p>
<p id="c05-para-0043"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.1">While savings rates have plummeted across the western world, indebtedness continues to rise. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.2">The average household in the West is indebted by more than 100% of its annual income, while the total debt burden of the various levels of government and households exceeds GDP by multiples, with significant consequences. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.3">Such numbers have become normalized as Keynesian economists assure citizens that debt is good for growth and that saving would result in recessions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.4">One of the most mendacious fantasies that pervades Keynesian economic thought is the idea that the national debt “does not matter, since we owe it to ourselves.” </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.5">Only a high‐time‐preference disciple of Keynes could fail to understand that this “ourselves” is not one homogeneous blob but is differentiated into several generations—namely, the current ones which consume recklessly at the expense of future ones. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.6">To make matters worse, this phrase is usually followed by emotional blackmail along the lines of “we would be short‐changing ourselves if we didn't borrow to invest for our future.”</span></p>
<p id="c05-para-0044"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.1">Many pretend this is a miraculous modern discovery from Keynes's brilliant insight that spending is all that matters, and that by ensuring spending remains high, debts can continue to grow indefinitely and savings can be eliminated. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.2">In reality, there is nothing new in this policy, which was employed by the decadent emperors of Rome during its decline, except that it is being applied</span><span epub:type="pagebreak" title="92" id="Page_92"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.133.1"> with government‐issued paper money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.133.2">Indeed, paper money allows it to be managed a little more smoothly, and less obviously, than the metallic coins of old. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.133.3">But the results are the same.</span></p>
<p id="c05-para-0045"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.1">The twentieth century's binge on conspicuous consumption cannot be understood separately from the destruction of sound money and the outbreak of Keynesian high‐time‐preference thinking, in vilifying savings and deifying consumption as the key to economic prosperity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.2">The reduced incentive to save is mirrored with an increased incentive to spend, and with interest rates regularly manipulated downwards and banks able to issue more credit than ever, lending stopped being restricted to investment, but has moved on to consumption. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.3">Credit cards and consumer loans allow individuals to borrow for the sake of consumption without even the pretense of performing investment in the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.4">It is an ironic sign of the depth of modern‐day economic ignorance fomented by Keynesian economics that capitalism—an economic system based on </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.1">capital accumulation</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.136.1"> from saving—is blamed for unleashing conspicuous consumption—the exact opposite of capital accumulation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.136.2">Capitalism is what happens when people drop their time preference, defer immediate gratification, and invest in the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.136.3">Debt‐fueled mass consumption is as much a normal part of capitalism as asphyxiation is a normal part of respiration.</span></p>
<p id="c05-para-0046"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.1">This also helps explain one of the key Keynesian misunderstandings of economics, which considers that delaying current consumption by saving will put workers out of work and cause economic production to stall. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.2">Keynes viewed the level of spending at any point in time as being the most important determinant of the state of the economy because, having studied no economics, he had no understanding of capital theory and how employment does not only have to be in final goods, but can also be in the production of capital goods which will only produce final goods in the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.3">And having lived off of his family's considerable fortune without having to work real jobs, Keynes had no appreciation of saving or capital accumulation and their essential role in economic growth. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.4">Hence, Keynes would observe a recession concurrently with a fall in consumer spending and increase in saving, and assume the causality runs from increased savings to decreased consumption to recession. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.5">Had he had the temperament to study capital theory, he would have understood that the</span><span epub:type="pagebreak" title="93" id="Page_93"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.138.1"> decreased consumption was a natural reaction to the business cycle, which was in turn caused by the expansion of the money supply, as will be discussed in </span><a href="c06.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.139.1">Chapter 6</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.140.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.140.2">He would also have understood that the only cause of economic growth in the first place is delayed gratification, saving, and investment, which extend the length of the production cycle and increase the productivity of the methods of production, leading to better standards of living. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.140.3">He would have realized the only reason he was born into a rich family in a rich society was that his ancestors had spent centuries accumulating capital, deferring gratification and investing in the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.140.4">But, like the Roman emperors during the decay of the empire, he could never understand the work and sacrifice needed to build his affluence and believed instead that high consumption is the cause of prosperity rather than its consequence.</span></p>
<p id="c05-para-0047"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.1">Debt is the opposite of saving. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.2">If saving creates the possibility of capital accumulation and civilizational advance, debt is what can reverse it, through the reduction in capital stocks across generations, reduced productivity, and a decline in living standards. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.3">Whether it is housing debt, Social Security obligations, or government debt that will require ever‐higher taxes and debt monetization to refinance, the current generations may be the first in the western world since the demise of the Roman Empire (or, at least, the Industrial Revolution) to come into the world with less capital than their parents. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.4">Rather than witness their savings accumulate and raise the capital stock, this generation has to work to pay off the growing interest on its debt, working harder to fund entitlement programs they will barely get to enjoy while paying higher taxes and barely being able to save for their old age.</span></p>
<p id="c05-para-0048"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.142.1">This move from sound money to depreciating money has led to several generations of accumulated wealth being squandered on conspicuous consumption within a generation or two, making indebtedness the new method for funding major expenses. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.142.2">Whereas 100 years ago most people would pay for their house, education, or marriage from their own labor or accumulated savings, such a notion seems ridiculous to people today. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.142.3">Even the wealthy will not live within their means and will instead use their wealth to allow them larger loans to finance large purchases. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.142.4">This sort of arrangement can last for a while, but its lasting cannot be mistaken for sustainability, as it is no more than the systematic consumption of the capital</span><span epub:type="pagebreak" title="94" id="Page_94"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.1"> stock of society—the eating of the seed crop.</span></p>
<p id="c05-para-0049"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.144.1">When money was nationalized, it was placed under the command of politicians who operate over short time‐horizons of a few years, trying their best to get reelected. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.144.2">It was only natural that such a process would lead to short‐term decision making where politicians abuse the currency to fund their reelection campaigns at the expense of future generations. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.144.3">As H. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.144.4">L. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.144.5">Mencken put it: “Every election is an advanced auction on stolen goods.”</span><sup><a id="fn-13" href="#fn13"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.145.1">13</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.146.1"> In a society where money is free and sound, individuals have to make decisions with their capital that affect their families in the long run. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.146.2">While it is likely that some would make irresponsible decisions that hurt their offspring, those who wanted to make responsible decisions had the choice to do so. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.146.3">With nationalized money, that became an increasingly harder choice to make, as central governmental control of money supply inevitably destroys incentives to save while increasing the incentive to borrow. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.146.4">No matter how prudent a person, his children will still witness their savings lose value and have to pay taxes to cover for the inflationary largesse of their government.</span></p>
<p id="c05-para-0050"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.1">As the reduction in intergenerational inheritance has reduced the strength of the family as a unit, government's unlimited checkbook has increased its ability to direct and shape the lives of people, allowing it an increasingly important role to play in more aspects of individuals' lives. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.2">The family's ability to finance the individual has been eclipsed by the state's largesse, resulting in a declining incentives for maintaining a family.</span></p>
