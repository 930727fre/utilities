<p id="c05-para-0051"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.148.1">In a traditional society, individuals are aware that they will need children to support them in the future, and so will spend their healthy young years starting a family and investing in giving their children the best life possible. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.148.2">But if long‐term investment in general is disincentivized, if saving is likely to be counterproductive as money depreciates, this investment becomes less profitable. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.148.3">Further, as politicians sell people the lie that eternal welfare and retirement benefits are possible through the magic of the monetary printing press, the investment in a family becomes less and less valuable. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.148.4">Over time, the incentive to start a family declines and more and more people</span><span epub:type="pagebreak" title="95" id="Page_95"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.149.1"> end up leading single lives. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.149.2">More marriages are likely to break down as partners are less likely to put in the necessary emotional, moral, and financial investment to make them work, while marriages that do survive will likely produce fewer children. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.149.3">The well‐known phenomenon of the modern breakdown of the family cannot be understood without recognizing the role of unsound money allowing the state to appropriate many of the essential roles that the family has played for millennia, and reducing the incentive of all members of a family to invest in long‐term familial relations.</span></p>
<p id="c05-para-0052"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.150.1">Substituting the family with government largesse has arguably been a losing trade for individuals who have partaken in it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.150.2">Several studies show that life satisfaction depends to a large degree on establishing intimate long‐term familial bonds with a partner and children.</span><sup><a id="fn-14" href="#fn14"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.151.1">14</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.152.1"> Many studies also show that rates of depression and psychological diseases are rising over time as the family breaks down, particularly for women.</span><sup><a id="fn-15" href="#fn15"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.153.1">15</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.154.1"> Cases of depression and psychological disorders very frequently have family breakdown as a leading cause.</span></p>
<p id="c05-para-0053"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.155.1">It is no coincidence that the breakdown of the family has come about through the implementation of the economic teachings of a man who never had any interest in the long term. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.155.2">A son of a rich family that had accumulated significant capital over generations, Keynes was a libertine hedonist who wasted most his adult life engaging in sexual relationships with children, including traveling around the Mediterranean to visit children's brothels.</span><sup><a id="fn-16" href="#fn16"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.1">16</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.157.1"> Whereas Victorian Britain was a low‐time‐preference society with a strong sense of morality, low interpersonal conflict, and stable families, Keynes was part of a generation that rose against these traditions and viewed them as a repressive institution to be brought down. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.157.2">It is impossible to understand the economics of Keynes without understanding the kind of morality</span><span epub:type="pagebreak" title="96" id="Page_96"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.158.1"> he wanted to see in a society he increasingly believed he could shape according to his will.</span></p></section>
<section><span id="c05-sec-0004"/>
<h2 id="head-2-16"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.159.1">Innovations: “Zero to One” versus “One to Many”</span></h2>
<p id="c05-para-0054"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.160.1">The impact of sound money on time preference and future orientation can be seen in more than just the level of savings, but also in the type of projects in which a society invests. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.160.2">Under a sound money regime, similar to what the world had in the late nineteenth century, individuals are far more likely to engage in long‐term investments and to have large amounts of capital available to finance the sort of projects that will require a long time to pay off. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.160.3">As a result, some of the most important innovations in human history were born in the golden era at the end of the nineteenth century.</span></p>
<p id="c05-para-0055"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.161.1">In their seminal work, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.162.1">The History of Science and Technology</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.163.1">, Bunch and Hellemans compile a list of the 8,583 most important innovations and inventions in the history of science and technology. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.163.2">Physicist Jonathan Huebner</span><sup><a id="fn-17" href="#fn17"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.164.1">17</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.165.1"> analyzed all these events along with the years in which they happened and global population at that year, and measured the rate of occurrence of these events per year per capita since the Dark Ages. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.165.2">Huebner found that while the total number of innovations rose in the twentieth century, the number of innovations per capita peaked in the nineteenth century.</span></p>
<p id="c05-para-0056"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.166.1">A closer look at the innovations of the pre‐1914 world lends support to Huebner's data. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.166.2">It is no exaggeration to say that our modern world was invented in the gold standard years preceding World War I. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.166.3">The twentieth century was the century that refined, improved, optimized, economized, and popularized the inventions of the nineteenth century. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.166.4">The wonders of the twentieth century's improvements make it easy to forget that the actual inventions—the transformative world‐changing innovations—almost all came in the golden era.</span></p>
<p id="c05-para-0057"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.167.1">In his popular book, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.1">From Zero to One</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.169.1">, Peter Thiel discusses the impact of the visionaries who create a new world by producing the first successful example of a new</span><span epub:type="pagebreak" title="97" id="Page_97"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.170.1"> technology. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.170.2">The move from having “zero to one” successful example of a technology, as he terms it, is the hardest and most significant step in an invention, whereas the move from “one to many” is a matter of scaling, marketing, and optimization. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.170.3">Those of us who are enamored with the concept of progress might find it hard to swallow the fact that the world of sound money pre‐1914 was the world of zero to one, whereas the post‐1914 world of government‐produced money is the world of moving from one to many. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.170.4">There is nothing wrong with the move from one to many, but it certainly gives us plenty of food for thought to consider why we do not have many more zero‐to‐one transformations under our modern monetary system.</span></p>
<p id="c05-para-0058"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.171.1">The majority of the technology we use in our modern life was invented in the nineteenth century, under the gold standard, financed with the ever‐growing stock of capital accumulated by savers storing their wealth in a sound money and store of value which did not depreciate quickly. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.171.2">A summary of some of the most important innovations of the period is provided here:</span></p>
<ul>
<li id="c05-li-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.172.1">Hot and cold running water, indoor toilets, plumbing, central heating:
</span><p><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.1">These inventions, taken for granted today by anyone living in a civilized society, are the difference between life and death for most of us. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.2">They have been the main factor in the elimination of most infectious diseases across the globe, and allowed for the growth of urban areas without the ever‐present scourge of diseases.</span></p></li>
<li id="c05-li-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.1">Electricity, internal combustion engine, mass production:
</span><p><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.175.1">Our modern industrial society was built around the growth in utilization of hydrocarbon energy, without which none of the trappings of modern civilization would be possible. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.175.2">These foundational technologies of energy and industry were invented in the nineteenth century.</span></p></li>
<li id="c05-li-0003"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.176.1">Automobile, airplane, city subway, electric elevator:
</span><p><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.1">We have </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.178.1">la belle époque</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.179.1"> to thank for our cities' streets not being littered with horse manure, and for our ability to travel around the world. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.179.2">The automobile was invented by Karl Benz in 1885, the airplane by the Wright brothers in 1906, the subway by Charles Pearson in 1843, and the electric elevator by Elisha Otis in 1852.</span></p></li>
<li id="c05-li-0004"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.180.1">Heart surgery; organ</span><span epub:type="pagebreak" title="98" id="Page_98"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.181.1"> transplant; appendectomy; baby incubator; radiation therapy; anesthetics, aspirin, blood types and blood transfusions, vitamins, electrocardiograph, stethoscope:
</span><p><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.182.1">Surgery and modern medicine owe their most significant advances to </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.1">la belle époque</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.184.1"> as well. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.184.2">The introduction of modern sanitation and reliable hydrocarbon energy allowed doctors to transform the way they cared for their patients after centuries of largely counterproductive measures.</span></p></li>
<li id="c05-li-0005"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.185.1">Petroleum‐derived chemicals, stainless steel, nitrogen‐based fertilizers:
</span><p><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.186.1">The industrial substances and materials which make our modern life possible all derive from the transformative innovations of </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.187.1">la belle époque</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.188.1">, which allowed for mass industrialization, as well as mass agriculture. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.188.2">Plastics, and everything that comes from them, are a product of the utilization of petroleum‐derived chemicals.</span></p></li>
<li id="c05-li-0006"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.189.1">Telephone, wireless telegraphy, voice recording, color photography, movies:
</span><p><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.190.1">While we like to think of our modern era as being the era of mass telecommunication, in reality, most of what we have achieved in the twentieth century was to improve on the innovations of the nineteenth. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.190.2">The first computer was the Babbage computer, designed in 1833 by Charles Babbage, but completed by his son Henry in 1888. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.190.3">It might be an exaggeration to say that the Internet and all it contains are bells and whistles added onto the invention of the telegraph in 1843, but it does contain a kernel of truth. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.190.4">It was the telegraph which fundamentally transformed human society by allowing for communication without the need for the physical transport of letters or messengers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.190.5">That was telecommunication's zero‐to‐one moment, and everything that followed, for all its wonders, has been a one‐to‐many improvement.</span></p></li></ul>
</section>
<section><span id="c05-sec-0005"/>
<h2 id="head-2-17"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.191.1">Artistic Flourishing</span></h2>
<p id="c05-para-0071"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.192.1">The contributions of sound money to human flourishing are not restricted to scientific and technological advance; they can also be vividly seen in the art world. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.192.2">It is no coincidence that Florentine and Venetian artists were the</span><span epub:type="pagebreak" title="99" id="Page_99"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.193.1"> leaders of the Renaissance, as these were the two cities which led Europe in the adoption of sound money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.193.2">The Baroque, Neoclassical, Romantic, Realistic, and post‐Impressionistic schools were all financed by wealthy patrons holding sound money, with a very low time preference and the patience to wait for years, or even decades, for the completion of masterpieces meant to survive for centuries. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.193.3">The astonishing domes of Europe's churches, built and decorated over decades of inspired meticulous work by incomparable architects and artists like Filippo Brunelleschi and Michelangelo, were all financed with sound money by patrons with very low time preference. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.193.4">The only way to impress these patrons was to build artwork that would last long enough to immortalize their names as the owners of great collections and patrons of great artists. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.193.5">This is why Florence's Medicis are perhaps better remembered for their patronage of the arts than for their innovations in banking and finance, though the latter may be far more consequential.</span></p>
<p id="c05-para-0072"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.194.1">Similarly, the musical works of Bach, Mozart, Beethoven, and the composers of the Renaissance, Classical, and Romantic eras put to shame today's animalistic noises recorded in batches of a few minutes, churned out by the ton by studios profiting from selling to man the titillation of his basest instincts. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.194.2">Whereas the music of the golden era spoke to man's soul and awakened him to think of higher callings than the mundane grind of daily life, today's musical noises speak to man's most base animalistic instincts, distracting him from the realities of life by inviting him to indulge in immediate sensory pleasures with no concern for long‐term consequences or anything more profound. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.194.3">It was hard money that financed Bach's </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.195.1">Brandenburg Concertos</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.196.1"> while easy money financed Miley Cyrus's twerks.</span></p>
<p id="c05-para-0073"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.197.1">In times of sound money and low time preference, artists worked on perfecting their craft so they could produce valuable works in the long run. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.197.2">They spent years learning the intricate details and techniques of their work, perfecting it and excelling in developing it beyond the capabilities of others, to the astonishment of their patrons and the general public. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.197.3">Nobody stood a chance of being called an artist without years of hard work on developing their craft. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.197.4">Artists did not condescendingly lecture the public on what art is and why their lazy productions that took a day to make are profound. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.197.5">Bach never claimed to be a genius or spoke at length about how his</span><span epub:type="pagebreak" title="100" id="Page_100"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.198.1"> music was better than that of others; he instead spent his life perfecting his craft. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.198.2">Michelangelo spent four years hanging from the ceiling of the Sistine Chapel working for most of the day with little food in order to paint his masterpiece. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.198.3">He even wrote a poem to describe the ordeal:</span><sup><a id="fn-18" href="#fn18"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.199.1">18</span></a></sup></p>
<blockquote>
<p id="c05-line-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.200.1">I've grown a goitre by dwelling in this den—</span></p>
<p id="c05-line-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.201.1">As cats from stagnant streams in Lombardy,</span></p>
<p id="c05-line-0003"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.202.1">Or in what other land they hap to be—</span></p>
<p id="c05-line-0004"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.203.1">Which drives the belly close beneath the chin:</span></p>
<p id="c05-line-0005"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.204.1">My beard turns up to heaven; my nape falls in,</span></p>
<p id="c05-line-0006"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.205.1">Fixed on my spine: my breast‐bone visibly</span></p>
<p id="c05-line-0007"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.206.1">Grows like a harp: a rich embroidery</span></p>
<p id="c05-line-0008"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.207.1">Bedews my face from brush‐drops thick and thin.</span></p>
<p id="c05-line-0009"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.208.1">My loins into my paunch like levers grind:</span></p>
<p id="c05-line-0010"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.209.1">My buttock like a crupper bears my weight;</span></p>
<p id="c05-line-0011"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.210.1">My feet unguided wander to and fro;</span></p>
<p id="c05-line-0012"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.211.1">In front my skin grows loose and long; behind,</span></p>
<p id="c05-line-0013"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.212.1">By bending it becomes more taut and strait;</span></p>
<p id="c05-line-0014"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.213.1">Crosswise I strain me like a Syrian bow:</span></p>
<p id="c05-line-0015"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.214.1">Whence false and quaint, I know,</span></p>
<p id="c05-line-0016"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.215.1">Must be the fruit of squinting brain and eye;</span></p>
<p id="c05-line-0017"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.216.1">For ill can aim the gun that bends awry.</span></p>
<p id="c05-line-0018"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.217.1">Come then, Giovanni, try</span></p>
<p id="c05-line-0019"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.218.1">To succour my dead pictures and my fame;</span></p>
<p id="c05-line-0020"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.219.1">Since foul I fare and painting is my shame.</span></p>
</blockquote>
<p id="c05-para-0074"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.220.1">Only with such meticulous and dedicated effort over many decades did these geniuses succeed in producing these masterpieces, immortalizing their names as the masters of their craft. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.220.2">In the era of unsound money, no artist has the low time preference to work as hard or as long as Michelangelo or Bach to learn their craft properly or spend any significant amount of time perfecting it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.220.3">A stroll through a modern art gallery shows artistic works whose production requires no more effort or talent than can be mustered by a bored 6‐year‐old. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.220.4">Modern artists have replaced craft and long hours</span><span epub:type="pagebreak" title="101" id="Page_101"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.221.1"> of practice with pretentiousness, shock value, indignation, and existential angst as ways to cow audiences into appreciating their art, and often added some pretense to political ideals, usually of the puerile Marxist variety, to pretend‐play profundity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.221.2">To the extent that anything good can be said about modern “art,” it is that it is clever, in the manner of a prank or practical joke. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.221.3">There is nothing beautiful or admirable about the output or the process of most modern art, because it was produced in a matter of hours by lazy talentless hacks who never bothered to practice their craft. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.221.4">Only cheap pretentiousness, obscenity, and shock value attract attention to the naked emperor of modern art, and only long pretentious diatribes shaming others for not understanding the work give it value.</span></p>
<p id="c05-para-0075"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.222.1">As government money has replaced sound money, patrons with low time preference and refined tastes have been replaced by government bureaucrats with political agendas as crude as their artistic taste. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.222.2">Naturally, then, neither beauty nor longevity matters anymore, replaced with political prattling and the ability to impress bureaucrats who control the major funding sources to the large galleries and museums, which have become a government‐protected monopoly on artistic taste and standards for artistic education. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.222.3">Free competition between artists and donors is now replaced with central planning by unaccountable bureaucrats, with predictably disastrous results. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.222.4">In free markets, the winners are always the ones who provide the goods deemed best by the public. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.222.5">When government is in charge of deciding winners and losers, the sort of people who have nothing better to do with their life than work as government bureaucrats are the arbiters of taste and beauty. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.222.6">Instead of art's success being determined by the people who have succeeded in attaining wealth through several generations of intelligence and low time preference, it is instead determined by the people with the opportunism to rise in the political and bureaucratic system best. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.222.7">A passing familiarity with this kind of people is enough to explain to anyone how we can end up with the monstrosities of today's art.</span></p>
<p id="c05-para-0076"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.223.1">In their fiat‐fueled ever‐growing realm of control, almost all modern governments dedicate budgets to finance art and artists in various media. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.223.2">But as time has gone by, bizarre and barely believable stories have emerged about covert government meddling in arts for political agendas. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.223.3">While the Soviets funded and directed communist “art” to achieve political and propaganda</span><span epub:type="pagebreak" title="102" id="Page_102"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.224.1"> goals, it has recently emerged that the CIA retorted by financing and promoting the work of abstract expressionist mattress and cardboard molesters such as Mark Rothko and Jackson Pollock to serve as an American counter.</span><sup><a id="fn-19" href="#fn19"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.225.1">19</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.226.1"> Only with unsound money could we have reached this artistic calamity where the two largest economic, military, and political behemoths in the world were actively promoting and funding tasteless trash picked by people whose artistic tastes qualify them for careers in Washington and Moscow spy agencies and bureaucracies.</span></p>
<p id="c05-para-0077"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.227.1">As the Medicis have been replaced with the artistic equivalents of DMV workers, the result is an art world teeming with visually repulsive garbage produced in a matter of minutes by lazy talentless hacks looking for a quick paycheck by scamming the world's aspirants to artistic class with concocted nonsensical stories about it symbolizing anything more than the utter depravity of the scoundrel pretending to be an artist who made it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.227.2">Mark Rothko's “art” took mere hours to produce, but was sold to gullible collectors holding millions of today's unsound money, clearly solidifying modern art as the most lucrative get‐rich‐quick scam of our age. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.227.3">No talent, hard work, or effort is required on the part of a modern artist, just a straight face and a snobby attitude when recounting to the nouveau riche why the splatter of paint on a canvas is anything more than a hideous thoughtless splatter of paint, and how their inability to understand the work of art unexplained can be easily remedied with a fat check.</span></p>
<p id="c05-para-0078"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.1">What is astounding is not just the preponderance of garbage like Rothko's in the modern art world; it is the conspicuous absence of great masterpieces that can compare with the great works of the past. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.2">One cannot help but notice that there aren't too many Sistine Chapels being constructed today anywhere; nor are there many masterpieces to compare with the great paintings of Leonardo, Rafael, Rembrandt, Carvaggio, or Vermeer. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.3">This is even more astonishing when one realizes that advances in technology and industrialization would make producing such artwork far easier to accomplish than it was in the golden era.</span></p>
<p id="c05-para-0079"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.229.1">The Sistine Chapel will</span><span epub:type="pagebreak" title="103" id="Page_103"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.230.1"> leave its viewer in awe, and any further explanation of its content, method, and history will transform the awe into appreciation of the depth of thought, craft, and hard work that went into it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.230.2">Before they became famous, even the most pretentious of art critics could have passed by a Rothko painting neglected on a sidewalk and not even noticed it, let alone bothered to pick it up and take it home. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.230.3">Only after a circle jerk of critics have spent endless hours pontificating to promote this work will the hangers‐on and aspirant nouveau riche begin to pretend there is deeper meaning to it and spend modern unsound money on it.</span></p>
<p id="c05-para-0080"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.231.1">Several stories have surfaced over the years of pranksters leaving random objects in modern art museums, only for modern art lovers to swarm around them in admiration, illustrating the utter vacuity of our era's artistic tastes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.231.2">But there is perhaps no more fitting tribute to the value of modern art than the many janitors at art exhibits worldwide who, demonstrating admirable perceptiveness and dedication to their job, have repeatedly thrown expensive modern art installations into the dustbins to which they belong. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.231.3">Some of the most iconic “artists” of our era, such as Damien Hirst, Gustav Metzger, Tracey Emin, and Italian duo Sara Goldschmied and Eleonora Chiara, have received this critical appraisal by janitors more discerning than the insecure nouveau riche who spent millions of dollars on what the janitors threw away.</span></p>
<p id="c05-para-0081"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.232.1">A case can be made for ignoring all this worthless scribbling as just a government‐funded embarrassment to our era and looking beyond it for what is worthwhile. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.232.2">Nobody, after all, would judge a country like America by the behavior of its incompetent DMV employees napping on their shifts as they take out their frustrations on their hapless customers, and perhaps we shouldn't judge our era by the work of government workers spinning stories about piles of worthless cardboard as if they were artistic achievements. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.232.3">But even then, we find less and less that can hold a candle to the past. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.232.4">In </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.233.1">From Dawn to Decadence</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.234.1">, a devastating critique of modern “demotic” culture, Jacques Barzun concludes: “All that the 20C has contributed and created since is refinement by ANALYSIS or criticism by pastiche and parody.” </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.234.2">Barzun's work has resonated with many of this generation because it contains a large degree of depressing truth: once one overcomes one's inherent bias to believe in the inevitability of progress, there is no escaping the conclusion that ours is a generation that is inferior to its ancestors</span><span epub:type="pagebreak" title="104" id="Page_104"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.235.1"> in culture and refinement, in the same way the Roman subjects of Diocletian, living off his inflationary spending and drunk on the barbaric spectacles of the Colosseum, could not hold a candle to the great Romans of Caesar's era, who had to earn their aureus coins with sober hard work.</span></p>
</section>
</section>

<aside class="noteEntry" epub:type="rearnote"><a id="fn16" href="#fn-16"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.304.1">16</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.305.1"> See Michael Holroyd, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.306.1">Lytton Strachey: The New Biography</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.307.1">, vol. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.307.2">I, p. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.307.3">80, in which a letter sent by Keynes to his friend Lytton Strachey in the Bloomsbury set advised them to visit Tunis “where bed and boy were not expensive.” </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.307.4">See also David Felix, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.308.1">Keynes: A Critical Life</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.309.1">, p. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.309.2">112, which quotes a letter from Keynes in which he informs a friend, “I'm leaving for Egypt … I just learned that ‘bed and boy’ is prepared.” </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.309.3">In another letter, he recommended Strachey go to Tunis and Sicily “if you want to go to where the naked boys dance.”</span></aside>
