</figure>
<p id="c08-para-0054"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.333.1">Bitcoin's volatility derives from the fact that its supply is utterly inflexible and not responsive to demand changes, because it is programmed to grow at a predetermined rate. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.333.2">For any regular commodity, the variation in demand will affect the production decisions of producers of the commodity: an increase in demand causes them to increase their production, moderating the rise in the price and allowing them to increase their profitability, while a decrease in demand would cause producers to decrease their supply and allow them to minimize losses. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.333.3">A similar situation exists with national currencies, where central banks are expected to maintain relative stability in the purchasing power of their currencies by setting the parameters of their monetary policy to counteract market fluctuations. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.333.4">With a supply schedule utterly irresponsive to demand, and no central bank to manage the supply, there will likely be volatility, particularly at the early stages when</span><span epub:type="pagebreak" title="190" id="Page_190"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.334.1"> demand varies very erratically from day to day, and the financial markets that deal with Bitcoin are still infant.</span></p>
<p id="c08-para-0055"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.335.1">But as the size of the market grows, along with the sophistication and the depth of the financial institutions dealing with Bitcoin, this volatility will likely decline. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.335.2">With a larger and more liquid market, the daily variations in demand are likely to become relatively smaller, allowing market makers to profit from hedging price variations and smoothing the price. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.335.3">This will only be achieved if and when a large number of market participants hold bitcoins with the intent of holding onto them for the long term, raising the market value of the supply of bitcoins significantly and making a large liquid market possible with only a fraction of the supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.335.4">Should the network reach a stable size at any point, the flow of funds in and out of it would be relatively equal and the price of bitcoin can stabilize. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.335.5">In such a case, Bitcoin would gain more stability while also having enough liquidity to not move significantly with daily market transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.335.6">But as long as Bitcoin continues to grow in adoption, its appreciation attracts more adopters to it, leading to further appreciation, making this drop in volatility further away. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.335.7">As long as Bitcoin is growing, its token price will behave like that of a stock of a start‐up achieving very fast growth. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.335.8">Should Bitcoin's growth stop and stabilize, it would stop attracting high‐risk investment flows, and become just a normal monetary asset expected to appreciate slightly every year.</span></p></section>
<div class="pagebreak"/>
<section>
<h2 id="head-2-30"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.336.1">Appendix to Chapter 8</span></h2>
<section><span id="c08-sec-1000"/>
<p id="c08-para-3001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.337.1">The following is a brief description</span><span epub:type="pagebreak" title="191" id="Page_191"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.338.1"> of three technologies utilized by Bitcoin:</span></p>
<p id="c08-para-3002"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.339.1">Hashing</span></b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.340.1"> is a process that can take any stream of data as an input and transform it into a dataset of fixed size (known as a hash) using a non‐reversible mathematical formula. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.340.2">In other words, it is trivial to use this function to generate a uniform‐sized hash for any piece of data, but it is not possible to determine the original string of data from the hash. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.340.3">Hashing is essential for the operation of Bitcoin as it is used in digital signatures, proof‐of‐work, Merkle trees, transaction identifiers, Bitcoin addresses, and various other applications. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.340.4">Hashing in essence allows identifying a piece of data in public without revealing anything about that data, which can be used to securely and trustlessly see if multiple parties have the same data.</span></p>
<p id="c08-para-3003"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.341.1">Public key cryptography</span></b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.342.1"> is a method for authentication that relies on a set of mathematically related numbers: a private key, a public key, and one or more signatures. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.342.2">The private key, which must be kept secret, can generate a public key that can be distributed freely because it is not possible to determine the private key by examining the public key. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.342.3">This method is used for authentication: after someone publicizes his public key, he can hash some data and then</span><span epub:type="pagebreak" title="192" id="Page_192"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.343.1"> sign that hash with his private key to create a signature. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.343.2">Anyone with the same data can create the same hash and see that it was used to create the signature; then she can compare the signature to the public key she previously received and see that they're both mathematically related, proving that the person with the private key signed the data covered by the hash. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.343.3">Bitcoin utilizes public key cryptography to allow secure value exchange over an open unsecured network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.343.4">A bitcoin holder can only access his bitcoins if he has the private keys attached to them, while the public address associated with them can be distributed widely. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.343.5">All network members can verify the validity of the transaction by verifying that the transactions sending the money came from the owner of the right private key. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.343.6">In Bitcoin, the only form of ownership that exists is through the ownership of the private keys.</span></p>
<p id="c08-para-3004"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.344.1">Peer‐to‐peer network</span></b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.345.1"> is a network structure in which all members have equal privileges and obligations toward one another. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.345.2">There are no central coordinators who can change the rules of the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.345.3">Node operators that disagree with how the network functions cannot impose their opinions on other members of the network or override their privileges. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.345.4">The most well‐known example of a peer‐to‐peer network is BitTorrent, a protocol for sharing files online. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.345.5">Whereas in centralized networks members download files from a central server that hosts them, in BitTorrent, users download files from each other directly, divided into small pieces. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.345.6">Once a user has downloaded a piece of the file, they can become a seed for that file, allowing others to download it from them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.345.7">With this design, a large file can spread relatively quickly without the need for large servers and extensive infrastructure to distribute it, while also protecting against the possibility of a single point of failure compromising the process. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.345.8">Every file that is shared on the network is protected by a cryptographic hash that can be easily verified to ensure that any nodes sharing it have not corrupted it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.345.9">After law enforcement had cracked down on centralized file‐sharing websites such as Napster, BitTorrent's decentralized nature meant law enforcement could never shut it down. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.345.10">With a growing network of users worldwide, BitTorrent at some point represented about a third of all Internet traffic worldwide. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.345.11">Bitcoin utilizes a network similar to BitTorrent, but whereas in BitTorrent the network members share the bits of data that constitute a movie, song, or book, in Bitcoin the network members share the ledger of all Bitcoin transactions.</span></p>
</section>

<h2 id="notes"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.346.1">Notes</span></h2>
<section class="notesList">
<aside class="noteEntry" epub:type="rearnote"><a id="fn1" href="#fn-1"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.347.1">1</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.348.1"> See Nick Szabo, 2001, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.349.1">Trusted Third Parties Are Security Holes</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.350.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.350.2">Available on </span><a href="http://nakamotoinstitute.org"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.351.1">nakamotoinstitute.org</span></a></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn2" href="#fn-2"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.352.1">2</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.353.1"> A brief description of the first three of these technologies is provided in the Appendix to this chapter, while proof‐of‐work is discussed in more detail in this chapter and in </span><a href="c10.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.354.1">Chapter 10</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.355.1">.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn3" href="#fn-3"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.356.1">3</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.357.1"> Konrad Graf, “On the Origins of Bitcoin: Stages of Monetary Evolution” (2013). </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.357.2">Available at </span><a href="http://www.konradsgraf.com"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.358.1">www.konradsgraf.com</span></a></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn4" href="#fn-4"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.359.1">4</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.360.1"> I do not intend to drag this book and the reader into metaphysical questions, but it did occur to me once that the Bitcoin ledger of transactions might just be the only objective set of facts in the world. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.360.2">You could argue (as many philosophers do) that every fact is subjective and its truthfulness is based on the person stating or hearing it, but the Bitcoin ledger of transactions is created through converting electricity and processing power to truth without having to rely on the word of anyone.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn5" href="#fn-5"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.361.1">5</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.362.1"> The only way to own bitcoins is to have control of the private keys. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.362.2">Should someone manage to gain access to your private keys, they have your bitcoins. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.362.3">Theft of private keys is like theft of physical dollars or gold; it is final and irreversible. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.362.4">There is no authority you can call to rescind the theft. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.362.5">This is an unavoidable part of Bitcoin being cash and an important point that potential investors in Bitcoin need to understand full well before putting any sum of money into Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.362.6">Securing the private keys is not a simple task, and not being able to secure them is very risky.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn6" href="#fn-6"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.363.1">6</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.364.1"> Ralph Merkle, “DAOs, Democracy and Governance,” </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.365.1">Cryonics</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.366.1">, vol. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.366.2">37, no. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.366.3">4 (July–August 2016): 28–40; Alcor, </span><a href="http://www.alcor.org"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.367.1">www.alcor.org</span></a></aside>

<aside class="noteEntry" epub:type="rearnote"><a id="fn14" href="#fn-14"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.397.1">14</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.398.1"> CIA World Factbook. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.398.2">Available at </span><a href="https://www.cia.gov/library/publications/the-world-factbook"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.399.1">https://www.cia.gov/library/publications/the‐world‐factbook/</span></a></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn15" href="#fn-15"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.400.1">15</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.401.1"> These comparisons should be taken with a grain of salt, as they are not entirely accurate comparisons of like for like. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.401.2">Government money supply is created not just by the central bank, but also by the banks themselves, while no such process exists for Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.401.3">The measures of money supply also differ from one country to another in terms of which financial assets they would include as part of the money supply.</span></aside>
