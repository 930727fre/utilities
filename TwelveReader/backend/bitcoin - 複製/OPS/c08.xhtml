<section epub:type="chapter">
<header>
<h1><span epub:type="pagebreak" title="167" id="Page_167"/><a id="c08"/><span class="chapterNumber"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.1.1">Chapter 8</span></span><br/><span class="chapterTitle"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.2.1">Digital Money</span></span></h1>
</header>
<section><span id="c08-sec-0001"/>
<p id="c08-para-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.1">The global telecommunication revolution, starting with the production of the first fully programmable computer in the 1950s, has encroached on an increasing number of material aspects of life, providing engineering solutions to hitherto age‐old problems. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.2">While banks and startup firms increasingly utilized computer and network technology for payments and recordkeeping, the innovations that succeeded did not provide a new form of money, and the innovations that tried to provide a new form of money all failed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.3">Bitcoin represents the first truly digital solution to the problem of money, and in it we find a potential solution to the problems of salability, soundness, and sovereignty. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.4">Bitcoin has operated with practically no failure for the past 9 years, and if it continues to operate like this for the next 90, it will be a compelling solution to the problem of money, offering individuals sovereignty over money that is resistant to unexpected inflation while also being highly salable across space, scale, and time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.5">Should Bitcoin continue to operate as it already has, all the previous technologies humans have employed as money—shells, salt, cattle, precious metals, and government paper—may appear</span><span epub:type="pagebreak" title="168" id="Page_168"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.1"> quaint anachronisms in our modern world—abacuses next to our modern computers.</span></p>
<p id="c08-para-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.5.1">We saw how the introduction of metallurgy produced solutions to the problem of money that were superior to beads, shellfish, and other artifacts, and how the emergence of regular coinage allowed gold and silver coins to emerge as superior forms of money to irregular lumps of metal. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.5.2">We further saw how gold‐backed banking allowed gold to dominate as the global monetary standard and led to the demonetization of silver. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.5.3">From the necessity of centralizing gold arose government money backed by gold, which was more salable in scale, but with it came government expansion of the money supply and coercive control which eventually destroyed money's soundness and sovereignty. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.5.4">Every step of the way, technological advances and realities shaped the monetary standards that people employed, and the consequences to economies and society were enormous. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.5.5">Societies and individuals who chose a sound monetary standard, such as the Romans under Caesar, the Byzantines under Constantine, or Europeans under the gold standard, benefited immensely. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.5.6">Those who had unsound or technologically inferior money, such as Yap Islanders with the arrival of O'Keefe, West Africans using glass beads, or the Chinese on a silver standard in the nineteenth century, paid a heavy price.</span></p>
<p id="c08-para-0003"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.1">Bitcoin represents a new technological solution to the money problem, born out of the digital age, utilizing several technological innovations that were developed over the past few decades and building on many attempts at producing digital money to deliver something which was almost unimaginable before it was invented. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.2">To understand why, we will focus on the monetary properties of Bitcoin as well as the economic performance of the network since its inception. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.3">In the same way that a book on the gold standard would not discuss the chemical properties of gold, this chapter will not delve too much into the technical details of the operation of the Bitcoin network, instead focusing on the monetary properties of the bitcoin currency.</span></p></section>
<section><span id="c08-sec-0002"/>
<h2 id="head-2-28"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.7.1">Bitcoin as Digital Cash</span></h2>
<p id="c08-para-0004"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.1">To understand the significance of a technology for digital cash, it is instructive to look at the world before Bitcoin was invented, when one could neatly divide payment methods into</span><span epub:type="pagebreak" title="169" id="Page_169"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.1"> two distinct non‐overlapping categories:</span></p>
<ol class="decimal">
<li id="c08-li-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.1">Cash payments, which are carried out in person between two parties. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.2">These payments have the convenience of being immediate and final, and require no trust on the part of either transacting party. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.3">There is no delay in the execution of the payment, and no third party can effectively intervene to stop such payments. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.4">Their main drawback is the need for the two parties to be physically present in the same place at the same time, a problem which becomes more and more pronounced as telecommunication makes it more likely for individuals to want to transact with persons who are not in their immediate vicinity.</span></li>
<li id="c08-li-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.11.1">Intermediated payments, which require a trusted third party, and comprise cheques, credit cards, debit cards, bank wire transfers, money transfer services, and more recent innovations such as PayPal. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.11.2">By definition, intermediated payment involves a third party handling the money transfer between the two transacting parties. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.11.3">The main advantages of intermediated payments are allowing payments without the two parties having to be at the same place at the same time, and allowing the payer to make payment without having to carry her money on her. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.11.4">Their main drawback is the trust that is required in execution of the transactions, the risk of the third party being compromised, and the costs and time required for the payment to be completed and cleared to allow the recipient to spend it.</span></li></ol>
<p id="c08-para-0005"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.1">Both forms of payment have their advantages and drawbacks, and most people resort to a combination of the two in their economic transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.2">Before the invention of Bitcoin, intermediated payments included (though were not limited to) all forms of digital payment. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.3">The nature of digital objects, since the inception of computers, is that they are not scarce. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.4">They can be reproduced endlessly, and as such it was impossible to make a currency out of them, because sending them will only duplicate them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.5">Any form of electronic payment had to be carried out via an intermediary because of the danger of double‐spending: there was no way of guaranteeing that the payer was being honest with his funds, and not using them more than once, unless there was a trusted third party overseeing the account and able</span><span epub:type="pagebreak" title="170" id="Page_170"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.1"> to verify the integrity of the payments carried out. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.2">Cash transactions were confined to the physical realm of direct contact, while all digital forms of payments had to be supervised by a third party.</span></p>
<p id="c08-para-0006"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.14.1">After years of innovative trial and error by many programmers, and through relying on a wide range of technologies, Bitcoin was the first engineering solution that allowed for digital payments without having to rely on a trusted third‐party intermediary. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.14.2">By being the first digital object that is verifiably scarce, Bitcoin is the first example of </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.15.1">digital cash</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.16.1">.</span></p>
<p id="c08-para-0007"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.17.1">There are several drawbacks to transacting through trusted third parties which make digital cash a valuable proposition for many. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.17.2">Third parties are by their very nature an added security weakness</span><sup><a id="fn-1" href="#fn1"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.1">1</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.19.1">—involving an extra party in your transaction inherently introduces risk, because it opens up new possibilities for theft or technical failure. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.19.2">Further, payment through intermediaries leaves the parties vulnerable to surveillance and bans by political authorities. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.19.3">In other words, when resorting to any form of digital payment, there was no alternative to trusting in a third party, and whichever political authorities rule over it, and being subject to the risk of the political authority stopping the payment under pretexts of security, terrorism, or money laundering. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.19.4">To make matters worse, intermediated payments always involve a risk of fraud, which raises transaction costs and delays final settlement of payments.</span></p>
<p id="c08-para-0008"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.1">In other words, intermediated payments take away a significant share of the properties of money as a medium of exchange controlled by its owner, with high liquidity for him to sell whenever he wants. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.2">Of the most persistent characteristics of money historically are fungibility (any unit of money is equivalent to any other unit), and liquidity (ability of the owner to sell quickly at market price). </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.3">People choose moneys that are fungible and liquid because they want sovereignty over their money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.4">Sovereign money contains within it all the permission needed to spend it; the desire for others to hold it exceeds the ability of others to impose controls on it.</span></p>
<p id="c08-para-0009"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.1">While intermediated payments compromise some of the desirable features of money, these shortcomings are not present in physical cash transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.2">But as more trade and</span><span epub:type="pagebreak" title="171" id="Page_171"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.1"> employment takes place over long distances thanks to modern telecommunication, physical cash transactions become prohibitively impractical. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.2">The move toward digital payments was reducing the amount of sovereignty people have over their own money and leaving them subject to the whims of the third parties they had no choice but to trust. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.3">Further, the move from gold, which is money that nobody can print, toward fiat currencies whose supply is controlled by central banks further reduced people's sovereignty over their wealth and left them helpless in the face of the slow erosion of the value of their money as central banks inflated the money supply to fund government operation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.4">It became increasingly impractical to accumulate capital and wealth without the permission of the government issuing that money.</span></p>
<p id="c08-para-0010"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.1">Satoshi Nakamoto's motivation for Bitcoin was to create a “purely peer‐to‐peer form of electronic cash” that would not require trust in third parties for transactions and whose supply cannot be altered by any other party. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.2">In other words, Bitcoin would bring the desirable features of physical cash (lack of intermediaries, finality of transactions) to the digital realm and combine them with an ironclad monetary policy that cannot be manipulated to produce unexpected inflation to benefit an outside party at the expense of holders. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.3">Nakamoto succeeded in achieving this through the utilization of a few important though not widely understood technologies: a distributed peer‐to‐peer network with no single point of failure, hashing, digital signatures, and proof‐of‐work.</span><sup><a id="fn-2" href="#fn2"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.1">2</span></a></sup></p>
<p id="c08-para-0011"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.1">Nakamoto removed the need for trust in a third party by building Bitcoin on a foundation of very thorough and ironclad </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.1">proof</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.27.1"> and </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.28.1">verification</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.2">It is fair to say that the central operational feature of Bitcoin is verification, and only because of that can Bitcoin remove the need for trust completely.</span><sup><a id="fn-3" href="#fn3"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.1">3</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.31.1"> Every transaction has to be recorded by every member of the network so that they all share one common ledger of balances and transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.31.2">Whenever a member of the network transfers a sum to another member, all network members can verify the sender has a sufficient balance, and nodes compete to be the first to update the ledger with a new block</span><span epub:type="pagebreak" title="172" id="Page_172"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.1"> of transactions every ten minutes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.2">In order for a node to commit a block of transactions to the ledger, it has to expend processing power on solving complicated mathematical problems that are hard to solve but whose correct solution is easy to verify. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.3">This is the proof‐of‐work (PoW) system, and only with a correct solution can a block be committed and verified by all network members. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.4">While these mathematical problems are unrelated to the Bitcoin transactions, they are indispensable to the operation of the system as they force the verifying nodes to expend processing power which would be wasted if they included fraudulent transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.5">Once a node solves the proof‐of‐work correctly and announces the transactions, other nodes on the network vote for its validity, and once a majority has voted to approve the block, nodes begin committing transactions to a new block to be amended to the previous one and solving the new proof‐of‐work for it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.6">Crucially, the node that commits a valid block of transactions to the network receives a </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.1">block reward</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.34.1"> consisting of brand‐new bitcoins added to the supply along with all the transaction fees paid by the people who are transacting.</span></p>
<p id="c08-para-0012"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.1">This process is what is referred to as </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.1">mining</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.1">, analogous to the mining of precious metals, and is why nodes that solve proof‐of‐work are known as miners. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.2">This block reward compensates the miners for the resources they committed to proof‐of‐work. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.3">Whereas in a modern central bank the new money created goes to finance lending and government spending, in Bitcoin the new money goes only to those who spend resources on updating the ledger. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.4">Nakamoto programmed Bitcoin to produce a new block roughly every ten minutes, and for each block to contain a reward of 50 coins in the first four years of Bitcoin's operation, to be halved afterwards to 25 coins, and further halved every four years.</span></p>
<p id="c08-para-0013"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.1">The quantity of bitcoins created is preprogrammed and cannot be altered no matter how much effort and energy is expended on proof‐of‐work. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.2">This is achieved through a process called difficulty adjustment, which is perhaps the most ingenious aspect of Bitcoin's design. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.3">As more people choose to hold Bitcoin, this drives up the market value of Bitcoin and makes mining new coins more profitable, which drives more miners to expend more resources on solving proof‐of‐work problems. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.4">More miners means more processing power, which would result in the solutions to the proof‐of‐work being arrived at faster, thus increasing the</span><span epub:type="pagebreak" title="173" id="Page_173"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.1"> rate of issuance of new bitcoins. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.2">But as the processing power rises, Bitcoin will raise the difficulty of the mathematical problems needed to unlock the mining rewards to ensure blocks will continue to take around ten minutes to be produced.</span></p>
<p id="c08-para-0014"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.1">Difficulty adjustment is the most reliable technology for making hard money and limiting the stock‐to‐flow ratio from rising, and it makes Bitcoin fundamentally different from every other money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.2">Whereas the rise in value of any money leads to more resources dedicated to its production and thus an increase in its supply, as Bitcoin's value rises, more effort to produce bitcoins does not lead to the production of more bitcoins. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.3">Instead, it just leads to an increase in the processing power necessary to commit valid transactions to the Bitcoin network, which only serves to make the network more secure and difficult to compromise. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.4">Bitcoin is the hardest money ever invented: growth in its value cannot possibly increase its supply; it can only make the network more secure and immune to attack.</span></p>
<p id="c08-para-0015"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.1">For every other money, as its value rises, those who can produce it will start producing more of it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.2">Whether it is Rai stones, seashells, silver, gold, copper, or government money, everyone will have an incentive to try to produce more. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.3">The harder it was to produce new quantities of the money in response to price rises, the more likely it was to be adopted widely and used, and the more a society would prosper because it would mean individuals' efforts at producing wealth will go toward serving one another, not producing money, an activity with no added value to society because any supply of money is enough to run any economy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.4">Gold became the prime money of every civilized society precisely because it was the hardest to produce, but Bitcoin's difficulty adjustment makes it even harder to produce. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.5">A massive increase in the price of gold will, in the long run, lead to larger quantities being produced, but no matter how high the price of bitcoins rises, the supply stays the same and the safety of the network only increases.</span></p>
<p id="c08-para-0016"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.1">The security of Bitcoin lies in the asymmetry between the cost of solving the proof‐of‐work necessary to commit a transaction to the ledger and the cost of verifying its validity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.2">It costs ever‐increasing quantities of electricity and processing power to record transactions, but the cost of verifying the validity of the transactions is close to zero and will remain at that level no matter how much Bitcoin grows. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.3">To try to commit fraudulent transactions</span><span epub:type="pagebreak" title="174" id="Page_174"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.1"> to the Bitcoin ledger is to deliberately waste resources on solving the proof‐of‐work only to watch nodes reject it at almost no cost, thereby withholding the block reward from the miner.</span></p>
<p id="c08-para-0017"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.44.1">As time goes by, it becomes increasingly difficult to alter the record, as the energy needed is larger than the energy already expended, which only grows with time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.44.2">This highly complex iterative process has grown to require vast quantities of processing power and electricity but produces a ledger of ownership and transactions that is beyond dispute, without having to rely on the trustworthiness of any single third party. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.44.3">Bitcoin is built on 100% verification and 0% trust.</span><sup><a id="fn-4" href="#fn4"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.45.1">4</span></a></sup></p>
<p id="c08-para-0018"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.46.1">Bitcoin's shared ledger can be likened to the Rai stones of Yap Island discussed in </span><a href="c02.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.47.1">Chapter 2</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.1">, in that the money does not actually move for transactions to take place. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.2">Whereas in Yap the islanders would meet to announce the transfer of the ownership of a stone from one person to the other, and the entire town would know who owned which stone, in Bitcoin members of the network would broadcast their transaction to all network members, who would verify that the sender has the balance necessary for the transaction, and credit it to the recipient. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.3">To the extent that the digital coins exist, they are simply entries on a ledger, and a verified transaction changes the ownership of the coins on the ledger from the sender to the recipient. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.4">Ownership of the coins is assigned through public addresses, not by name of the holder, and access to the coins owned by an address is secured through the ownership of the private key, a string of characters analogous to a password.</span><sup><a id="fn-5" href="#fn5"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.1">5</span></a></sup></p>
<p id="c08-para-0019"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.50.1">Whereas the Rai stones' physical heft makes their divisibility highly impractical, Bitcoin faces no such problem. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.50.2">Bitcoin's supply is made up of a maximum of 21,000,000 coins, each of which is divisible into 100,000,000 satoshis, making it</span><span epub:type="pagebreak" title="175" id="Page_175"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.1"> highly salable across scales. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.2">Whereas the Yapese stones were only practical for a few transactions in a small island with a small population who knew each other very well, Bitcoin has far superior salability across space, because the digital ledger is accessible by anyone worldwide with an Internet connection.</span></p>
<p id="c08-para-0020"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.1">What keeps Bitcoin nodes honest, individually, is that if they were dishonest, they would be discovered immediately, making dishonesty exactly as effective as doing nothing but involving a higher cost. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.2">Collectively, what prevents a majority from colluding to be dishonest is that if they were to succeed in compromising the integrity of the ledger of transactions, the entire value proposition of Bitcoin would be destroyed and the bitcoin tokens' value would collapse to nothing. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.3">Collusion costs a lot, but it would itself lead to its loot becoming worthless. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.4">In other words, Bitcoin relies on economic incentives, making fraud far costlier than its rewards.</span></p>
<p id="c08-para-0021"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.1">No single entity is relied upon for maintaining the ledger and no single individual can alter the record on it without the consent of a majority of network members. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.2">What determines the validity of the transaction is not the word of a single authority, but the software running the individual nodes on the network.</span></p>
<p id="c08-para-0022"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.54.1">Ralph Merkle, inventor of the Merkle tree data structure, which is utilized by Bitcoin to record transactions, had a remarkable way of describing Bitcoin:
</span></p>
<blockquote>
<p id="c08-para-0023"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.1">Bitcoin is the first example of a new form of life. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.2">It lives and breathes on the internet. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.3">It lives because it can pay people to keep it alive. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.4">It lives because it performs a useful service that people will pay it to perform. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.5">It lives because anyone, anywhere, can run a copy of its code. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.6">It lives because all the running copies are constantly talking to each other. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.7">It lives because if any one copy is corrupted it is discarded, quickly and without any fuss or muss. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.8">It lives because it is radically transparent: anyone can see its code and see exactly what it does.</span></p>
<p id="c08-para-0024"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.1">It can't be changed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.2">It can't be argued with. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.3">It can't be tampered with. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.4">It can't be corrupted. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.5">It can't be stopped. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.6">It can't even be interrupted.</span></p>
<p id="c08-para-0025"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.1">If nuclear war destroyed half of our planet, it would continue to live, uncorrupted. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.2">It would continue to offer its services. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.3">It would continue to pay people to keep it alive.</span></p>
<p id="c08-para-0026"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.58.1">The only way to shut it down</span><span epub:type="pagebreak" title="176" id="Page_176"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.59.1"> is to kill every server that hosts it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.59.2">Which is hard, because a lot of servers host it, in a lot of countries, and a lot of people want to use it.</span></p>
<p id="c08-para-0027"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.1">Realistically, the only way to kill it is to make the service it offers so useless and obsolete that no one wants to use it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.2">So obsolete that no one wants to pay for it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.3">No one wants to host it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.4">Then it will have no money to pay anyone. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.5">Then it will starve to death.</span></p>
<p id="c08-para-0028"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.1">But as long as there are people who want to use it, it's very hard to kill, or corrupt, or stop, or interrupt.</span><sup><a id="fn-6" href="#fn6"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.1">6</span></a></sup></p></blockquote>
<p id="c08-para-0029"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.1">Bitcoin is a technology that survives for the very same reason the wheel, knife, phone, or any technology survives: it offers its users benefits from using it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.2">Users, miners, and node operators are all rewarded economically from interacting with Bitcoin, and that is what keeps it going. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.3">It's worth adding that all the parties that make Bitcoin work are individually dispensable to its operation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.4">Nobody is essential to Bitcoin, and if anybody wants to alter Bitcoin, Bitcoin is perfectly capable of continuing to operate as it is without whatever input anyone has on this. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.5">This will help us understand the immutable nature of Bitcoin in </span><a href="c10.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.1">Chapter 10</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.65.1">, and why attempts at making serious changes to the Bitcoin code will almost inevitably lead to the creation of a knockoff version of Bitcoin, but one that cannot possibly recreate the economic balance of incentives that keeps Bitcoin operational and immutable.</span></p>
<p id="c08-para-0030"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.1">Bitcoin can also be understood as a spontaneously emergent and autonomous firm which provides a new form of money and a new payments network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.2">There is no management or corporate structure to this firm, as all decisions are automated and preprogrammed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.3">Volunteer coders in an open source project can present changes and improvements to the code, but it is up to users to choose to adopt them or not. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.4">The value proposition of this firm is that its money supply is completely inelastic in response to increased demand and price; instead, increased demand just leads to a safer network due to the mining difficulty adjustment. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.5">Miners invest electricity and processing power in the mining infrastructure that protects the network because they are rewarded for it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.6">Bitcoin users pay transaction fees and buy the coins from the miners because they</span><span epub:type="pagebreak" title="177" id="Page_177"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.1"> want to utilize digital cash and benefit from the appreciation over time, and in the process they finance the miners' investment in operating the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.2">The investment in PoW mining hardware makes the network more secure and can be understood as the firm's capital. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.3">The more the demand for the network grows, the more valuable the miners' rewards and transaction fees become, which necessitates more processing power to generate new coins, increasing the company's capital, making the network more secure and the coins harder to produce. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.4">It is an economic arrangement that has been productive and lucrative to everyone involved, which in turn leads to the network continuing to grow at an astonishing pace.</span></p>
<p id="c08-para-0031"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.1">With this technological design, Nakamoto was able to invent </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.1">digital scarcity</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.70.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.70.2">Bitcoin is the first example of a digital good that is scarce and cannot be reproduced infinitely. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.70.3">While it is trivial to send a digital object from one location to another in a digital network, as is done with email, text messaging, or file downloads, it is more accurate to describe these processes as </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.1">copying</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.1"> rather than </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.1">sending</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.1">, because the digital objects remain with the sender and can be reproduced infinitely. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.2">Bitcoin is the first example of a digital good whose transfer stops it from being owned by the sender.</span></p>
<p id="c08-para-0032"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.1">Beyond digital scarcity, Bitcoin is also the first example of </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.1">absolute scarcity</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.1">, the only liquid commodity (digital or physical) with a set fixed quantity that cannot conceivably be increased. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.2">Until the invention of Bitcoin, scarcity was always relative, never absolute. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.3">It is a common misconception to imagine that any physical good is finite, or absolutely scarce, because the limit on the quantity we can produce of any good is never its prevalence in the planet, but the effort and time dedicated to producing it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.4">With its absolute scarcity Bitcoin is highly salable across time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.5">This is a critical point which will be explicated further in </span><a href="c09.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.78.1">Chapter 9</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.1"> on Bitcoin's role as a store of value.</span></p></section>
<section><span id="c08-sec-0003"/>
<h2 id="head-2-29"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.1">Supply, Value, and Transactions</span></h2>
<p id="c08-para-0033"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.1">It had always been theoretically possible to produce an asset with a predictably constant or low rate of supply growth to allow it to maintain its monetary role, but reality, as always, had proven far trickier than theory. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.2">Governments would never allow</span><span epub:type="pagebreak" title="178" id="Page_178"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.82.1"> private parties to issue their own private currencies and transgress on the main way in which government funds itself and grows. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.82.2">So government would always want to monopolize money production and face too strong a temptation to engage in the increase of the money supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.82.3">But with the invention of Bitcoin, the world had finally arrived at a synthetic form of money that had an ironclad guarantee governing its low rate of supply growth. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.82.4">Bitcoin takes the macroeconomists, politicians, presidents, revolutionary leaders, military dictators, and TV pundits out of monetary policy altogether. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.82.5">Money supply growth is determined by a programmed function adopted by all members of the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.82.6">There may have been a time at the start of this currency when this inflation schedule could have been conceivably changed, but that time has well passed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.82.7">For all practical intents and purposes, Bitcoin's inflation schedule, like its record of transactions, is immutable.</span><sup><a id="fn-7" href="#fn7"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.1">7</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.1"> While for the first few years of Bitcoin's existence the supply growth was very high, and the guarantee that the supply schedule would not be altered was not entirely credible, as time went by the supply growth rate dropped and the credibility of the network in maintaining this supply schedule has increased and continues to rise with each passing day in which no serious changes are made to the network.</span></p>
<p id="c08-para-0034"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.1">Bitcoin blocks are added to the shared ledger roughly every ten minutes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.2">At the birth of the network, the block reward was programmed to be 50 bitcoins per block. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.3">Every four years, roughly, or after 210,000 blocks have been issued, the block reward drops by half. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.4">The first halving happened on November 28, 2012, after which the issuance of new bitcoins dropped to 25 per block. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.5">On July 9, 2016, it dropped again to 12.5 coins per block, and will drop to 6.25 in 2020. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.6">According to this schedule, the supply will continue to increase at a decreasing rate, asymptotically approaching 21 million coins sometime around the year 2140, at which point there will be no more bitcoins issued. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.7">(See </span><a id="R_c08-fig-0001" href="#c08-fig-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.1">Figure 14</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.1">.)</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.1"><img alt="Graphical illustration of Bitcoin supply and supply growth rate assuming blocks are issued exactly every ten minutes." src="images/c08f001.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c08-fig-0001" id="c08-fig-0001"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.1">Figure 14</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.90.1"> Bitcoin supply and supply growth rate assuming blocks are issued exactly every ten minutes.</span></p></figcaption></figure>
<p id="c08-para-0035"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.1">Because new coins are only produced with the issuance of a new block, and each new block requires the solving of the proof‐of‐work problems, there is a real cost to the production of new bitcoins. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.2">As the price of bitcoins rises in the market, more nodes enter to compete for the solution of the PoW to obtain the block reward, which raises the difficulty of the PoW problems, making it more costly to obtain the reward. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.3">The cost of producing a bitcoin will thus generally rise along with the market price.</span></p>
<p id="c08-para-0036"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.92.1">After setting this supply growth schedule, Satoshi divided each bitcoin into 100,000,000 units, which were later named satoshis in his pseudonymous honor. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.92.2">Dividing each bitcoin into 8 digits means that the supply will continue to grow at a decreasing rate until around the year 2140, when the digits all fill up and we reach 21,000,000 coins. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.92.3">The decreasing rate of growth, however, means that the first 20 million coins will be mined by around the year 2025, leaving 1 million coins to be mined over one more century.</span></p>
<p id="c08-para-0037"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.1">The number of new coins issued is not exactly as predicted from the algorithm, because new blocks are not mined precisely every ten minutes, because the difficulty adjustment is not a precise process but a calibration that adjusts every two weeks and can overshoot or undershoot its target depending on how many new miners enter the mining business. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.2">In 2009, when very few people had used Bitcoin at all, the issuance was far below schedule, while in 2010 it was above the theoretical number predicted from the supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.3">The exact numbers will vary, but this variance from the theoretical growth will decrease as the supply grows. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.4">What will not vary is the maximum cap of coins and the</span><span epub:type="pagebreak" title="179" id="Page_179"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.94.1"> fact that the supply growth rate will continue to decline as an ever‐decreasing number of coins is added onto an ever‐increasing stock of coins.</span></p>
<p id="c08-para-0038"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.1">By the end of 2017, 16.775 million coins were already mined, constituting 79.9% of all coins that will ever exist. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.2">The annual supply growth in 2017 was 4.35%, coming down from 6.8% in 2016. </span><a id="R_c08-tbl-0001" href="#c08-tbl-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.96.1">Table 6</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.1"> shows the actual supply growth of BTC and its growth rate.</span><sup><a id="fn-8" href="#fn8"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.98.1">8</span></a></sup></p>

<p id="c08-para-0039"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.1">A closer look at the Bitcoin supply schedule over the coming years would give us these estimates for the supply and growth rate. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.2">The actual numbers will surely vary from this, but not by much. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.3">(See </span><a id="R_c08-tbl-0002" href="#c08-tbl-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.1">Table 7</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.133.1">.</span><sup><a id="fn-9" href="#fn9"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.1">9</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.1">)</span></p>

<p id="c08-para-0040"><a id="R_c08-fig-0002" href="#c08-fig-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.1">Figure 15</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.169.1"> extrapolates the growth rate of the main global reserve currencies' broad money supply and gold over the past 25 years into the next 25 years, and increases the supply of bitcoins by the programmed growth rates. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.169.2">By these calculations, the bitcoin supply will increase by 27% in the coming 25 years, whereas the supply for gold will increase by 52%, the Japanese yen by 64%, the Swiss</span><span epub:type="pagebreak" title="180" id="Page_180"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.170.1"> franc by 169%, the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.170.2">dollar by 272%, the euro by 286%, and the British pound by 429%.</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.171.1"><img alt="Bar graph representation of extrapolated national currency growth and expected Bitcoin supply growth (2016 = 1)." src="images/c08f002.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c08-fig-0002" id="c08-fig-0002"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.172.1">Figure 15</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.1"> Projected Bitcoin and national currency percentage growth in supply over 25 years.</span></p></figcaption></figure>
<p id="c08-para-0041"><span epub:type="pagebreak" title="181" id="Page_181"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.1">This exposition can help us appreciate the salability of bitcoin and how it fulfills the functions of money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.2">With its supply growth rate dropping below that of gold by the year 2025, Bitcoin has the supply restrictions that could make it have considerable demand as a store of value; in other words, it can have salability across time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.3">Its digital nature that makes it easy to safely send worldwide makes it salable in space in a way never seen with other forms of money, while its divisibility into 100,000,000 satoshis makes it salable in scale. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.4">Further, Bitcoin's elimination of intermediary control and the near‐impossibility of any authority debasing or confiscating it renders it free of the main drawbacks of government money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.5">As the digital age has introduced improvements and efficiencies to most aspects of our life, Bitcoin presents a tremendous technological leap forward in the monetary solution to the indirect exchange problem, perhaps as significant as the move from cattle and salt to gold and silver.</span></p>
<p id="c08-para-0042"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.175.1">Whereas traditional currencies are continuously increasing in supply and decreasing in purchasing power, bitcoin has so far witnessed a large increase in real purchasing power despite a moderate, but decreasing and capped, increase in its supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.175.2">Because miners who verify transactions are rewarded with bitcoins, these miners have a strong vested interest in maintaining the integrity of the network, which in turn causes the value of the currency to rise.</span></p>
<p id="c08-para-0043"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.176.1">The Bitcoin network began operating</span><span epub:type="pagebreak" title="182" id="Page_182"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.1"> in January 2009 and was for a while an obscure project used by a few people in a cryptography mailing list. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.2">Perhaps the most important milestone in Bitcoin's life was the first day that the tokens in this network went from being economically worthless to having a market value, validating that Bitcoin had passed the market test: the network had operated successfully enough for someone to be willing to part with actual money to own some of its tokens. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.3">This happened in October 2009, when an online exchange named New Liberty Standard sold bitcoins at a price of $0.000994. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.4">In May 2010, the first real‐world purchase with bitcoin took place, as someone paid 10,000 bitcoins for two pizza pies worth $25, putting the price of a bitcoin at $0.0025. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.5">With time, more and more people heard of Bitcoin and became interested in purchasing it and the price continued to rise further.</span><sup><a id="fn-10" href="#fn10"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.178.1">10</span></a></sup></p>
<p id="c08-para-0044"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.179.1">The market demand for a bitcoin token comes from the fact that it is needed to operate the first (and so far, arguably only) functional and reliable digital cash system.</span><sup><a id="fn-11" href="#fn11"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.180.1">11</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.181.1"> The fact that this network was successfully operational in its early days gave its digital token a collectible value among tiny communities of cryptographers and libertarians, who tried mining it with their own PCs, and eventually even started purchasing it from one another.</span><sup><a id="fn-12" href="#fn12"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.182.1">12</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.1"> That the tokens were strictly limited and could not be replicated helped create this initial collectible status. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.2">After being acquired by individuals to use on the Bitcoin network, and gaining economic value, Bitcoin began to get monetized through more people demanding it as a store of value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.3">This sequence of activities conforms to Ludwig von Mises' Theory of Regression on the origins of money, which states that a monetary good begins as a market good and is then used as a medium of exchange. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.4">Bitcoin's collectible status among small communities is no different from seashells', Rai stones', and precious metals' ornamental value, from which they were to acquire a monetary role that raised their value significantly.</span></p>
<p id="c08-para-0045"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.184.1">Being new and only beginning to spread, Bitcoin's price has fluctuated wildly as demand fluctuates, but the impossibility of increasing the supply arbitrarily by any authority</span><span epub:type="pagebreak" title="183" id="Page_183"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.185.1"> in response to price spikes explains the meteoric rise in the purchasing power of the currency. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.185.2">When there is a spike in demand for bitcoins, bitcoin miners cannot increase production beyond the set schedule like copper miners can, and no central bank can step in to flood the market with increasing quantities of bitcoins, as Greenspan suggested central banks do with their gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.185.3">The only way for the market to meet the growing demand is for the price to rise enough to incentivize the holders to sell some of their coins to the newcomers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.185.4">This helps explain why in eight years of existence, the price of a bitcoin has gone from $0.000994 on October 5, 2009, in its first recorded transaction, to $4,200 on October 5, 2017, an increase of 422,520,000% in eight years and a compound annual growth rate of 573% per year. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.185.5">(See </span><a id="R_c08-fig-0003" href="#c08-fig-0003"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.186.1">Figure 16</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.187.1">.</span><sup><a id="fn-13" href="#fn13"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.188.1">13</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.189.1">)</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.190.1"><img alt="Graphical illustration of the price of Bitcoin in U.S. dollars." src="images/c08f003.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c08-fig-0003" id="c08-fig-0003"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.191.1">Figure 16</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.192.1"> Price of Bitcoin in US dollars.</span></p></figcaption></figure>
<p id="c08-para-0046"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.193.1">For the bitcoin price to rise, people must hold it as a store of value, and not just spend it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.193.2">Without a number of people willing to hold the currency for a significant period of time, continued selling of the currency will keep its price down and prevent it from appreciating. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.193.3">By November 2017, the total market value of all the bitcoins in circulation was in the range of $110 billion, giving it a value larger than the broad money supply of the national currencies of most countries. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.193.4">If Bitcoin were a country, the value of its currency would be the 56th largest national currency worldwide, roughly in the range of the size of the money supply of Kuwait or Bangladesh, larger than that of Morocco and Peru, but smaller than Colombia and Pakistan. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.193.5">If it were to be compared to the narrow money supply, Bitcoin's supply value would be ranked around the 33rd in the world, with a value similar to the narrow money supply of Brazil, Turkey, and South Africa.</span><sup><a id="fn-14" href="#fn14"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.194.1">14</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.195.1"> It is perhaps one of the most remarkable achievements of the Internet that an online economy that spontaneously and voluntarily emerged around a network designed by an anonymous programmer has grown, in nine years, to hold more value than is held in the money supply of most nation‐states and national currencies</span><sup><a id="fn-15" href="#fn15"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.196.1">15</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.197.1">.</span></p>
<p id="c08-para-0047"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.198.1">This conservative monetary policy and the pursuant appreciation in the market value of bitcoins is vital to the successful operation of Bitcoin, as it is the reason that miners have an incentive to expend electricity and processing power on honestly verifying transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.198.2">Had Bitcoin been created with an easy‐money policy, such as what a Keynesian or Monetarist economist would recommend, it would have had its money supply grow in proportion to the number of users or transactions, but in that case it would have remained a marginal experiment among cryptography enthusiasts online. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.198.3">No serious amount of processing power would have gone to mining it, as there would be no point in investing heavily in verifying transactions and solving proof‐of‐work in order to get tokens that will get devalued as more people use the system. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.198.4">The expansionary monetary policies of modern fiat economies and economists have never won the market test of adoption freely, but have instead been imposed through government laws, as discussed earlier. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.198.5">As a voluntary system with no mechanism for forcing people to use it, Bitcoin would fail to attract significant demand, and as a result its status as a successful digital cash would not be guaranteed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.198.6">While the</span><span epub:type="pagebreak" title="184" id="Page_184"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.199.1"> transactions could be carried out without need for trust in a third party, the network would be vulnerable to attack by any malicious actor mobilizing large amounts of processing power. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.199.2">In other words, without a conservative monetary policy and difficulty adjustment, Bitcoin would only have succeeded theoretically as digital cash, but remained too insecure to be used widely in practice. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.199.3">In that case, the first competitor to Bitcoin that introduced a hard money policy would make the updating of the ledger and production of new units progressively more expensive. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.199.4">The high cost of updating the ledger would give miners an incentive to be honest with their updating of the ledger, making the network more secure than easy money contenders.</span></p>
<p id="c08-para-0048"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.200.1">The growth in the price is a reflection of the growing use and utility that the network offers its users. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.200.2">The number of transactions on the network has also grown rapidly: whereas 32,687 transactions were carried out in 2009 (at a rate of 90 transactions per day), the number grew to more than 103 million transactions in 2017 (at a daily rate of 284,797 transactions). </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.200.3">The cumulative number of transactions is approaching 300 million transactions in January 2018. </span><a id="R_c08-tbl-0003" href="#c08-tbl-0003"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.201.1">Table 8</span></a><sup><a id="fn-16" href="#fn16"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.202.1">16</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.203.1"> and </span><a id="R_c08-fig-0004" href="#c08-fig-0004"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.204.1">Figure 17</span></a><sup><a id="fn-17" href="#fn17"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.205.1">17</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.206.1"> show the annual growth.</span></p>

<p id="c08-para-0049"><span epub:type="pagebreak" title="185" id="Page_185"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.242.1">While the growth in transactions is impressive, it does not match the growth in the value of the total stock of the Bitcoin currency, as can be evidenced by the fact that the number</span><span epub:type="pagebreak" title="186" id="Page_186"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.1"> of transactions is far less than what would be transacted in an economy whose currency had the value of the bitcoin supply; 300,000 daily transactions is the number of transactions that takes place in a small town, not in a medium‐sized economy, which is around the value of the supply of Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.2">Further, with the current size of Bitcoin blocks being limited to 1 megabyte, 500,000 transactions per day is close to the upper limit that can be carried out by the Bitcoin network and recorded by all peers on the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.3">Even as this limit is reached and its presence is well‐publicized, the growth in the value of the currency and the value of daily transactions has not abated. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.4">This suggests that Bitcoin adopters value it more as a store of value than a medium of exchange, as will be discussed in </span><a href="c09.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.244.1">Chapter 9</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.245.1">.</span></p>
<p id="c08-para-0050"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.246.1">The market value of transactions has also increased over the network's lifetime. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.246.2">The peculiar nature of Bitcoin transactions makes it hard to precisely estimate the exact value of transactions in bitcoins or U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.246.3">dollars, but a lower‐bound estimate sees an average daily volume of around 260,000 bitcoins in 2017, with highly volatile growth over Bitcoin's lifetime. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.246.4">While the bitcoin value of transactions has not increased appreciably over time, the market value of these transactions in U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.246.5">dollars has. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.246.6">The volume of transactions was $375.6 billion U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.246.7">dollars in 2017. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.246.8">In total, by its ninth birthday, Bitcoin had processed half a trillion US dollars' worth of</span><span epub:type="pagebreak" title="187" id="Page_187"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.247.1"> transactions, with USD value calculated at the time of the transaction. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.247.2">(See </span><a id="R_c08-tbl-0004" href="#c08-tbl-0004"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.248.1">Table 9</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.249.1">.</span><sup><a id="fn-18" href="#fn18"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.250.1">18</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.251.1">)</span></p>

<p id="c08-para-0051"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.276.1">Another measure of the growth of the Bitcoin network is the value of the transaction fees required to process the transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.276.2">Whereas Bitcoin transactions can theoretically be processed for free, it is incumbent on the miners to process them, and the higher the fee, the faster they are likely to pick them up. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.276.3">In the early days when the number of transactions was small, miners would process transactions that did not include a fee because the block subsidy of new coins itself was worth the effort. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.276.4">As demand for Bitcoin transactions grew, miners could afford to be more selective and prioritize transactions with higher fees. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.276.5">Fees were under $0.1 per transaction up until late 2015, and started rising above $1 per transaction around early 2016. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.276.6">With the quick rise in Bitcoin's price in 2017, the average daily transaction fee had reached $7 by the end of November. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.276.7">(See </span><a id="R_c08-fig-0005" href="#c08-fig-0005"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.277.1">Figure 18</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.278.1">.</span><sup><a id="fn-19" href="#fn19"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.279.1">19</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.280.1">)</span></p>

<p id="c08-para-0052"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.287.1">While the price of bitcoin has generally risen over time, this rise has been highly volatile. </span><a id="R_c08-fig-0006" href="#c08-fig-0006"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.288.1">Figure 19</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.289.1"> shows the 30‐day standard deviation of daily returns for the past five years of bitcoin trading.</span><sup><a id="fn-20" href="#fn20"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.290.1">20</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.291.1"> While the volatility appears to be declining, it remains very high compared to that of national currencies and</span><span epub:type="pagebreak" title="188" id="Page_188"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.292.1"> gold, and the trend is still too weak to conclusively determine if it will continue to decline. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.292.2">The 30‐day volatility of the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.292.3">Dollar Index is included in </span><a href="#c08-fig-0006"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.293.1">Figure 19</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.294.1"> to provide perspective.</span></p>
<p id="c08-para-0053"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.295.1">Examining price data for gold</span><span epub:type="pagebreak" title="189" id="Page_189"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.296.1"> and major national and crypto currencies shows a marked difference in the volatility in the market price of these currencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.296.2">Daily returns were collected for the previous five years for gold, major fiat currencies, and bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.296.3">The major national currencies each had a standard deviation more than seven times larger than that of Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.296.4">(See </span><a id="R_c08-tbl-0005" href="#c08-tbl-0005"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.297.1">Table 10</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.298.1">.</span><sup><a id="fn-21" href="#fn21"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.299.1">21</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.300.1">)</span></p>
