<section epub:type="chapter">
<header>
<h1><span epub:type="pagebreak" title="193" id="Page_193"/><a id="c09"/><span class="chapterNumber"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.1.1">Chapter 9</span></span><br/><span class="chapterTitle"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.2.1">What Is Bitcoin Good For?</span></span></h1>
</header>
<section><span id="c09-sec-0001"/>
<h2 id="head-2-32"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.1">Store of Value</span></h2>
<p id="c09-para-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.1">The belief that resources are scarce and limited is a misunderstanding of the nature of scarcity, which is the key concept behind economics. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.2">The absolute quantity of every raw material present in earth is too large for us as human beings to even measure or comprehend, and in no way constitutes a real limit to what we as humans can produce of it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.3">We have barely scratched the surface of the earth in search of the minerals we need, and the more we search, and the deeper we dig, the more resources we find. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.4">What constitutes the practical and realistic limit to the quantity of any resource is always the amount of human time that is directed toward producing it, as that is the only real scarce resource (until the creation of Bitcoin). </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.5">In his masterful book, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.5.1">The Ultimate Resource</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.1">, the late economist Julian Simon explains how the only limited resource, and in fact the only thing for which the term </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.7.1">resource</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.1"> actually applies, is human time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.2">Each human has a limited</span><span epub:type="pagebreak" title="194" id="Page_194"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.1"> time on earth, and that is the only scarcity we deal with as individuals. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.2">As a society, our only scarcity is in the total amount of time available to members of a society to produce different goods and services. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.3">More of any good can always be produced if human time goes toward it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.4">The real cost of a good, then, is always its opportunity cost in terms of goods forgone to produce it.</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.1"><img alt="Graphical illustration of global oil consumption, production, proven reserves, and ratio of reserves over annual production, 1980–2015." src="images/c09f001.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c09-fig-0001" id="c09-fig-0001"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.11.1">Figure 20</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.1"> Global oil consumption, production, proven reserves, and ratio of reserves over annual production, 1980–2015.</span></p></figcaption></figure>
<p id="c09-para-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.1">In all human history, we have never run out of any single raw material or resource, and the price of virtually all resources is lower today than it was in past points in history, because our technological advancement allows us to produce them at a lower cost in terms of our time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.2">Not only have we not run out of raw materials, the proven reserves that exist of each resource have only increased with time as our consumption has gone up. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.3">If resources are to be understood as being finite, then the existing stockpiles would decline with time as we consume more. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.4">But even as we are always consuming more, prices continue to drop, and the improvements in technology for finding and excavating resources allows us to find more and more. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.5">Oil, the vital bloodline of modern economies, is the best example as it has fairly reliable statistics. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.6">As </span><a id="R_c09-fig-0001" href="#c09-fig-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.14.1">Figure 20</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.15.1"> shows, even as consumption and production continue to increase year on year, the proven reserves increase at an even faster rate.</span><sup><a id="fn-1" href="#fn1"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.16.1">1</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.17.1"> According to data from BP's statistical review, annual oil production was 46% higher in 2015 than its level in 1980, while consumption was 55% higher. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.17.2">Oil reserves, on the other hand, have increased by 148%, around triple the increase in production and consumption.</span></p>
<p id="c09-para-0003"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.1">Similar statistics can be produced for resources with varying degrees of prevalence in the earth's crust. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.2">The rarity of a resource determines the relative cost of extracting it from the earth. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.3">More prevalent metals like iron and copper are easy to find, and relatively cheap as a result. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.4">Rarer metals, such as silver and gold, are more expensive. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.5">The limit on how much we can produce of each of those metals, however, remains the opportunity cost of their production relative to one another, and not their absolute quantity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.6">There is no better evidence for this than the fact that the rarest metal in the crust of the earth, gold, has been mined for thousands of years and continues to be mined in increasing quantities as technology advances over time, as shown in </span><a href="c03.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.19.1">Chapter 3</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.2">If annual production of the rarest metal in the earth's crust goes up every year, then it makes no sense to talk of any natural element as being limited in its quantity in any practical sense. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.3">Scarcity is only relative in material resources, with the differences in cost of extraction being the determinant of the level of scarcity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.4">The only scarcity, as Julian Simon brilliantly demonstrated, is in the time humans have to produce these metals, and that is why the global wage continues to rise worldwide, making products and materials continuously get cheaper in terms of human labor.</span></p>
<p id="c09-para-0004"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.1">This is one the hardest economic concepts for people to understand, which fuels the endless hysteria that the environmental movement has foisted upon us through decades of apocalyptic scaremongering. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.2">Julian Simon did his best to combat this hysteria by challenging one of the foremost hysterics of the twentieth century to a famous 10‐year bet. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.3">Paul Ehrlich had written several hysterical books arguing that the earth was on the edge of catastrophe from running out of vital resources, with precise dire predictions about the dates on which these resources would be exhausted. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.4">In 1980, Simon challenged Ehrlich to name any raw materials and any period longer than a year, and</span><span epub:type="pagebreak" title="195" id="Page_195"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.1"> bet him $10,000 that the price of each of these metals, adjusted for inflation, would be lower at the end of the period than before it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.2">Ehrlich picked copper, chromium, nickel, tin, and tungsten, which were all materials he had predicted would run out. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.3">Yet, in 1990, the price of each of these metals had dropped, and the level of annual production had increased, even though the intervening decade had seen human population increase by 800 million people, the largest increase in a single decade before or since.</span></p>
<p id="c09-para-0005"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.1">In reality, the more humans exist, the more production of all these raw materials can take place. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.2">More importantly, perhaps, as economist Michael Kremer</span><sup><a id="fn-2" href="#fn2"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.1">2</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.1"> argues, the fundamental driver of human progress is not raw materials, but technological solutions to problems. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.2">Technology is by its nature both a </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.1">non‐excludable good</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.27.1"> (meaning that once one person invents something, all others can copy it and benefit from it) and a </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.28.1">non‐rival good</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.1"> (meaning that a person benefiting from an invention does not reduce the utility that accrues to others who use it). </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.2">As an example, take the wheel. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.3">Once one person invented it, everyone else could copy it and make their own wheel, and their use of their wheel would not in any way reduce others' ability to benefit from it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.4">Ingenious ideas are rare, and only a small minority of people can come up with them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.5">Larger populations will thus produce more technologies and ideas than smaller populations, and because the benefit accrues to everyone, it is better to live in a world with a larger population. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.6">The more humans exist on earth, the more technologies and productive ideas are thought of, and the more humans can benefit from these ideas and copy them from one another, leading to higher productivity of human time and improving standards of living.</span></p>
<p id="c09-para-0006"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.1">Kremer illustrates this by showing that as the population of the earth has increased, the rate of population growth has increased rather than declined. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.2">Had humans been a burden consuming resources, then the larger the population, the lower the quantity of resources available to each individual and the lower the rate of economic growth and thus population growth, as the Malthusian model predicts. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.3">But because humans are themselves the resource, and productive</span><span epub:type="pagebreak" title="196" id="Page_196"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.31.1"> ideas are the driver of economic production, a larger number of humans results in more productive ideas and technologies, more production per capita, and a higher capacity for sustaining larger populations. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.31.2">Further, Kremer shows how isolated landmasses that were more heavily populated witnessed faster economic growth and progress than those that were sparsely populated.</span></p>
<p id="c09-para-0007"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.1">It is a misnomer to call raw materials resources, because humans are not passive consumers of manna from heaven. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.2">Raw materials are always the product of human labor and ingenuity and thus humans are the ultimate resource, because human time, effort, and ingenuity can always be used to produce more output.</span></p>
<p id="c09-para-0008"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.1">The eternal dilemma humans face with their time concerns how to store the value they produce with their time through the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.2">While human time is finite, everything else is practically infinite, and more of it can be produced if more human time is directed at it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.3">Whatever object humans chose as a store of value, its value would rise, and because more of the object can always be made, others would produce more of the object to acquire the value stored in it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.4">The Yapese had O'Keefe bringing explosives and advanced boats to make more Rai stones for them and acquire the value stored in the existing stones. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.5">Africans had Europeans bringing boats full of beads to acquire the value stored in their beads. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.6">Any metal other than gold that was used as a monetary medium was overproduced until its price collapsed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.7">Modern economies have Keynesian central banks forever pretending to fight inflation while gradually or quickly eroding the value of their money, as discussed in </span><a href="c04.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.34.1">Chapter 4</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.2">As Americans recently started using their homes as a medium for savings, the supply of housing was increased so much that the price came crashing down. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.3">As monetary inflation proceeds, the large number of bubbles can be understood as speculative bets for ways to find a useful store of value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.4">Only gold has come close to solving this problem, thanks to its chemistry making it impossible for anyone to inflate its supply, and that resulted in one of the most glorious eras of human history. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.5">But the move toward government control of gold soon limited its monetary role by replacing it with government‐issued money, whose record has been abysmal.</span></p>
<p id="c09-para-0009"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.1">This sheds some light on an astonishing facet of the technical accomplishment that is Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.2">For the first time, humanity has recourse to a commodity whose supply is </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.1">strictly limited</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.2">No</span><span epub:type="pagebreak" title="197" id="Page_197"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.1"> matter how many people use the network, how much its value rises, and how advanced the equipment used to produce it, there can only ever be 21 million bitcoins in existence. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.2">There is no technical possibility for increasing the supply to match the increased demand. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.3">Should more people demand to hold Bitcoin, the only way to meet the demand is through appreciation of the existing supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.4">Because each bitcoin is divisible into 100 million satoshis, there is plenty of room for the growth of Bitcoin through the use of ever‐smaller units of it as the value appreciates. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.5">This creates a new type of asset well‐suited for playing the role of store of value.</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.1"><img alt="Bar graph representation of the total available global stockpiles divided by annual production." src="images/c09f002.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c09-fig-0002" id="c09-fig-0002"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.1">Figure 21</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.1"> Total available global stockpiles divided by annual production.</span></p></figcaption></figure>
<p id="c09-para-0010"><span epub:type="pagebreak" title="198" id="Page_198"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.1">Until Bitcoin's invention, all forms of money were unlimited in their quantity and thus imperfect in their ability to store value across time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.2">Bitcoin's immutable monetary supply makes it the best medium to store the value produced from the limited human time, thus making it arguably the best store of value humanity has ever invented. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.3">To put it differently, Bitcoin is the cheapest way to buy the future, because Bitcoin is the only medium guaranteed to not be debased, no matter how much its value rises. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.4">(See </span><a id="R_c09-fig-0002" href="#c09-fig-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.44.1">Figure 21</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.45.1">.</span><sup><a id="fn-3" href="#fn3"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.46.1">3</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.47.1">)</span></p>
<p id="c09-para-0011"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.1">In 2018, with Bitcoin only nine years</span><span epub:type="pagebreak" title="199" id="Page_199"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.1"> old, it has already been adopted by millions</span><sup><a id="fn-4" href="#fn4"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.50.1">4</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.1"> worldwide and its current supply growth rate compares with that of the global reserve currencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.2">In terms of the stock‐to‐flow ratio discussed in </span><a href="c01.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.1">Chapter 1</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.1">, the existing stockpiles of Bitcoin in 2017 were around 25 times larger than the new coins produced in 2017. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.2">This is still less than half of the ratio for gold, but around the year 2022, Bitcoin's stock‐to‐flow ratio will overtake that of gold, and by 2025, it will be around double that of gold and continue to increase quickly into the future while that of gold stays roughly the same, given the dynamics of goldmining discussed in </span><a href="c03.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.54.1">Chapter 3</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.2">Around the year 2140 there will be no new supply of Bitcoin, and the stock‐to‐flow ratio becomes infinite, the first time any commodity or good has achieved this.</span></p>
<p id="c09-para-0012"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.1">An important implication of the reduced supply of bitcoins and the continuously diminishing rate at which the supply grows is to make the supply of existing bitcoins very large compared to the new supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.2">In that sense, Bitcoin mining is similar to goldmining, thus ensuring that as a monetary medium, relatively less time and effort would go toward securing new supplies of Bitcoin than other moneys whose supply can be increased easily; and more time and effort is dedicated toward useful economic production which can then be exchanged for bitcoins. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.3">As the block subsidy declines, the resources dedicated to mining bitcoins will be mainly rewarded for processing the transactions and thus securing the network, rather than for the creation of new coins.</span></p>
<p id="c09-para-0013"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.1">For most of human history, some physical object was used as the store of value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.2">The function of value storage did not need a physical manifestation, but having one allowed for making the supply of the store of value harder to increase. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.3">Bitcoin, by not having any physical presence, and being purely digital, is able to achieve strict scarcity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.4">No divisible and transportable physical material had ever achieved this before. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.5">Bitcoin allows humans to transport value digitally without any dependence on the physical world, which allows large transfers of sums across the world to be completed in minutes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.6">The strict</span><span epub:type="pagebreak" title="200" id="Page_200"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.58.1"> digital scarcity of the Bitcoin tokens combines the best elements of physical monetary media, without any of the physical drawbacks to moving and transporting it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.58.2">Bitcoin might have a claim to make for being the best technology for saving ever invented.</span></p></section>
<section><span id="c09-sec-0002"/>
<h2 id="head-2-33"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.59.1">Individual Sovereignty</span></h2>
<p id="c09-para-0014"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.1">As the first form of digital cash, Bitcoin's first and most important value proposition is in giving anyone in the world access to sovereign base money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.2">Any person who owns Bitcoin achieves a degree of economic freedom which was not possible before its invention. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.3">Bitcoin holders can send large amounts of value across the planet without having to ask for the permission of anyone. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.4">Bitcoin's value is not reliant on anything physical anywhere in the world and thus can never be completely impeded, destroyed, or confiscated by any of the physical forces of the political or criminal worlds.</span></p>
<p id="c09-para-0015"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.1">The significance of this invention for the political realities of the twenty‐first century is that, for the first time since the emergence of the modern state, individuals have a clear technical solution to escaping the financial clout of the governments they live under. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.2">Remarkably, the best description of the significance of such a technology can be found in a book written in 1997, a full 12 years before Bitcoin's creation, which foresaw a digital currency remarkably similar to Bitcoin, and the impact it would have on transforming human society.</span></p>
<p id="c09-para-0016"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.1">In </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.1">The Sovereign Individual</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.1">, James Davidson and William Rees‐Mogg argue that the modern nation‐state, with its restrictive laws, high taxes, and totalitarian impulses, has grown to a level of burdensome repression of its citizens' freedom comparable to that of the Church in the European Middle Ages, and just as ripe for disruption. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.2">With its heavy burden of taxation, personal control, and rituals, the costs of supporting the Church became unbearable for Europeans, and newer more productive political and economic forms of organization emerged to replace it and consign it to insignificance. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.3">The rise of machinery, the printing press, capitalism, and the modern nation‐state birthed the age of industrial society and modern conceptions of citizenship.</span></p>
<p id="c09-para-0017"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.65.1">Five hundred years later, it is industrial</span><span epub:type="pagebreak" title="201" id="Page_201"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.1"> society and the modern nation‐state that have become repressive, sclerotic, and burdensome while new technology eats away at its power and raison d'être. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.2">“Microprocessors will subvert and destroy the nation‐state” is the provocative thesis of the book. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.3">New forms of organization will emerge from information technology, destroying the capacity of the state to force citizens to pay more for its services than they wish. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.4">The digital revolution will destroy the power of the modern state over its citizens, reduce the significance of the nation‐state as an organizing unit, and give individuals unprecedented power and sovereignty over their own lives.</span></p>
<p id="c09-para-0018"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.1">We can already see this process taking place thanks to the telecommunication revolution. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.2">Whereas the printing press allowed the poor of the world to access knowledge that was forbidden them and monopolized by the churches, it still had the limitation of producing physical books which could always be confiscated, banned, or burned. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.3">No such threat exists in the cyber‐world, where virtually all human knowledge exists, readily available for individuals to access without any possibility for effective government control or censorship.</span></p>
<p id="c09-para-0019"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.1">Similarly, information is allowing trade and employment to subvert government restrictions and regulations, as best exemplified by companies like Uber and Airbnb, which have not asked for government permission to introduce their products successfully and subvert traditional forms of regulation and supervision. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.2">Modern individuals can transact with others they meet online via systems of identity and protection built on consent and mutual respect, without any need for resort to coercive government regulations.</span></p>
<p id="c09-para-0020"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.1">The emergence of cheap forms of telecommunication online has also subverted the importance of geographic location for work. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.2">Producers of many goods can now choose to be domiciled anywhere they prefer while the products of their labor, which are becoming increasingly informational and nonmaterial, can be transferred globally instantaneously. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.3">Government regulations and taxes are becoming less powerful as individuals can live or work where it suits them and deliver their work via telecommunication.</span></p>
<p id="c09-para-0021"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.70.1">As more and more of the value of economic production takes the form of nontangible goods, the relative value of land and physical means of production declines, reducing returns on violently appropriating such physical means of</span><span epub:type="pagebreak" title="202" id="Page_202"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.1"> production. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.2">Productive capital becomes more embodied in the individuals themselves, making the threat of violently appropriating it increasingly hollow, as individuals' productivity becomes inextricably linked to their consent. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.3">When peasants' productivity and survival was tied to the land that they did not own, the threat of violence was effective in getting them to be productive to benefit the landowner. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.4">Similarly, industrial society's heavy reliance on physical productive capital and its tangible output made expropriation by the state relatively straightforward, as the twentieth century so bloodily illustrated. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.5">But as the individual's mental capacities become the prime productive force of society, the threat of violence becomes far less effective. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.6">Humans can easily move to jurisdictions where they are not threatened, or can be productive on computers without governments being able to even know what they are producing.</span></p>
<p id="c09-para-0022"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.1">There was one final piece in the puzzle of digitization that had been missing, and that is the transfer of money and value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.2">Even as information technology could subvert geographic and governmental controls and restrictions, payments continued to be heavily controlled by governments and the state‐enforced banking monopolies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.3">Like all government‐enforced monopolies, banking had for years resisted innovations and changes that benefit the consumers and restrict their ability to extract fees and rents. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.4">This was a monopoly that grew ever more burdensome as the global economy spread and became more global. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.5">Davidson and Rees‐Mogg predict with remarkable prescience the form that the new digital monetary escape hatch will take: cryptographically secured forms of money independent of all physical restrictions that cannot be stopped or confiscated by government authorities. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.6">While this seemed like an outlandish prediction when the book was written, it is now a vivid reality already utilized by millions worldwide, though the significance of it is not widely understood.</span></p>
<p id="c09-para-0023"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.1">Bitcoin, and cryptography in general, are defensive technologies that make the cost of defending property and information far lower than the cost of attacking them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.2">It makes theft extremely expensive and uncertain, and thus favors whoever wants to live in peace without aggression toward others. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.3">Bitcoin goes a long way in correcting the imbalance of power that emerged over the last century when the government was able to appropriate money into its central banks and thus make individuals utterly reliant on it for their survival</span><span epub:type="pagebreak" title="203" id="Page_203"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.1"> and well‐being. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.2">The historical version of sound money, gold, did not have these advantages. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.3">Gold's physicality made it vulnerable to government control. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.4">That gold could not be moved around easily meant that payments using it had to be centralized in banks and central banks, making confiscation easy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.5">With Bitcoin, on the other hand, verifying transactions is trivial and virtually costless, as anyone can access the transactions ledger from any Internet‐connected device for free</span><sup><a id="fn-5" href="#fn5"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.1">5</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.2">While Bitcoin's scaling will likely require the use of third‐party intermediaries, this will be different from gold settlement in several very important respects. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.3">First, the dealings of the third parties will ultimately all be settled on a publicly accessible ledger, allowing for more transparency and auditing. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.4">Bitcoin offers the modern individual the chance to opt out of the totalitarian, managerial, Keynesian, and socialist states. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.5">It is a simple technological fix to the modern pestilence of governments surviving by exploiting the productive individuals who happen to live on their soil. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.6">If Bitcoin continues to grow to capture a larger share of the global wealth, it may force governments to become more and more a form of voluntary organization, which can only acquire its “taxes” voluntarily by offering its subjects services they would be willing to pay for.</span></p>
<p id="c09-para-0024"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.1">The political vision of Bitcoin can be understood from a closer examination of the ideas of the cypherpunk movement from which it sprung. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.2">In the words of Timothy May:</span></p>
<blockquote>
<p id="c09-para-0025"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.78.1">The combination of strong, unbreakable public key cryptography and virtual network communities in cyberspace will produce interesting and profound changes in the nature of economic and social systems. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.78.2">Crypto anarchy is the cyberspatial realization of anarcho‐capitalism, transcending national boundaries and freeing individuals to make the economic arrangements they wish to make consensually … Crypto anarchy is liberating individuals from coercion by their physical neighbors–who cannot know who they are on the Net–and from governments. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.78.3">For libertarians, strong crypto provides the means by which government will be avoided.</span><sup><a id="fn-6" href="#fn6"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.1">6</span></a></sup></p></blockquote>
<p id="c09-para-0026"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.1">The vision of anarcho‐capitalism</span><span epub:type="pagebreak" title="204" id="Page_204"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.1"> May describes is the political philosophy developed by the American economist of the Austrian school, Murray Rothbard. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.2">In </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.82.1">The Ethics of Liberty</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.1"> Rothbard explains libertarian anarcho‐capitalism as the only logically coherent implication of the idea of free will and self‐ownership:</span></p>
<blockquote>
<p id="c09-para-0027"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.1">On the other hand, consider the universal status of the ethic of liberty, and of the natural right of person and property that obtains under such an ethic. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.2">For every person, at any time or place, can be covered by the basic rules: ownership of one's own self, ownership of the previously unused resources which one has occupied and transformed; and ownership of all titles derived from that basic ownership–either through voluntary exchanges or voluntary gifts. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.3">These rules–which we might call the “rules of natural ownership”–can clearly be applied, and such ownership defended, regardless of the time or place, and regardless of the economic attainments of the society. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.4">It is impossible for any other social system to qualify as universal natural law; for if there is any coercive rule by one person or group over another (and all rule partakes of such hegemony), then it is impossible to apply the same rule for all; only a rulerless, purely libertarian world can fulfill the qualifications of natural rights and natural law, or, more important, can fulfill the conditions of a universal ethic for all mankind.</span><sup><a id="fn-7" href="#fn7"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.1">7</span></a></sup></p></blockquote>
<p id="c09-para-0028"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.1">The non‐aggression principle is the foundation of Rothbard's anarcho‐capitalism, and on its basis, any aggression, whether carried out by government or individual, cannot have moral justification. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.2">Bitcoin, being completely voluntary and relentlessly peaceful, offers us the monetary infrastructure for a world built purely on voluntary cooperation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.3">Contrary to popular depictions of anarchists as hoodie‐clad hoodlums, Bitcoin's brand of anarchism is completely peaceful, providing individuals with the tools necessary for them to be free from government control and inflation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.4">It seeks to impose itself on nobody, and if it grows and succeeds, it will be for its own merits as a peaceful neutral technology for money and settlement, not through it being forced on others.</span></p>
<p id="c09-para-0029"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.1">In the foreseeable future, as it is still at a very low level of general adoption, Bitcoin provides a cost‐effective option for people needing to get around government restrictions on</span><span epub:type="pagebreak" title="205" id="Page_205"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.1"> the banking sector, as well as to save wealth in a liquid store of value not subject to government inflation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.2">If it were to be adopted widely, the cost of on‐chain Bitcoin transactions is likely to rise significantly, as discussed ahead in the section on scaling, making it less feasible for individuals to carry out the uncensorable on‐chain transactions to get around government rules and regulations. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.3">In that situation, however, the wide adoption of Bitcoin will have a far larger positive effect on individual freedom, by reducing government's ability to finance its operation through inflation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.4">It was government money in the twentieth century that allowed for the birth of the heavily interventionist managerial state, with totalitarian and authoritarian tendencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.5">In a society run on hard money, government impositions that are not economically productive are unlikely to survive for long, as there is little incentive to continue financing them.</span></p></section>
<section><span id="c09-sec-0003"/>
<h2 id="head-2-34"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.1">International and Online Settlement</span></h2>
<p id="c09-para-0030"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.90.1">Traditionally, gold was the medium of settlement of payments and store of value worldwide. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.90.2">The inability of any party to expand its supply in any significant quantities made it so. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.90.3">Its value was earned on the free market, and not a liability of anyone else. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.90.4">As the scope of communication and travel grew larger in the nineteenth century, requiring financial transactions over longer distances, gold moved out of people's hands and into the vaults of banks, and eventually, central banks. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.90.5">Under a gold standard, people held paper receipts in gold or wrote checks for it that cleared without physical gold having to be physically moved, vastly improving the speed and efficiency of global trade.</span></p>
<p id="c09-para-0031"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.1">As governments confiscated gold and issued their own money, it was no longer possible for global settlements between individuals and banks to be done with gold, and instead they were conducted with national currencies fluctuating in value, creating significant problems for international trade, as discussed in </span><a href="c06.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.92.1">Chapter 6</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.2">The invention of Bitcoin has created, from the ground up, a new independent alternative mechanism for international settlement that does not rely on any intermediary and can operate entirely separate from the existing financial infrastructure.</span></p>
<p id="c09-para-0032"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.94.1">The ability of any individual to run</span><span epub:type="pagebreak" title="206" id="Page_206"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.1"> a Bitcoin node and send his own money without permission from anyone, and without having to expose his identity, is a noteworthy difference between gold and Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.2">Bitcoin does not have to be stored on a computer; the private key to a person's bitcoin hoard is a string of characters or a string of words the person remembers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.3">It is far easier to move around with a Bitcoin private key than with a hoard of gold, and far easier to send it across the world without having to risk it getting stolen or confiscated. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.4">Whereas governments confiscated people's gold savings and forced them to trade with money supposedly backed by that gold, people are able to keep the bulk of their bitcoin savings in storage away from government's hands and only use smaller amounts to transact through intermediaries. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.5">The very nature of the Bitcoin technology puts governments at a severe disadvantage compared to all other forms of money and thus makes confiscation much harder.</span></p>
<p id="c09-para-0033"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.96.1">Further, the ability of bitcoin holders to track all holdings of bitcoin on its blockchain makes it extremely impractical for any authority to play the role of a lender of last resort for banks dealing with Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.96.2">Even in the heyday of the international gold standard, money was redeemable in gold, but central banks rarely had enough to cover the entire supply of currency they introduced, and thus always had a margin for increasing the supply of paper to back up the currency. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.96.3">This is much harder with Bitcoin, which brings cryptographic digital certainty to accounting and can help expose banks engaging in fractional reserve banking.</span></p>
<p id="c09-para-0034"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.1">The future use of Bitcoin for small payments will likely not be carried out over the distributed ledger, as explained in the discussion on scaling in </span><a href="c10.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.98.1">Chapter 10</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.1">, but through second layers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.2">Bitcoin can be seen as the new emerging reserve currency for online transactions, where the online equivalent of banks will issue Bitcoin‐backed tokens to users while keeping their hoard of Bitcoins in cold storage, with each individual being able to audit in real time the holdings of the intermediary, and with online verification and reputation systems able to verify that no inflation is taking place. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.3">This would allow an infinite number of transactions to be carried out online without having to pay the high transaction fees for on‐chain transactions.</span></p>
<p id="c09-para-0035"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.100.1">As Bitcoin continues to evolve in the direction of having a higher market value with higher transaction fees, it starts to look more and more like a reserve currency than a currency</span><span epub:type="pagebreak" title="207" id="Page_207"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.101.1"> for everyday trading and transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.101.2">Even at the time of writing, with Bitcoin at a relatively small level of public adoption, the majority of Bitcoin transactions are not recorded on‐chain, but occur in exchanges and various types of Bitcoin‐based online platforms such as gambling and casino websites. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.101.3">These businesses will credit or debit bitcoins to their customers on their own internal records and then only make transactions on the Bitcoin network when customers deposit or withdraw funds.</span></p>
<p id="c09-para-0036"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.1">By virtue of being digital cash, Bitcoin's comparative advantage may not lie in replacing cash payments, but rather in allowing for cash payments to be carried out over long distances. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.2">Payments in person, for small amounts, can be conducted in a wide variety of options: physical cash, barter, favors, credit cards, bank checks, and so on. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.3">Current state‐of‐the‐art technology in payment settlements has already introduced a wide array of options for settling small‐scale payments with very little cost. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.4">It is likely that Bitcoin's advantage lies not in competing with these payments for small amounts and over short distances; Bitcoin's advantage, rather, is that by bringing the finality of cash settlement to the digital world, it has created the fastest method for final settlement of large payments across long distances and national borders. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.5">It is when compared to these payments that Bitcoin's advantages appear most significant. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.6">There are only a few currencies that are accepted for payment worldwide, namely the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.7">dollar, the euro, gold, and the IMF's Special Drawing Rights. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.8">The vast majority of international payments are denominated in one of these currencies, with only a tiny percentage shared by a few other major currencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.9">To send a few thousand dollars' worth of these currencies internationally usually costs dozens of dollars, takes several days, and is subject to invasive forensic examination by financial institutions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.10">The high cost of these transactions lies primarily in the volatility of trading currencies and the problems of settlement between institutions in different countries, which necessitates the employment of several layers of intermediation.</span></p>
<p id="c09-para-0038"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.103.1">In less than ten years of existence, Bitcoin has already achieved a significant degree of global liquidity, allowing for international payments in prices that are currently much lower than existing international transfers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.103.2">This is not to argue that Bitcoin will replace the international money transfer market, but merely to point out its potential for international liquidity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.103.3">As it stands, the volume of these</span><span epub:type="pagebreak" title="208" id="Page_208"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.104.1"> international flows is far larger than what Bitcoin's blockchain can handle, and if more such payments move to Bitcoin, fees will rise to limit the demand for them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.104.2">Yet, that would also not spell doom for Bitcoin, because sending these individual payments is not the limit of Bitcoin's capabilities.</span></p>
<p id="c09-para-0039"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.1">Bitcoin is money free of counterparty risk, and its network can offer final settlement of large‐volume payments within minutes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.2">Bitcoin can thus be best understood to compete with settlement payments between central banks and large financial institutions, and it compares favorably to them due to its verifiable record, cryptographic security, and imperviousness to third‐party security holes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.3">Using the major national currencies (USD, euro) for settlement carries with it the risk of exchange rate fluctuation of these currencies and involves trust in several layers of existing intermediation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.4">Settlements between central banks and large financial institutions take days, and sometimes weeks, to clear, during which time each party is exposed to significant foreign exchange and counterparty risk. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.5">Gold is the only traditional monetary medium that is not someone's liability, and is free of counterparty risk, but moving gold around is an extremely expensive operational task, fraught with risks.</span></p>
<p id="c09-para-0040"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.1">Bitcoin, having no counterparty risk and no reliance on any third‐party, is uniquely suited to play the same role that gold played in the gold standard. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.2">It is a neutral money for an international system that does not give any one country the “exorbitant privilege” of issuing the global reserve currency, and is not dependent on its economic performance. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.3">Being separated from any particular country's economy, its value will not be affected by the volume of trade denominated in it, averting all the exchange rate problems that have plagued the twentieth century. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.4">Further, the finality of settlement on Bitcoin does not rely on any counterparty, and does not require any single bank to be the de facto arbiter, making it ideal for a network of global peers, rather than a global hegemonic centralized order. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.5">The Bitcoin network is based on a form of money whose supply cannot be inflated by any single member bank, making it a more attractive store‐of‐value proposition than national currencies whose creation was precisely so their supply could be increased to finance governments.</span></p>
<p id="c09-para-0041"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.107.1">Bitcoin's capacity for transactions is far more than what the current number of central banks would need even if they settled their accounts daily. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.107.2">Bitcoin's current capacity of around</span><span epub:type="pagebreak" title="209" id="Page_209"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.108.1"> 350,000 transactions per day can allow a global network of 850 banks to each have one daily transaction with every other bank on the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.108.2">(The number of unique connections in a network equals </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.109.1">n</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.110.1">(</span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.1">n</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.1"> – 1)/2, where </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.113.1">n</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.1"> is the number of nodes.)</span></p>
<p id="c09-para-0042"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.1">A global network of 850 central banks can perform daily final settlement with one another over the Bitcoin network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.2">If each central bank serves around 10 million customers, that would cover the entire world's population. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.3">This is offered as an absolute worst‐case scenario in which Bitcoin's capacity is not increased in any way whatsoever. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.4">As will be discussed in the next chapter, there are several ways in which capacity can be increased even without altering the architecture of Bitcoin in a backward‐incompatible way, potentially allowing for daily settlement between several thousands of banks.</span></p>
<p id="c09-para-0043"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.116.1">In a world in which no government can create more bitcoins, these Bitcoin central banks would compete freely with one another in offering physical and digital bitcoin‐backed monetary instruments and payment solutions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.116.2">Without a lender of last resort, fractional reserve banking becomes an extremely dangerous arrangement and it would be my expectation the only banks that will survive in the long run would be banks offering financial instruments 100% backed by Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.116.3">This, however, is a point of contention among economists and time can only tell whether that will be the case. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.116.4">These banks would settle payments between their own customers outside of Bitcoin's blockchain and then perform final daily settlement between each other over the blockchain.</span></p>
<p id="c09-para-0044"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.117.1">While this view of Bitcoin might sound like it is a betrayal of Bitcoin's original vision of fully peer‐to‐peer cash, it is not a new vision. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.117.2">Hal Finney, the recipient of the first Bitcoin transaction from Nakamoto, wrote this on the Bitcoin forum in 2010:</span></p>
<blockquote>
<p id="c09-para-0045"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.118.1">Actually there is a very good reason for Bitcoin‐backed banks to exist, issuing their own digital cash currency, redeemable for bitcoins. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.118.2">Bitcoin itself cannot scale to have every single financial transaction in the world be broadcast to everyone and included in the block chain. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.118.3">There needs to be a secondary level of payment systems which is lighter weight and more efficient. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.118.4">Likewise, the time needed for Bitcoin transactions to finalize will be impractical for medium to large value purchases.</span></p>
<p id="c09-para-0046"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.119.1">Bitcoin backed banks will solve</span><span epub:type="pagebreak" title="210" id="Page_210"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.120.1"> these problems. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.120.2">They can work like banks did before nationalization of currency. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.120.3">Different banks can have different policies, some more aggressive, some more conservative. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.120.4">Some would be fractional reserve while others may be 100% Bitcoin backed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.120.5">Interest rates may vary. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.120.6">Cash from some banks may trade at a discount to that from others.</span></p>
<p id="c09-para-0047"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.121.1">George Selgin has worked out the theory of competitive free banking in detail, and he argues that such a system would be stable, inflation resistant and self‐regulating.</span></p>
<p id="c09-para-0048"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.122.1">I believe this will be the ultimate fate of Bitcoin, to be the “high‐powered money” that serves as a reserve currency for banks that issue their own digital cash. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.122.2">Most Bitcoin transactions will occur between banks, to settle net transfers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.122.3">Bitcoin transactions by private individuals will be as rare as… well, as Bitcoin based purchases are today.</span><sup><a id="fn-8" href="#fn8"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.123.1">8</span></a></sup></p></blockquote>
<p id="c09-para-0049"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.124.1">The number of transactions in a Bitcoin economy can still be as large as it is today, but the settlement of these transactions will not happen on Bitcoin's ledger, whose immutability and trustlessness is far too valuable for individual consumer payments. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.124.2">Whatever the limitations of current payment solutions, they will stand to benefit immensely from the introduction of free market competition into the field of banking and payments, one of the most sclerotic industries in the modern world economy, because it is controlled by governments that can create the money on which it runs.</span></p>
<p id="c09-para-0050"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.125.1">If Bitcoin continues to grow in value and gets utilized by a growing number of financial institutions, it will become a reserve currency for a new form of central bank. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.125.2">These central banks could be primarily based in the digital or physical worlds, but it is becoming worth considering if national central banks should supplement their reserves with Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.125.3">In the current monetary global system, national central banks hold reserves mainly in U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.125.4">dollars, euros, British pounds, IMF Standard Drawing Rights, and gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.125.5">These reserve currencies are used to settle accounts between central banks and to defend the market value of their local currencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.125.6">Should Bitcoin's appreciation continue in the same manner it has experienced over the past few years, it is</span><span epub:type="pagebreak" title="211" id="Page_211"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.126.1"> likely to attract the attention of central banks with an eye on the future.</span></p>
<p id="c09-para-0051"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.127.1">If Bitcoin continues to appreciate significantly, it will provide the central bank more flexibility with their monetary policy and international account settlement. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.127.2">But perhaps the real case for central banks owning bitcoin is as insurance against the scenario of it succeeding. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.127.3">Given that the supply of bitcoins is strictly limited, it may be wise for a central bank to spend a small amount acquiring a small portion of bitcoin's supply today in case it appreciates significantly in the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.127.4">If bitcoin continues to appreciate while a central bank doesn't own any of it, then the market value of their reserve currencies and gold will be declining in terms of Bitcoin, placing the central bank at a disadvantage the later it decides to acquire reserves.</span></p>
<p id="c09-para-0052"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.1">Bitcoin is still viewed as a quirky Internet experiment for now, but as it continues to survive and appreciate over time, it will start attracting real attention from high‐net‐worth individuals, institutional investors, and then, possibly, central banks. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.2">The point at which central banks start to consider using it is the point at which they are all engaged in a reverse bank run on Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.3">The first central bank to buy bitcoin will alert the rest of the central banks to the possibility and make many of them rush toward it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.4">The first central bank purchase is likely to make the value of Bitcoin rise significantly and thus make it progressively more expensive for later central banks to buy it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.5">The wisest course of action in this case is for a central bank to purchase a small share of Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.6">If the central bank has the institutional capacity to purchase the currency without announcing it, that would be an even wiser course of action, allowing the central bank to accumulate it at low prices.</span></p>
<p id="c09-para-0053"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.129.1">Bitcoin can also serve as a useful reserve asset for central banks facing international restrictions on their banking operations, or unhappy at the dollar‐centric global monetary system. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.129.2">The possibility of adopting Bitcoin reserves might itself prove a valuable bargaining chip for these central banks with U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.129.3">monetary authorities, who would probably prefer not to see any central banks defect to Bitcoin as a method of settlement, because that would then entice others to join.</span></p>
<p id="c09-para-0054"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.130.1">While central banks have mostly been dismissive of the importance of Bitcoin, this could be a luxury they may not afford for long. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.130.2">As hard as it might be for central bankers to believe it, Bitcoin is a direct competitor to their line of business, which</span><span epub:type="pagebreak" title="212" id="Page_212"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.1"> has been closed off from market competition for a century. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.2">Bitcoin makes global processing of payments and final clearance available for anyone to perform at a small cost, and it replaces human‐directed monetary policy with superior and perfectly predictable algorithms. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.3">The modern central bank business model is being disrupted. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.4">Central banks now have no way of stopping competition by just passing laws as they have always done. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.5">They are now up against a digital competitor that most likely cannot be brought under the physical world's laws. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.6">Should national central banks not use Bitcoin's instant clearance and sound monetary policy, they would leave the door open for digital upstarts to capture more and more of this market for a store of value and settlement.</span></p>
<p id="c09-para-0055"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.1">If the modern world is ancient Rome, suffering the economic consequences of monetary collapse, with the dollar our aureus, then Satoshi Nakamoto is our Constantine, Bitcoin is his solidus, and the Internet is our Constantinople. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.2">Bitcoin serves as a monetary lifeboat for people forced to transact and save in monetary media constantly debased by governments. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.3">Based on the foregoing analysis, the real advantage of Bitcoin lies in it being a reliable long‐term store of value, and a sovereign form of money that allows individuals to conduct permissionless transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.4">Bitcoin's main uses in the foreseeable future will follow from these competitive advantages, and not from its ability to offer ubiquitous or cheap transactions.</span></p></section>
<section><span id="c09-sec-0004"/>
<h2 id="head-2-35"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.133.1">Global Unit of Account</span></h2>
<p id="c09-para-0056"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.1">This final application of Bitcoin is not one that is likely to materialize any time soon, but is nonetheless intriguing given Bitcoin's unique properties. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.2">Since the end of the gold standard era, global trade has been hampered by the differences in currency value across different countries. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.3">This destroyed people's ability to conduct indirect exchange using a single medium of exchange and instead created a world where buying something across borders has to be preceded by buying the currency of the producer, almost mimicking barter. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.4">This has severely hampered people's ability to conduct economic calculation across borders and resulted in the growth of a massive foreign exchange industry. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.5">That industry produces little of value but an amelioration</span><span epub:type="pagebreak" title="213" id="Page_213"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.1"> of the terrible consequences of monetary nationalism.</span></p>
<p id="c09-para-0057"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.136.1">The gold standard offered a solution to this problem, wherein a single form of money, independent of the control of any single government or authority, was the monetary standard worldwide. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.136.2">Prices could be calibrated against gold and expressed in it, facilitating calculation across borders. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.136.3">The physical heft of gold, however, meant that it had to be centralized and settlement had to be carried out between central banks. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.136.4">Once the gold was centralized, its lure proved irresistible for governments, who took control of it and eventually replaced it with fiat money whose supply they control. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.136.5">Sound money became unsound as a result.</span></p>
<p id="c09-para-0058"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.1">It is an open question whether Bitcoin could potentially play the role of a global unit of account for trade and economic activity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.2">For this possibility to materialize, Bitcoin would need to be adopted by an extremely large number of people in the world, most likely indirectly, through its use as a reserve currency. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.3">It would then remain to be seen whether the stability of bitcoin's supply would make it also stable in value, as daily transactions in it would be marginal compared to the quantities held. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.4">As it stands, given that Bitcoin constitutes less than 1% of the global money supply, large individual transactions in Bitcoin can have a large impact on price, and small variations in demand can cause large swings in price. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.5">This, however, is a feature of the current situation where Bitcoin as a global settlement network and currency is still a tiny fraction of global settlement payments and money supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.6">Buying a Bitcoin token today can be considered an investment in the fast growth of the network and currency as a store of value, because it is still very small and able to grow many multiples of its size and value very quickly. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.7">Should Bitcoin's share of the global money supply and international settlement transactions become a majority share of the global market, the level of demand for it will become far more predictable and stable, leading to a stabilization in the value of the cur
