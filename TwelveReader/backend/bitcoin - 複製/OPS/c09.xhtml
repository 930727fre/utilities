rency. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.8">Hypothetically, should bitcoin become the only money used around the world, it will no longer have large room for growth in value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.9">At that point, demand for it will simply be demand for holding liquid money, and the speculative investment aspect of the demand we see today would disappear. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.10">In such a situation, the value of bitcoin would vary along with the time preference of the entire world's population, with increasing demand for</span><span epub:type="pagebreak" title="214" id="Page_214"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.138.1"> holding Bitcoin as a store of value leading to only small appreciation of its value.</span></p>
<p id="c09-para-0059"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.139.1">In the long run, the absence of any authority that can control bitcoin's supply will likely go from creating volatility in the price to reducing it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.139.2">The predictability of the supply combined with growth in the number of users could make daily fluctuations in demand less significant determinants of price, as market makers are able to hedge and smooth supply‐and‐demand fluctuations and create a more stable price.</span></p>
<p id="c09-para-0060"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.140.1">The situation would be similar to gold under the gold standard, as detailed in Jastram's study referenced in </span><a href="c06.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.1">Chapter 6</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.142.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.142.2">For centuries during which gold was used as money, the steady and gradual increase in its supply meant that its value did not increase or decrease significantly, making it the perfect unit of account across space and time.</span></p>
<p id="c09-para-0061"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.1">But this scenario ignores one fundamental difference between gold and Bitcoin, and that is that gold has large and highly elastic demand for use in a multitude of industrial and ornamental applications. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.2">Gold's unique chemical properties have ensured that it is always in high demand regardless of its monetary role. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.3">Even as monetary demand for gold changes, industry stands ready to utilize essentially limitless quantities of gold should the price drop due to a decrease in monetary demand. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.4">Gold's properties make it the best choice for many applications, for which inferior substitutes are only chosen due to gold's high price. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.5">Even in a scenario where all global central banks dispose of all their gold reserves, jewelry and industrial demand is likely to absorb all that excess supply with only temporary reductions in price. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.6">The rarity of gold in the earth's crust will always ensure it will remain expensive relative to other materials and metals. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.7">This property has been instrumental in the rise of gold as money because it ensured a relative stability of value for gold over time, regardless of global changes in monetary demand through countries going on or off the gold standard. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.8">This relative stability in turn solidified gold's appeal as a monetary asset and ensured demand for it, and can be understood as the real reason central banks do not sell their gold reserves decades after their currencies stopped being redeemable in it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.9">Should central banks sell their gold reserves, the net effect will be that tons more gold will be utilized in industrial applications over the coming few years, with a small impact on gold's price. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.10">In this trade, the central bank would</span><span epub:type="pagebreak" title="215" id="Page_215"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.144.1"> only gain a fiat currency it can print itself, and would lose an asset which will likely gain value over its own currency.</span></p>
<p id="c09-para-0062"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.145.1">The equivalent nonmonetary demand for bitcoin can be understood as the demand for the coins not as a store of value, but as a necessary prerequisite to using the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.145.2">But unlike industrial demand for gold, which is completely independent of its monetary demand, demand for bitcoin to operate the network is inextricably linked to demand for it as a store of value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.145.3">It thus cannot be expected to play a significant role in ameliorating the volatility of bitcoin's market value as it is growing in its monetary role.</span></p>
<p id="c09-para-0063"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.146.1">On the one hand, Bitcoin's strict scarcity makes it a very attractive choice for a store of value, and an ever‐growing number of holders could tolerate the volatility for long periods of time if it is heavily skewed to the upside, as has been the case so far. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.146.2">On the other hand, the persistence of volatility in bitcoin's value will prevent it from playing the role of a unit of account, at least until it has grown to many multiples of its current value and in the percentage of people worldwide who hold and accept it.</span></p>
<p id="c09-para-0064"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.1">Yet, considering that the world's population today has only lived in a world of volatile fiat currencies shifting against each other, bitcoin holders should be far more tolerant of its volatility than generations reared under the certainty of the gold standard. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.2">Only the best fiat currencies have been stable in the short‐term, but the devaluation in the long term is evident. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.3">Gold, on the other hand, has maintained long‐term stability, but it is relatively unstable in the short term. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.4">Bitcoin's lack of stability does not seem like a fatal flaw that would prevent its growth and adoption given that all its alternatives are also relatively unstable.</span></p>
<p id="c09-para-0065"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.148.1">Such questions cannot be answered definitively at this point, and only the real world will tell how these dynamics will unfold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.148.2">Monetary status is a spontaneously emergent product of human action, not a rational product of human design.</span><sup><a id="fn-9" href="#fn9"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.149.1">9</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.150.1"> Individuals act out of self‐interest, and technological possibilities and the economic realities of supply and demand shape the outcomes of their actions, providing them incentives to persist, adapt, change, or innovate. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.150.2">A</span><span epub:type="pagebreak" title="216" id="Page_216"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.151.1"> spontaneous monetary order emerges from these complex interactions; it is not something that is conferred through academic debate, rational planning, or government mandate. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.151.2">What might appear like a better technology for money in theory may not necessarily succeed in practice. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.151.3">Bitcoin's volatility may make monetary theorists dismiss it as a monetary medium, but monetary theories cannot override the spontaneous order that emerges on the market as a result of human actions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.151.4">As a store of value, Bitcoin may continue to attract more savings demand, causing it to continue appreciating significantly compared to all other forms of money until it becomes the prime choice for anyone looking to get paid.</span></p>
<p id="c09-para-0066"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.152.1">Should it achieve some sort of stability in value, Bitcoin would be superior to using national currencies for global payment settlements, as is the case today, because national currencies fluctuate in value based on each nation's and government's conditions, and their widespread adoption as a global reserve currency results in an “exorbitant privilege” to the issuing nation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.152.2">An international settlement currency should be neutral to the monetary policy of different countries, which is why gold played this role with excellence during the international gold standard. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.152.3">Bitcoin would have an advantage over gold in playing this role because its settlement can be completed in minutes, and the authenticity of the transactions can be trivially verified by anyone with an Internet connection, at virtually no cost. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.152.4">Gold, on the other hand, takes more time to transport, and its clearance relies on varying degrees of trust in intermediaries responsible for settling it and transferring it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.152.5">This might preserve gold's monetary role for in‐person cash transactions while Bitcoin specializes in international settlement.</span></p>
</section>
</section>

<aside class="noteEntry" epub:type="rearnote"><a id="fn4" href="#fn-4"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.1">4</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.169.1"> There are no simple ways of estimating the number of Bitcoin users, as each individual user can have an arbitrary number of wallet addresses associated with them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.169.2">Various attempts at estimating the number put it between 10 and 100 million holders in 2017, and I think this could be as accurate an estimate as we can get.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn5" href="#fn-5"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.170.1">5</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.171.1"> And obtaining internet capable devices and an internet connection is cheap and continuously getting cheaper.</span></aside>
