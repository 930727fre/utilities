<h2 id="bref-bibsec-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.299.1">Online Resources</span></h2>
<p id="bref-li-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.300.1">bitcoin.org: The original domain</span><span epub:type="pagebreak" title="281" id="Page_281"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.301.1"> used by Nakamoto to announce Bitcoin, share the white paper, and distribute the code. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.301.2">It continues to be run by several contributors and serves as a good resource for information.</span></p>
<p id="bref-li-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.302.1">en.bitcoin.it/wiki/: An open encyclopedia for information on Bitcoin, which contains useful and usually up to date information on Bitcoin.</span></p>
