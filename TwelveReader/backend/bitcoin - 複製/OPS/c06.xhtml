<section epub:type="chapter">
<header>
<h1><span epub:type="pagebreak" title="105" id="Page_105"/><a id="c06"/><span class="chapterNumber"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.1.1">Chapter 6</span></span><br/><span class="chapterTitle"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.2.1">Capitalism's Information System</span></span></h1>
</header>
<section><span id="c06-sec-0001"/>
<blockquote>
<p id="c06-para-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.1">“The cause of waves of unemployment is not ‘capitalism’ but governments denying enterprise the right to produce good money.”</span></p>
<p class="right"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.1">—</span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.5.1">Friedrich Hayek</span></i></p>
</blockquote>
<p id="c06-para-0003"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.1">Money's primary function as a medium of exchange is what allows economic actors to engage in economic planning and calculation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.2">As economic production moves from the very primitive scale, it becomes harder for individuals to make production, consumption, and trade decisions without having a fixed frame of reference with which to compare the value of different objects to one another. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.3">This property, the unit of account, is the third function of money after being a medium of exchange and store of value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.4">To understand the significance of this property to an economic system, we do what wise people always do when seeking</span><span epub:type="pagebreak" title="106" id="Page_106"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.7.1"> to understand economic questions: turn to the work of dead Austrian economists.</span></p>
<p id="c06-para-0004"><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.1">The Use of Knowledge in Society</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.1">, by Friedrich Hayek, is arguably one of the most important economic papers to have ever been written. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.2">Unlike highly theoretical, inconsequential, and esoteric modern academic research that is read by nobody, the 11 pages of this paper continue to be read widely 70 years after its publication, and have had a lasting impact on the lives and businesses of many people worldwide, perhaps none as significant as its role in the founding of one of the most important websites on the Internet, and the largest single body of knowledge assembled in human history. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.3">Jimmy Wales, Wikipedia's founder, has stated that the idea for establishing Wikipedia came to him after he read this paper by Hayek and his explanation of knowledge.</span></p>
<p id="c06-para-0005"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.1">Hayek explained that contrary to popular and elementary treatments of the topic, the economic problem is not merely the problem of allocating resources and products, but more accurately, the problem of allocating them using knowledge that is not given in its totality to any single individual or entity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.2">Economic knowledge of the conditions of production, the relative availability and abundance of the factors of production, and the preferences of individuals, is not objective knowledge that can be fully known to a single entity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.3">Rather, the knowledge of economic conditions is by its very nature </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.11.1">distributed</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.1"> and situated with the people concerned by their individual decisions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.2">Every human's mind is consumed in learning and understanding the economic information relevant to them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.3">Highly intelligent and hardworking individuals will spend decades learning the economic realities of their industries in order to reach positions of authority over the production processes of one single good. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.4">It is inconceivable that all these individual decisions being carried out by everyone could be substituted by aggregating all that information into one individual's mind to perform the calculations for everyone. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.5">Nor is there a need for this insane quest to centralize all knowledge into one decision maker's hands.</span></p>
<p id="c06-para-0006"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.1">In a free market economic system, prices are knowledge, and the signals that communicate information. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.2">Each individual decision maker is only able to carry out her decisions by examining the prices of the goods involved, which carry in them the distillation of all market conditions and realities into one actionable variable for that individual. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.3">In turn, each individual's decisions will</span><span epub:type="pagebreak" title="107" id="Page_107"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.14.1"> in turn play a role in shaping the price. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.14.2">No central authority could ever internalize all the information that goes into forming a price or replace its function.</span></p>
<p id="c06-para-0007"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.15.1">To understand Hayek's point, picture the scenario of an earthquake badly damaging the infrastructure of a country that is the world's major producer of a commodity, such as the 2010 earthquake in Chile, which is the world's largest producer of copper. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.15.2">As the earthquake hit a region with extensive copper mines, it caused damage to these mines and to the seaport from which they are exported. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.15.3">This meant a reduction in the supply of copper to the world markets and immediately resulted in a 6.2% rise in the price of copper.</span><sup><a id="fn-1" href="#fn1"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.16.1">1</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.17.1"> Anybody in the world involved in the copper market will be affected by this, but they do not need to know anything about the earthquake, Chile, and the conditions of the market in order to decide how to act. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.17.2">The rise in the price itself contains all the relevant information they need. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.17.3">Immediately, all the firms demanding copper now have an incentive to demand a smaller quantity of it, delay purchases that weren't immediately necessary, and find substitutes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.17.4">On the other hand, the rising price gives all firms that produce copper anywhere around the world an incentive to produce more of it, to capitalize on the price rise.</span></p>
<p id="c06-para-0008"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.1">With the simple increase in the price, everyone involved in the copper industry around the world now has the incentive to act in a way that alleviates the negative consequences of the earthquake: other producers supply more while consumers demand less. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.2">As a result, the shortage caused by the earthquake is not as devastating as it could be, and the extra revenue from the rising prices can help the miners rebuild their infrastructure. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.3">Within a few days, the price was back to normal. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.4">As global markets have become more integrated and larger, such individual disruptions are becoming less impactful than ever, as market makers have the depth and liquidity to get around them quickly with the least disruption.</span></p>
<p id="c06-para-0009"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.19.1">To understand the power of prices as a method of communicating knowledge, imagine that the day before the earthquake, the entirety of the global copper industry stopped being a market institution and was instead given over to be under the command of a specialized agency, meaning production is allocated without</span><span epub:type="pagebreak" title="108" id="Page_108"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.1"> any recourse to prices. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.2">How would such an agency react to the earthquake? </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.3">Of all the many copper producers worldwide, how would they decide which producers should increase their production and by how much? </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.4">In a price system, each firm's own management will look at the prices of copper and the prices of all inputs into its production and come up with an answer to the most efficient new level of production. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.5">Many professionals work for decades in a firm to arrive at these answers with the help of prices, and they know their own firm far more than the central planners, who cannot resort to prices. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.6">Further, how will the planners decide on which consumers of copper should reduce their consumption and by how much, when there are no prices allowing these consumers to reveal their preferences?</span></p>
<p id="c06-para-0010"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.1">No matter how much objective data and knowledge the agency might collect, it can never know all the dispersed knowledge that bears on the decisions that each individual carries out, and that includes their own preferences and valuations of objects. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.2">Prices, then, are not simply a tool to allow capitalists to profit; they are the information system of economic production, communicating knowledge across the world and coordinating the complex processes of production. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.3">Any economic system that tries to dispense with prices will cause the complete breakdown of economic activity and bring a human society back to a primitive state.</span></p>
<p id="c06-para-0011"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.1">Prices are the only mechanism that allows trade and specialization to occur in a market economy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.2">Without resort to prices humans could not benefit from the division of labor and specialization beyond some very primitive small scale. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.3">Trade allows producers to increase their living standards through specialization in the goods in which they have a </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.1">comparative advantage</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.1">—goods which they can produce at a lower relative cost. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.2">Only with accurate prices expressed in a common medium of exchange is it possible for people to identify their comparative advantage and specialize in it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.3">Specialization itself, guided by price signals, will lead to producers further improving their efficiency in the production of these goods through learning by doing, and more importantly, accumulating capital specific to it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.4">In fact, even without inherent differences in the relative costs, specialization would allow each producer to accumulate capital relevant to their production and thus increase their marginal productivity in it, allowing them to decrease their marginal cost of production, and trade with those who accumulate capital to specialize in other goods.</span></p></section>
<section><span id="c06-sec-0002"/>
<h2 id="head-2-19"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.1">Capital Market Socialism</span></h2>
<p id="c06-para-0012"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.1">While most understand the importance</span><span epub:type="pagebreak" title="109" id="Page_109"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.27.1"> of the price system to the division of labor, few get the crucial role it plays in capital accumulation and allocation, for which we need to turn to the work of Mises. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.27.2">In his 1922 book, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.28.1">Socialism</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.1">, Mises explained the quintessential reason why socialist systems must fail, and it was </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.1">not</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.31.1"> the commonly held idea that socialism simply had an incentive problem (Why would anyone work if everyone got the same rewards regardless of effort?). </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.31.2">Given that lack of application to one's job was usually punished with government murder or imprisonment, socialism arguably overcame the incentive problem successfully, regardless of how bloody the process. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.31.3">After a century in which around 100 million people worldwide were murdered by socialist regimes,</span><sup><a id="fn-2" href="#fn2"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.1">2</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.1"> this punishment was clearly not theoretical, and the incentives to work were probably stronger than in a capitalist system. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.2">There must be more to socialist failure than just incentives, and Mises was the first to precisely explicate why socialism would fail even if it were to successfully overcome the incentive problem by creating “the new socialist man.”</span></p>
<p id="c06-para-0013"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.34.1">The fatal flaw of socialism that Mises exposed was that without a price mechanism emerging on a free market, socialism would fail at economic calculation, most crucially in the allocation of capital goods</span><sup><a id="fn-3" href="#fn3"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.1">3</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.2">As discussed earlier, capital production involves progressively sophisticated methods of production, longer time horizons, and a larger number of intermediate goods not consumed for their own sake, but only produced so as to take part in the production of final consumer goods in the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.3">Sophisticated structures of production only emerge from an intricate web of individual calculations by producers of each capital and consumer good buying and selling inputs and outputs to one another</span><sup><a id="fn-4" href="#fn4"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.1">4</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.2">The most productive allocation is determined only through the price mechanism allowing the most productive users of capital goods to bid highest for them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.3">The supply and demand</span><span epub:type="pagebreak" title="110" id="Page_110"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.1"> of capital goods emerges from the interaction of the producers and consumers and their iterative decisions.</span></p>
<p id="c06-para-0014"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.1">In a socialist system, government owns and controls the means of production, making it at once the sole buyer and seller of all capital goods in the economy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.2">That centralization stifles the functioning of an actual market, making sound decisions based on prices impossible. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.3">Without a market for capital where independent actors can bid for capital, there can be no price for capital overall or for individual capital goods. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.4">Without prices of capital goods reflecting their relative supply and demand, there is no rational way of determining the most productive uses of capital, nor is there a rational way of determining how much to produce of each capital good. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.5">In a world in which the government owns the steel factory, as well as all the factories that will utilize steel in the production of various consumer and capital goods, there can be no price emerging for steel, or for the goods it is used to produce, and hence, no possible way of knowing which uses of steel are the most important and valuable. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.6">How can the government determine whether its limited quantities of steel should be utilized in making cars or trains, given that it also owns the car and train factories and allocates by diktat to citizens how many cars and trains they can have? </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.7">Without a price system for citizens to decide between trains and cars, there is no way of knowing what the optimal allocation is and no way of knowing where the steel would be most necessary. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.8">Asking citizens in surveys is a meaningless exercise, because people's choices are meaningless without a price to reflect the real opportunity cost involved in trade‐offs between choices. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.9">A survey without prices would find that everyone would like their own Ferrari, but of course, when people have to pay, very few choose Ferraris. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.10">Central planners can never know the preferences of each individual nor allocate resources in the way that satisfies that individual's needs best.</span></p>
<p id="c06-para-0015"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.1">Further, when the government owns all inputs into all the production processes of the economy, the absence of a price mechanism makes it virtually impossible to coordinate the production of various capital goods in the right quantities to allow all the factories to function. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.2">Scarcity is the starting point of all economics, and it is not possible to produce unlimited quantities of all inputs; trade‐offs need to be made, so allocating capital, land, and labor to the production of steel must come at the expense of creating more copper. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.3">In a free market, as factories compete for the acquisition of copper and steel, they</span><span epub:type="pagebreak" title="111" id="Page_111"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.1"> create scarcity and abundance in these markets and the prices allow copper and steel makers to compete for the resources that go into making them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.2">A central planner is completely in the dark about this web of preferences and opportunity costs, of trains, cars, copper, steel, labor, capital, and land. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.3">Without prices, there is no way to calculate how to allocate these resources to produce the optimal products, and the result is a complete breakdown in production.</span></p>
<p id="c06-para-0016"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.1">And yet all of this is but one aspect of the calculation problem, pertaining merely to the production of existing goods in a static market. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.2">The problem is far more pronounced when one considers that nothing is static in human affairs, as humans are eternally seeking to improve their economic situation, to produce new goods, and find more and better ways of producing goods. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.3">The ever‐present human impulse to tinker, improve, and innovate gives socialism its most intractable problem. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.4">Even if the central planning system succeeded in managing a static economy, it is powerless to accommodate change or to allow entrepreneurship. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.5">How can a socialist system make calculations for technologies and innovations that do not exist, and how can factors of production be allocated for them when there is yet no indication whether these products can even work?</span></p>
<blockquote>
<p id="c06-para-0017"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.44.1">“Those who confuse entrepreneurship and management close their eyes to the economic problem…. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.44.2">The capitalist system is not a managerial system; it is an entrepreneurial system.”</span></p>
<p class="right"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.45.1">—</span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.46.1">Ludwig von Mises</span><sup><a id="fn-5" href="#fn5"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.47.1">5</span></a></sup></i></p>
</blockquote>
<p id="c06-para-0018"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.1">The point of this exposition is not to argue against the socialist economic system, which no serious adult takes seriously in this day and age, after the catastrophic, bloody and comprehensive failure it has achieved in every society in which it has been tried over the last century. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.2">The point rather is to explicate clearly the difference between two ways of allocating capital and making production decisions: prices and planning. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.3">While most of the world's countries today do not have a central planning board responsible for the direct allocation of capital goods, it is nonetheless the case in every country in the world that there is a central planning board for the most important market of all, the market for capital. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.4">A free market is understood as one in which the buyers and sellers are free to transact on terms determined</span><span epub:type="pagebreak" title="112" id="Page_112"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.1"> by them solely, and where entry and exit into the market are free: no third parties restrict sellers or buyers from entering the market, and no third parties stand to subsidize buyers and sellers who cannot transact in the market. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.2">No country in the world has a capital market that has these characteristics today.</span></p>
<p id="c06-para-0019"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.50.1">The capital markets in a modern economy consist of the markets for loanable funds. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.50.2">As the structure of production becomes more complicated and long‐term, individuals no longer invest their savings themselves, but lend them out, through various institutions, to businesses specialized in production. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.50.3">The interest rate is the price that the lender receives for lending their funds, and the price that the borrower pays to obtain them.</span></p>
<p id="c06-para-0020"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.1">In a free market for loanable funds, the quantity of these funds supplied, like all supply curves, rises as the interest rate rises. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.2">In other words, the higher the interest rate, the more people are inclined to save and offer their savings to entrepreneurs and firms. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.3">The demand for loans, on the other hand, is negatively related to the interest rate, meaning that entrepreneurs and firms will want to borrow less when the interest rate rises.</span></p>
<p id="c06-para-0021"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.1">The interest rate in a free market for capital is positive because people's positive time preference means that nobody would part with money unless he could receive more of it in the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.2">A society with a lot of individuals with low time preference is likely to have plenty of savings, bringing the interest rate down and providing for plenty of capital for firms to invest, generating significant economic growth for the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.3">As a society's time preference increases, people are less likely to save, interest rates would be high, and producers find less capital to borrow. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.4">Societies that live in peace and have secure property rights and a large degree of economic freedom are likely to have low time preference as they provide a strong incentive for individuals to discount their future less. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.5">Another Austrian economist, Eugen von Böhm‐Bawerk, even argued that the interest rate in a nation reflected its cultural level: the higher a people's intelligence and moral strength, the more they save and the lower the rate of interest.</span></p>
<p id="c06-para-0022"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.1">But this is not how a capital market functions in any modern economy today, thanks to the invention of the modern central bank and its incessant interventionist meddling in the most critical of markets. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.2">Central banks determine the interest rate</span><span epub:type="pagebreak" title="113" id="Page_113"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.54.1"> and the supply of loanable funds through a variety of monetary tools, operating through their control of the banking system.</span><sup><a id="fn-6" href="#fn6"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.1">6</span></a></sup></p>
<p id="c06-para-0023"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.1">A fundamental fact to understand about the modern financial system is that banks create money whenever they engage in lending. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.2">In a fractional reserve banking system similar to the one present all over the world today, banks not only lend the savings of their customers, but also their demand deposits. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.3">In other words, the depositor can call on the money at any time while a large percentage of that money has been issued as a loan to a borrower. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.4">By giving the money to the borrower while keeping it available to the depositor, the bank effectively creates new money and that results in an increase in the money supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.5">This underlies the relationship between money supply and interest rates: when interest rates drop, there is an increase in lending, which leads to an increase in money creation and a rise in the money supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.6">On the other hand, a rise in interest rates causes a reduction in lending and contraction in the money supply, or at least a reduction in the rate of its growth.</span></p></section>
<section><span id="c06-sec-0003"/>
<h2 id="head-2-20"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.1">Business Cycles and Financial Crises</span></h2>
<p id="c06-para-0024"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.58.1">Whereas in a free market for capital the supply of loanable funds is determined by the market participants who decide to lend based on the interest rate, in an economy with a central bank and fractional reserve banking, the supply of loanable funds is directed by a committee of economists under the influence of politicians, bankers, TV pundits, and sometimes, most spectacularly, military generals.</span></p>
<p id="c06-para-0025"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.59.1">Any passing familiarity with economics will make the dangers of price controls clear and discernable. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.59.2">Should a government decide to set the price of apples and prevent it from</span><span epub:type="pagebreak" title="114" id="Page_114"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.1"> moving, the outcome will be either a shortage or a surplus and large losses to society overall from overproduction or underproduction. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.2">In the capital markets, something similar happens, but the effects are far more devastating as they affect every sector of the economy, because capital is involved in the production of every economic good.</span></p>
<p id="c06-para-0026"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.1">It is first important to understand the distinction between loanable funds and actual capital goods. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.2">In a free market economy with sound money, savers have to defer consumption in order to save. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.3">Money that is deposited in a bank as savings is money taken away from consumption by people who are delaying the gratification that consumption could give them in order to gain more gratification in the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.4">The exact amount of savings becomes the exact amount of loanable funds available for producers to borrow. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.5">The availability of capital goods is inextricably linked to the reduction of consumption: actual physical resources, labor, land, and capital goods will move from being employed in the provision of final consumption goods to the production of capital goods. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.6">The marginal worker is directed away from car sales and toward a job in the car factory; the proverbial corn seed will go into the ground instead of being eaten.</span></p>
<p id="c06-para-0027"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.1">Scarcity is the fundamental starting point of all economics, and its most important implication is the notion that everything has an opportunity cost. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.2">In the capital market, the opportunity cost of capital is forgone consumption, and the opportunity cost of consumption is forgone capital investment. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.3">The interest rate is the price that regulates this relationship: as people demand more investments, the interest rate rises, incentivizing more savers to set aside more of their money for savings. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.4">As the interest rate drops, it incentivizes investors to engage in more investments, and to invest in more technologically advanced methods of production with a longer time horizon. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.5">A lower interest rate, then, allows for the engagement of methods of production that are longer and more productive: society moves from fishing with rods to fishing with oil‐powered large boats.</span></p>
<p id="c06-para-0028"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.1">As an economy advances and becomes increasingly sophisticated, the connection between physical capital and the loanable funds market does not change in reality, but it does get obfuscated in the minds of people. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.2">A modern economy with a central bank is built on ignoring this fundamental trade‐off and assuming that</span><span epub:type="pagebreak" title="115" id="Page_115"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.1"> banks can finance investment with new money without consumers having to forgo consumption. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.2">The link between savings and loanable funds is severed to the point where it is not even taught in the economics textbooks any more,</span><sup><a id="fn-7" href="#fn7"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.65.1">7</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.1"> let alone the disastrous consequences of ignoring it.</span></p>
<p id="c06-para-0029"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.1">As the central bank manages the money supply and interest rate, there will inevitably be a discrepancy between savings and loanable funds. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.2">Central banks are generally trying to spur economic growth and investment and to increase consumption, so they tend to increase the money supply and lower the interest rate, resulting in a larger quantity of loanable funds than savings. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.3">At these artificially low interest rates, businesses take on more debt to start projects than savers put aside to finance these investments. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.4">In other words, the value of consumption deferred is less than the value of the capital borrowed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.5">Without enough consumption deferred, there will not be enough capital, land, and labor resources diverted away from consumption goods toward higher‐order capital goods at the earliest stages of production. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.6">There is no free lunch, after all, and if consumers save less, there will have to be less capital available for investors. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.7">Creating new pieces of paper and digital entries to paper over the deficiency in savings does not magically increase society's physical capital stock; it only devalues the existing money supply and distorts prices.</span></p>
<p id="c06-para-0030"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.1">This shortage of capital is not immediately apparent, because banks and the central bank can issue enough money for the borrowers—that is, after all, the main perk of using unsound money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.2">In an economy with sound money, such manipulation of the price of capital would be impossible: as soon as the interest rate is set artificially low, the shortage in savings at banks is reflected in reduced capital available for borrowers, leading to a rise in the interest rate, which reduces demand for loans and raises the supply of savings until the two match.</span></p>
<p id="c06-para-0031"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.1">Unsound money makes such manipulation possible, but only for a short while, of course, as reality cannot be deceived forever. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.2">The artificially low interest rates and the excess printed money deceive the producers into engaging in a production</span><span epub:type="pagebreak" title="116" id="Page_116"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.70.1"> process requiring more capital resources than is actually available. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.70.2">The excess money, backed by no actual deferred consumption, initially makes more producers borrow, operating under the delusion that the money will allow them to buy all the capital goods necessary for their production process. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.70.3">As more and more producers are bidding for fewer capital goods and resources than they expect there to be, the natural outcome is a rise in the price of the capital goods during the production process. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.70.4">This is the point at which the manipulation is exposed, leading to the simultaneous collapse of several capital investments which suddenly become unprofitable at the new capital good prices; these projects are what Mises termed </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.1">malinvestments</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.1">—investments that would not have been undertaken without the distortions in the capital market and whose completion is not possible once the misallocations are exposed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.2">The central bank's intervention in the capital market allows for more projects to be undertaken because of the distortion of prices that causes investors to miscalculate, but the central bank's intervention cannot increase the amount of actual capital available. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.3">So these extra projects are not completed and become an unnecessary waste of capital. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.4">The suspension of these projects at the same time causes a rise in unemployment across the economy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.5">This economy‐wide simultaneous failure of overextended businesses is what is referred to as a </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.1">recession</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.1">.</span></p>
<p id="c06-para-0032"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.1">Only with an understanding of the capital structure and how interest rate manipulation destroys the incentive for capital accumulation can one understand the causes of recessions and the swings of the business cycle. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.2">The business cycle is the natural result of the manipulation of the interest rate distorting the market for capital by making investors imagine they can attain more capital than is available with the unsound money they have been given by the banks. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.3">Contrary to Keynesian animist mythology, business cycles are not mystic phenomena caused by flagging “animal spirits” whose cause is to be ignored as central bankers seek to try to engineer recovery</span><sup><a id="fn-8" href="#fn8"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.1">8</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.2">Economic logic clearly shows how recessions are the inevitable outcome of interest rate</span><span epub:type="pagebreak" title="117" id="Page_117"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.78.1"> manipulation in the same way shortages are the inevitable outcome of price ceilings.</span></p>
<p id="c06-para-0033"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.1">An analogy can be borrowed from Mises's work</span><sup><a id="fn-9" href="#fn9"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.1">9</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.1"> (and embellished) to illustrate the point: imagine the capital stock of a society as building bricks, and the central bank as a contractor responsible for constructing them into houses. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.2">Each house requires 10,000 bricks to construct, and the developer is looking for a contractor who will be able to build 100 houses, requiring a total of 1 million. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.3">But a Keynesian contractor, eager to win the contract, realizes his chances of winning the contract will be enhanced if he can submit a tender promising to build 120 of the same house while only requiring 800,000 bricks. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.4">This is the equivalent of the interest rate manipulation: it reduces the supply of capital while increasing the demand for it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.5">In reality, the 120 houses will require 1.2 million bricks, but there are only 800,000 available. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.6">The 800,000 bricks are sufficient to begin the construction of the 120 houses, but they are not sufficient to complete them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.7">As the construction begins, the developer is very happy to see 20% more houses for 80% of the cost, thanks to the wonders of Keynesian engineering, which leads him to spend the 20% of the cost he saved on buying himself a new yacht. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.8">But the ruse cannot last as it will eventually become apparent that the houses cannot be completed and the construction must come to a halt. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.9">Not only has the contractor failed to deliver 120 houses, he will have failed to deliver any houses whatsoever, and instead, he's left the developer with 120 half‐houses, effectively useless piles of bricks with no roofs. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.10">The contractor's ruse reduced the capital spent by the developer and resulted in the construction of fewer houses than would have been possible with accurate price signals. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.11">The developer would have had 100 houses if he went with an honest contractor. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.12">By going with a Keynesian contractor who distorts the numbers, the developer continues to waste his capital for as long as the capital is being allocated on a plan with no basis in reality. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.13">If the contractor realizes the mistake early on, the capital wasted on starting 120 houses might be very little, and a new contractor will be able to take the remaining bricks and use them to produce 90 houses. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.14">If the developer remains ignorant of the reality until the capital runs out, he will only have 120 unfinished homes that</span><span epub:type="pagebreak" title="118" id="Page_118"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.82.1"> are worthless as nobody will pay to live in a roofless house.</span></p>
<p id="c06-para-0034"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.1">When the central bank manipulates the interest rate lower than the market clearing price by directing banks to create more money by lending, they are at once reducing the amount of savings available in society and increasing the quantity demanded by borrowers while also directing the borrowed capital toward projects which cannot be completed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.2">Hence, the more unsound the form of money, and the easier it is for central banks to manipulate interest rates, the more severe the business cycles are. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.3">Monetary history testifies to how much more severe business cycles and recessions are when the money supply is manipulated than when it isn't.</span></p>
<p id="c06-para-0035"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.1">While most people imagine that socialist societies are a thing of the past and that market systems rule capitalist economies, the reality is that a capitalist system cannot function without a free market in capital, where the price of capital emerges through the interaction of supply and demand and the decisions of capitalists are driven by accurate price signals. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.2">The central bank's meddling in the capital market is the root of all recessions and all the crises which most politicians, journalists, academics, and leftist activists like to blame on capitalism. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.3">Only through the central planning of the money supply can the price mechanism of the capital markets be corrupted to cause wide disruptions in the economy.</span></p>
<p id="c06-para-0036"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.1">Whenever a government has started on the path of inflating the money supply, there is no escaping the negative consequences. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.2">If the central bank stops the inflation, interest rates rise, and a recession follows as many of the projects that were started are exposed as unprofitable and have to be abandoned, exposing the misallocation of resources and capital that took place. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.3">If the central bank were to continue its inflationary process indefinitely, it would just increase the scale of misallocations in the economy, wasting even more capital and making the inevitable recession even more painful. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.4">There is no escape from paying a hefty bill for the supposed free lunch that Keynesian cranks foisted upon us.</span></p>
<blockquote>
<p id="c06-para-0037"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.1">“We now have a tiger by the tail: how long can this inflation continue? </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.2">If the tiger (of inflation) is freed he will eat us up; yet if he runs faster and faster while we desperately hold</span><span epub:type="pagebreak" title="119" id="Page_119"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.1"> on, we are still finished! </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.2">I'm glad I won't be here to see the final outcome.”</span></p>
<p class="right"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.1">—</span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.1">Friedrich Hayek</span></i><sup><a id="fn-10" href="#fn10"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.90.1">10</span></a></sup></p>
</blockquote>
<p id="c06-para-0038"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.1">Central bank planning of the money supply is neither desirable nor possible. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.2">It is rule by the most conceited, making the most important market in an economy under the command of the few people who are ignorant enough of the realities of market economies to believe they can centrally plan a market as large, abstract, and emergent as the capital market. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.3">Imagining that central banks can “prevent,” “combat,” or “manage” recessions is as fanciful and misguided as placing pyromaniacs and arsonists in charge of the fire brigade.</span></p>
<p id="c06-para-0039"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.92.1">The relative stability of sound money, for which it is selected by the market, allows for the operation of a free market through price discovery and individual decision making. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.92.2">Unsound money, whose supply is centrally planned, cannot allow for the emergence of accurate price signals, because it is by its very nature controlled. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.92.3">Through centuries of price controls, central planners have tried to find the elusive best price to achieve the goals they wanted, to no avail.</span><sup><a id="fn-11" href="#fn11"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.1">11</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.94.1"> The reason that price controls must fail is not that the central planners cannot pick the right price, but rather that by merely imposing a price—any price—they prevent the market process from allowing prices to coordinate consumption and production decisions among market participants, resulting in inevitable shortages or surpluses. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.94.2">Equivalently, central planning of credit markets must fail because it destroys markets' mechanisms for price‐discovery providing market participants with the accurate signals and incentives to manage their consumption and production.</span></p>
<p id="c06-para-0040"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.1">The form of failure that capital market central planning takes is the boom‐and‐bust cycle, as explained in Austrian business cycle theory. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.2">It is thus no wonder that this dysfunction is treated as a normal part of market economies, because, after all, in the minds of modern economists a central bank controlling interest rates is a normal part of a modern market economy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.3">The track record of central banks in this area has been quite abject, especially when compared to</span><span epub:type="pagebreak" title="120" id="Page_120"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.96.1"> periods with no central planning and directing of the money supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.96.2">Established in 1914, the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.96.3">Federal Reserve was in charge of a sharp contraction in reserves in 1920–21, and then the sharp bust of 1929, whose fallout lasted until the end of 1945. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.96.4">From then on, economic depressions became a regular and painful part of the economy, recurring every few years and providing justification for growing government intervention to handle their fallout.</span></p>
<p id="c06-para-0041"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.1">A good example of the benefits of sound money can be found looking at the fate of the Swiss economy, the last bastion of sound money, which had kept its currency pegged to gold until its ill‐fated decision to abandon global neutrality and join the International Monetary Fund in 1992. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.2">Before that date, the unemployment rate had always been practically zero, virtually never exceeding 1%. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.3">After they joined the IMF, whose rules prevent governments from tying their currency's value to gold, the Swiss economy began to experience the pleasures of Keynesian funny money, with unemployment rate rising to 5% within a few years, rarely ever dropping below 2%. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.4">(See </span><a id="R_c06-fig-0001" href="#c06-fig-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.98.1">Figure 13</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.1">.</span><sup><a id="fn-12" href="#fn12"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.100.1">12</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.101.1">)</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.1"><img alt="Graphical illustration of the unemployment rate in Switzerland." src="images/c06f001.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c06-fig-0001" id="c06-fig-0001"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.103.1">Figure 13</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.104.1"> Unemployment rate in Switzerland, %.</span></p></figcaption></figure>
<p id="c06-para-0042"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.1">When comparing depressions to periods of the gold standard, it must be remembered that the gold standard in Europe and the United States in the nineteenth century was far from a perfect form of sound money, as there were several flaws in it, most importantly, that banks and governments could often expand</span><span epub:type="pagebreak" title="121" id="Page_121"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.1"> their supply of money and credit beyond the gold held in their reserves, causing booms and busts similar to those seen in the twentieth century, though to a much lesser degree.</span></p>
<p id="c06-para-0043"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.107.1">With this background in mind, we can get a far clearer idea of modern monetary history than what is commonly taught in academic textbooks since the Keynesian deluge. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.107.2">The founding text of Monetarist thought is what is considered the definitive work of U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.107.3">monetary history: </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.108.1">The Monetary History of the United States</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.109.1"> by Milton Friedman and Anna Schwartz. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.109.2">A giant tome of 888 pages, the book is astounding in its ability to marshal endless facts, details, statistics, and analytical tools without once providing the unfortunate reader with an understanding of one key issue: the causes of financial crises and recessions.</span></p>
<p id="c06-para-0044"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.110.1">The fundamental flaw of Friedman and Schwartz's book is typical of modern academic scholarship: it is an elaborate exercise in substituting rigor for logic. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.110.2">The book systematically and methodically avoids ever questioning the causes of the financial crises that have affected the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.110.3">economy over a century, and instead inundates the reader with impressively researched data, facts, trivia, and minutiae.</span></p>
<p id="c06-para-0045"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.1">The central contention of the book is that recessions are the result of the government not responding quickly enough to a financial crisis, bank run, and deflationary collapse by increasing the money supply to re‐inflate the banking sector. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.2">It is typical of the Milton Friedman band of libertarianism in that it blames the government for an economic problem, but the flawed reasoning leads to suggesting even more government intervention as the solution. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.3">The glaring error in the book is that the authors never once discuss what causes these financial crises, bank runs, and deflationary collapses of the money supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.4">As we saw from the discussion of the Austrian business cycle theory, the only cause of an economy‐wide recession is the inflation of the money supply in the first place. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.5">Relieved of the burden of understanding the cause, Friedman and Schwartz can then safely recommend the cause itself as the cure: governments need to step in to aggressively recapitalize the banking system and increase liquidity at the first sign of economic recession. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.6">You can begin to see why modern economists loathe understanding logical causality so much; it would debunk almost all their solutions.</span></p>
<p id="c06-para-0046"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.1">Friedman and Schwartz begin their book in the year 1867, so that when analyzing the causes of the recession of 1873, they completely ignore the small matter of the</span><span epub:type="pagebreak" title="122" id="Page_122"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.113.1"> U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.113.2">government's printing of greenbacks to finance the Civil War, which was the ultimate cause of that recession. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.113.3">This is a pattern that will recur throughout the book.</span></p>
<p id="c06-para-0047"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.1">Friedman and Schwartz barely discuss the causes of the 1893 recession, alluding to a drive for silver due to gold not being sufficient to cover the monetary needs of the economy, and then inundating the reader with trivia about the recession in that year. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.2">They fail to mention the Sherman Silver Purchase Act of 1890 approved by the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.3">Congress, which required the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.4">Treasury to buy large quantities of silver with a new issue of Treasury notes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.5">Seeing as silver had been almost entirely demonetized worldwide at that point, people who held silver or Treasury notes sought to convert them to gold, leading to a drain on the Treasury's gold reserves. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.6">Effectively, the Treasury had engaged in a large misguided dose of monetary expansionism by increasing the money supply to try to pretend that silver was still money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.7">All that did was devalue U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.8">Treasury notes, creating a financial bubble which crashed as withdrawals of gold accelerated. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.9">Any history book of the period could make this clear to anyone with a cursory understanding of monetary theory, but Friedman and Schwartz impressively avoid any mention of this.</span></p>
<p id="c06-para-0048"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.1">The book's treatment of the 1920 recession ignores the large dose of monetary expansion that had to happen to finance U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.2">entry into World War I. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.3">Despite not mentioning it in their analysis, their data</span><sup><a id="fn-13" href="#fn13"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.116.1">13</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.117.1"> tells you that there was a 115% increase in the money stock between June 1914 and May 1920. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.117.2">Only 26% of that increase was due to increases in gold holdings, meaning that the rest was driven by the government, banks, and the Federal Reserve. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.117.3">This was the central cause of the 1920 depression, but this, too, goes unmentioned.</span></p>
<p id="c06-para-0049"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.118.1">Most curiously, however, is how they completely ignore the recovery from the depression of 1920–21, which was termed the “last natural recovery to full employment” by economist Benjamin Anderson, where taxes and government expenditures were reduced and wages were left to adjust freely, leading to a swift return to full employment in less than a year.</span><sup><a id="fn-14" href="#fn14"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.119.1">14</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.120.1"> The 1920 depression saw one of the fastest contractions of output in American history (9% drop in a 10‐month period from September 1920 to July 1921), and</span><span epub:type="pagebreak" title="123" id="Page_123"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.121.1"> also the fastest recovery. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.121.2">In other depressions, with Keynesians and Monetarists injecting liquidity, increasing the money supply, and increasing government spending, the recovery was slower.</span></p>
<p id="c06-para-0050"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.122.1">While everyone tries to learn the lesson of the Great Depression, mainstream economics textbooks never mention the 1920 depression, and never try to learn why it is that this depression was so quick to recover.</span><sup><a id="fn-15" href="#fn15"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.123.1">15</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.124.1"> The president at the time, Warren Harding, had a strong commitment to free markets and refused to heed the call of interventionist economists. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.124.2">The malinvestments were liquidated, and the labor and capital employed in them was reallocated to new investments very quickly. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.124.3">Unemployment soon returned to normal levels precisely as a result of the absence of government intervention to deepen the distortions it had caused in the first place. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.124.4">This is the glaring opposite of everything Friedman and Schwartz recommend, and so it, too, does not even get a mention in their work.</span></p>
<p id="c06-para-0051"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.125.1">The most famous chapter of the book (and the only one that anyone seems to have read) is </span><a href="c07.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.126.1">Chapter 7</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.127.1">, which focuses on the Great Depression. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.127.2">The chapter begins </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.1">after</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.129.1"> the stock market crash of October 1929, while </span><a href="c06.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.130.1">Chapter 6</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.1"> ends in the year 1921. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.2">The entirety of the period from 1921 to October 1929, which would have to contain any cause of the Great Depression, is not deemed worthy of a single page of the 888 pages in the book.</span></p>
<p id="c06-para-0052"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.1">Only briefly, Friedman and Schwartz mention that the price level had not risen too quickly during the 1920s, and thus conclude that the period was not inflationary and so the causes of the depression could not have been inflationary. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.2">But the 1920s witnessed very fast economic growth, which would lead to a drop in prices. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.3">There was also heavy monetary expansion, caused by the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.4">Federal Reserve attempting to help the Bank of England stem the flow of gold from its shores, which was in turn caused by the Bank of England inflating instead of letting wages adjust downward. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.5">The net effect of a rise in the money supply and fast economic growth was that the price level did not rise a lot, but that asset prices rose heavily—mainly housing and stocks; the increased money supply had not translated to a rise in</span><span epub:type="pagebreak" title="124" id="Page_124"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.133.1"> consumer good prices because it had mainly been directed by the Federal Reserve to stimulate the stock and housing markets. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.133.2">The money supply expanded by 68.1% over the period of 1921–29 while the gold stock only expanded by 15%.</span><sup><a id="fn-16" href="#fn16"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.1">16</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.1"> It is this increase of the dollar stock, beyond the stock of gold, which is the root cause of the Great Depression.</span></p>
<p id="c06-para-0053"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.136.1">An honorable mention has to go to the father of the Monetarists, Irving Fisher, who spent the 1920s engaged in the “scientific management of the price level”. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.136.2">Fisher had imagined that as the United States was expanding the money supply, his extensive data collection and scientific management would allow him to control the growth in the money supply and asset prices to ensure that the price level remained stable. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.136.3">On October 16, 1929, Fisher proudly proclaimed in the </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.1">New York Times</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.138.1"> that stocks had reached a “permanently high plateau.”</span><sup><a id="fn-17" href="#fn17"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.139.1">17</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.140.1"> The stock market was to crash starting October 24, 1929, and as the Depression deepened, it would not be until the mid‐1950s, years after Fisher died, that the stock market would get back to the “permanently high plateau” Fisher had proclaimed in 1929. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.140.2">It is no wonder, then, that Milton Friedman would later proclaim Irving Fisher as the greatest economist America had produced.</span></p>
<p id="c06-para-0054"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.1">The crash resulted from the monetary expansion of the 1920s, which generated a massive bubble of illusory wealth in the stock market. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.2">As soon as the expansion slowed down, the bubble was inevitably going to burst. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.3">Once it burst, this meant a deflationary spiral where all the illusory wealth of the bubble disappears. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.4">As wealth disappears, a run on banks is inevitable as banks struggle to meet their obligations. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.5">This exposes the problem of having a system of fractional reserve banking—it's a disaster waiting to happen. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.6">Given that, it would have been appropriate for the Fed to guarantee people's deposits—though not guarantee the losses of businesses and the stock market. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.7">Leaving the banks alone to suffer from this, allowing the liquidation to take place and prices to fall, is the only solution. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.8">It is true that this solution would have involved a painful recession—but that is exactly why the monetary expansion should not have happened in the first place! </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.9">Attempting to avert the recession by pouring more liquidity into it will only</span><span epub:type="pagebreak" title="125" id="Page_125"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.142.1"> exacerbate the distortions which caused the crisis in the first place.</span></p>
<p id="c06-para-0055"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.1">The monetary expansion created illusory wealth that misallocated resources, and that wealth must disappear for the market to go back to functioning properly with a proper price mechanism. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.2">It was this illusory wealth that caused the collapse in the first place. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.3">Returning that illusory wealth to its original location is simply reassembling the house of cards again and preparing it for another, bigger and stronger fall.</span></p>
<p id="c06-para-0056"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.144.1">Having summarily dismissed the era leading up to 1929 as having anything to do with the stock market crash, Friedman and Schwartz then conclude that it was merely the Fed's reaction to the crash which caused it to turn into a Great Depression. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.144.2">Had the Federal Reserve opened the monetary spigots to drench the banking system with liquidity, they argue, then the stock market losses would have been largely inconsequential to the wider economy and there would not have been a larger depression. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.144.3">The fact that the Fed was in fact expansionary in response to this crisis is ignored in the deluge of data. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.144.4">While the Federal Reserve did attempt to alleviate the liquidity shortages in the banking sector, it could not stem the collapse, not because of a shortage of resolve, but rather due to the economy‐wide collapse of misallocated capital investments, and the heavily interventionist policies discussed in </span><a href="c04.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.145.1">Chapter 4</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.146.1">.</span></p>
<p id="c06-para-0057"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.1">Three important questions remain unanswered in this gigantic work, exposing a glaring hole in its logic. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.2">First, why is there no comparison of the 1920 and 1929 depressions? </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.3">The former didn't last long even though the Fed did not intervene in the way the authors recommend. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.4">Second, why is it that the United States had never suffered a financial crisis in the nineteenth century during the period when there was no central bank, except in the two instances when Congress had directed the Treasury to act like a central bank: during the Civil War with the printing of the greenbacks, and in 1890 after the monetization of silver? </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.5">Third, and most tellingly, how did the United States manage one of its longest periods of sustained economic growth without any financial crises between 1873 and 1890 when there was no central bank at all, and the money supply was restricted, and the price level continued to drop? </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.6">Friedman and Schwartz only mention this era in passing, remarking that the economy grew impressively “in spite” of the price level dropping, without caring to comment on how such a fact flies in</span><span epub:type="pagebreak" title="126" id="Page_126"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.148.1"> the face of their price‐level‐drop phobia.</span></p>
