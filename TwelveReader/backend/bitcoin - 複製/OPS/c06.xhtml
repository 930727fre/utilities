<p id="c06-para-0058"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.149.1">As Rothbard explained, there is nothing inherent about the workings of a market economy that will create a persistent problem of unemployment. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.149.2">The normal workings of a free market will witness many people lose or quit their jobs, and many businesses will go bankrupt or shut down for a wide variety of reasons, but these job losses will roughly cancel out with newly created jobs and businesses, leading to a negligibly small number of people being involuntarily unemployed at any point in time, as was the case during the years in which the gold standard was not abused in the nineteenth century, and as was the case with Switzerland pre‐1992. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.149.3">Only when a central bank manipulates the money supply and interest rate does it become possible for large‐scale failures across entire sectors of the economy to happen at the same time, causing waves of mass layoffs in entire industries, leaving a large number of workers jobless at the same time, with skills that are not easily transferrable to other fields.</span><sup><a id="fn-18" href="#fn18"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.150.1">18</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.151.1"> As Hayek put it: “The cause of waves of unemployment is not ‘capitalism’ but governments denying enterprise the right to produce good money.”</span><sup><a id="fn-19" href="#fn19"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.152.1">19</span></a></sup></p></section>
<section><span id="c06-sec-0004"/>
<h2 id="head-2-21"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.153.1">Sound Basis for Trade</span></h2>
<p id="c06-para-0059"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.154.1">In the world of sound money, goods and capital flowed between different countries almost in the same way they flowed between different regions of the same country: according to the desires of their rightful owners as agreed upon in mutually beneficial exchange. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.154.2">Under Julius Caesar's aureus, or under the gold standard of the Bank of Amsterdam in the seventeenth century, or under the nineteenth century gold standard, physically moving a good from one location to the other was the most significant barrier to trade. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.154.3">Tariffs and trade barriers hardly existed, and if they did, they constituted little more than fees to pay for the management and maintenance of border crossing points and seaports.</span></p>
<p id="c06-para-0060"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.155.1">In the era of unsound money, such</span><span epub:type="pagebreak" title="127" id="Page_127"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.1"> as in Europe's descent into feudalism or in the modern world's descent into monetary nationalism, trade stops being the prerogative of the transacting individuals and starts becoming a matter of national importance, requiring the oversight of the feudal lords or governments claiming sovereignty over the trading individuals. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.2">So ridiculously complete has this transformation of the nature of trade been that, in the twentieth century, the term </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.157.1">free trade</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.158.1"> came to refer to trade carried out between two individuals across borders, according to terms agreed upon by their respective governments, not by the concerned individuals!</span></p>
<p id="c06-para-0061"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.159.1">The abandonment of the gold standard in 1914 through the suspension and limitation of exchanging paper money for gold by most governments began the period Hayek named Monetary Nationalism. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.159.2">Money's value stopped being a fixed unit of gold, which was the commodity with the highest stock‐to‐flow ratio, and hence the lowest price elasticity of supply, keeping its value predictable and relatively constant. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.159.3">Instead, the value of money oscillated along with the vagaries of monetary and fiscal policy as well as international trade. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.159.4">Lower interest rates or increased money supply would drop the value of money, as would government spending financed by central bank lending to the government. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.159.5">While these two factors were nominally under the control of governments, who could at least delude themselves into thinking they could manage them to achieve stability, the third factor was a complex emergent outcome of the actions of all citizens and many foreigners. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.159.6">When a country's exports grew larger than its imports (a trade surplus), its currency would appreciate on the international exchange markets, whereas it would depreciate when its imports grew larger than exports (trade deficit). </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.159.7">Policymakers, instead of taking this as a sign to stop tinkering with the value of money and allow people the freedom to use the least volatile commodity as money, took it as an invitation to micromanage the smallest details of global trade.</span></p>
<p id="c06-para-0062"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.160.1">The value of money, supposed to be the unit of account with which all economic activity is measured and planned, went from being the value of the least volatile good on the market to being determined through the sum of three policy tools of the government—monetary, fiscal, and trade policy—and most unpredictably, through the reactions of individuals to these policy tools. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.160.2">Governments deciding</span><span epub:type="pagebreak" title="128" id="Page_128"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.161.1"> to dictate the measure of value makes as much sense as governments attempting to dictate the measure of length based on the heights of individuals and buildings in their territories. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.161.2">One can only imagine the sort of confusion that would happen to all engineering projects were the length of the meter to oscillate daily with the pronouncements of a central measurements office.</span></p>
<p id="c06-para-0063"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.162.1">Only the vanity of the insane can be affected by changing the unit with which they're measured. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.162.2">Making the meter shorter might make someone whose house's area is 200 square meters believe it is actually 400 square meters, but it would still be the same house. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.162.3">All that this redefinition of the meter has caused is ruin an engineer's ability to properly build or maintain a house. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.162.4">Similarly, devaluing a currency may make a country richer nominally, or increase the nominal value of its exports, but it does nothing to make the country more prosperous.</span></p>
<p id="c06-para-0064"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.163.1">Modern economics has formulated “The Impossible Trinity” to express the plight of modern central bankers, which states: No government can successfully achieve all three goals of having a fixed foreign exchange rate, free capital flows, and an independent monetary policy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.163.2">Should a government have a fixed exchange rate and free capital flows, it cannot have its own monetary policy, as altering the interest rate will cause capital to flow in or out to the point where the exchange rate becomes indefensible, and we all know how much modern economists appreciate having a monetary policy to “manage” the economy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.163.3">Having an independent monetary policy and a fixed exchange rate can only be achieved by limiting capital flows, which was the situation prevalent in the period between 1946 and 1971. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.163.4">But even that was not sustainable as the flow of goods became the way in which exchange rates would try to redress the imbalance, with some countries exporting too much and others importing too much, leading to political negotiations to recalibrate the exchange rate. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.163.5">There can be no rational ground for determining the outcome of these negotiations in international organizations, as each country's government attempts to pursue its own special groups' interest and will do whatever it takes to do just that. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.163.6">After 1971, the world predominantly moved to having an independent monetary policy and free capital flows, but floating exchange rates between currencies.</span></p>
<p id="c06-para-0065"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.164.1">This arrangement has the advantage</span><span epub:type="pagebreak" title="129" id="Page_129"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.165.1"> of allowing Keynesian economists to play with their favorite tools for “managing” economies while also keeping international financial institutions and large capital owners happy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.165.2">It is also a huge boon for large financial institutions which have generated a foreign exchange market worth trillions of dollars </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.166.1">a day</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.167.1">, where currencies and their futures are trading. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.167.2">But this arrangement is likely not to the benefit of almost everyone else, particularly for people who actually have productive enterprises that offer valuable goods to society.</span></p>
<p id="c06-para-0066"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.1">In a highly globalized world where foreign exchange rates are dependent upon a plethora of domestic and international variables, running a productive business becomes challenging completely unnecessarily. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.2">A successful firm likely has inputs and outputs from its business come and go to multiple countries. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.3">Every single purchase and sale decision is dependent on the foreign exchange between the countries involved. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.4">In this world, a highly competitive firm could suffer high losses through nothing more than a shift in exchange rates, not even necessarily involving its own country. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.5">If the firm's major supplier's country witnesses a rise in the value of its currency, the firm's input costs could rise enough to destroy the firm's profitability. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.6">The same thing could happen if the currency of the main market to which it exports drops in value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.7">Firms that have spent decades working on a competitive advantage could see it wiped out in 15 minutes of unpredictable foreign exchange volatility. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.8">This usually gets blamed on free trade, and economists and politicians likewise will use it as an excuse for implementing popular but destructive protectionist trade policies.</span></p>
<p id="c06-para-0067"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.169.1">With free capital flows and free trade built on a shaky foundation of floating exchange rate quicksand, a much higher percentage of the country's businesses and professionals need to concern themselves with the movements of the currency. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.169.2">Every business needs to dedicate resources and manpower toward studying an issue of extreme importance over which they have no control. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.169.3">More and more people work in speculating on the actions of central banks, national governments, and currency movement. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.169.4">This elaborate apparatus of central planning and its attendant rituals tends to eventually get in the way of economic activity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.169.5">Perhaps one of the most astonishing facts about the</span><span epub:type="pagebreak" title="130" id="Page_130"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.170.1"> modern world economy is the size of the foreign exchange market compared to productive economic activity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.170.2">The Bank of International Settlements</span><sup><a id="fn-20" href="#fn20"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.171.1">20</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.172.1"> estimates the size of the foreign exchange market to be $5.1 trillion per day for April 2016, which would come out to around $1,860 trillion per year. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.172.2">The World Bank estimates the GDP of all the world's countries combined at around $75 trillion for the year 2016. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.172.3">This means that the foreign exchange market is around 25 times as large as all the economic production that takes place in the entire planet.</span><sup><a id="fn-21" href="#fn21"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.1">21</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.1"> It's important to remember here that foreign exchange is not a productive process, which is why its volume isn't counted in GDP statistics; there is no economic value being created in transferring one currency to another; it is but a cost paid to overcome the large inconvenience of having different national currencies for different nations. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.2">What economist Hans‐Hermann Hoppe has termed “a global system of partial barter”</span><sup><a id="fn-22" href="#fn22"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.175.1">22</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.176.1"> across international borders is crippling the ability of global trade to benefit people, exacting a high amount of transaction costs to attempt to ameliorate its consequences. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.176.2">Not only is the world wasting large amounts of capital and labor attempting to overcome these barriers, businesses and individuals worldwide frequently incur significant losses through economic miscalculation caused by the quicksand of exchange rate volatility.</span></p>
<p id="c06-para-0068"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.1">In a free market for money, individuals would choose the currencies they want to use, and the result would be that they would choose the currency with the reliably lowest stock‐to‐flow ratio. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.2">This currency would oscillate the least with changes in demand and supply, and it would become a globally sought medium of exchange, allowing all economic calculation to be carried out with it, becoming a common unit of measure across time and space. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.3">The higher the salability of a good, the more suited it is for this role. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.4">The Roman aureus, Byzantine solidus, or the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.5">dollar were all examples of this to a limited extent, though each had its drawbacks. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.6">The money that</span><span epub:type="pagebreak" title="131" id="Page_131"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.178.1"> came closest to this was gold in the latter years of the international gold standard, although even then, some countries and societies remained on silver or other primitive forms of money.</span></p>
<p id="c06-para-0069"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.179.1">It is an astonishing fact of modern life that an entrepreneur in the year 1900 could make global economic plans and calculations all denominated in any international currency, with no thought whatsoever given to exchange rate fluctuations. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.179.2">A century later, the equivalent entrepreneur trying to make an economic plan across borders faces an array of highly volatile exchange rates that might make him think he has walked into a Salvador Dali painting. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.179.3">Any sane analyst looking at this mess would conclude it would be best to just tie the value of money to gold again and be rid of this juggling act, thus solving the Impossible Trinity by eliminating the need for government‐controlled monetary policy, and having free capital movement and free trade. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.179.4">This would at once create economic stability and free up a large amount of capital and resources to the production of valuable goods and services, rather than speculation on complex exchange rate oscillations.</span></p>
<p id="c06-para-0070"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.180.1">Unfortunately, however, the people in charge of the current monetary system have a vested interest in it continuing, and have thus preferred to try to find ways to manage it, and to find ever‐more‐creative ways of vilifying and dismissing the gold standard. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.180.2">This is entirely understandable given their jobs depend on a government having access to a printing press to reward them.</span></p>
<p id="c06-para-0071"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.181.1">The combination of floating exchange rates and Keynesian ideology has given our world the entirely modern phenomenon of currency wars: because Keynesian analysis says that increasing exports leads to an increase in GDP, and GDP is the holy grail of economic well‐being, it thus follows, in the mind of Keynesians, that anything that boosts exports is good. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.181.2">Because a devalued currency makes exports cheaper, any country facing an economic slowdown can boost its GDP and employment by devaluing its currency and increasing its exports.</span></p>
<p id="c06-para-0072"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.182.1">There are many things wrong with this worldview. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.182.2">Reducing the value of the currency does nothing to increase the competitiveness of the industries in real terms. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.182.3">Instead, it only creates a one‐time discount on their outputs, thus offering them to foreigners at a lower price than locals, impoverishing locals and subsidizing</span><span epub:type="pagebreak" title="132" id="Page_132"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.1"> foreigners. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.2">It also makes all the country's assets cheaper for foreigners, allowing them to come in and purchase land, capital, and resources in the country at a discount. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.3">In a liberal economic order, there is nothing wrong with foreigners buying local assets, but in a Keynesian economic order, foreigners are actively subsidized to come buy the country at a discount. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.4">Further, economic history shows that the most successful economies of the postwar era, such as Germany, Japan, and Switzerland, grew their exports significantly as their currency continued to appreciate. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.5">They did not need constant devaluation to make their exports grow; they developed a competitive advantage that made their products demanded globally, which in turn caused their currencies to appreciate compared to their trade partners, increasing the wealth of their population. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.6">It is counterproductive for the countries importing from them to think they can boost their exports by simply devaluing the currency. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.7">They would be destroying their people's wealth by simply allowing foreigners to purchase it at a discount. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.8">It is no coincidence that the countries that have seen their currencies devalue the most in the postwar period were also the ones that suffered economic stagnation and decline.</span></p>
<p id="c06-para-0073"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.184.1">But even if all of these problems with devaluation as the route to prosperity were inaccurate, there is one simple reason why it cannot work, and that is: if it worked, and all countries tried it, all currencies would devalue and no single country would have an advantage over the others. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.184.2">This brings us to the current state of affairs in the global economy, where most governments attempt to devalue their currencies in order to boost their exports, and all complain about one another's “unfair” manipulation of their currencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.184.3">Effectively, each country is impoverishing its citizens in order to boost its exporters and raise GDP numbers, and complaining when other countries do the same. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.184.4">The economic ignorance is only matched by the mendacious hypocrisy of the politicians and economists parroting these lines. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.184.5">International economic summits are convened where world leaders try to negotiate each other's acceptable currency devaluation, making the value of the currency an issue of geopolitical importance.</span></p>
<p id="c06-para-0074"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.185.1">None of this would be necessary if only the world were to be based on a sound global monetary system that serves as a global unit of account and measure of value, allowing</span><span epub:type="pagebreak" title="133" id="Page_133"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.186.1"> producers and consumers worldwide to have an accurate assessment of their costs and revenues, separating economic profitability from government policy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.186.2">Hard money, by taking the question of supply out of the hands of governments and their economist‐propagandists, would force everyone to be productive to society instead of seeking to get rich through the fool's errand of monetary manipulation.</span></p>
</section>
</section>
<section class="noteSet" epub:type="rearnotes">
<h2 id="notes"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.187.1">Notes</span></h2>
<section class="notesList">
<aside class="noteEntry" epub:type="rearnote"><a id="fn1" href="#fn-1"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.188.1">1</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.189.1"> Ben Rooney, “Copper Strikes After Chile Quake,” </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.190.1">CNN Money</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.191.1"> (March 1, 2010). </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.191.2">Available at </span><a href="http://money.cnn.com/2010/03/01/markets/copper/"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.192.1">http://money.cnn.com/2010/03/01/markets/copper/</span></a></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn2" href="#fn-2"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.193.1">2</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.194.1"> Stephane Courtois, Nicolas Werth, Karel Bartosek, Andrzej Paczkowski, Jean‐Louis Panné, and Jean‐Louis Margolin, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.195.1">The Black Book of Communism: Crimes, Terror, Repression</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.196.1"> (Harvard University Press, 1997).</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn3" href="#fn-3"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.197.1">3</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.198.1"> Ludwig von Mises. </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.199.1">Socialism: An Economic and Sociological Analysis</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.200.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.200.2">Ludwig von Mises Institute. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.200.3">Auburn, AL. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.200.4">2008 (1922).</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn4" href="#fn-4"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.201.1">4</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.202.1"> There is a lot wrong with Keynesian economics, but perhaps nothing is as ridiculous as the complete absence of any conception of how the structure of capital production functions.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn5" href="#fn-5"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.203.1">5</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.204.1"> Ludwig von Mises, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.205.1">Human Action</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.206.1">, pp. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.206.2">703–704.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn6" href="#fn-6"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.207.1">6</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.208.1"> The main tools that central banks use are: setting the Federal Funds rate, setting the required reserve ratio, engaging in open market operations, and determining lending eligibility criteria. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.208.2">A detailed explanation of the mechanism of operation of these tools can be found in any preliminary macroeconomics textbook. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.208.3">To summarize: the central bank can engage in expansionary monetary policy by (1) reducing interest rates, which stimulates lending and increases money creation; (2) lowering the required reserve ratio, allowing banks to increase their lending, increasing money creation; (3) purchasing treasuries or financial assets, which also leads to money creation; and (4) relaxing lending eligibility criteria, allowing banks to increase lending and thus money creation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.208.4">Contractionary monetary policy is conducted by reversing these steps, leading to a reduction of the money supply, or at least a reduction in the rate of growth in the money supply.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn7" href="#fn-7"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.209.1">7</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.210.1"> It is always fun to teach my senior students about a hypothetical free market in capital, if only for watching the reaction on their faces when they compare the neat logic of how a free market in capital could work, versus the pseudoscientific Keynesian central planning theories they had the misfortune of learning in their monetary theory class.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn8" href="#fn-8"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.211.1">8</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.212.1"> There is no shortage of alternatives to the Austrian capital theory as an explanation of recessions, yet all of these are largely just the rehashed arguments of monetary cranks from the early 20th century. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.212.2">One does not even need to read modern rebuttals of the latest line of Keynesian and pop psychology theories. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.212.3">Reading Hayek's </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.213.1">Monetary Theory and the Trade Cycle</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.214.1">, from 1933, or Rothbard's </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.215.1">America's Great Depression</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.216.1">, from 1963, is sufficient.</span></aside>
