<section epub:type="chapter">
<header>
<h1><span epub:type="pagebreak" title="217" id="Page_217"/><a id="c10"/><span class="chapterNumber"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.1.1">Chapter 10</span></span><br/><span class="chapterTitle"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.2.1">Bitcoin Questions</span></span></h1>
</header>
<section><span id="c10-sec-0001"/>
<p id="c10-para-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.1">With the economic basics of the operation of Bitcoin explained in </span><a href="c08.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.1">Chapter 8</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.5.1">, and the main potential use cases of Bitcoin discussed in </span><a href="c09.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.1">Chapter 9</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.7.1">, a few of the most salient questions surrounding Bitcoin's operation are examined here.</span></p></section>
<section><span id="c10-sec-0002"/>
<h2 id="head-2-37"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.1">Is Bitcoin Mining a Waste?</span></h2>
<p id="c10-para-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.1">Anyone who joins the Bitcoin network generates a </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.1">public address</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.11.1"> and a </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.1">private key</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.2">These are analogous to an email address and its password: people can send you bitcoins to your public address while you use your private key to send bitcoins from your balance. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.3">These addresses can also be presented in Quick Response (QR) code format.</span></p>
<p id="c10-para-0003"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.14.1">When a transaction is made, the sender broadcasts it to all other network members (nodes), who can verify the sender has enough bitcoins to fulfill it, and that he has not spent these coins on another transaction. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.14.2">Once the transaction is validated by a majority of the CPU behind the network, it is inscribed onto the</span><span epub:type="pagebreak" title="218" id="Page_218"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.15.1"> common ledger shared by all network members, allowing all members to update the balance of the two transacting members. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.15.2">While it is easy for any network member to verify the validity of a transaction, a system of voting based on giving each member one vote could be gamed by a hacker creating a lot of nodes to vote to validate their fraudulent transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.15.3">Only by making accuracy based on CPU cycles expended by members, in other words, employing a proof‐of‐work system, can Bitcoin solve the double‐spending problem without a trusted third party.</span></p>
<p id="c10-para-0004"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.16.1">In its essence, proof‐of‐work involves network members competing to solve mathematical problems that are hard to solve but whose solution is easy to verify. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.16.2">All Bitcoin transactions verified in a ten‐minute interval are transcribed and grouped together into one block. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.16.3">Nodes compete to solve the PoW math problems for a block of transactions, and the first node to produce the correct solution broadcasts it to network members, who can very quickly verify its correctness. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.16.4">Once the validity of the transactions and PoW are verified by a majority of the network nodes, a set quantity of bitcoin is issued to reward the node that correctly solved the PoW. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.16.5">This is known as the </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.17.1">block subsidy</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.1">, and the process of generating the new coins has been referred to as </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.19.1">mining</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.1">, because it is the only way that the supply of coins is increased, in the same way that mining is the only way to increase the supply of gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.2">On top of the block subsidy, the node that correctly solved the PoW also gets the </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.1">transaction fees</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.1"> included by senders. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.2">The sum of the transaction fees and the block subsidy is the </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.1">block reward</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.1">.</span></p>
<p id="c10-para-0005"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.1">Although solving these problems might initially seem a wasteful use of computing and electric power, proof‐of‐work is essential to the operation of Bitcoin.</span><sup><a id="fn-1" href="#fn1"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.1">1</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.27.1"> By requiring the expenditure of electricity and processing power to produce new bitcoins, PoW is the only method so far discovered for making the production </span><span epub:type="pagebreak" title="219" id="Page_219"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.28.1">of a digital good reliably expensive, allowing it to be a hard money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.28.2">By ensuring that finding the solution to the mathematical problem consumes large quantities of processing power and electricity, nodes who expend that processing power have a very strong incentive to not include any invalid transactions in their blocks to receive the block reward. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.28.3">Because it is far cheaper to verify the validity of transactions and the PoW than it is to solve the PoW, nodes attempting to enter invalid transactions into a block are almost certainly doomed to failure, ensuring that their expended processing power goes unrewarded.</span></p>
<p id="c10-para-0006"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.1">PoW makes the cost of writing a block extremely high and the cost of verifying its validity extremely low, almost eliminating the incentive for anyone to try to create invalid transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.2">If they tried, they would be wasting electricity and processing power without receiving the block reward. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.3">Bitcoin can thus be understood as a technology that converts electricity to truthful records through the expenditure of processing power. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.4">Those who expend this electricity are rewarded with the bitcoin currency, and so they have a strong incentive to maintain its integrity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.5">As a result of attaching a strong economic incentive for honesty, Bitcoin's ledger has been practically incorruptible for the period of its operation so far, with no example of a successful double‐spend attack on a confirmed transaction. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.6">This integrity of the bitcoin ledger of transactions is achieved without having to rely on any single party being honest. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.7">By relying entirely on verification, Bitcoin dooms fraudulent transactions to failure and obviates the need for trust in anyone for transactions to be completed.</span></p>
<p id="c10-para-0007"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.1">For an attacker to try to insert fraudulent transactions into the Bitcoin ledger, he would need to have a majority of the processing power behind the network to accept his fraud. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.2">Honest nodes that are part of the network would have no incentive to do so, because it would undermine the integrity of Bitcoin and devalue the rewards they are receiving, wasting the electricity and resources they have expended on it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.3">So an attacker's only hope would be to mobilize a quantity of processing power that constitutes more than 50% of the network to verify his fraud and build on it as if it were valid. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.4">Such a move could have been possible in the early days of Bitcoin when the total processing power behind the network was very small. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.5">But because the economic value held in the network at the time was nonexistent or insignificant, no such attacks materialized. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.6">As the</span><span epub:type="pagebreak" title="220" id="Page_220"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.31.1"> network continued to grow and more members brought processing power to it, the cost to attack the network rose.</span></p>
<p id="c10-para-0008"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.1">The reward to nodes for verifying transactions has proven to be a profitable use of processing power. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.2">In January 2017, the processing power behind the Bitcoin network is equivalent to that of 2 trillion consumer laptops. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.3">It is more than two million times larger than the processing power of the world's largest supercomputer, and more than 200,000 times larger than the world's top 500 supercomputers combined. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.4">By monetizing processing power directly, Bitcoin has become the largest single‐purpose computer network in the world.</span></p>
<p id="c10-para-0009"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.1">Another contributing factor in this growth in processing power is that the verification of transactions and the solving of the PoW problems has moved from being conducted by personal computers to specialized processers built specifically to be optimally efficient at running the Bitcoin software. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.2">These Application Specific Integrated Circuits (ASICs) were first introduced in 2012, and their deployment has made adding processing power to the Bitcoin network more efficient, because no electricity is wasted on any irrelevant computing processes that would be present in any other, non‐Bitcoin‐specific computing unit. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.3">A global distributed network of independent dedicated miners now protects the integrity of the Bitcoin ledger. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.4">All of these miners have no conceivable purpose but verifying Bitcoin transactions and solving proof‐of‐work. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.5">Should Bitcoin fail for whatever reason, these ASICs would be rendered useless and their owners' investment would be lost, so they have a strong incentive to maintain the honesty of the network.</span></p>
<p id="c10-para-0010"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.34.1">For someone to alter the record of the network they would need to invest hundreds of millions, if not billions, of dollars building new ASIC chips to alter it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.34.2">Should an attacker succeed in altering the record, he would be highly unlikely to gain any economic benefit from it, as compromising the network would probably reduce the value of bitcoins to close to nothing. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.34.3">In other words, to destroy Bitcoin, an attacker needs to expend very large sums of money with no return at all. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.34.4">And in fact, even if such an attempt succeeded, the honest nodes on the network can effectively go back to the record of transactions before the attack and resume operation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.34.5">The attacker would then need to continue incurring significant running costs to keep attacking the consensus of the honest nodes.</span></p>
<p id="c10-para-0011"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.1">In its early years, Bitcoin users would</span><span epub:type="pagebreak" title="221" id="Page_221"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.1"> run nodes and use them to carry out their own transactions and to verify each other's transactions, making each node a wallet and a verifier/miner. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.2">But with time, these functions have been separated. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.3">ASIC chips are now specialized only in verifying transactions to receive reward coins (which is why they are commonly referred to as miners). </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.4">Node operators can now generate unlimited wallets, allowing businesses to offer convenient wallets for users who can send and receive bitcoins without operating a node or spending processing power on verifying transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.5">This has moved Bitcoin away from being a pure peer‐to‐peer network between identical nodes, but the main functional importance of the decentralized and distributed nature of the network has arguably remained intact, as a large number of nodes still exists and no single party is relied on to operate the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.6">Further, specialized mining has allowed for the processing power backing the network to grow to the astoundingly large size it has reached.</span></p>
<p id="c10-para-0012"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.1">In its early days, when the tokens had little or no value, the network could have been conceivably hijacked and destroyed by attackers, but as the network had little economic value, nobody seems to have bothered. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.2">As the economic value held on the network increased, the incentive to attack the network may have increased, but the cost of doing so rose much more, resulting in no attacks materializing. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.3">But perhaps the real protection of the Bitcoin network at any point in time is that the value of its tokens is entirely dependent on the integrity of the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.4">Any attack that succeeds in altering the blockchain, stealing coins, or double‐spending them would be of little value to the attacker, as it would become apparent to all network members that it is possible to compromise the network, severely reducing demand for using the network and holding the coins, crashing the price. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.5">In other words, the defense of the Bitcoin network is not just that attacking it has become expensive, but that the attack succeeding renders the attacker's loot worthless. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.6">Being an entirely voluntary system, Bitcoin can only operate if it is honest, as users can very easily leave it otherwise.</span></p>
<p id="c10-para-0013"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.1">The distribution of the Bitcoin processing power, and the strong resistance of the code to change, combined with the intransigency of the monetary policy, are what has allowed Bitcoin to survive and grow in value to the extent to which it has today. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.2">It is hard for people new to Bitcoin to appreciate just how many logistical</span><span epub:type="pagebreak" title="222" id="Page_222"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.1"> and security challenges Bitcoin has had to endure over the years to arrive at where it is today. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.2">Bearing in mind that the Internet has created opportunities for hackers to attack all sorts of networks and websites for fun and profit, this achievement becomes more startling. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.3">The ever‐growing number of security breaches that happen to computer networks and email servers across the world on a daily basis have occurred to systems which offer the attackers not much more than data or opportunities to score political points. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.4">Bitcoin, on the other hand, contains billions of dollars of value, but continues to operate safely and reliably because it was built, from day one, to operate in a highly adversarial setting, subject to relentless attack. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.5">Programmers and hackers worldwide have tried to tear it apart using all sorts of techniques, and yet it has continued to operate according to the exact essence of its specification.</span></p></section>
<section><span id="c10-sec-0003"/>
<h2 id="head-2-38"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.1">Out of Control: Why Nobody Can Change Bitcoin</span></h2>
<blockquote>
<p id="c10-para-0015"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.1">“The nature of Bitcoin is such that once version 0.1 was released, the core design was set in stone for the rest of its lifetime.”</span></p>
<p class="right"><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.1">—Satoshi Nakamoto, 6/17/2010</span></i></p>
</blockquote>
<p id="c10-para-0016"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.1">Bitcoin's resilience has so far not been restricted to successfully repelling attacks; it has also ably resisted any attempt at changing it or altering its characteristics. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.2">The true depth of this statement and its implications has not yet been fully realized by most skeptics. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.3">If Bitcoin's currency were to be compared to a central bank, it would be the world's most independent central bank. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.4">If it were to be compared to a nation‐state, it would be the most sovereign nation‐state in the world. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.5">The sovereignty of Bitcoin is derived from the fact that, as far as anyone can tell, the way its consensus rules operate makes it very resistant to alteration by individuals. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.6">It is no exaggeration to say nobody controls Bitcoin, and that the only option available to people is to use it as it is or not use it.</span></p>
<p id="c10-para-0017"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.44.1">This immutability is not a feature of the Bitcoin software, which is trivial to change for anyone with coding skills, but rather is grounded in the economics of the currency and network, and stems from the difficulty of getting every member of the network to adopt the same changes to the software. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.44.2">The software implementation that</span><span epub:type="pagebreak" title="223" id="Page_223"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.45.1"> allows an individual to run a node that connects to the Bitcoin network is open source software, which was initially made available by Satoshi Nakamoto in collaboration with the late Hal Finney and some other programmers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.45.2">Since then, any person has been free to download and use the software as he or she pleases, and to make changes to it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.45.3">This creates a freely competitive market in Bitcoin implementations, with anyone free to contribute changes or improvements to the software and present them to users for adoption.</span></p>
<p id="c10-para-0018"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.46.1">Over time, hundreds of computer programmers from around the world have volunteered their time to improve the node software and in the process improve the capabilities of individual nodes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.46.2">These coders have formed several different implementations, the largest and most popular of which is known as “Bitcoin Core.” </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.46.3">Several other implementations exist, and users are free to alter the source code at any point. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.46.4">The only requirement for a node to be a part of the network is that it follows the consensus rules of the other nodes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.46.5">Nodes which break the consensus rules by altering the structure of the chain, the validity of the transaction, the block reward, or any one of many other parameters in the system end up having their transactions rejected by the rest of the nodes.</span></p>
<p id="c10-para-0019"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.47.1">The process of what defines the parameters of Bitcoin is an example of what Scottish philosopher Adam Ferguson called “the product of human action, and not of human design.</span><sup><a id="fn-2" href="#fn2"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.1">2</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.1">” Although Satoshi Nakamoto and Hal Finney and others had produced a working model of the software in January 2009, the code has evolved significantly since then through the contributions of hundreds of developers as chosen by thousands of users who run nodes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.2">There is no central authority that determines the evolution of the Bitcoin software and no single programmer is able to dictate any outcome. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.3">The key to running an implementation that gets adopted has proven to be the adherence to the parameters of the original design. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.4">To the extent that changes have been made to the software, these changes can be best understood as improvements to the way in which an individual node interacts with the network, but not alterations to the Bitcoin network or its consensus rules. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.5">While it is outside the scope of the book to discuss which parameters these are, suffice it to specify this</span><span epub:type="pagebreak" title="224" id="Page_224"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.50.1"> criterion: a change that puts the node who adopts it out of consensus with other nodes requires all other nodes to update in order for the node initiating the change to remain on the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.50.2">Should a number of nodes adopt the new consensus rules, what emerges is referred to as a hard fork.</span></p>
<p id="c10-para-0020"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.1">Bitcoin's coders, then, for all their competence, cannot control Bitcoin, and are only Bitcoin coders to the extent that they provide node operators with software the node operators want to adopt. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.2">But coders aren't the only ones who cannot control Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.3">Miners, too, for all of the hashing power they can marshal, also cannot control Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.4">No matter how much hashing power is expended on processing blocks that are invalid, they will not be validated by a majority of Bitcoin nodes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.5">Therefore, if miners attempted to change the rules of the network, the blocks they generate would simply be ignored by the network members who operate the nodes, and they would be wasting their resources on solving proof‐of‐work problems without any reward. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.6">Miners are only Bitcoin miners to the extent that they produce blocks with valid transactions according to the current consensus rules.</span></p>
<p id="c10-para-0021"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.1">It would be tempting here to say that node operators control Bitcoin, and that is true in an abstract collective manner. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.2">More realistically, node operators can only control their own nodes and decide for themselves which network rules to join and which transactions they deem valid or invalid. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.3">Nodes are severely restricted in their choice of consensus rules because if they enforced rules inconsistent with the consensus of the network, their transactions would be rejected. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.4">Each node has a strong incentive to maintain network consensus rules and to stay compatible with nodes on these consensus rules. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.5">Each individual node is powerless to force other nodes to change their code, and that creates a strong collective bias to remain on the current consensus rules.</span></p>
<p id="c10-para-0022"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.1">In conclusion, the Bitcoin coders face a strong incentive to abide by consensus rules if they are to have their code adopted. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.2">The miners have to abide by the network consensus rules to receive compensation for the resources they spend on proof‐of‐work. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.3">The network members face a strong incentive to remain on the consensus rules to ensure they can clear their transactions on the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.4">Any individual coder, miner, or node operator is dispensable to the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.5">If they stray away from consensus rules, the most likely outcome is that they will individually waste resources. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.6">As long as the network provides</span><span epub:type="pagebreak" title="225" id="Page_225"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.54.1"> positive rewards to its participants, it's likely that replacement participants will come up. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.54.2">The consensus parameters of Bitcoin can thus be understood as being sovereign. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.54.3">To the extent that Bitcoin will exist, it will exist according to these parameters and specifications. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.54.4">This very strong status‐quo bias in Bitcoin's operation makes alterations to its money supply schedule, or important economic parameters, extremely difficult. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.54.5">It is only because of this stable equilibrium that Bitcoin can be considered hard money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.54.6">Should Bitcoin deviate from these consensus rules its value proposition as hard money would be seriously compromised.</span></p>
<p id="c10-para-0023"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.1">To the best of this author's knowledge, there have been no significant coordinated attempts to alter the monetary policy of Bitcoin,</span><sup><a id="fn-3" href="#fn3"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.1">3</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.1"> but even far simpler attempts at altering some of the technical specifications of the code have so far failed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.2">The reason that even seemingly innocuous changes to the protocol are extremely hard to carry out is the distributed nature of the network, and the need for many disparate and adversarial parties to agree to changes whose impact they cannot fully understand, while the safety and tried‐and‐tested familiarity of the status quo remains fully familiar and dependable. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.3">Bitcoin's status quo can be understood as a stable Schelling point,</span><sup><a id="fn-4" href="#fn4"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.58.1">4</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.59.1"> which provides a useful incentive for all participants to stick to it, while the move away from it will always involve a significant risk of loss.</span></p>
<p id="c10-para-0024"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.1">If some members of the Bitcoin network decided to change a parameter in the Bitcoin code by introducing a new version of the software that is incompatible with the rest of the network members, the result would be a fork, which effectively creates two separate currencies and networks. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.2">For as long as any members stay on the old network, they would benefit from the infrastructure of the network as it exists, the mining equipment, the network effect, and name recognition. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.3">In order for the new fork to succeed it would need an overwhelming majority of users, mining hashing power, and all of the</span><span epub:type="pagebreak" title="226" id="Page_226"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.1"> related infrastructure to migrate at the same time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.2">If it doesn't get that overwhelming majority, the likeliest outcome is that the two Bitcoins would trade versus one another on exchanges. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.3">Should the people behind the fork hope for their fork to succeed, they will have to sell their coins on the old fork and hope everyone else does the same, so that the price of it collapses and the price of the new fork rises, thus driving all the mining power and economic network to the new network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.4">But because any change in any parameter in Bitcoin's operation is likely to have beneficial effects on some network members at the expense of others, it is unlikely that a consensus would form to shift to the new coin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.5">More broadly, the majority of Bitcoin holders only hold it because they were attracted to the automated nature of its rules and their imperviousness to direction by third parties. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.6">Such individuals are highly unlikely to want to risk giving discretion for fundamental changes to the network to a new group proposing a new incompatible codebase. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.7">Whether such a majority exists or not is a moot point; what matters is that enough of them exist to make it always certain that they will continue with the current system parameters, unless their operation is compromised for some reason.</span></p>
<p id="c10-para-0025"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.1">Barring such catastrophic failure in the current design, it is a safe bet that there will be a significant percentage of nodes choosing to stay with the old implementation, which automatically makes that choice far safer for anyone considering going onto a fork. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.2">The problem with deciding to go onto a fork is that the only way to help it succeed is by selling your coins on the old chain. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.3">Nobody wants to sell their coins on the old network to move to the new network, only to find that not everybody moved and the value of the coins on the new network collapses. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.4">In summation, no move to a new implementation with consensus rules can take place unless the vast majority is willing to shift together, and any shift without the majority shifting is almost certain to be economically disastrous for everyone involved. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.5">Because any such move to a new implementation likely gives the party proposing the change significant control over the future direction of Bitcoin, bitcoin holders, who are needed for this shift to succeed, are to a large extent ideologically opposed to any such group having authority over Bitcoin and are highly unlikely to support such a move. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.6">The existence of this group makes supporting a fork highly risky for everybody else. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.7">This analysis may help explain why Bitcoin has resisted all attempts to change</span><span epub:type="pagebreak" title="227" id="Page_227"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.1"> it significantly so far. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.2">The coordination problem of organizing a simultaneous shift among people with adversarial interests, many of whom are strongly vested in the notion of immutability for its own sake, is likely intractable barring any pressing reason for people to move away from current implementations.</span></p>
<p id="c10-para-0026"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.1">For instance, an edit to increase the issuance rate of the currency to raise the coins that reward miners might appeal to miners, but it would not appeal to current holders, and so they are unlikely to go with such a proposal. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.2">Similarly, an edit to increase the size of the Bitcoin network blocks would likely benefit miners by allowing them to run more transactions per block and possibly collect more transaction fees to maximize return on their investment in their mining equipment. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.3">But it would likely not appeal to long‐term holders of Bitcoin, who would worry that larger blocks would cause the size of the blockchain to grow much bigger, and thus make running a full node more expensive, thereby dropping the number of nodes in the network, making the network more centralized and thus more vulnerable to attack. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.4">The coders who develop software to run Bitcoin nodes are powerless to impose changes on anybody; all they can do is propose code, and users are free to download whichever code and version they like. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.5">Any code that is compatible with the existing implementations will be far more likely to be downloaded than any code that is not compatible, because the latter would only succeed if the overwhelming majority of the network also ran it.</span></p>
<p id="c10-para-0027"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.65.1">As a result, Bitcoin exhibits extremely strong status‐quo bias. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.65.2">Only minor and uncontroversial changes to the code have been implemented so far, and every attempt to alter the network significantly has ended with resounding failure, to the delight of long‐term Bitcoin stalwarts who like nothing more about their currency than its immutability and resistance to change. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.65.3">The highest‐profile of these attempts have concerned increasing the size of individual blocks to increase transaction throughput. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.65.4">Several projects have gathered the names of some very prominent and old‐time Bitcoiners, and spent a lot on trying to gain publicity for the coin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.65.5">Gavin Andresen, who was one of the faces most publicly associated with Bitcoin, has pushed very aggressively for several attempts to fork Bitcoin into having bigger blocks, along with many stakeholders, including some skilled developers and deep‐pocketed entrepreneurs.</span></p>
<p id="c10-para-0028"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.1">Initially, Bitcoin XT was proposed by</span><span epub:type="pagebreak" title="228" id="Page_228"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.1"> Andresen and a developer by the name of Mike Hearn in June 2015, aiming at increasing the size of a block from 1MB to 8MB. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.2">But the majority of nodes refused to update to their software and preferred to stay on the 1‐megabyte blocks. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.3">Hearn was then hired by a “blockchain consortium of financial institutions” to bring blockchain technology to the financial markets, and published a blogpost to coincide with a glowing profile of him in the </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.1">New York Times</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.1"> which hailed him as desperately trying to save Bitcoin while painting Bitcoin as now being doomed to failure. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.2">Hearn proclaimed “the resolution of the Bitcoin experiment”, citing the lack of growth in transaction capacity as a lethal roadblock to Bitcoin's success and announcing he had sold all his coins. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.3">The bitcoin price on that day was around $350. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.4">Over the following two years, the price was to increase more than forty‐fold while the “blockchain consortium” he joined is yet to produce any actual products.</span></p>
<p id="c10-para-0029"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.70.1">Undeterred, Gavin Andresen immediately proposed a new attempt to fork Bitcoin under the name of “Bitcoin Classic,” which would have raised the blocksize to 8 megabytes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.70.2">This attempt fared no better, and by March 2016 the number of nodes supporting it began to fizzle. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.70.3">Yet, supporters of increasing the blocksize regrouped into Bitcoin Unlimited in 2017, an even wider coalition that included the largest maker of Bitcoin mining chips, as well as a wealthy individual who controls the </span><a href="http://bitcoin.com"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.1">bitcoin.com</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.1"> domain name and has spent enormous resources trying to promote larger blocks. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.2">A lot of media hype was generated and the sense of crisis was palpable to many who follow Bitcoin news on mainstream media and social media; yet the reality remained that no fork was attempted, as the majority of nodes continued to run on the 1MB‐compatible implementations.</span></p>
<p id="c10-para-0030"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.1">Finally, in August 2017, a group of programmers proposed a new fork of Bitcoin under the name of “Bitcoin Cash,” which included many of the earlier advocates of increasing the block size. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.2">The fate of Bitcoin Cash is a vivid illustration of the problems with a Bitcoin fork that does not have consensus support. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.3">Because a majority chose to stay with the original chain, and the economic infrastructure of exchanges and businesses supporting Bitcoin is still largely focused on the original Bitcoin, this has kept the value of Bitcoin's coins much higher than that of Bitcoin Cash, and the price of Bitcoin Cash continued to drop until it hit a low of 5% of Bitcoin's value in</span><span epub:type="pagebreak" title="229" id="Page_229"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.1"> November 2017. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.2">Not only is the fork unable to gain economic value, it is also dogged with a serious technical problem that renders it almost unusable. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.3">Seeing as the new chain has the same hashing algorithm as Bitcoin, miners can utilize their processing power on both chains and receive rewards in both. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.4">But because Bitcoin's coins are far more valuable than Bitcoin Cash, the processing power behind Bitcoin remains far higher than that of Bitcoin Cash, and Bitcoin miners can shift to Bitcoin Cash any time the rewards get high. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.5">This leaves Bitcoin Cash in an unfortunate dilemma: if the mining difficulty is too high, then there will be a long delay for blocks to be produced and transactions to process. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.6">But if the difficulty is set too low, the coin is mined very quickly and the supply increases quickly. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.7">This increases the supply of the Bitcoin Cash coins faster than the Bitcoin chain, and would lead to the coin reward for Bitcoin Cash running out very quickly, thus reducing the incentive for future miners to mine it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.8">Most likely, this will have to lead to a hard fork that adjusts the supply growth to continue offering rewards to miners. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.9">This problem is unique to a chain breaking off from Bitcoin, but was never true for Bitcoin itself. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.10">Bitcoin mining was always utilizing the largest amount of processing power for its algorithm, and the increase in processing power was always incremental as miners employed more mining capacity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.11">But with a coin that breaks off from Bitcoin, the lower value of the coin and the lower difficulty makes the coin constantly vulnerable for quick mining by the much larger mining capacity of the more valuable chain.</span></p>
<p id="c10-para-0031"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.1">After the failure of this fork to challenge Bitcoin's prime position, another attempt at a fork to double the blocksize, negotiated between various startups active in the Bitcoin economy, was canceled in mid‐November as its promoters realized they were highly unlikely to achieve consensus for their move and would instead most likely end up with another coin and network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.2">Bitcoin stalwarts have learned to shrug at such attempts, realizing that no matter how much hype is generated, any attempt to change the consensus rules of Bitcoin will lead to the generation of yet another Bitcoin copycat, like the altcoins which copy Bitcoin's incidental details but do not have its only important characteristic: immutability. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.3">From the discussion above it should be clear that Bitcoin's advantages lie not in its speed, convenience, or friendly user experience. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.4">Bitcoin's value comes from it having an immutable monetary policy</span><span epub:type="pagebreak" title="230" id="Page_230"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.1"> precisely because nobody can easily change it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.2">Any coin that begins with a group of individuals changing Bitcoin's specification has with its creation lost arguably the only property that makes Bitcoin valuable in the first place.</span></p>
<p id="c10-para-0032"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.1">Bitcoin is straightforward to use, but virtually impossible to alter. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.2">Bitcoin is voluntary, so nobody has to use it, but those who want to use it have no choice but to play by its rules. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.3">Changing Bitcoin in any meaningful way is not really possible, and should it be attempted, will produce another pointless knock‐off to be added to the thousands already out there. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.4">Bitcoin is to be taken as it is, accepted on its own terms and used for what it offers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.5">For all practical intents and purposes, Bitcoin is </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.78.1">sovereign</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.1">: it runs by its own rules, and there are no outsiders who can alter these rules. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.2">It might even be helpful to think of the parameters of Bitcoin as being similar to the rotation of the earth, sun, moon, or stars, forces outside of our control which are to be lived, not altered.</span></p></section>
<section><span id="c10-sec-0004"/>
<h2 id="head-2-39"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.1">Antifragility</span></h2>
<p id="c10-para-0033"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.1">Bitcoin is an embodiment of Nassim Taleb's idea of </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.82.1">antifragility</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.1">, which he defines as gaining from adversity and disorder. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.2">Bitcoin is not just robust to attack, but it can be said to be antifragile on both a technical and economic level. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.3">While attempts to kill Bitcoin have so far failed, many of them have made it stronger by ending up allowing coders to identify weaknesses and patch them up. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.4">Further, every thwarted attack on the network is a notch on its belt, another testament and advertisement to participants and outsiders of the security of the network.</span></p>
<p id="c10-para-0034"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.1">A global team of volunteer software developers, reviewers, and hackers have taken a professional, financial, and intellectual interest in working on improving or strengthening the Bitcoin code and network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.2">Any exploits or weaknesses found in the specification of the code will attract some of these coders to offer solutions, debate them, test them, and then propose them to network members for adoption. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.3">The only changes that have happened so far have been operational changes that allow the network to run more efficiently, but not changes that alter the essence of the coin's operation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.4">These coders can own Bitcoin tokens, and so have a financial incentive to work on ensuring Bitcoin grows and succeeds. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.5">In turn, the continued success</span><span epub:type="pagebreak" title="231" id="Page_231"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.1"> of Bitcoin rewards these coders financially and thus allows them to dedicate more time and effort to the maintenance of Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.2">Some of the prominent developers working on maintaining Bitcoin have become wealthy enough from investing in Bitcoin that they can make it their prime occupation without receiving pay from anyone.</span></p>
<p id="c10-para-0035"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.1">In terms of media coverage, Bitcoin appears to be a good embodiment of the adage “all publicity is good publicity.” </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.2">As a new technology that is not easy to understand, Bitcoin was always going to receive inaccurate and downright hostile media coverage, as was the case with many other technologies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.3">The website </span><a href="http://99bitcoins.com"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.1">99bitcoins.com</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.1"> has collected more than 200 examples of prominent articles announcing the death of Bitcoin over the years. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.2">Some of these writers found Bitcoin to be a contravention to their worldview—usually related to the state theory of money or Keynesian faith in the importance of an elastic supply of money—and refused to consider the possibility they might be wrong. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.3">Instead, they concluded that it must be Bitcoin whose existence is wrong, and therefore they predicted it would die soon. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.4">Others believed strongly in the need for Bitcoin to change to maintain its success, and when they failed to get it to change in the way they desired, they concluded it must die. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.5">These people's attacks on Bitcoin led them to write about it and bring it to the attention of ever‐wider audiences. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.6">The more obituaries intensified, the more its processing power, transactions, and market value grew. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.7">Many Bitcoiners, this author included, only came around to appreciating the importance of Bitcoin by noticing how many times it had been written off, and how it continued to operate successfully. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.8">The Bitcoin obituaries were powerless to stop it, but they seem to have helped it gain more publicity and awaken the public's curiosity to the fact that it continues to operate in spite of all the hostility and bad press it gets.</span></p>
<p id="c10-para-0036"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.1">A good example of Bitcoin's antifragility came in the fall of 2013, when the FBI arrested the alleged owner of the Silk Road website, which was a truly free online market allowing users to sell and buy anything they wanted online, including illegal drugs. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.2">With Bitcoin's association in the public's mind with drugs and crime, most analysts predicted the closing of the website would destroy Bitcoin's utility. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.3">The price on that day dropped from around the $120 range to the $100 range, but it rebounded quickly and began a very fast rise, reaching $1,200 per bitcoin within a few months. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.4">At the time of writing, the</span><span epub:type="pagebreak" title="232" id="Page_232"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.90.1"> price had never again dropped to the level it was at before the closing of the Silk Road website. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.90.2">By surviving the closing of the Silk Road unscathed, Bitcoin demonstrated that it is far more than a currency for crime, and in the process it benefited from the free publicity from the Silk Road media coverage.</span></p>
<p id="c10-para-0037"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.1">Another example of Bitcoin's antifragility came in September 2017, after the Chinese government announced the closure of all Chinese exchanges that traded Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.2">Whereas the initial reaction was one of panic that saw the price drop by around 40%, it was only a matter of hours before the price started recovering, and within a few months the price had more than doubled from where it was before the government's ban. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.3">While banning exchanges from trading Bitcoin could be viewed as an impediment to Bitcoin's adoption through a reduction in its liquidity, it seems to have only served to reinforce Bitcoin's value proposition. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.4">More transactions started happening off exchanges in China, with volume on websites like </span><a href="http://localbitcoins.com"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.92.1">localbitcoins.com</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.1"> exploding. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.2">It may just be that the suspension of trading in China caused the opposite of the intended effect, as it drove Chinese to hold onto their Bitcoin for the long term rather than trade it for the short term.</span></p></section>
<section><span id="c10-sec-0005"/>
<h2 id="head-2-40"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.94.1">Can Bitcoin Scale?</span></h2>
<p id="c10-para-0038"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.1">At the time of writing, one of the most high‐profile debates surrounding Bitcoin concerns the question of scaling, or increasing the transaction capacity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.2">Bitcoin's 1‐megabyte blocks mean that the capacity for transactions as it stands is around less than 500,000 transactions per day. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.3">Bitcoin has already approached these levels of transactions, and as a result, transaction fees have risen significantly over the past few months. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.4">The implementation of a technology called Segwit could result in a quadrupling of this daily capacity, but it is nonetheless becoming clear that there will be a hard limit to how many transactions can be processed over the Bitcoin blockchain, due to the decentralized and distributed nature of Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.5">Each Bitcoin transaction is recorded with all network nodes, who are all required to keep a copy of the entire ledger of all transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.6">This necessarily means that the cost of recording transactions will be far higher than for any centralized solution which only needs one record and a few backups. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.7">The most</span><span epub:type="pagebreak" title="233" id="Page_233"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.96.1"> efficient payment processing systems are all centralized for a good reason: it is cheaper to keep a central record than to keep several distributed records and have to worry about them updating in sync, a process which so far can only be achieved using Bitcoin proof‐of‐work.</span></p>
<p id="c10-para-0039"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.1">Centralized payment solutions, such as Visa or MasterCard, employ one centralized ledger to which all transactions are committed, as well as a backup that is entirely separate. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.2">Visa can process around 3,200 transactions per second, or 100.8 billion transactions per year.</span><sup><a id="fn-5" href="#fn5"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.98.1">5</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.1"> Bitcoin's current 1‐megabyte blocks are able to process a maximum of four transactions per second, 350,000 transactions per day, or around 120 million transactions per year. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.2">For Bitcoin to process the 100 billion transactions that Visa processes, each block would need to be around 800 megabytes, meaning every ten minutes, each Bitcoin node would need to add 800 megabytes of data. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.3">In a year, each Bitcoin node would add around 42 terabytes of data, or 42,000 gigabytes, to its blockchain. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.4">Such a number is completely outside the realm of possible processing power of commercially available computers now or in the foreseeable future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.5">The average consumer computer, or the average external hard drive, has a capacity in the order of 1 terabyte, about a week's worth of transactions at Visa volumes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.6">For some perspective, it is worth examining the sort of computing infrastructure that Visa employs to process these transactions.</span></p>
<p id="c10-para-0040"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.100.1">In 2013, a report showed that Visa owns a data center described as a “digital Fort Knox” containing 376 servers, 277 switches, 85 routers, and 42 firewalls.</span><sup><a id="fn-6" href="#fn6"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.101.1">6</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.1"> Granted, Visa's centralized system is a single point of failure, and so it employs very large amounts of redundancy and spare capacity to protect from unforeseen circumstances, whereas in the case of Bitcoin, the presence of many nodes would make each one of them non‐critical, and so requiring less security and capacity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.2">Nonetheless, a node that can add 42 terabytes of data every year would require a very expensive computer, and the network bandwidth required to process all of these transactions every day would be an enormous cost that would be clearly unworkably complicated and</span><span epub:type="pagebreak" title="234" id="Page_234"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.103.1"> expensive for a distributed network to maintain.</span></p>
<p id="c10-para-0041"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.104.1">There are only a handful of such centers in existence worldwide: those employed by Visa, MasterCard, and a few other payment processors. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.104.2">Should Bitcoin attempt to process such a capacity, it could not possibly compete with these centralized solutions by having thousands of distributed centers on a similar scale; it would have to become centralized and employ only a few such data centers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.104.3">For Bitcoin to remain distributed, each node on the network must cost something reasonable for thousands of individuals to run it on commercially available personal computers, and the transfer of data between the nodes has to be at scales that are supported by regular consumer bandwidth.</span></p>
<p id="c10-para-0042"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.1">It is inconceivable that Bitcoin could run the same scale of transactions on‐chain that a centralized system can support. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.2">This explains why transaction costs are rising, and in most likelihood, will continue to rise if the network continues to grow. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.3">The biggest scope for scaling Bitcoin transactions will likely come off‐chain, where many simpler technologies can be used for small and unimportant payments. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.4">This ensures there can be no compromise of Bitcoin's two most significant properties for which using extensive processing power is justified: digital sound money and digital cash. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.5">There are no alternative technologies that can offer these two functions, but there are many technologies that can offer small payments and consumer spending at low costs, and the technology for these choices is very simple to implement relatively reliably with current banking technologies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.6">Bitcoin mass use for merchant payments is not even very feasible given that it takes anywhere from 1 to 12 minutes for a transaction to receive its first confirmation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.7">Merchants and customers cannot wait that long on payments, and even though the risk of a double‐spend attack is not significant enough for one small payment, it is significant enough for merchants who receive large numbers of transactions as in the example of the attack on Betcoin Dice, discussed later in the section on attacks on Bitcoin.</span></p>
<p id="c10-para-0043"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.1">For people who want to use bitcoin as a digital long‐term store of value, or for people who want to carry out important transactions without having to go through a repressive government, the high transaction fees are a price well worth paying. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.2">Saving in Bitcoin by its very nature will not require many transactions, and so a high transaction fee is worth paying for it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.3">And for</span><span epub:type="pagebreak" title="235" id="Page_235"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.107.1"> transactions that cannot be carried out through the regular banking system, such as people trying to get their money out of a country suffering inflation and capital controls, Bitcoin's high transaction fees will be a price well worth paying. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.107.2">Even at current low levels of adoption, the demand for digital cash and digital sound money has already raised transaction fees to the point where they cannot compete with centralized solutions like PayPal and credit cards for small payments. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.107.3">This has not stalled Bitcoin's growth, however, which indicates that the market demand for Bitcoin is driven by its use as a digital cash and digital store of value, rather than small digital payments.</span></p>
<p id="c10-para-0044"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.108.1">If Bitcoin's popularity continues to grow, there are some potential scaling solutions that do not involve creating any changes to the structure of Bitcoin, but which take advantage of the way transactions are structured to increase the number of payments possible. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.108.2">Each Bitcoin transaction can contain several inputs and outputs, and using a technique called CoinJoin, several payments can be grouped together into one transaction, allowing several inputs and outputs for only a fraction of the space that would have been needed otherwise. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.108.3">This could potentially raise the transaction volume of Bitcoin to the millions of payments per day, and as the transaction costs rise higher, this is more and more likely to become a popular option.</span></p>
<p id="c10-para-0045"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.109.1">Another possibility for scaling Bitcoin is digital mobile USB wallets, which can be made to be physically tamper‐proof and can be checked for their balance at any time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.109.2">These USB drives would carry the private keys to specific amounts of Bitcoins, allowing whoever holds them to withdraw the money from them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.109.3">They could be used like physical cash, and each holder could verify the value in these drives. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.109.4">As fees have been rising on the network, there has been no respite in the growth of demand for Bitcoin, as evidenced by its rising price, indicating that users value the transactions more than the transaction costs they have to pay for them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.109.5">Instead of the rising fees slowing Bitcoin's adoption, all that is happening is that the less important transactions are being moved off‐chain and the on‐chain transactions are growing in importance. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.109.6">The most important use cases of Bitcoin, as a store of value and uncensorable payments, are well worth the transaction fees. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.109.7">When people buy Bitcoin to hold it for the long‐term, a one‐off small transaction fee is to be expected and is usually dwarfed by the commission</span><span epub:type="pagebreak" title="236" id="Page_236"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.110.1"> and the premium placed by the sellers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.110.2">For people looking to escape capital controls or send money to countries facing economic difficulties, the transaction fee is well worth paying considering Bitcoin is the only alternative. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.110.3">As Bitcoin adoption spreads, and transaction fees rise high enough that they will matter to the people paying them, there will be economic pressure to utilize more of the above scaling solutions which can increase transaction capacity without making changes that compromise the rules of the network and force a chain split.</span></p>
<p id="c10-para-0046"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.1">Beyond these possibilities, the majority of Bitcoin transactions today are already carried out off‐chain, and only settled on‐chain. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.2">Bitcoin‐based businesses, such as exchanges, casinos, or gaming websites, will only use Bitcoin's blockchain for customer deposits and withdrawals, but within their platforms, all transactions are recorded on their local databases, denominated in Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.3">It is not possible to make accurate estimates of the number of these transactions due to the very large number of businesses, the lack of public data on the transactions taking place in their proprietary platforms, and the quickly shifting dynamics of the Bitcoin economy, but a conservative estimate would put them as being more than 10 times the number of transactions carried out on the Bitcoin blockchain. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.4">In effect, Bitcoin is already being used as a reserve asset in the majority of the transactions in the Bitcoin economy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.5">Should Bitcoin's growth continue it is only natural to see the number of off‐chain transactions increase faster than the on‐chain transactions.</span></p>
<p id="c10-para-0047"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.1">Such an analysis may contradict the rhetoric that accompanied the rise of Bitcoin, which promotes Bitcoin as putting an end to banks and banking. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.2">The idea that millions, let alone billions, could use the Bitcoin network directly for carrying out their every transaction is unrealistic as it would entail that every network member needs to be recording every other member's transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.3">As the numbers grow, these records become larger and constitute a significant computing burden. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.4">On the other hand, Bitcoin's unique properties as a store of value are likely to continue to increase demand for it, making it hard for it to survive as a purely peer‐to‐peer network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.5">For Bitcoin to continue to grow there will have to be payment processing solutions handled off the Bitcoin blockchain, and such solutions are emerging out of the grind of competitive markets.</span></p>
<p id="c10-para-0048"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.113.1">Another important reason why</span><span epub:type="pagebreak" title="237" id="Page_237"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.1"> banking as an institution is not going away is the convenience of banking custody. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.2">While many Bitcoin purists value the freedom accorded to them by being able to hold their own money and not rely on a financial institution to access it, the vast majority of people would not want this freedom and prefer to not have their money under their responsibility for fear of theft or abduction. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.3">In the midst of the very common anti‐bank rhetoric that is popular these days, particularly in Bitcoin circles, it is easy to forget that deposit banking is a legitimate business which people have demanded for hundreds of years around the world. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.4">People have happily paid to have their money stored safely so they only need to carry a small amount of money on them and face little risk of loss. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.5">In turn, the widespread use of banking cards instead of cash allows people to carry small sums of money on them at all times, which likely makes modern society safer than it would be otherwise, because most potential assailants these days realize they are not likely to come across a victim carrying significant amounts of cash, and theft of banking cards is unlikely to yield significant sums before the victim is able to cancel them.</span></p>
<p id="c10-para-0049"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.1">Even if it were possible for Bitcoin's network to support billions of transactions per day, obviating the need for second‐layer processing, many, if not most, Bitcoiners with significant holdings will eventually resort to keeping them in one of the growing number of services for safe custody of Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.2">This is an entirely new industry and it is likely to evolve significantly to provide technical solutions for storage with different degrees of safety and liquidity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.3">Whatever shape this industry takes, the services it provides and how it evolves will shape the contours of a Bitcoin‐based banking system in the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.4">I make no prediction as to what shape these services will take, and what technological capabilities they will have, except to say that it will likely utilize cryptographic proof mechanisms on top of establishing market reputation in order to operate successfully. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.5">One possible technology for how this might be achieved is known as the Lightning Network, a technology under development that promises increasing transaction capacity significantly by allowing nodes to run payment channels off‐chain, which only use the Bitcoin ledger for verification of valid balances rather than transfers.</span></p>
