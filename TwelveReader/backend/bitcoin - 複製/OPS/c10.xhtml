<p id="c10-para-0050"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.116.1">In 2016 and 2017, as Bitcoin approached the maximum number of daily transactions, the network continued to grow, as is clear from the data in </span><a href="c08.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.117.1">Chapter 8</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.118.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.118.2">Bitcoin is scaling</span><span epub:type="pagebreak" title="238" id="Page_238"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.119.1"> through an increase in the value of on‐chain transactions, not through a rise of their number. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.119.2">More and more transactions are being carried out off‐chain, settled on exchanges or websites that handle Bitcoin, turning Bitcoin into more of a settlement network than a direct payment network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.119.3">This does not represent a move away from Bitcoin's function as cash, as is commonly believed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.119.4">While the term </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.120.1">cash</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.121.1"> has come to denote the money used for small consumer transactions today, the original meaning of the term refers to money that is a bearer instrument, whose value can be transferred directly without resort to settlement by, or liability of, third parties. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.121.2">In the nineteenth century, the term </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.122.1">cash</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.123.1"> referred to central bank gold reserves, and cash settlement was the transfer of physical gold between banks. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.123.2">If this analysis is correct, and Bitcoin continues to grow in value and off‐chain transactions while on‐chain transactions do not grow as much, Bitcoin would be better understood as cash in the old meaning of the term, similar to gold cash reserves, rather than the modern term for cash as paper money for small transactions.</span></p>
<p id="c10-para-0051"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.124.1">In conclusion, there are many possibilities for increasing the number of bitcoin transactions without having to alter the architecture of Bitcoin as it is, and without requiring all current node operators to upgrade simultaneously. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.124.2">Scaling solutions will come from node operators improving the way they send data on Bitcoin transactions to other network members. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.124.3">This will come through joining transactions together, off‐chain transactions, and payment channels. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.124.4">On‐chain scaling solutions are unlikely to be enough to meet the growing demand for Bitcoin over time, and so second‐layer solutions are likely to continue to grow in importance, leading to the emergence of a new kind of financial institution similar to today's banks, using cryptography, and operating primarily online.</span></p></section>
<section><span id="c10-sec-0006"/>
<h2 id="head-2-41"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.125.1">Is Bitcoin for Criminals?</span></h2>
<p id="c10-para-0052"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.126.1">One of the very common misconceptions about Bitcoin from its inception is that it would make a great currency for criminals and terrorists. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.126.2">A long list of press articles have been published with unsubstantiated claims that terrorists or criminal gangs are using Bitcoin for their activity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.126.3">Many of these articles have</span><span epub:type="pagebreak" title="239" id="Page_239"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.127.1"> been retracted,</span><sup><a id="fn-7" href="#fn7"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.1">7</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.129.1"> but not before they have imprinted the idea into the minds of many people, including misguided criminals.</span></p>
<p id="c10-para-0053"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.130.1">The reality is that Bitcoin's ledger is globally accessible and immutable. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.130.2">It will carry the record of every transaction for as long as Bitcoin is still operational. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.130.3">It is inaccurate to really say Bitcoin is anonymous, as it is rather pseudonymous. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.130.4">It is possible, though not guaranteed, to establish links between real‐life identities and Bitcoin addresses, thus allowing the full tracking of all transactions by an address once its identity is established. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.130.5">When it comes to anonymity, it is useful to think of Bitcoin as being as anonymous as the Internet: it depends on how well you hide, and how well the others look. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.130.6">Yet Bitcoin's blockchain makes hiding that much more difficult on the Web. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.130.7">It is easy to dispose of a device, email address, or IP address and never use it again, but it is harder to completely erase the trail of funds to one bitcoin address. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.130.8">By its very nature, Bitcoin's blockchain structure is not ideal for privacy.</span></p>
<p id="c10-para-0054"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.1">All of this means that for any crime that actually has a victim, it would be inadvisable for the criminal to use Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.2">Its pseudonymous nature means that addresses could be linked to real‐world identities, even many years after the crime is committed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.3">The police, or the victims and any investigators they hire, might well be able to find a link to the identity of the criminal, even after many years. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.4">The Bitcoin trail of payments itself has been the reason that many online drug dealers have been identified and caught as they fell for the hype of Bitcoin as completely anonymous.</span></p>
<p id="c10-para-0055"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.1">Bitcoin is a technology for money, and money is something that can be used by criminals at all times. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.2">Any form of money can be used by criminals or to facilitate crime, but Bitcoin's permanent ledger makes it particularly unsuited to crimes with victims likely to try to investigate. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.3">Bitcoin can be useful in facilitating “victimless crimes,” where the absence of the victim will mean nobody trying to establish the identity of the “criminal.” </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.4">In reality, and once one overcomes the propaganda of the twentieth‐century state, there is no such thing as a victimless crime. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.5">If an action has no victims, it is no crime, regardless of what some self‐important voters or bureaucrats would like to believe about their prerogative to legislate morality</span><span epub:type="pagebreak" title="240" id="Page_240"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.133.1"> for others. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.133.2">For these illegal but perfectly moral actions, Bitcoin could be useful because there are no victims to try to hunt down the perpetrator. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.133.3">The harmless activity carried out shows up on the blockchain as an individual transaction which could have a multitude of causes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.133.4">So one can expect that victimless crimes, such as online gambling and evading capital controls, would use Bitcoin, but murder and terrorism would more likely not. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.133.5">Drug dealing seems to happen on the Bitcoin blockchain, though that is likely more down to addicts' cravings than sound judgment, as evidenced by the large number of Bitcoin drug purchasers that have been identified by law enforcement. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.133.6">While statistics on this matter are very hard to find, I would not be surprised to find buying drugs with Bitcoin is far more dangerous than with physical government money.</span></p>
<p id="c10-para-0056"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.1">In other words, Bitcoin will likely increase individuals' freedom while not necessarily making it easier for them to commit crimes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.2">It is not a tool to be feared, but one to be embraced as an integral part of a peaceful and prosperous future.</span></p>
<p id="c10-para-0057"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.1">One high‐profile type of crime that has indeed utilized Bitcoin heavily is ransomware: a method of unauthorized access to computers that encrypts the victims' files and only releases them if the victim makes a payment to the recipient, usually in Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.2">While such forms of crime were around before Bitcoin, they have become more convenient to carry out since Bitcoin's invention. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.3">This is arguably the best example of Bitcoin facilitating crime. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.4">Yet one can simply understand that these ransomware crimes are being built around taking advantage of lax computer security. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.5">A company that can have its entire computer system locked up by anonymous hackers demanding a few thousand dollars in Bitcoin has far bigger problems than these hackers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.6">The incentive for the hackers may be in the thousands of dollars, but the incentive for the firm's competitors, clients, and suppliers for gaining access to this data can be much higher. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.7">In effect, what Bitcoin ransomware has allowed is the detection and exposition of computer security flaws. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.8">This process is leading firms to take better security precautions, and causing computer security to grow as an industry. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.9">In other words, Bitcoin allows for the monetizing of the computer security market. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.10">While hackers can initially benefit from this, in the long run, productive businesses will command the best security resources.</span></p></section>
<section><span id="c10-sec-0007"/>
<h2 id="head-2-42"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.136.1">How to Kill Bitcoin: A Beginners' Guide</span></h2>
<p id="c10-para-0058"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.1">Many Bitcoiners have developed quasi‐religious</span><span epub:type="pagebreak" title="241" id="Page_241"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.138.1"> beliefs in the ability of Bitcoin to survive come what may. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.138.2">The amount of processing power behind it and the large number of nodes distributed worldwide verifying transactions means that it is highly resistant to change and likely to remain as such. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.138.3">Most of those unfamiliar with Bitcoin will frequently believe that it is doomed because it will inevitably get hacked, like everything digital seems to. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.138.4">Once Bitcoin's operation is understood, it becomes clear that “hacking” it is not a straightforward task. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.138.5">There are several other possible threats to Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.138.6">Computer security is a fundamentally intractable problem, as it involves unpredictable attackers finding new angles of attack. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.138.7">It is beyond the scope of this book to elucidate all potential threats to Bitcoin and assess them.</span><sup><a id="fn-8" href="#fn8"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.139.1">8</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.140.1"> This section examines only some of the more high‐profile threats and the ones most relevant to the focus of this book on Bitcoin as sound money.</span></p>
<section><span id="c10-sec-0008"/>
<h3><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.1">Hacking</span></i></h3>
<p id="c10-para-0059"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.142.1">Bitcoin's resistance to attack is rooted in three properties: its barebones simplicity, the vast processing power that does nothing but ensure the safety of this very simple design, and the distributed nodes which need to achieve consensus on any change for it to take effect. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.142.2">Imagine the digital equivalent of placing the entirety of the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.142.3">military's infantry and equipment around a school playground to protect it from invasion and you begin to get an idea of how overly fortified Bitcoin is.</span></p>
<p id="c10-para-0060"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.1">Bitcoin is at its essence a ledger of ownership of virtual coins. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.2">There are only 21 million of these coins, and a few million addresses that own them, and every day no more than 500,000 transactions move some of these coins around. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.3">The computing power necessary to operate such a system is minuscule. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.4">A laptop for $100 could do it while also surfing the Web. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.5">But the reason Bitcoin is not run on one laptop is that such an arrangement would require trust in the owner of the laptop while also being a relatively simple target for hacking.</span></p>
<p id="c10-para-0061"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.144.1">All computer networks rely for their security</span><span epub:type="pagebreak" title="242" id="Page_242"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.145.1"> on making some computers impenetrable to attackers and using these as the definitive record. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.145.2">Bitcoin, on the other hand, takes an entirely different approach to computer security: it does not bother to secure any of its computers individually, and operates under the working assumption that all computer nodes are hostile attackers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.145.3">Instead of establishing trust in any network member, Bitcoin verifies everything they do. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.145.4">That process of verification, through proof‐of‐work, is what consumes large amounts of processing power, and it has proven very effective because it makes Bitcoin security dependent on brute processing power, and as such, invulnerable to problems of access or credentials. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.145.5">If everyone is assumed dishonest, everyone must pay a large cost to commit transactions to the common record, and everyone will lose these costs if their fraud is detected. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.145.6">The economic incentives make dishonesty extremely expensive and highly unlikely to succeed.</span></p>
<p id="c10-para-0062"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.146.1">To hack Bitcoin, in the sense of corrupting the ledger of transactions to fraudulently move coins to a specific account, or to make it unusable, would require a node to post an invalid block to the blockchain, and the network to adopt it and continue to build on it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.146.2">Because nodes have a very low cost of detecting fraud, while the cost of adding a block of transactions is high and continuously rising, and because the majority of nodes in the network have an interest in Bitcoin surviving, this battle is unlikely to be won by attackers, and continues to get harder as the cost of adding blocks gets higher.</span></p>
<p id="c10-para-0063"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.1">At the heart of Bitcoin's design there is a fundamental asymmetry between the cost of committing a new block of transactions and the cost of verifying the validity of these transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.2">This means while forging the record is technically possible, the economic incentives are highly stacked against it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.3">The ledger of transactions as a result constitutes an undisputable record of valid transactions so far.</span></p></section>
<section><span id="c10-sec-0009"/>
<h3><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.148.1">The 51% Attack</span></i></h3>
<p id="c10-para-0064"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.149.1">The 51% attack is a method of using large amounts of hashrate to generate fraudulent transactions, by spending the same coin twice, thus having one of the transactions canceled and defrauding the recipient. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.149.2">In essence, if a miner who controls a large percentage of the hashrate manages to solve proof‐of‐work problems quickly, he could</span><span epub:type="pagebreak" title="243" id="Page_243"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.150.1"> spend a bitcoin on a public chain that receives confirmations while mining another fork of the blockchain with another transaction of the same bitcoin to another address, belonging to the attacker. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.150.2">The recipient of the first transaction receives confirmations, but the attacker will attempt to use his processing power to make the second chain longer. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.150.3">If he succeeds in making the second chain longer than the first one, the attack succeeds, and the recipient of the first transaction will find the coins they received vanish.</span></p>
<p id="c10-para-0065"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.151.1">The more hashrate the attacker is able to command, the more likely he is to make the fraudulent chain longer than the public one, and then reverse his transaction and profit. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.151.2">While this may sound simple in principle, in practice it has been much harder. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.151.3">The longer the recipient waits for confirmation, the less likely it is that the attacker can succeed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.151.4">If the recipient is willing to wait for six confirmations, the probability of an attack succeeding shrinks infinitely low.</span></p>
<p id="c10-para-0066"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.152.1">In theory, the 51% percent attack is very feasible technically. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.152.2">But in practice, the economic incentives are heavily aligned against it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.152.3">A miner who successfully executes a 51% attack would severely undermine the economic incentives for anyone to use Bitcoin, and with that the demand for Bitcoin tokens. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.152.4">As Bitcoin mining has grown to become a heavily capital‐intensive industry with large investments dedicated to producing coins, miners have grown to have a vested long‐term interest in the integrity of the network, as the value of their rewards depends on it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.152.5">There have been no successful double‐spend attacks on any Bitcoin transactions that have been confirmed at least once.</span></p>
<p id="c10-para-0067"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.153.1">The closest thing to a successful double‐spend attack that Bitcoin has witnessed was in 2013, when a Bitcoin betting site called Betcoin Dice had a sum in the range of 1,000 bitcoins (valued at around $100,000 at the time) stolen from it through double‐spend attacks utilizing significant mining resources. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.153.2">That attack, however, only succeeded because Betcoin Dice was accepting transactions with zero confirmations, making the cost of attack relatively low. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.153.3">Had they accepted transactions with one confirmation, it would have been much harder to pull off the attack. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.153.4">This is another reason Bitcoin's blockchain is not ideal for mass consumer payments: it takes somewhere in the range of 1 to 12 minutes for a new block to be generated to produce one confirmation for a transaction. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.153.5">Should a large payment processor want to accept taking the risk of approving payments with zero confirmations, it</span><span epub:type="pagebreak" title="244" id="Page_244"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.154.1"> constitutes a lucrative target for coordinated double‐spend attacks that utilize heavy mining resources.</span></p>
<p id="c10-para-0068"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.155.1">In conclusion, a 51% attack is theoretically possible to execute if the recipients of the payment are not waiting for a few blocks to confirm the validity of the transaction. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.155.2">In practice, however, the economic incentives are heavily against owners of hashpower utilizing their investments in this avenue, and as a result, there have been no successful 51% attacks on node members that have waited for at least one confirmation.</span></p>
<p id="c10-para-0069"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.1">A 51% attack would likely not be successful if done for a profit motive, but such an attack could also be carried out with no profit motive, but with the intention of destroying Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.2">A government or private entity could decide to acquire Bitcoin mining capacity to commandeer a majority of the Bitcoin network and then proceed to use that hashrate to launch continuous double‐spend attacks, defrauding many users and destroying confidence in the safety of the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.3">Yet the economic nature of mining is heavily stacked against this scenario materializing. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.4">Processing power is a highly competitive global market, and Bitcoin mining is one of the largest, most profitable, and fastest growing uses of processing power in the world. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.5">An attacker may look at the cost of commandeering 51% of current hashing power and be willing to dedicate that cost to purchasing the hardware necessary for this. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.6">But if such an enormous amount of resources were mobilized to buy Bitcoin mining equipment, it would simply lead to a sharp rise in the price of this equipment, which would reward current miners and allow them to invest more heavily in buying more mining equipment. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.7">It would also lead to heavier capital investment in the production of mining power by mining producers, which would bring the cost of processing power down and allow the faster growth of Bitcoin's hashrate. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.8">As an outsider entering the market, the attacker is at a constant disadvantage as his own purchasing of mining equipment leads to the faster growth of the mining processing power not controlled by him. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.9">In turn, the more resources are expended on building processing power to attack Bitcoin, the faster the growth of the processing power of Bitcoin and the harder it becomes to attack. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.10">So, yet again, while technically possible, the economics of the network makes it highly unlikely that such an attack would succeed.</span></p>
<p id="c10-para-0070"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.157.1">An attacker, particularly a state, could attempt</span><span epub:type="pagebreak" title="245" id="Page_245"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.158.1"> to attack Bitcoin through taking control of existing mining infrastructure and using it unprofitably in order to undermine the safety of the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.158.2">The fact that Bitcoin mining is widely distributed geographically makes this a challenging prospect that would require collaboration from various governments worldwide. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.158.3">A better way to implement this might be not through physically taking over mining equipment but commandeering it through hardware backdoors.</span></p></section>
<section><span id="c10-sec-0010"/>
<h3><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.159.1">Hardware Backdoors</span></i></h3>
<p id="c10-para-0071"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.160.1">Another possibility for disrupting or destroying the Bitcoin network is through corrupting hardware that runs bitcoin software to be accessible by outside parties. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.160.2">Nodes that perform mining could, for example, be fitted with undetectable malware that allows outsiders to commandeer the hardware. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.160.3">This equipment could then be deactivated or remotely controlled at a time when a 51% attack is launched.</span></p>
<p id="c10-para-0072"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.161.1">Another example would be through spying technology installed on user computers allowing access to users' bitcoins by accessing their private keys. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.161.2">Such attacks on a mass scale could severely undermine confidence in Bitcoin as an asset and demand for it.</span></p>
<p id="c10-para-0073"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.162.1">Both types of attack are feasible technically, and unlike the previous two kinds of attacks, they do not have to succeed entirely in order to create enough confusion to hurt Bitcoin's reputation and demand. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.162.2">Such an attack on mining equipment is more likely to succeed given that there are only a few manufacturers of mining equipment, and this constitutes one of Bitcoin's most critical points of failure. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.162.3">However, as Bitcoin mining is growing, it is likely to start attracting more hardware makers to manufacture its equipment, which would reduce the disastrous impact on the network from the compromise of one manufacturer's operations.</span></p>
<p id="c10-para-0074"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.163.1">With individual computers, this risk is less systematic to the network because there is a virtually limitless number of manufacturers worldwide that access equipment capable of accessing the Bitcoin network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.163.2">Should any one producer turn out to be compromised, it is just likely to lead to consumers shifting to other producers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.163.3">Further, users can generate the private keys to their addresses on offline computers which they will never connect to the Internet. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.163.4">The extra‐paranoid can even generate their addresses and private keys on offline computers</span><span epub:type="pagebreak" title="246" id="Page_246"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.164.1"> which are then immediately destroyed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.164.2">Coins stored on these virtual private keys will survive any kind of attack on the network.</span></p>
<p id="c10-para-0075"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.165.1">Particularly important defenses against these kinds of attacks are Bitcoiners' anarchist and cypherpunk tendencies, which lead them to believe much more in verification than trust. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.165.2">Bitcoiners are generally far more technically competent than the average population, and they are very meticulous about examining the hardware and software they utilize. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.165.3">The open source peer review culture also acts as a significant defense against these sorts of attacks. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.165.4">Given the distributed nature of the network, it is far more likely that such attacks could cause significant costs and losses to individuals, and perhaps even systemic disruptions of the network, but it will be very hard to cause the network to come to a standstill or to destroy demand for Bitcoin completely. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.165.5">The reality is that the economic incentives of Bitcoin are what make it valuable, not any type of hardware. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.165.6">Any individual piece of equipment is dispensable to the operation of Bitcoin and can be replaced with other equipment. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.165.7">Nonetheless, Bitcoin's survival and robustness will be enhanced if it can diversify its hardware providers to not make any of them systemically important.</span></p></section>
<section><span id="c10-sec-0011"/>
<h3><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.166.1">Internet and Infrastructure Attacks</span></i></h3>
<p id="c10-para-0076"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.167.1">One of the most commonly held misconceptions about Bitcoin is that it can be shut down by shutting down important communications infrastructure on which Bitcoin relies, or shutting down the Internet. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.167.2">The problem with these scenarios is that they misunderstand Bitcoin as if it is a network in the traditional sense of dedicated hardware and infrastructure with critical points that can be attacked and compromised. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.167.3">But Bitcoin is a software protocol; it is an internal process that can be carried out on any one of billions of computer machines that are distributed worldwide. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.167.4">Bitcoin has no single point of failure, no single indispensable hardware structure anywhere in the world on which it relies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.167.5">Any computer that runs Bitcoin's software can connect to the network and carry out operations on it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.167.6">It is in that sense similar to the Internet, in that it is a protocol that allows computers to connect together; it is not the infrastructure which connects them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.167.7">The quantity of data that is required to pass on information about Bitcoin is not very large,</span><span epub:type="pagebreak" title="247" id="Page_247"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.1"> and a tiny fraction of the total amount of Internet traffic. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.2">Bitcoin does not need as extensive an infrastructure as the rest of the Internet, because its blockchain is really only about transmitting 1 megabyte of data every ten minutes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.3">There are countless wired and wireless technologies for the transmission of data worldwide, and any particular user only needs one of these to be working to connect to the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.4">In order to create a world in which no Bitcoin user is able to connect to other users, the kind of damage that would be needed to be done to the world's information, data, and connectivity infrastructure would be absolutely devastating. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.5">The life of modern society depends to a very large degree on connectivity, and many vital services and matters of life and death rely on these communication infrastructures continuing. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.6">To begin trying to turn off all of the Internet infrastructure simultaneously would likely cause significant damage to any society that tries it while likely failing to stem the flow of Bitcoin, as dispersed machines can always connect to one another using protocols and encrypted communications. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.7">There are simply far too many computers and connections spread out all over the world, utilized by far too many people, for any force to be able to make them all stop functioning simultaneously. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.8">The only conceivable scenario where this could happen would be through the sort of apocalyptic scenario after which there would be nobody left to even wonder if Bitcoin is operational or not. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.9">Of all the threats that are often mentioned against Bitcoin, I find this to be the least credible or meaningful.</span></p></section>
<section><span id="c10-sec-0012"/>
<h3><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.169.1">Rise in Cost of Nodes and Drop in Their Numbers</span></i></h3>
<p id="c10-para-0077"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.170.1">Rather than imagining futuristic sci‐fi scenarios involving the destruction of humanity's telecommunication infrastructure in a futile attempt at eradicating a software program, there are far more realistic threats to Bitcoin grounded in the fundamentals of its design. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.170.2">Bitcoin's property as hard money whose supply cannot be tampered with, and as uncensorable digital cash without the possibility for third‐party intervention, is dependent upon the consensus rules of the network remaining very hard to change, especially the money supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.170.3">What achieves this stable status quo, as discussed earlier, is that it is a highly risky and likely negative move for a network member to move out of the current consensus rules if the other members of the</span><span epub:type="pagebreak" title="248" id="Page_248"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.171.1"> network do not also move to the new consensus rules. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.171.2">But what keeps that move highly risky and unlikely is that the number of nodes running the software is large enough that coordination between them is not practical. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.171.3">Should the cost of running a Bitcoin node increase significantly, it would make running a node harder for more and more users, and as a result it would decrease the number of nodes on the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.171.4">A network with a few dozen nodes stops being an effectively decentralized network as it becomes very possible for the few nodes that operate it to collude to alter the rules of the network to their own benefit, or even to sabotage it.</span></p>
<p id="c10-para-0078"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.172.1">This remains in my opinion the most serious technical threat to Bitcoin in the medium and long term. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.172.2">As it stands, the main constraint on individuals being able to run their own nodes is the Internet connection bandwidth. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.172.3">As blocks remain under 1 megabyte, this should be generally manageable. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.172.4">A hard fork that increases the size of the block would cause a rise in the cost of running a node and lead to a reduction in the number of operational nodes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.172.5">And just like with the previous threats, while this is certainly technically possible, it remains unlikely to materialize because the economic incentives of the system militate against it, as evidenced by the widespread rejection of attempts to increase the blocksize so far.</span></p></section>
<section><span id="c10-sec-0013"/>
<h3><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.1">The Breaking of the SHA‐256 Hashing Algorithm</span></i></h3>
<p id="c10-para-0079"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.1">The SHA‐256 hashing function is an integral part of the operation of the Bitcoin system. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.2">Briefly, hashing is a process that takes any stream of data as an input and transforms it into a dataset of fixed size (known as a hash) using a nonreversible mathematical formula. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.3">In other words, it is trivial to use this function to generate a hash for any piece of data, but it is not possible to determine the original string of data from the hash. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.4">With improvements in processing power, it might become possible for computers to reverse‐calculate these hashing functions, which would render all Bitcoin addresses vulnerable to theft.</span></p>
<p id="c10-para-0080"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.175.1">It is not possible to ascertain if and when such a scenario might unfold, but if it does, it would constitute a very serious technical threat to Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.175.2">The technical fix to counter this is to switch to a stronger form of encryption, but the tricky part is to coordinate a hard fork that brings most of the nodes of the network</span><span epub:type="pagebreak" title="249" id="Page_249"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.176.1"> to abandon the old consensus rules for a new set of rules with a new hashing function. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.176.2">All of the problems previously discussed in the difficulty of coordinating a fork apply here, but this time, because the threat is real, and any Bitcoin holder who chooses to stay on the old implementation will be vulnerable to hacking, it is likely that an overwhelming majority of users will take part in a hard fork. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.176.3">The only interesting question that remains is whether this hard fork will be orderly and witness all users migrate to the same chain, or if it will lead to the chain splitting into several branches using different encryption methods. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.176.4">While it is certainly possible that the SHA‐256 encryption may be broken, the economic incentives of network users are to switch from it to a stronger algorithm, and to switch together to one algorithm.</span></p></section>
<section><span id="c10-sec-0014"/>
<h3><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.1">A Return to Sound Money</span></i></h3>
<p id="c10-para-0081"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.178.1">While most discussions of how Bitcoin could fail or get destroyed focus on technical attacks, a far more promising way of attacking Bitcoin is through undermining the economic incentives to its use. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.178.2">To attempt to attack or destroy Bitcoin in any of the ways mentioned earlier is highly unlikely to succeed because it conflicts with the economic incentives that drive the use of Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.178.3">The situation is analogous to trying to ban the wheel or a knife. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.178.4">As long as the technology is useful for people, attempts at banning it will fail as people will continue to find ways of utilizing it, legally or not. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.178.5">The only way that a technology can be stopped is not by banning it, but by inventing a better replacement or by obviating the need for its use. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.178.6">The typewriter could never be banned or legislated out of existence, but the rise of the PC did effectively kill it.</span></p>
<p id="c10-para-0082"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.179.1">The demand for Bitcoin stems from the need of individuals all over the world to carry out transactions that bypass political controls and to have an inflation‐resistant store of value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.179.2">For as long as political authorities impose restrictions and limitations on individuals transferring money, and for as long as government money is easy money whose supply can be easily expanded according to the whims of politicians, demand for Bitcoin will continue to exist, and its diminishing supply growth is likely to lead to its value appreciating over time, thus attracting ever‐larger numbers of people to use it as a store of value.</span></p>
<p id="c10-para-0083"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.180.1">Hypothetically, if the entire</span><span epub:type="pagebreak" title="250" id="Page_250"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.181.1"> world's banking and monetary systems were replaced with those of the gold standard in the late nineteenth century, where individual freedom and hard money were paramount, the demand for Bitcoin would likely subside significantly. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.181.2">It might just be the case that such a move would cause a large enough reduction in demand for Bitcoin that brings its price significantly down, hurting current holders significantly, increasing the volatility of the currency, and setting it back many years. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.181.3">With the increased volatility and the availability of a reliable and relatively stable hard‐money international monetary standard, the incentive for using Bitcoin drops significantly. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.181.4">In a world in which governments' restrictions and inflationary tendencies are disciplined by the gold standard, it might just be the case that gold's first‐mover advantage and relative purchasing power stability would constitute an insurmountable hurdle for Bitcoin to overcome, by depriving Bitcoin of the fast growth in users and thus preventing it from reaching a large enough size with any semblance of stability in price.</span></p>
<p id="c10-para-0084"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.182.1">In practice, however, the possibility of a global return to sound money and liberal government is extremely unlikely as these concepts are largely alien to the vast majority of politicians and voters worldwide, who have been reared for generations to understand government control of money and morality as necessary for the functioning of any society. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.182.2">Further, even if such a political and monetary transformation were possible, Bitcoin's diminishing supply growth rate is likely to continue to make it an attractive speculative bet for many, which would in itself cause it to grow further and acquire a larger monetary role. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.182.3">In my assessment, a global monetary return to gold might be the most significant threat to Bitcoin, yet it is both unlikely to happen and unlikely to destroy Bitcoin completely.</span></p>
<p id="c10-para-0085"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.1">Another possibility for derailing Bitcoin would be through the invention of a new form of sound money that is superior to Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.2">Many seem to think that the other cryptocurrencies that mimic Bitcoin could achieve this, but it is my firm belief that none of the coins that copy Bitcoin's design can compete with Bitcoin on being sound money, for reasons discussed at length in the next section of the chapter, primarily: Bitcoin is the only truly decentralized digital currency which has grown spontaneously as a finely balanced equilibrium between miners, coders, and users, none of whom can control it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.183.3">It was only ever possible to develop one</span><span epub:type="pagebreak" title="251" id="Page_251"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.184.1"> currency based on this design, because once it became obvious that it is workable, any attempt at copying it will have been a top‐down and centrally controlled network which will never escape the control of its creators.</span></p>
<p id="c10-para-0086"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.185.1">So when it comes to Bitcoin's structure and technology, it is highly unlikely that any coin that copies it could replace Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.185.2">A new design and technology for implementing digital cash and hard money might produce such a competitor, although it is not possible to predict the emergence of such a technology before it is created, and a familiarity with the problem of digital cash over the years will make it clear that this is not an invention that would be easy to devise.</span></p>
</section>
</section>
<section><span id="c10-sec-0015"/>
<h2 id="head-2-43"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.186.1">Altcoins</span></h2>
<p id="c10-para-0087"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.187.1">While Bitcoin was the first example of a peer‐to‐peer electronic cash, it was certainly not the last. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.187.2">Once Nakamoto's design was out in the open, and the currency succeeded in gaining value and adopters, many copied it to produce similar currencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.187.3">Namecoin was the first such currency, which used Bitcoin's code and started operation in April 2011. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.187.4">At least 732 digital currencies were created by February 2017, according to </span><a href="http://coinmarketcap.com"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.188.1">coinmarketcap.com</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.189.1">.</span></p>
<p id="c10-para-0088"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.190.1">While it is common to think that these currencies exist in competition with Bitcoin, and that one of them might overtake Bitcoin in the future, in reality they are not in competition with Bitcoin because they can never have the properties that make Bitcoin functional as digital cash and sound money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.190.2">In order for a digital system to function as digital cash, it has to be outside the control of any third party; its operation needs to conform to the will of its user according to the protocol, with no possibility for any third party to stop these payments. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.190.3">After years of watching altcoins get created, it seems impossible that any coin will recreate the adversarial standoff that exists between Bitcoin stakeholders and prevents any party from controlling payments in it.</span></p>
<p id="c10-para-0089"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.191.1">Bitcoin was designed by a pseudonymous programmer whose real identity is still unknown. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.191.2">He posted the design to an obscure mailing list for computer programmers interested in cryptography, and after receiving feedback on it over a few months, he launched the network with the late programmer Hal Finney, who</span><span epub:type="pagebreak" title="252" id="Page_252"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.192.1"> passed away in August 2014. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.192.2">After a few days of transacting with Finney and experimenting with the software, more members began to join the network to transact and mine. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.192.3">Nakamoto disappeared in mid‐2010, citing “moving to new projects” and has most likely never been heard from since.</span><sup><a id="fn-9" href="#fn9"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.193.1">9</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.194.1"> In all likelihood, there are around 1 million bitcoins that are held in an account that is or was controlled by Nakamoto, but these coins have not moved once. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.194.2">Nakamoto did, however, take extreme caution to ensure that he will not be identified, and until this day there is no compelling evidence to identify who the real Nakamoto is. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.194.3">Had he wanted to be identified, he would already have come forward. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.194.4">Had he left any evidence that could lead to the tracing of his identity, it would have likely already been used to do so. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.194.5">All of his writings and communications have been pored over obsessively by investigators and journalists to no avail. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.194.6">It is high time for everyone involved in Bitcoin to stop concerning themselves with the question of the identity of Nakamoto, and accept that it does not matter to the operation of the technology, in the same way that the identity of the inventor of the wheel no longer matters.</span></p>
<p id="c10-para-0090"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.195.1">Because Nakamoto and Finney are no longer with us, Bitcoin has not had any central authority figure or leader who could dictate its direction or exercise influence over the course of its development. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.195.2">Even Gavin Andresen, who was in close contact with Nakamoto, and one of the most identifiable faces of Bitcoin, has failed repeatedly at exercising influence on the direction of Bitcoin's evolution. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.195.3">An email is often quoted in the press, claiming to be the last email ever sent by Nakamoto, which says, “I've moved on to other things. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.195.4">It's in good hands with Gavin and everyone.”</span><sup><a id="fn-10" href="#fn10"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.196.1">10</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.197.1"> Andresen has repeatedly tried to increase the size of Bitcoin's blocks, but all his proposals to do so</span><span epub:type="pagebreak" title="253" id="Page_253"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.198.1"> have failed to gain traction with the operators of the nodes.</span></p>
<p id="c10-para-0091"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.199.1">Bitcoin has continued to grow and thrive in all the metrics mentioned in </span><a href="c08.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.200.1">Chapter 8</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.201.1">, while the authority of any individual or party over it has diminished to insignificance. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.201.2">Bitcoin can be understood as a sovereign piece of code, because there is no authority outside of it that can control its behavior. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.201.3">Only Bitcoin's rules control Bitcoin, and the possibility of changing these rules in any substantive way has become extremely impractical as the status‐quo bias continues to shape the incentives of everyone involved in the project.</span></p>
<p id="c10-para-0092"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.202.1">It is the sovereignty of Bitcoin code, backed by proof‐of‐work, which makes it a genuinely effective solution to the double‐spending problem, and a successful digital cash. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.202.2">And it is this trustlessness which other digital currencies cannot replicate. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.202.3">Facing any digital currency built after Bitcoin is a deep existential crisis: because Bitcoin is already in existence, with more security, processing power and an established user base, anybody looking to use digital cash will naturally prefer it over smaller and less secure alternatives. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.202.4">Because the replication of the code to generate a new coin is almost costless, and the imitation coins proliferate, no single coin is likely to develop any sort of significant growth or momentum unless there is an active team dedicated to nurturing it, growing it, coding it, and securing it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.202.5">Being the first such invention, Bitcoin demonstrating its value as digital cash and hard money was enough to secure growing demand for it, allowing it to succeed when the only person behind it was an anonymous programmer who practically spent no money on promoting it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.202.6">Being fundamentally knock‐offs that are very easy to recreate, all altcoins do not have this luxury of real‐world demand, and must actively build and increase this demand.</span></p>
<p id="c10-para-0093"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.203.1">This is why virtually all altcoins have a team in charge; they began the project, marketed it, designed the marketing material, and plugged press releases into the press as if they were news items, while also having the advantage of mining a large number of coins early before anybody had heard of the coins. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.203.2">These teams are publicly known individuals, and no matter how hard they might try, they cannot demonstrate credibly that they have no control over the direction of the currency, which undermines any claims other currencies might have to being a form of digital cash that cannot be edited or controlled by any third party. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.203.3">In other words, after the Bitcoin genie got </span><span epub:type="pagebreak" title="254" id="Page_254"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.204.1">out of the bottle, anybody trying to build an alternative to Bitcoin will only succeed by investing heavily in the coin, making them effectively in control of it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.204.2">And as long as there is a party with sovereign power over a digital currency, then that currency cannot be understood as a form of digital cash, but rather, a form of intermediated payment—and a very inefficient one at that.</span></p>
<p id="c10-para-0094"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.205.1">This presents a dilemma facing designers of alternative currencies: without active management by a team of developers and marketers, no digital currency will attract any attention or capital in a sea of 1,000+ currencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.205.2">But with active management, development, and marketing by a team, the currency cannot credibly demonstrate that it is not controlled by these individuals. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.205.3">With a group of developers in control of the majority of coins, processing power, and coding expertise, the currency is practically a centralized currency where the interests of the team dictate its development path. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.205.4">There is nothing wrong with a centralized digital currency, and we may well get such competitors in a free market without government restrictions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.205.5">But there is something deeply and fundamentally wrong about a centralized currency that adopts a highly cumbersome and inefficient design whose only advantage is the removal of a single point of failure.</span></p>
<p id="c10-para-0095"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.206.1">This problem is more pronounced for digital currencies that begin with an Initial Coin Offering, which creates a highly visible group of developers communicating publicly with investors, making the entire project effectively a centralized project. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.206.2">The trials and tribulations of Ethereum, the largest coin in terms of market value after Bitcoin, illustrate this point vividly.</span></p>
<p id="c10-para-0096"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.207.1">The Decentralized Autonomous Organization (DAO) was the first implementation of smart contracts on the Ethereum network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.207.2">After more than $150 million was invested in this smart contract, an attacker was able to execute the code in a way that diverted around one‐third of all the DAO's assets to his own account. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.207.3">It would be arguably inaccurate to describe this attack as a theft, because all the depositors had accepted that their money will be controlled by the code and nothing else, and the attacker had done nothing but execute the code as it was accepted by the depositors. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.207.4">In the aftermath of the DAO hack, Ethereum developers created a new version of Ethereum where this inconvenient mistake never occurred, confiscating the attacker's funds and distributing them to his victims. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.207.5">This</span><span epub:type="pagebreak" title="255" id="Page_255"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.208.1"> re‐injection of subjective human management is at odds with the objective of making code into law, and questions the entire rationale of smart contracts.</span></p>
<p id="c10-para-0097"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.209.1">If the second largest network in terms of processing power can have its blockchain record altered when the transactions do not go in a way that suits the interests of the development team, then the notion that any of the altcoins is truly regulated by processing power is not tenable. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.209.2">The concentration of currency holding, processing power, and programming skills in the hands of one group of people who are effectively partners in a venture defeats the entire purpose of employing a blockchain structure.</span></p>
<p id="c10-para-0098"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.210.1">Further, it is extremely difficult to foresee such privately issued currencies rise to the status of a global currency when they have a visible team behind them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.210.2">Should the currencies appreciate significantly, a small team of creators will become extremely rich, and endowed with the power to collect seniorage, a role reserved for nation‐states in the modern world. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.210.3">Central banks and national governments will not take kindly to this undermining of their authority. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.210.4">It would be relatively easy for central banks to get any of the teams behind this currency to destroy it, or alter its operation in a way that prevents it from competing with national currencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.210.5">No single altcoin has demonstrated anything near Bitcoin's impressive resilience to change, which is down to its truly decentralized nature and the strong incentives for everyone to abide by the status quo consensus rules. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.210.6">Bitcoin can only make this claim after growing in the wilds of the internet for nine years without any authority controlling it, and very ably repelling some highly coordinated and well‐funded campaigns to alter it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.210.7">In comparison, altcoins have the unmistakable friendly culture of nice people working together on a team project. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.210.8">While this would be great for a new start‐up, it is anathema to a project that wants to demonstrate credible commitment to a fixed monetary policy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.210.9">Should the teams behind any particular altcoin decide to change its monetary policy, it would be a relatively straightforward thing to achieve. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.210.10">Ethereum, for instance, does not yet have a clear vision of what it wants its monetary policy to be in the future, leaving the matter up to community discussion. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.210.11">While this may work wonders for the community spirit of Ethereum, it is no way to build a global hard money, which, to be fair, Ethereum does not claim to do. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.210.12">Whether it is because they are aware of this point, or to avoid run‐ins with political authority, or as a marketing gimmick, most altcoins</span><span epub:type="pagebreak" title="256" id="Page_256"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.211.1"> do not market themselves as competitors to Bitcoin, but as performing tasks different to Bitcoin.</span></p>
<p id="c10-para-0099"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.212.1">There is nothing about Bitcoin's design that suggests it would be good for any of the multitude of use cases that other coins claim they will be able to do, and no coin other than Bitcoin has delivered any differentiating capabilities or features which Bitcoin does not have. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.212.2">Yet they all have a freely trading currency which is somehow essential for their complex system for performing some online applications.</span></p>
<p id="c10-para-0100"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.213.1">But the notion that new web apps require their own decentralized currency is the desperately naïve hope that somehow unsolving the problem of lack of coincidence of wants could be economically profitable. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.213.2">There is a reason real‐world businesses don't issue their own currency, and that is that nobody wants to hold currency that is only spendable in one business. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.213.3">The point of holding money is holding liquidity which can be spent as easily as possible. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.213.4">Holding forms of money which can only be spent in particular vendors offers very little liquidity and serves no purpose. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.213.5">People will naturally prefer to hold the liquid means of payment, and any business that insists on payment in its own freely‐trading currency is just introducing significantly high costs and risks to its potential customers.</span></p>
<p id="c10-para-0101"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.214.1">Even in businesses which require some form of token operationally, such as amusement parks or casinos, the token is always fixed in value compared to liquid money so customers know exactly what they are getting and can make accurate economic calculations. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.214.2">Should any of these supposedly revolutionary decentralized currencies offer any real‐world valuable application, it is completely inconceivable that it would be paid for with its own freely trading currency.</span></p>
<p id="c10-para-0102"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.215.1">In reality, after examining this space for years, I have yet to identify a single digital currency that offers any product or service that has any market demand. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.215.2">The highly vaunted decentralized applications of the future never seem to arrive, but the tokens that are supposedly essential to their operation continue to proliferate by the hundreds every month. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.215.3">One cannot help but wonder if the only use of these revolutionary currencies is the enriching of their makers.</span></p>
<p id="c10-para-0103"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.216.1">No coin other than Bitcoin can lay a credible claim to being outside the control of anyone else, and as such, the entire point of utilizing the extremely complex structure underpinning Bitcoin is moot. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.216.2">There is nothing original or difficult about</span><span epub:type="pagebreak" title="257" id="Page_257"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.217.1"> copying Bitcoin's design and producing a slightly different copycat, and thousands have done this so far. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.217.2">With time, one can expect more and more of these coins to enter the market, diluting the brand of all the other altcoins. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.217.3">Non‐Bitcoin digital currencies are, in the aggregate, easy money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.217.4">No single altcoin can be considered on its own merits, because they are all indistinguishable in what they perform, which is also what Bitcoin performs, but very distinguishable from Bitcoin in that their supply and design can easily be altered, whereas Bitcoin's monetary policy is for all intents and purposes set in stone.</span></p>
<p id="c10-para-0104"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.218.1">It is an open question if any of these currencies will succeed in offering a market‐demanded service other than the one offered by Bitcoin, but it appears patently clear that they cannot compete with Bitcoin on being trustless digital cash. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.218.2">That they have all chosen to ape Bitcoin's rituals while pretending to be solving something extra does not inspire confidence in them achieving anything more than enriching their makers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.218.3">The thousands of imitations of Nakamoto's design are perhaps the sincerest form of flattery, but their continued failure to ever deliver anything more than what Nakamoto delivered is a testament to how singular his accomplishment is. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.218.4">The only worthwhile additions to Bitcoin's design were done by the competent selfless volunteer coders who contributed long hours to making the Bitcoin code better. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.218.5">Many less competent coders have gotten massively rich by repackaging Nakamoto's design with marketing and pointless buzzwords, but have all failed in adding any functional capabilities to it that have any real‐world demand. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.218.6">The growth of these altcoins cannot be understood outside the context of easy government money looking for easy investment, forming large bubbles in massive malinvestments.</span></p></section>
<section><span id="c10-sec-0016"/>
<h2 id="head-2-44"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.219.1">Blockchain Technology</span><sup><a id="fn-11" href="#fn11"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.220.1">11</span></a></sup></h2>
<p id="c10-para-0105"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.221.1">As a result of Bitcoin's startling rise in value, and the difficulty in understanding its operating procedure and technicalities, there has been a significant amount of confusion surrounding it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.221.2">Perhaps the most persistent and high‐profile confusion is the notion</span><span epub:type="pagebreak" title="258" id="Page_258"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.222.1"> that a mechanism that is part of Bitcoin's operation—putting transactions into blocks which are chained together to form the ledger—can somehow be deployed to solve or improve economic or social problems, or even “revolutionize” them, as is the wont of every newfangled overhyped toy invented these days. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.222.2">“Bitcoin is not important, but the underlying blockchain technology is what holds promise” is a mantra that has been repeated ad nauseam between 2014 and 2017 by banking executives, journalists, and politicians, who all share one thing in common: a lack of understanding of how Bitcoin actually works. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.222.3">(See </span><a id="R_c10-fig-0001" href="#c10-fig-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.223.1">Figure 22</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.224.1">.)</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.225.1"><img alt="Schematic illustration of blockchain decision chart." src="images/c10f001.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c10-fig-0001" id="c10-fig-0001"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.226.1">Figure 22</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.227.1"> Blockchain decision chart.</span></p></figcaption></figure>
