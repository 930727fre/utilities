<p id="c10-para-0106"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.1">The fixation with blockchain technology is a great example of “cargo cult science,” an idea popularized by physicist Richard Feynman. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.2">The story goes that the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.3">military established airplane landing strips to aid in military operations on an island in the South Pacific Ocean during World War II. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.4">The airplanes would usually bring gifts to the local inhabitants of the island, who used to enjoy them immensely. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.5">After the war ended and the airplanes stopped landing on the strip, the locals tried their best to bring the airplanes and their cargo back. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.6">In their desperation, they would mimic the behavior of the long‐gone military airport ground controllers, thinking that if they put a man in a hut with an antenna and light a fire, as the military ground controllers used to do, then the airplanes would come back and bring them the gifts. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.7">Clearly such a strategy could not work, because the procedures of the ground controllers were not creating airplanes out of thin air; they were but one integral part of an elaborate technological process, beginning with the manufacturing of the airplanes and their</span><span epub:type="pagebreak" title="259" id="Page_259"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.229.1"> departure from their bases, which the South Pacific islanders could not comprehend.</span></p>
<p id="c10-para-0107"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.230.1">Like these islanders, the people touting blockchain technology as a process that could generate economic benefits on its own do not understand the larger process of which it is a part. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.230.2">Bitcoin's mechanism for establishing the authenticity and validity of the ledger is extremely complex and complicated, but it serves an explicit purpose: issuing a currency and moving value online without the need for a trusted third party. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.230.3">“Blockchain technology,” to the extent that such a thing exists, is not an efficient or cheap or fast way of transacting online. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.230.4">It is actually immensely inefficient and slow compared to centralized solutions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.230.5">The </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.231.1">only</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.232.1"> advantage that it offers is eliminating the need to trust in third‐party intermediation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.232.2">The only possible uses of this technology are in avenues where removing third‐party intermediation is of such paramount value to end users that it justifies the increased cost and lost efficiency. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.232.3">And the only process for which it actually can succeed in eliminating third‐party intermediation is the process of moving the native token of the network itself, as the code of the blockchain has no integrated control over anything taking place outside it.</span></p>
<p id="c10-para-0108"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.233.1">A comparison will help give a sense of just how inefficient bitcoin is as a method for running transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.233.2">If we strip away the trappings of decentralization, proof‐of‐work verification, mining, and trustlessness, and run a centralized version of Bitcoin, it would essentially consist of an algorithm for generating coins, and a database for coin ownership that processes around 300,000 transactions per day. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.233.3">Such tasks are trivial, and any modern personal computer could perform them reliably. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.233.4">In fact, a regular off‐the‐shelf consumer laptop can be made to process around 14,000 transactions per second, or all of Bitcoin's current daily transaction volume in 20 seconds.</span><sup><a id="fn-12" href="#fn12"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.234.1">12</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.235.1"> To process Bitcoin's entire yearly transaction volume, a personal laptop would need little more than two hours.</span></p>
<p id="c10-para-0109"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.236.1">The problem with running such a currency on a personal laptop, however, is that it requires trust in the owner of the laptop and in the laptop's security and safety from attack. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.236.2">In</span><span epub:type="pagebreak" title="260" id="Page_260"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.237.1"> order to make such a trivial software system run without requiring trust in any single party to not defraud the record of transactions or alter the rate of currency issuance, the only design anyone has found is Bitcoin's decentralized peer‐to‐peer network with proof‐of‐work verification. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.237.2">This is not a trivial software problem, and it took decades of computer programmers attempting different designs before one was found that could demonstrably achieve this. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.237.3">Whereas a good consumer laptop today has a hashrate around 10 megahashes per second, the Bitcoin network collectively processes around 20 exahashes per second, or the equivalent of 2 trillion laptops. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.237.4">In other words, to remove the need for trust, the processing power to run a simple currency and database software needs to be increased roughly by a factor of 2 trillion. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.237.5">It is not the currency and its transactions that require so much processing power; making the entire system trustless does. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.237.6">For any other computing process to be run using blockchain technology, it would need to fulfill two criteria:</span></p>
<p id="c10-para-0110"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.238.1">First, the gains from decentralization need to be compelling enough to justify the extra costs. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.238.2">For any process which will still require some form of trust in a third party to implement any small part of it, the extra costs of decentralization cannot be justified. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.238.3">For implementing contracts dealing with real‐world businesses under legal jurisdictions, there will still be legal oversight relating to the real‐world implementation of these contracts that can override the network consensus, making the extra cost of decentralization pointless. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.238.4">The same applies for decentralizing databases of financial institutions that will remain as trusted third parties in their own operations with one another or with their clients.</span></p>
<p id="c10-para-0111"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.239.1">Second, the initial process itself needs to be simple enough to ensure the ability to run the distributed ledger on many nodes, without the blockchain becoming too heavy to be distributed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.239.2">As the process continues to repeat over time, the size of the blockchain will grow and become more and more unmanageable for distributed nodes to hold a full copy of the blockchain, ensuring that only a few large computers can operate the blockchain and rendering decentralization obsolete. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.239.3">Note here the distinction between nodes that carry the ledger and dedicated miners who solve the proof‐of‐work, which is discussed in </span><a href="c08.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.240.1">Chapter 8</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.241.1">: miners need to expend enormous processing power to commit transactions to the joint ledger, whereas nodes need very little power to keep a copy of the ledger with which to verify the accuracy</span><span epub:type="pagebreak" title="261" id="Page_261"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.242.1"> of miners' transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.242.2">This is why nodes can be run on personal computers, whereas individual miners have the processing power of hundreds of personal computers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.242.3">Should the operation of the ledger itself become too complex, nodes will need to be large servers instead of personal computers, destroying the possibility of decentralization.</span></p>
<p id="c10-para-0112"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.1">The Bitcoin blockchain has placed a 1‐megabyte limit on the size of each block, which has limited the pace at which the blockchain has grown. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.2">That limit allows simple computers to be able to maintain and run a node. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.3">Should the size of each block increase, or should the blockchain be used for more sophisticated processes such as those touted by blockchain enthusiasts, it would become too large to be run on individual computers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.4">Centralizing the network over a few large nodes owned and operated by large institutions only defeats the entire point of decentralization.</span></p>
<p id="c10-para-0113"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.244.1">Trustless digital cash has so far been the only successful implementation for blockchain technology precisely because it is a clean and simple technological process to operate, leading to its ledger growing relatively slowly over time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.244.2">This means that being a member of the Bitcoin network is possible for a residential computer and connection in most of the world. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.244.3">Predictable controlled inflation also requires little processing power, but is a process whose decentralization and trustlessness offers enormous value to end users, as explained in </span><a href="c08.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.245.1">Chapter 8</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.246.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.246.2">All other monetary media today are controlled by parties who can inflate the supply in order to profit from increased demand. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.246.3">This is true for fiat currencies and nonprecious metals, but also for gold, which is held in large quantities by central banks ready to sell it onto the market to prevent it from appreciating too quickly and thus displacing fiat currencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.246.4">For the first time since the abolition of the gold standard, Bitcoin has made sound money easily available to anyone in the world who wants it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.246.5">This highly unlikely combination of lightweight computing load and heavy economic significance is why it has made sense to grow the size of the Bitcoin network's processing power to the largest network in history. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.246.6">It has proven impossible over eight years to find one other use case that is valuable enough to justify being distributed over thousands of node members while also being lightweight enough to allow for that decentralization.</span></p>
<p id="c10-para-0114"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.247.1">The first implication of this analysis is</span><span epub:type="pagebreak" title="262" id="Page_262"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.248.1"> that any change to Bitcoin's protocol that increases the size of the blockchain is highly unlikely to pass, not just for the reasons of immutability mentioned before, but also because it would likely prevent most node operators from managing to run their own nodes, and because they are the ones who decide which software runs, it is safe to assume a significant intransigent minority of node operators will continue to run the current software, holding their current bitcoins, making any attempt to upgrade the Bitcoin software effectively just another worthless altcoin like the hundreds of others that already exist.</span></p>
<p id="c10-para-0115"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.249.1">The second implication is that all the “blockchain technology” applications being touted as revolutionizing banking or database technology are utterly doomed to fail in achieving anything more than fancy demos that will never transfer to the real world, because they will always be a highly inefficient way for the trusted third parties that operate them to conduct their business. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.249.2">It is outside the realm of possibility that a technology designed specifically to eliminate third‐party intermediation could end up serving any useful purpose to the intermediaries it was created to replace.</span></p>
<p id="c10-para-0116"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.250.1">There are many easier and less cumbersome ways of recording transactions, but this is the only method that eliminates the need for a trusted third party. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.250.2">A transaction is committed to the blockchain because many verifiers compete to verify it for profit. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.250.3">Yet not one of them is relied upon or trusted for the transaction to go through. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.250.4">Rather, fraud is immediately detected and reversed by other network members who have strong incentives to ensure the integrity of the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.250.5">In other words, Bitcoin is a system built entirely on cumbersome and expensive verification so it can eliminate the need for any trust or accountability between all parties: it is 100% verification and 0% trust.</span></p>
<p id="c10-para-0117"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.251.1">Contrary to a lot of the hype surrounding Bitcoin, eliminating the need for trust in third parties is not an unquestionably good thing to do in all avenues of business and life. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.251.2">Once one understands the mechanism of Bitcoin's operation, it is clear that there is a trade‐off involved in moving to a system that does not rely on any trusted third parties. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.251.3">The advantages lie in individual sovereignty over the protocol, censorship‐resistance, and immutability of the money supply growth and technical parameters. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.251.4">The disadvantages lie in the need for much larger processing power expenditure to perform the same amount</span><span epub:type="pagebreak" title="263" id="Page_263"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.252.1"> of work. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.252.2">There is no reason, outside of naïve futuristic hype, to believe that this is a trade‐off that is worthwhile for much. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.252.3">It may well be that the only place where this trade‐off is worthwhile is the managing of a global homogeneous supranational sound money, for two important reasons. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.252.4">First, the excessive costs of operating the system can be recouped from slowly capturing parts of the global currency market, which runs at around 80 trillion U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.252.5">dollars in value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.252.6">Second, the nature of sound money, as explained earlier, lies precisely in the fact that no human is able to control it, and hence, a predictable immutable algorithm is uniquely suited for this task. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.252.7">Having thought of this question for years, in no other avenue of business can I find a similar process that is at once so important as to be worth the extra costs for disintermediation, as well as being so transparently simple that removing all human discretion would be a massive advantage.</span></p>
<p id="c10-para-0118"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.253.1">An analogy with the automobile is instructive here. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.253.2">In 1885, when Karl Benz added an internal combustion engine to a carriage to produce the first autonomously powered vehicle, the express purpose of that move was to remove horses from carriages and free people from having to constantly deal with horse excrement. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.253.3">Benz was not trying to make horses faster. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.253.4">Burdening a horse with a heavy metal engine will not make it go faster; it will only slow it down while doing nothing to reduce the amount of excrement it produces. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.253.5">Similarly, as </span><a href="c08.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.254.1">Chapter 8</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.255.1"> explained, the colossal processing power needed to make the Bitcoin network operate eliminates the need for a trusted third party to process payments or determine the supply of money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.255.2">If the third party remains, then all of that processing power is a pointless waste of electricity.</span></p>
<p id="c10-para-0119"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.256.1">Only time will tell whether this model for Bitcoin will continue to grow in popularity and adoption. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.256.2">It is possible that Bitcoin will grow to displace many financial intermediaries. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.256.3">It is also possible that bitcoin will stagnate or even fail and disappear. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.256.4">What cannot happen is Bitcoin's blockchain benefiting the intermediation it was specifically designed to replace.</span></p>
<p id="c10-para-0120"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.257.1">For any trusted third party carrying out payments, trading, or recordkeeping, the blockchain is an extremely costly and inefficient technology to utilize. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.257.2">A non‐Bitcoin blockchain combines the worst of both worlds: the cumbersome structure of the blockchain with the cost and security risk of trusted third parties. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.257.3">It is no wonder that eight years after its invention, blockchain technology</span><span epub:type="pagebreak" title="264" id="Page_264"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.258.1"> has not yet managed to break through in a successful, ready‐for‐market commercial application other than the one for which it was specifically designed: Bitcoin.</span></p>
<p id="c10-para-0121"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.259.1">Instead, an abundance of hype, conferences, and high‐profile discussions in media, government, academia, industry, and the World Economic Forum on the potential of blockchain technology has emerged. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.259.2">Many millions of dollars have been invested in venture capital, research, and marketing by governments and institutions that are seduced by the hype, without any practical result.</span></p>
<p id="c10-para-0122"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.260.1">Blockchain consultants have built prototypes for stock trading, asset registry, voting, and payment clearance. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.260.2">But none of them have been commercially deployed because they are more expensive than simpler methods relying on established database and software stacks, as the government of Vermont recently concluded.</span><sup><a id="fn-13" href="#fn13"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.261.1">13</span></a></sup></p>
<p id="c10-para-0123"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.262.1">Meanwhile, banks don't have a great track record in applying earlier technological advances for their own use. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.262.2">While JPMorgan Chase's CEO Jamie Dimon was touting blockchain technology in Davos in January 2016, his bank's Open Financial Exchange interfaces—a technology from 1997 to provide aggregators a central database of customer information—had been down for two months.</span></p>
<p id="c10-para-0124"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.263.1">In contrast, the Bitcoin network was born from the blockchain design two months after Nakamoto presented the technology. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.263.2">To this day, it has been operating uninterrupted and growing to more than $150 billion worth of bitcoins. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.263.3">The blockchain was the solution to the electronic cash problem. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.263.4">Because it worked, it grew quickly while Nakamoto worked anonymously and only communicated curtly via email for about two years. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.263.5">It did not need investment, venture capital, conferences, or advertisement.</span></p>
<p id="c10-para-0125"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.264.1">As will become apparent from this exposition, the notion that a “blockchain technology” exists and can be deployed to solve any specific problems is highly dubious. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.264.2">It is far more accurate to understand the blockchain structure as an integral part of the operation of Bitcoin and its testnets and copycats. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.264.3">Nevertheless, the term blockchain technology is used for simplicity in elucidation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.264.4">The next section of this chapter examines the most commonly</span><span epub:type="pagebreak" title="265" id="Page_265"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.265.1"> touted use‐cases for blockchain technology, while the section after it identifies the main impediments to its application to these problems.</span></p>
<section><span id="c10-sec-0017"/>
<h3><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.266.1">Potential Applications of Blockchain Technology</span></i></h3>
<p id="c10-para-0126"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.267.1">An overview of startups and research projects related to blockchain technology concludes that the potential applications of blockchains can be divided into three main fields:</span></p>
<section><span id="c10-sec-0018"/>
<h4><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.268.1">Digital Payments</span></h4>
<p id="c10-para-0127"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.269.1">Current commercial mechanisms for payment clearance rely on centralized ledgers to record all transactions and maintain account balances. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.269.2">In essence, the transaction is transmitted once from the transacting parties to the intermediary, checked for validity, and accordingly both accounts are adjusted. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.269.3">In a blockchain, the transaction is transmitted to all network nodes, which involves many more transmissions and more processing power and time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.269.4">The transaction also becomes part of the blockchain, copied onto every member computer. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.269.5">This is slower and more expensive than centralized clearance, and helps explain why Visa and MasterCard clear 2,000 transactions per second while Bitcoin can at best clear four. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.269.6">Bitcoin has a blockchain not because it allows for faster and cheaper transactions, but because it removes the need to trust in third‐party intermediation: transactions are cleared because nodes compete to verify them, yet no node needs to be trusted. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.269.7">It is unworkable for third‐party intermediaries to imagine they could improve their performance by employing a technology that sacrifices efficiency and speed precisely to remove third‐party intermediaries. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.269.8">For any currency controlled by a central party, it will always be more efficient to record transactions centrally. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.269.9">What can be clearly seen is that blockchain payment applications will have to be with the blockchain's own decentralized currency, and not with centrally controlled currencies.</span></p></section>
<section><span id="c10-sec-0019"/>
<h4><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.270.1">Contracts</span></h4>
<p id="c10-para-0128"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.271.1">Currently, contracts are drafted by lawyers, judged by courts, and enforced by the police. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.271.2">Smart contract cryptographic systems such as Ethereum encode contracts into a blockchain to make them self‐executing, with no possibility for</span><span epub:type="pagebreak" title="266" id="Page_266"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.272.1"> appeal or reversal and beyond the reach of courts and police. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.272.2">“Code is law” is a motto used by smart contract programmers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.272.3">The problem with this concept is that the language lawyers use to draft contracts is understood by far more people than the code language used by smart contract drafters. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.272.4">There are probably only a few hundred people worldwide with the technical expertise to fully understand the implications of a smart contract, and even they could miss glaring software bugs. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.272.5">Even as more people become proficient in the programming languages necessary to operate these contracts, the few people who are most proficient at it will by definition continue to have an advantage over the rest. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.272.6">Code competence will always offer a strategic advantage to the most proficient over everyone else.</span></p>
<p id="c10-para-0129"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.273.1">This all became apparent with the first implementation of smart contracts on the Ethereum network, the Decentralized Autonomous Organization (DAO). </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.273.2">After more than $150 million was invested in this smart contract, an attacker was able to execute the code in a way that diverted around a third of all the DAO's assets to his own account. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.273.3">It would be arguably inaccurate to describe this attack as a theft, because all the depositors had accepted that their money would be controlled by the code and nothing else, and the attacker had done nothing but execute the code as it was accepted by the depositors. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.273.4">In the aftermath of the DAO hack, Ethereum developers created a new version of Ethereum where this inconvenient mistake never occurred. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.273.5">This re‐injection of subjective human management is at odds with the objective of making code into law, and questions the entire rationale of smart contracts.</span></p>
<p id="c10-para-0130"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.274.1">Ethereum is the second largest blockchain after Bitcoin in terms of its processing power, and while the Bitcoin blockchain cannot effectively be rolled back, that Ethereum can be rolled back means that all blockchains smaller than Bitcoin's are effectively centralized databases under the control of their operators. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.274.2">It turns out code is not really law, because the operators of these contracts can override what the contract executes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.274.3">Smart contracts have not replaced courts with code, but they have replaced courts with software developers with little experience, knowledge, or accountability in arbitrating. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.274.4">It remains to be seen whether courts and lawyers will remain uninvolved as the ramifications of such forks continue to be explored.</span></p>
<p id="c10-para-0131"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.275.1">The DAO was the first and so far</span><span epub:type="pagebreak" title="267" id="Page_267"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.276.1"> only sophisticated application of a smart contract on a blockchain, and the experience suggests wider implementation is still a long way off, if it ever were to occur. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.276.2">All other applications currently only exist in prototype. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.276.3">Perhaps in a hypothetical future where code literacy is far more common and code more predictable and reliable, such contracts might become more commonplace. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.276.4">But if operating such contracts only adds processing power requirements while still leaving them subject to editing, forking, and overruling by the blockchain's engineers, then the entire exercise serves no purpose but the generation of buzzwords and publicity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.276.5">A far more likely future for smart contracts is that they will exist over secured centralized computers operated by trusted third parties with the ability to override them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.276.6">This formalizes the reality of blockchain smart contracts as editable while reducing the processing power requirement and reducing the attack vectors possible to compromise this.</span></p>
<p id="c10-para-0132"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.277.1">For actual operational blockchains, demand will likely only be found for simple contracts whose code can be easily verified and understood. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.277.2">The only rationale for employing such contracts on a blockchain rather than a centralized computer system would be for the contracts to utilize the blockchain's native currency in some form, as all other contracts are better enforced and supervised without the extra burden of a blockchain distributed system. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.277.3">The only existing meaningful blockchain contract applications are for simple time‐programmed payments and multi‐signature wallets, all of which are performed with the currency of the blockchain itself, mostly on the Bitcoin network.</span></p></section>
<section><span id="c10-sec-0020"/>
<h4><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.278.1">Database and Record Management</span></h4>
<p id="c10-para-0133"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.279.1">Blockchain is a reliable and tamper‐proof database and asset register, but only for the blockchain's native currency and only if the currency is valuable enough for the network to have strong enough processing power to resist attack. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.279.2">For any other asset, physical or digital, the blockchain is only as reliable as those responsible for establishing the link between the asset and what refers to it on the blockchain. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.279.3">There are no efficiency or transparency gains from using a permissioned blockchain here, as the blockchain is only as reliable as the party that grants permission to write to it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.279.4">Introducing blockchain to that party's recordkeeping is only going to make it slower while adding no security or immutability, because there is no proof‐of‐work. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.279.5">Trust in third‐party</span><span epub:type="pagebreak" title="268" id="Page_268"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.280.1"> intermediaries must remain while the processing power and time required for running the database increases. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.280.2">A blockchain secured with a token could be used as a notary service, where contracts or documents are hashed onto a block of transactions, allowing any party to access the contract and be sure that the version displayed is the one that was hashed at the time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.280.3">Such a service will provide a market for scarce block space, but is unworkable with any blockchain without a currency.</span></p>
</section>
</section>
<section><span id="c10-sec-0021"/>
<h3><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.281.1">The Economic Drawbacks of Blockchain Technology</span></i></h3>
<p id="c10-para-0134"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.282.1">From examining the previous three potential applications of blockchain technology, five main obstacles to wider adoption are identified.</span></p>
<section><span id="c10-sec-0022"/>
<h4><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.283.1">1. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.283.2">Redundancy</span></h4>
<p id="c10-para-0135"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.284.1">Having every transaction recorded with every member of the network is a very costly redundancy whose only purpose is to remove intermediation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.284.2">For any intermediary, whether financial or legal, there is no sense in adding this redundancy while remaining an intermediary. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.284.3">There is no good reason for a bank to want to share a record of all its transactions with all banks, nor is there a reason for a bank to want to expend significant resources on electricity and processing power to record the transactions of other financial institutions with one another. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.284.4">This redundancy offers increased costs for no conceivable benefit.</span></p></section>
<section><span id="c10-sec-0023"/>
<h4><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.285.1">2. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.285.2">Scaling</span></h4>
<p id="c10-para-0136"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.286.1">A distributed network where all nodes record all transactions will have its common transaction ledger grow exponentially faster than the number of network members. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.286.2">The storage and computational burden on members of a distributed network will be far larger than a centralized network of the same size. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.286.3">Blockchains will always face this barrier to effective scaling, and this explains why as Bitcoin developers search for solutions for scaling, they are moving away from the pure decentralized blockchain model toward having payments cleared on second layers, such as the Lightning Network, or off the blockchain with intermediaries. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.286.4">There is a clear trade‐off between scale and decentralization. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.286.5">Should a blockchain be made to accommodate larger volumes of transactions, the blocks need to be made larger, which would raise the cost</span><span epub:type="pagebreak" title="269" id="Page_269"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.287.1"> of joining the network and result in fewer nodes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.287.2">The network will tend toward centralization as a result. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.287.3">The most cost‐effective way to have a large volume of transactions is centralization in one node.</span></p></section>
<section><span id="c10-sec-0024"/>
<h4><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.288.1">3. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.288.2">Regulatory Compliance</span></h4>
<p id="c10-para-0137"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.289.1">Blockchains with their own currency, such as Bitcoin, exist orthogonally to the law; there is virtually nothing that any government authority can do to affect or alter their operation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.289.2">The Federal Reserve chair has even said as much: it has no authority to regulate Bitcoin at all.</span><sup><a id="fn-14" href="#fn14"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.290.1">14</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.291.1"> Roughly every ten minutes on the Bitcoin network, a new block is released containing all the valid transactions made in these ten minutes, and nothing else. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.291.2">Transactions will clear if valid, and will not clear if not valid, and there is nothing that regulators can do to overturn the consensus of the network processing power. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.291.3">Applying blockchain technology in heavily regulated industries such as law or finance, with currencies other than Bitcoin, will result in regulatory problems and legal complications. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.291.4">Regulations were designed for an infrastructure much different from that of blockchain and the rules cannot be easily tailored to fit blockchain operation, with the radical openness of having all records distributed to all network members. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.291.5">Further, a blockchain operates online across jurisdictions with different regulatory rules, so compliance with all rules is difficult to ensure.</span></p></section>
<section><span id="c10-sec-0025"/>
<h4><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.292.1">4. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.292.2">Irreversibility</span></h4>
<p id="c10-para-0138"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.293.1">With payments, contracts, or databases operated by intermediaries, human or software errors can be easily reversed by appealing to the intermediary. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.293.2">In a blockchain, things are infinitely more complicated. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.293.3">Once a block has been confirmed and new blocks are being attached to it, it is only possible to reverse any of its transactions by marshalling 51% of the processing power of the network to roll back the network, where all these nodes agree to move simultaneously to an amended blockchain, and hope that the other 49% will not want to start their own network and will join the new one. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.293.4">The larger the</span><span epub:type="pagebreak" title="270" id="Page_270"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.294.1"> network, the harder it is to reverse any mistaken transaction. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.294.2">Blockchain technology, after all, is meant to replicate cash transactions online, which includes the irreversibility of cash transactions and none of the benefits of custodial intermediation in redress and revision. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.294.3">Human and software errors constantly occur in banking, and employing a blockchain structure will only result in these errors being far more costly to fix. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.294.4">The DAO incident revealed just how expensive and protracted such a reversal would be on a blockchain, requiring weeks of coding and public relations campaigns to get network members to agree to adopt the new software. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.294.5">And even after all that, the old chain continued to exist and took away a significant amount of the value and hashing power of the old network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.294.6">This loss created a situation where two records of the previous transactions exist, one in which the DAO attack succeeded, and another in which it did not.</span></p>
<p id="c10-para-0139"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.295.1">If the second largest network in terms of processing power can have its blockchain record altered when the transactions do not go in a way that suits the interests of the development team, then the notion that any other blockchain is truly regulated by processing power is not tenable. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.295.2">The concentration of currency holding, processing power, and programming skills in the hands of one group of people who are de facto colleagues in a private venture defeats the purpose of implementing this elaborate structure.</span></p>
<p id="c10-para-0140"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.296.1">Such a reversal is extremely impractical and unlikely in Bitcoin, for the reasons discussed in </span><a href="c09.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.297.1">Chapter 9</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.298.1">, mainly that every party in the Bitcoin network is only capable of joining the network by agreeing to existing consensus rules. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.298.2">The adversarial interests of different members of the ecosystem have always meant that the network only grew through attracting the voluntary contributions of people who are willing to accept the consensus rules. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.298.3">In Bitcoin, the consensus rules are constant and the users can choose to come and go. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.298.4">For every other blockchain project which was established by imitating Bitcoin's design, there was always a single group responsible for setting the rules of the system, and thus having the ability to change them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.298.5">Whereas Bitcoin grew around the set of established consensus rules through human action, all other projects grew by active human design and management. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.298.6">Bitcoin has earned its reputation as being immutable after years of resisting alteration. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.298.7">No other blockchain project can make such a claim.</span></p>
<p id="c10-para-0141"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.299.1">A blockchain that is alterable is a</span><span epub:type="pagebreak" title="271" id="Page_271"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.300.1"> functionally pointless exercise in engineering sophistry: it uses a complex and expensive method for clearance to remove intermediaries and establish immutability, but then grants an intermediary the ability to overturn that immutability. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.300.2">Current best practice in these fields contains reversibility and supervision by legal and regulatory authorities, but employs cheaper, faster, and more efficient methods.</span></p></section>
<section><span id="c10-sec-0026"/>
<h4><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.301.1">5. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.301.2">Security</span></h4>
<p id="c10-para-0142"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.302.1">The security of a blockchain database is entirely reliant on the expenditure of processing power on verification of transactions and proof‐of‐work. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.302.2">Blockchain technology can best be understood as the conversion of electric power to verifiable undisputed records of ownership and transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.302.3">For this system to be secure, the verifiers who expend the processing power have to be compensated in the currency of the payment system itself, to align their incentive with the health and longevity of the network. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.302.4">Should payment for the processing power be made in any other currency, then the blockchain is essentially a private record maintained by whoever pays for the processing power. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.302.5">The security of the system rests on the security of the central party funding the miners, but it is compromised by operating on a shared ledger, which opens up many possibilities for security breaches to take place. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.302.6">An open decentralized system built on verification by processing power is more secure the more open the system and the larger the number of network members expending processing power on verification. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.302.7">A centralized system reliant on a single point of failure is less secure with a larger number of network members able to write to the blockchain as each added network member is a potential security threat.</span></p>
</section>
</section>
<section><span id="c10-sec-0027"/>
<h3><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.303.1">Blockchain Technology as a Mechanism for Producing Electronic Cash</span></i></h3>
<p id="c10-para-0143"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.304.1">The only commercially successful application of blockchain technology so far is electronic cash, and in particular, Bitcoin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.304.2">The most common potential applications touted for blockchain technology—payments, contracts, and asset registry—are only workable to the extent that they run using the decentralized currency of the blockchain. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.304.3">All blockchains without currencies have not moved</span><span epub:type="pagebreak" title="272" id="Page_272"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.305.1"> from the prototype stage to commercial implementation because they cannot compete with current best practice in their markets. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.305.2">Bitcoin's design has been freely available online for nine years, and developers can copy and improve on it to introduce commercial products, but no such products have appeared.</span></p>
<p id="c10-para-0144"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.306.1">The market test shows that the redundancies of transaction recording and proof‐of‐work can only be justified for the purpose of producing electronic cash and a payment network without third‐party intermediation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.306.2">Electronic cash ownership and transactions can be communicated in very small quantities of data. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.306.3">Other economic cases which need more data requirements, such as mass payments and contracts, become unworkably cumbersome in the blockchain model. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.306.4">For any applications which involve intermediaries, the blockchain will offer an uncompetitive solution. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.306.5">There cannot be wide adoption of blockchain technology in industries reliant on trust in intermediaries, because the mere presence of intermediaries makes all the costs associated with running a blockchain superfluous. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.306.6">Any application of blockchain technology will only make commercial sense if its operation is reliant on the use of electronic cash, and only if electronic cash's disintermediation provides economic benefits outweighing the use of regular currencies and payment channels.</span></p>
<p id="c10-para-0145"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.307.1">Good engineering begins with a clear problem and attempts to find the optimal solution for it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.307.2">An optimal solution not only solves the problem, but by definition does not contain within it any irrelevant or superfluous excess. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.307.3">Bitcoin's creator was motivated by creating a “peer‐to‐peer electronic cash”, and he built a design for that end. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.307.4">There is no reason, except for ignorance of its mechanics, to expect that it would be suited for other functions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.307.5">After nine years and millions of users, it is safe to say his design has succeeded in producing digital cash, and, unsurprisingly, nothing else. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.307.6">This electronic cash can have commercial and digital applications, but it is not meaningful to discuss blockchain technology as a technological innovation in its own right with applications in various fields. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.307.7">Blockchain is better understood as an integral cog in the machine that creates peer‐to‐peer electronic cash with predictable inflation.</span></p>
</section>
</section></section>
<section class="noteSet" epub:type="rearnotes">
<h2 id="notes"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.308.1">Notes</span></h2>
<section class="notesList">
<aside class="noteEntry" epub:type="rearnote"><a id="fn1" href="#fn-1"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.309.1">1</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.310.1"> The question of whether Bitcoin wastes electricity is at its heart a misunderstanding of the fundamentally subjective nature of value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.310.2">Electricity is generated worldwide in large quantities to satisfy the needs of consumers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.310.3">The only judgment about whether this electricity has gone to waste or not lies with the consumer who pays for it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.310.4">People who are willing to pay the cost of the operation of the Bitcoin network for their transactions are effectively financing this electricity consumption, which means the electricity is being produced to satisfy consumer needs and has not been wasted. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.310.5">Functionally speaking, PoW is the only method humans have invented for creating digital hard money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.310.6">If people find that worth paying for, the electricity has not been wasted.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn2" href="#fn-2"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.311.1">2</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.312.1"> Adam Ferguson, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.313.1">An Essay on the History of Civil Society</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.314.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.314.2">(London: T. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.314.3">Cadell, 1782).</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn3" href="#fn-3"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.315.1">3</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.316.1"> After the first halving of coin rewards in 2012, some miners attempted to continue to mine blocks with 50 coin rewards, but the attempt was thwarted quickly as nodes rejected the blocks mined by these miners, forcing them to switch back to the original inflation schedule.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn4" href="#fn-4"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.317.1">4</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.318.1"> A Schelling point is a strategy which individuals will use in the absence of communication with others because the point appears natural, and because they expect others to also choose this strategy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.318.2">Given that there is no formal way of even assessing how many Bitcoin nodes there are, the Schelling point for each node member is stick to the existing set of consensus rules and avoid defecting to a new set.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn5" href="#fn-5"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.319.1">5</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.320.1"> Visa, Inc. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.320.2">at a glance. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.320.3">Available at </span><a href="https://usa.visa.com/dam/VCOM/download/corporate/media/visa-fact-sheet-Jun2015.pdf"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.321.1">https://usa.visa.com/dam/VCOM/download/corporate/media/visa‐fact‐sheet‐Jun2015.pdf</span></a></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn6" href="#fn-6"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.322.1">6</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.323.1"> Tony Kontzer, “Inside Visa's Data Center,” </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.324.1">Network Computing</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.325.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.325.2">Available at </span><a href="http://www.networkcomputing.com/networking/inside-visas-data-center/1599285558"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.326.1">http://www.networkcomputing.com/networking/inside‐visas‐data‐center/1599285558</span></a></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn7" href="#fn-7"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.327.1">7</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.328.1"> Stein, Mara Lemos. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.328.2">“The Morning Risk Report: Terrorism Financing Via Bitcoin May Be Exaggerated.” </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.329.1">Wall Street Journal</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.330.1">, 2017.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn8" href="#fn-8"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.331.1">8</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.332.1"> J. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.332.2">W. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.332.3">Weatherman has started an open source project to assess threats to the Bitcoin network, which can be found on </span><a href="http://www.BTCthreats.com"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.333.1">BTCthreats.com</span></a></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn9" href="#fn-9"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.334.1">9</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.335.1"> Two further communications were possibly made by Nakamoto since then. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.335.2">One was to deny that his real identity was that of a Japanese‐American engineer with the real name Dorian Prentice Satoshi Nakamoto, who was identified by </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.336.1">Newsweek</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.337.1"> magazine as the real Nakamoto based on no more evidence than a coincidence of names and a knowledge of computers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.337.2">The other was to offer an opinion on the way the debate for scaling Bitcoin had been proceeding. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.337.3">It is not clear whether these posts were by Nakamoto himself or whether someone had compromised his account, particularly as it is a known fact that the email account which he had used to communicate was in fact compromised.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn10" href="#fn-10"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.338.1">10</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.339.1"> The author is unable to establish the veracity of this email, but it is telling enough that the email is widely quoted, to the point that the </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.340.1">MIT Technology Review</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.341.1"> ran a long feature piece on Andresen entitled “The Man Who Really Built Bitcoin,” claiming Andresen was more important to Bitcoin's development than even Nakamoto.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn11" href="#fn-11"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.342.1">11</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.343.1"> This section draws heavily on my paper: “Blockchain Technology: What Is It Good For?” </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.343.2">published in the </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.344.1">Banking and Finance Law Review</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.345.1">, Issue 1, Volume 33.3, 2018.</span></aside>
