<section epub:type="chapter">
<header>
<h1><span epub:type="pagebreak" title="41" id="Page_41"/><a id="c04"/><span class="chapterNumber"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.1.1">Chapter 4</span></span><br/><span class="chapterTitle"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.2.1">Government Money</span></span></h1>
</header>
<section><span id="c04-sec-0001"/>
<p id="c04-para-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.1">World War I saw the end of the era of monetary media being the choice decided by the free market, and the beginning of the era of government money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.2">While gold continues to underpin the global monetary system to this day, government edicts, decisions, and monetary policy shape the monetary reality of the world more than any aspect of individual choice.</span></p>
<p id="c04-para-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.1">The common name for government money is </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.5.1">fiat money</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.1">, from the Latin word for decree, order, or authorization. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.2">Two important facts must be understood about government money from the outset. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.3">First, there is a very large difference between government money redeemable in gold, and irredeemable government money, even if both are run by the government. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.4">Under a gold standard, money is gold, and government just assumes a responsibility of minting standard units of the metal or printing paper backed by the gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.5">The government has no control over the supply of gold in the economy, and people are able to redeem their paper in physical gold at any time, and use other shapes and forms of gold, such as bullion bars and foreign coins, in their dealings with one another. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.6">With irredeemable government</span><span epub:type="pagebreak" title="42" id="Page_42"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.7.1"> money, on the other hand, the government's debt and/or paper is used as money, and the government is able to increase its supply as it sees fit. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.7.2">Should anybody use other forms of money for exchange, or should they attempt to create more of the government's money, they run the risk of punishment.</span></p>
<p id="c04-para-0003"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.1">The second and often overlooked fact, is that, contrary to what the name might imply, no fiat money has come into circulation solely through government fiat; they were all originally redeemable in gold or silver, or currencies that were redeemable in gold or silver. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.2">Only through redeemability into salable forms of money did government paper money gain its salability. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.3">Government may issue decrees mandating people use their paper for payments, but no government has imposed this salability on papers without these papers having first been redeemable in gold and silver. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.4">Until this day, all government central banks maintain reserves to back up the value of their national currency. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.5">The majority of countries maintain some gold in their reserves, and those countries which do not have gold reserves maintain reserves in the form of other countries' fiat currencies, which are in turn backed by gold reserves. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.6">No pure fiat currency exists in circulation without any form of backing. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.7">Contrary to the most egregiously erroneous and central tenet of the state theory of money, it was not government that decreed gold as money; rather, it is only by holding gold that governments could get their money to be accepted at all.</span></p>
<p id="c04-para-0004"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.1">The oldest recorded example of fiat money was </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.1">jiaozi</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.11.1">, a paper currency issued by the Song dynasty in China in the tenth century. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.11.2">Initially, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.1">jiaozi</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.1"> was a receipt for gold or silver, but then government controlled its issuance and suspended redeemability, increasing the amount of currency printed until it collapsed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.2">The Yuan dynasty also issued fiat currency in 1260, named </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.14.1">chao</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.15.1">, and exceeded the supply far beyond the metal backing, with predictably disastrous consequences. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.15.2">As the value of the money collapsed, the people fell into abject poverty, with many peasants resorting to selling their children into debt slavery.</span></p>
<p id="c04-para-0005"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.16.1">Government money, then, is similar to primitive forms of money discussed in </span><a href="c02.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.17.1">Chapter 2</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.1">, and commodities other than gold, in that it is liable to having its supply increased quickly compared to its stock, leading to a quick loss of salability, destruction of purchasing power, and impoverishment of its holders. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.2">In this respect it differs from gold, whose supply cannot be increased due to the</span><span epub:type="pagebreak" title="43" id="Page_43"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.19.1"> fundamental chemical properties of the metal discussed above. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.19.2">That the government demands payment in its money for its taxes may guarantee a longer life for that money, but only if the government is able to prevent the quick expansion of the supply can it protect its value from depreciating quickly. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.19.3">When comparing different national currencies, we find that the major and most widely used national currencies have a lower annual increase in their supply than the less salable minor currencies.</span></p></section>
<section><span id="c04-sec-0002"/>
<h2 id="head-2-9"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.1">Monetary Nationalism and the End of the Free World</span></h2>
<p id="c04-para-0006"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.1">The many enemies of sound money whom Mises named in the quote referenced at the end of the last chapter were to have their victory over the gold standard with the beginning of a small war in Central Europe in 1914, which snowballed into the first global war in human history. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.2">Certainly, when the war started nobody had envisioned it lasting as long, and producing as many casualties, as it did. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.3">British newspapers, for example, heralded it as the August Bank Holiday War, expecting it to be a simple triumphant summer excursion for their troops. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.4">There was a sense that this would be a limited conflict. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.5">And, after decades of relative peace across Europe, a new generation of Europeans had not grown to appreciate the likely consequences of launching war. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.6">Today, historians still fail to offer a convincing strategic or geopolitical explanation for why a conflict between the Austro‐Hungarian Empire and Serbian separatists was to trigger a global war that claimed the lives of millions and drastically reshaped most of the world's borders.</span></p>
<p id="c04-para-0007"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.1">In retrospect, the major difference between World War I and the previous limited wars was neither geopolitical nor strategic, but rather, it was monetary. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.2">When governments were on a gold standard, they had direct control of large vaults of gold while their people were dealing with paper receipts of this gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.3">The ease with which a government could issue more paper currency was too tempting in the heat of the conflict, and far easier than demanding taxation from the citizens. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.4">Within a few weeks of the war starting, all major belligerents had suspended gold convertibility, effectively going off the gold standard and putting their population on a fiat standard, wherein</span><span epub:type="pagebreak" title="44" id="Page_44"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.1"> the money they used was government‐issued paper that was not redeemable for gold.</span></p>
<p id="c04-para-0008"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.1">With the simple suspension of gold redeemability, governments' war efforts were no longer limited to the money that they had in their own treasuries, but extended virtually to the entire wealth of the population. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.2">For as long as the government could print more money and have that money accepted by its citizens and foreigners, it could keep financing the war. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.3">Previously, under a monetary system where gold as money was in the hands of the people, government only had its own treasuries to sustain its war effort, along with any taxation or bond issues to finance the war. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.4">This made conflict limited, and lay at the heart of the relatively long periods of peace experienced around the world before the twentieth century.</span></p>
<p id="c04-para-0009"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.1">Had European nations remained on the gold standard, or had the people of Europe held their own gold in their own hands, forcing government to resort to taxation instead of inflation, history might have been different. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.2">It is likely that World War I would have been settled militarily within a few months of conflict, as one of the allied factions started running out of financing and faced difficulties in extracting wealth from a population that was not willing to part with its wealth to defend their regime's survival. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.3">But with the suspension of the gold standard, running out of financing was not enough to end the war; a sovereign had to run out of its people's accumulated wealth expropriated through inflation.</span></p>
<p id="c04-para-0010"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.1">European countries devaluing their currency allowed the bloody stalemate to continue for four years, with no resolution or advancement. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.2">The senselessness of it all was not lost on the populations of these countries, and the soldiers on the front line risking their lives for no apparent reason but the unbounded vanity and ambition of monarchs who were usually related and intermarried. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.3">In the most vivid personification of the absolute senselessness of this war, on Christmas Eve 1914, French, English, and German soldiers stopped following orders to fight, laid down their arms, and crossed the battle lines to mingle and socialize with one another. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.4">Many of the German soldiers had worked in England and could speak English, and most soldiers had a fondness for football, and so many impromptu games were organized between the teams.</span><sup><a id="fn-1" href="#fn1"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.27.1">1</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.28.1"> The astounding fact exposed by this truce</span><span epub:type="pagebreak" title="45" id="Page_45"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.1"> is that these soldiers had nothing against each other, had nothing to gain from fighting this war, and could see no reason to continue it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.2">A far better outlet for their nations' rivalry would be in football, a universally popular game where tribal and national affiliations can be played out peacefully.</span></p>
<p id="c04-para-0011"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.1">The war was to continue for four more years with barely any progress, until the United States was to intervene in 1917 and swing the war in favor of one party at the expense of the other by bringing in a large amount of resources with which their enemies could no longer keep up. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.2">While all governments were funding their war machines with inflation, Germany and the Austro‐Hungarian Empire began to witness serious decline in the value of their currency in 1918, making their defeat inevitable. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.3">Comparing the belligerents' currencies' exchange rates to the Swiss Franc, which was still on the gold standard at the time, provides a useful measure of the devaluation each currency experienced, as is shown in </span><a id="R_c04-fig-0001" href="#c04-fig-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.31.1">Figure 5</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.1">.</span><sup><a id="fn-2" href="#fn2"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.1">2</span></a></sup></p>

<figcaption>

<p id="c04-para-0012"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.1">After the dust settled, the currencies of all major European powers had declined in real value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.2">The losing powers, Germany and Austria, had their average currency value in November 1918 drop to 51% and 31% of their value in 1913. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.3">Italy's currency witnessed a drop to 77% of its original value while France's dropped only to 91%, the U.K.'s to 93%, and the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.4">currency only to 96% of its original value.</span><sup><a id="fn-3" href="#fn3"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.1">3</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.1"> (See </span><a id="R_c04-tbl-0001" href="#c04-tbl-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.1">Table 2</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.1">.</span><sup><a id="fn-4" href="#fn4"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.1">4</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.1">)</span></p>

<p id="c04-para-0013"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.1">The geographic changes brought about by the war were hardly worth the carnage, as most nations gained or lost marginal lands and no victor could claim to have captured large territories worth the sacrifice. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.2">The Austro‐Hungarian Empire was broken up into smaller nations, but these remained ruled by their own people, and not the winners of the war. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.3">The major adjustment of the war was the removal of many European monarchies and their replacement with republican regimes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.4">Whether such a transition was for the better pales in comparison to the destruction and devastation that the war had inflicted on the citizens of these countries.</span></p>
<p id="c04-para-0014"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.1">With redemption of gold from central banks, and movement of gold internationally suspended or severely restricted in the major economies, governments could maintain the façade of the currency's value remaining at its prewar peg to gold, even as prices were rising. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.2">As the war ended, the international monetary system revolving around the gold standard was no longer functional. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.3">All countries had gone off gold and had to face the major dilemma of whether they should get</span><span epub:type="pagebreak" title="46" id="Page_46"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.1"> back onto a gold standard, and if so, how to revalue their currencies compared to gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.2">A fair market valuation of their existing stock of currency to their stock of gold would be a hugely unpopular admission of the depreciation that the currency underwent. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.3">A return to the old rates of exchange would cause citizens to demand holding gold rather than the ubiquitous paper receipts, and lead to the flight of gold outside the country to where it was fairly valued.</span></p>
<p id="c04-para-0015"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.1">This dilemma took money away from the market and turned it into a politically controlled economic decision. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.2">Instead of market participants freely choosing the most salable good as a medium of exchange, the value, supply, and interest rate for money now became centrally planned by national governments, a monetary system which Hayek named Monetary Nationalism, in a brilliant short book of the same name:
</span></p>
<blockquote>
<p id="c04-para-0016"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.1">By Monetary Nationalism I mean the doctrine that a country's share in the world's supply of money should not be left to be determined by the same principles and the same mechanism as those which determine the relative amounts of money in its different regions or localities. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.2">A truly International Monetary System would be one where the whole world possessed a homogeneous currency such as obtains within separate countries and where its flow between regions was left to be determined by the results of the action of all individuals.</span><sup><a id="fn-5" href="#fn5"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.65.1">5</span></a></sup></p></blockquote>
<p id="c04-para-0017"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.1">Never again would gold return to being the world's homogeneous currency, with central banks' monopoly position and restrictions on gold ownership forcing people to use national government moneys. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.2">The introduction of Bitcoin, as a currency native to the Internet superseding national borders and outside the realm of governmental control, offers an intriguing possibility for the emergence of a new international monetary system, to be analyzed in </span><a href="c09.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.1">Chapter 9</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.1">.</span></p></section>
<section><span id="c04-sec-0003"/>
<h2 id="head-2-10"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.1">The Interwar Era</span></h2>
<p id="c04-para-0018"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.70.1">Whereas under the international gold standard money flowed freely between nations in return for goods, and the exchange rate between different currencies was merely the</span><span epub:type="pagebreak" title="47" id="Page_47"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.1"> conversion between different weights of gold, under monetary nationalism the money supply of each country, and the exchange rate between them, was to be determined in international agreements and meetings. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.2">Germany suffered from hyperinflation after the Treaty of Versailles had imposed large reparations on it and it sought to repay them using inflation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.3">Britain had major problems with the flow of gold from its shores to France and the United States as it attempted to maintain a gold standard but with a rate that overvalued the British pound and undervalued gold.</span></p>
<p id="c04-para-0019"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.1">The first major treaty of the century of monetary nationalism was the 1922 Treaty of Genoa. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.2">Under the terms of this treaty, the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.3">dollar and the British pound were to be considered reserve currencies similar to gold in their position in other countries' reserves. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.4">With this move, the U.K. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.5">had hoped to alleviate its problems with the overvalued sterling by having other countries purchase large quantities of it to place in their reserves. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.6">The world's major powers signaled their departure from the solidity of the gold standard toward inflationism as a solution to economic problems. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.7">The insanity of this arrangement was that these governments wanted to inflate while also maintaining the price of their currency stable in terms of gold at prewar levels. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.8">Safety was sought in numbers: if everyone devalued their currencies, there would be nowhere for capital to hide. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.9">But this did not and could not work and gold continued to flow out of Britain to the United States and France.</span></p>
<p id="c04-para-0020"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.1">The drain of gold from Britain is a little‐known story with enormous consequences. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.2">Liaquat Ahamed's </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.1">Lords of Finance</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.1"> focuses on this episode, and does a good job of discussing the individuals involved and the drama taking place, but adopts the reigning Keynesian understanding of the issue, putting the blame for the entire episode on the gold standard. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.2">In spite of his extensive research, Ahamed fails to comprehend that the problem was not the gold standard, but that post‐World War I governments had wanted to return to the gold standard at the pre‐World War I rates. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.3">Had they admitted to their people the magnitude of the devaluation that took place to fight the war, and re‐pegged their currencies to gold at new rates, there would have probably been a recessionary crash, after which the economy would have recovered on a sound monetary basis.</span></p>
<p id="c04-para-0021"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.1">A better treatment of this episode, and</span><span epub:type="pagebreak" title="48" id="Page_48"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.1"> its horrific aftermath, can be found in Murray Rothbard's </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.78.1">America's Great Depression</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.2">As Britain's gold reserves were leaving its shores to places where they were better valued, the chief of the Bank of England, Sir Montagu Norman, leaned heavily on his French, German, and American counterparts to increase the money supply in their countries, devaluing their paper currencies in the hope that it would stem the flow of gold away from England. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.3">While the French and German bankers were not cooperative, Benjamin Strong, chairman of the New York Federal Reserve, was, and he engaged in inflationary monetary policy throughout the 1920s. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.4">This may have succeeded in reducing the outflow of gold from Britain up to a point, but the most important implication of it was that it created a larger bubble in the housing and stock markets in the United States. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.5">The U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.6">Fed's inflationary policy ended by the end of 1928, at which point the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.7">economy was ripe for the inevitable collapse that follows from the suspension of inflationism. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.8">What followed was the 1929 stock market crash, and the reaction of the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.9">government turned that into the longest depression in modern recorded history.</span></p>
<p id="c04-para-0022"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.1">The common story about the Great Depression posits that President Hoover chose to remain inactive in the face of the downturn, due to a misplaced faith in the ability of free markets to bring about recovery, and adherence to the gold standard. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.2">Only when he was replaced by Franklin Delano Roosevelt, who moved to an activist governmental role and suspended the gold standard, did the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.3">recovery ensue. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.4">This, to put it mildly, is nonsense. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.5">Hoover not only increased government spending on public work projects to fight the Depression, but he also leaned on the Federal Reserve to expand credit, and made the focus of his policy the insane quest to keep wages high in the face of declining wage rates. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.6">Further, price controls were instituted to keep prices of products, particularly agricultural, at high levels, similar to what was viewed as the fair and correct state that preceded the depression. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.7">The United States and all major global economies began to implement protective trade policies that made matters far worse across the world economy.</span><sup><a id="fn-6" href="#fn6"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.1">6</span></a></sup></p>
<p id="c04-para-0023"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.82.1">It is a little‐known fact, carefully airbrushed</span><span epub:type="pagebreak" title="49" id="Page_49"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.1"> from the history books, that in the 1932 U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.2">general election, Hoover ran on a highly interventionist platform while Franklin Delano Roosevelt ran on a platform of fiscal and monetary responsibility. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.3">Americans had actually voted against Hoover's policies, but when FDR got into power, he found it more convenient to play along with the interests that had influenced Hoover, and as a result, the interventionist policies of Hoover were amplified into what came to be known as the New Deal. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.4">It's important to realize there was nothing unique or new about the New Deal. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.5">It was a magnification of the heavily interventionist policies which Hoover had instituted.</span></p>
<p id="c04-para-0024"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.1">A precursory understanding of economics will make it clear that price controls are always counterproductive, resulting in surpluses and shortages. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.2">The problems faced by the American economy in the 1930s were inextricably linked to the fixing of wages and prices. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.3">Wages were set too high, resulting in a very high unemployment rate, reaching 25% at certain points, while price controls had created shortages and surpluses of various goods. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.4">Some agricultural products were even burned in order to maintain their high prices, leading to the insane situation where people were going hungry, desperate for work, while producers couldn't hire them as they couldn't afford their wages, and the producers who could produce some crops had to burn some of them to keep the price high. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.5">All of this was done to maintain prices at the pre‐1929 boom levels while holding onto the delusion that the dollar had still maintained its value compared to gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.6">The inflation of the 1920s had caused large asset bubbles to form in the housing and stock markets, causing an artificial rise in wages and prices. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.7">After the bubble burst, market prices sought readjustment via a drop in the value of the dollar compared to gold, and a drop in real wages and prices. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.8">The pigheadedness of deluded central planners who wanted to prevent all three from taking place paralyzed the economy: the dollar, wages, and prices were overvalued, leading to people seeking to drop their dollars for gold, as well as massive unemployment and failure of production.</span></p>
<p id="c04-para-0025"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.1">None of this, of course, would be possible with sound money, and only through inflating the money supply did these problems occur. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.2">And even after the inflation, the effects would have been far less disastrous had they revalued the dollar to gold at a market‐determined price and let wages and prices adjust freely. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.3">Instead of learning that lesson, the government economists of the era decided</span><span epub:type="pagebreak" title="50" id="Page_50"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.1"> that the fault was not in inflationism, but rather, in the gold standard which restricted government's inflationism. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.2">In order to remove the golden fetters to inflationism, President Roosevelt issued an executive order banning the private ownership of gold, forcing Americans to sell their gold to the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.3">Treasury at a rate of $20.67 per ounce. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.4">With the population deprived of sound money, and forced to deal with dollars, Roosevelt then revalued the dollar on the international market from $20.67 per ounce to $35 per ounce, a 41% devaluation of the dollar in real terms (gold). </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.5">This was the inevitable reality of years of inflationism which started in 1914 with the creation of the Federal Reserve and the financing of America's entry into World War II.</span></p>
<p id="c04-para-0026"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.1">It was the abandonment of sound money and its replacement with government‐issued fiat which turned the world's leading economies into centrally planned and government‐directed failures. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.2">As governments controlled money, they controlled most economic, political, cultural, and educational activity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.3">Having never studied economics or researched it professionally, Keynes captured the zeitgeist of omnipotent government to come up with the definitive track that gave governments what they wanted to hear. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.4">Gone were all the foundations of economic knowledge acquired over centuries of scholarship around the world, to be replaced with the new faith with the ever‐so‐convenient conclusions that suited high time‐preference politicians and totalitarian governments: the state of the economy is determined by the lever of aggregate spending, and any rise in unemployment or slowdown in production had no underlying causes in the structure of production or in the distortion of markets by central planners; rather it was all a shortage of spending, and the remedy is the debauching of the currency and the increase of government spending. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.5">Saving reduces spending and because spending is all that matters, government must do all it can to deter its citizens from saving. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.6">Imports drive workers out of work, so spending increases must go on domestic goods. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.7">Governments loved this message, and Keynes himself knew that. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.8">His book was translated into German in 1937, at the height of the Nazi era, and in the introduction to the German edition Keynes wrote:
</span></p>
<blockquote>
<p id="c04-para-0027"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.1">The theory of aggregate production, which is the point of the following book, nevertheless can be much easier adapted to the conditions of a totalitarian state than the theory</span><span epub:type="pagebreak" title="51" id="Page_51"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.1"> of production and distribution of a given production put forth under conditions of free competition and a large degree of laissez‐faire.</span><sup><a id="fn-7" href="#fn7"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.90.1">7</span></a></sup></p></blockquote>
<p id="c04-para-0028"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.1">The Keynesian deluge, from which the world is yet to recover, had begun. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.2">Universities lost their independence and became part and parcel of the government's ruling apparatus. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.3">Academic economics stopped being an intellectual discipline focused on understanding human choices under scarcity to improve their conditions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.4">Instead it became an arm of the government, meant to direct policymakers toward the best policies for managing economic activities. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.5">The notion that government management of the economy is necessary became the unquestioned starting point of all modern economic education, as can be gleaned from looking at any modern economics textbook, where government plays the same role that God plays in religious scriptures: an omnipresent, omniscient, omnipotent force that merely needs to identify problems to satisfactorily address them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.6">Government is immune to the concept of opportunity costs, and rarely are the negative results of government intervention in economic activity even considered, and if they are, it is only to justify even more government intervention. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.7">The classical liberal tradition that viewed economic freedom as the foundation of economic prosperity was quietly brushed aside as government propagandists masquerading as economists presented the Great Depression, caused and exacerbated by government controls, as the refutation of free markets. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.8">Classical liberals were the enemies of the political regimes of the 1930s; murdered and chased away from Russia, Italy, Germany, and Austria, they were fortunate to only be academically persecuted in the United States and the U.K., where these giants struggled to find employment while middling bureaucrats and failed statisticians filled every university economics department with their scientism and fake certainty.</span></p>
<p id="c04-para-0029"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.92.1">Today government‐approved economics curricula still blame the gold standard for the Great Depression. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.92.2">The same gold standard which produced more than four decades of virtually uninterrupted global growth and prosperity between 1870 and 1914 suddenly stopped working in the 1930s because it wouldn't allow governments to expand their money supply to fight the</span><span epub:type="pagebreak" title="52" id="Page_52"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.1"> depression, whose causes these economists cannot explain beyond meaningless Keynesian allusions to animal spirits. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.2">And none of these economists seem to notice that if the problem was indeed the gold standard, then its suspension should have caused the beginning of recovery. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.3">Instead, it took more than a decade after its suspension for growth to resume. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.4">The conclusion obvious to anyone with a basic understanding of money and economics is that the cause of the Great Crash of 1929 was the diversion away from the gold standard in the post‐WWI years, and that the deepening of the Depression was caused by government control and socialization of the economy in the Hoover and FDR years. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.5">Neither the suspension of the gold standard nor the wartime spending did anything to alleviate the Great Depression.</span></p>
<p id="c04-para-0030"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.94.1">As the major economies of the world went off the gold standard, global trade was soon to be shipwrecked on the shores of oscillating fiat money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.94.2">With no standard of value to allow an international price mechanism to exist, and with governments increasingly captured by statist and isolationist impulses, currency manipulation emerged as a tool of trade policy, with countries seeking to devalue their currencies in order to give their exporters an advantage. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.94.3">More trade barriers were erected, and economic nationalism became the ethos of that era, with predictably disastrous consequences. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.94.4">The nations that had prospered together 40 years earlier, trading under one universal gold standard, now had large monetary and trade barriers between them, loud populist leaders who blamed all their failures on other nations, and a rising tide of hateful nationalism that was soon to fulfill Otto Mallery's prophecy: “If soldiers are not to cross international boundaries, goods must do so. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.94.5">Unless the Shackles can be dropped from trade, bombs will be dropped from the sky.”</span><sup><a id="fn-8" href="#fn8"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.1">8</span></a></sup></p></section>
<section><span id="c04-sec-0004"/>
<h2 id="head-2-11"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.96.1">World War II and Bretton Woods</span></h2>
<p id="c04-para-0031"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.1">From the sky the bombs did drop, along with countless heretofore unimaginable forms of murder and horror. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.2">The war machines that the government‐directed economies</span><span epub:type="pagebreak" title="53" id="Page_53"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.98.1"> built were far more advanced than any the world had ever seen, thanks to the popularity of the most dangerous and absurd of all Keynesian fallacies, the notion that government spending on military effort would aid economic recovery. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.98.2">All spending is spending, in the naive economics of Keynesians, and so it matters not if that spending comes from individuals feeding their families or governments murdering foreigners: it all counts in aggregate demand and it all reduces unemployment! </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.98.3">As an increasing number of people went hungry during the depression, all major governments spent generously on arming themselves, and the result was a return to the senseless destruction of three decades earlier.</span></p>
<p id="c04-para-0032"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.1">For Keynesian economists, the war was what caused economic recovery, and if one looked at life merely through the lens of statistical aggregates collected by government bureaucrats, such a ridiculous notion is tenable. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.2">With government war expenditure and conscription on the rise, aggregate expenditure soared while unemployment plummeted, so all countries involved in World War II had recovered because of their participation in the war. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.3">Anybody not afflicted with Keynesian economics, however, can realize that life during World War II, even in countries that did not witness war on their soil, like the United States, cannot by any stretch of the imagination be characterized as “economic recovery.” </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.4">On top of the death and destruction, the dedication of so much of the capital and labor resources of the belligerent countries to the war effort meant severe shortages of output at home, resulting in rationing and price controls. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.5">In the United States, construction of new housing and repair of existing housing were banned.</span><sup><a id="fn-9" href="#fn9"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.100.1">9</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.101.1"> More obviously, one cannot possibly argue that soldiers fighting and dying at warfronts, who constituted a large percentage of the populations of belligerent nations, enjoyed any form of economic recovery, no matter how much aggregate expenditure went into making the weapons they were carrying.</span></p>
<p id="c04-para-0033"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.1">But one of the most devastating blows to Keynesian theories of the aggregate demand as the determinant of the state of the economy came in the aftermath of World War II, particularly in the United States. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.2">A confluence of factors had conspired</span><span epub:type="pagebreak" title="54" id="Page_54"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.103.1"> to reduce government spending drastically, leading to Keynesian economists of the era predicting doom and gloom to follow the war: the end of military hostilities reduced government military spending dramatically. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.103.2">The death of the populist and powerful FDR and his replacement by the meeker and less iconic Truman, coming up against a Congress controlled by Republicans, created political deadlock that prevented the renewal of the statutes of the New Deal. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.103.3">All of these factors together, when analyzed by Keynesian economists, would point to impending disaster, as Paul Samuelson, the man who literally wrote the textbooks for economic education in the postwar era, wrote in 1943:
</span></p>
<blockquote>
<p id="c04-para-0034"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.104.1">The final conclusion to be drawn from our experience at the end of the last war is inescapable—were the war to end suddenly within the next 6 months, were we again planlessly to wind up our war effort in the greatest haste, to demobilize our armed forces, to liquidate price controls, to shift from astronomical deficits to even the large deficits of the thirties—then there would be ushered in the greatest period of unemployment and industrial dislocation which any economy has ever faced.</span><sup><a id="fn-10" href="#fn10"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.1">10</span></a></sup></p></blockquote>
<p id="c04-para-0035"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.1">The end of World War II and the dismantling of the New Deal meant the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.2">government cut its spending by an astonishing 75% between 1944 and 1948, and it also removed most price controls for good measure. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.3">And yet, the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.4">economy witnessed an extraordinary boom during these years. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.5">The roughly 10 million men who were mobilized for the war came back home and were almost seamlessly absorbed into the labor force, as economic production boomed, flying in the face of all Keynesian predictions and utterly obliterating the ridiculous notion that the level of spending is what determines output in the economy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.6">As soon as governmental central planning had abated for the first time since the 1929 crash, and as soon as prices were allowed to adjust freely, they served their role as the coordinating mechanism for economic activity, matching sellers and buyers, incentivizing the production of goods demanded by consumers and compensating workers for their effort. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.7">The situation was far from perfect, though, as</span><span epub:type="pagebreak" title="55" id="Page_55"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.107.1"> the world remained off the gold standard, leading to ever‐present distortions of the money supply which would continue to dog the world economy with crisis after crisis.</span></p>
<p id="c04-para-0036"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.108.1">It is well‐known that history is written by the victors, but in the era of government money, victors get to decide on the monetary systems, too. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.108.2">The United States summoned representatives of its allies to Bretton Woods in New Hampshire to discuss formulating a new global trading system. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.108.3">History has not been very kind to the architects of this system. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.108.4">Britain's representative was none other than John Maynard Keynes, whose economic teachings were to be wrecked on the shores of reality in the decades following the war, while America's representative, Harry Dexter White, would later be uncovered as a Communist who was in contact with the Soviet regime for many years.</span><sup><a id="fn-11" href="#fn11"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.109.1">11</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.110.1"> In the battle for centrally planned global monetary orders, White was to emerge victorious with a plan that even made Keynes's look not entirely unhinged. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.110.2">The United States was to be the center of the global monetary system, with its dollars being used as a global reserve currency by other central banks, whose currencies would be convertible to dollars at fixed exchange rates, while the dollar itself would be convertible to gold at a fixed exchange rate. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.110.3">To facilitate this system, the United States would take gold from other countries' central banks.</span></p>
<p id="c04-para-0037"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.1">Whereas the American people were</span><span epub:type="pagebreak" title="56" id="Page_56"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.1"> still prohibited from owning gold, the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.2">government promised to redeem dollars in gold to other countries' central banks at a fixed rate, opening what was known as the gold exchange window. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.3">In theory, the global monetary system was still based on gold, and if the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.4">government had maintained convertibility to gold by not inflating the dollar supply beyond their gold reserves while other countries had not inflated their money supply beyond their dollar reserves, the monetary system would have effectively been close to the gold standard of the pre‐World War I era. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.5">They did not, of course, and in practice, the exchange rates were anything but fixed and provisions were made for allowing governments to alter these rates to address a “fundamental disequilibrium.”</span><sup><a id="fn-12" href="#fn12"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.113.1">12</span></a></sup></p>
<p id="c04-para-0038"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.1">In order to manage this global system of hopefully fixed exchange rates, and address any potential fundamental disequilibrium, the Bretton Woods conference established the International Monetary Fund, which acted as a global coordination body between central banks with the express aim of achieving stability of exchange rates and financial flows. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.2">In essence, Bretton Woods attempted to achieve through central planning what the international gold standard of the nineteenth century had achieved spontaneously. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.3">Under the classical gold standard the monetary unit was gold while capital and goods flowed freely between countries, spontaneously adjusting flows without any need for central control or direction, and never resulting in balance of payment crises: whatever amount of money or goods moved across borders did so at the discretion of its owners and no macroeconomic problems could emerge.</span></p>
<p id="c04-para-0039"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.1">In the Bretton Woods system, however, governments were dominated by Keynesian economists who viewed activist fiscal and monetary policy as a natural and important part of government policy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.2">The constant monetary and fiscal management would naturally lead to the fluctuation of the value of national currencies, resulting in imbalances in trade and capital flows. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.3">When a country's currency is devalued, its products become cheaper to foreigners, leading to more goods leaving the country, while holders of the currency seek to purchase foreign currencies to protect themselves from devaluation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.4">As</span><span epub:type="pagebreak" title="57" id="Page_57"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.116.1"> devaluation is usually accompanied by artificially low interest rates, capital seeks exit from the country to go where it can be better rewarded, exacerbating the devaluation of the currency. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.116.2">On the other hand, countries which maintained their currency better than others would thus witness an influx of capital whenever their neighbors devalued, leading to their currency appreciating further. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.116.3">Devaluation would sow the seeds of more devaluation, whereas currency appreciation would lead to more appreciation, creating a problematic dynamic for the two governments. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.116.4">No such problems could exist with the gold standard, where the value of the currency in both countries was constant, because it was gold, and movements of goods and capital would not affect the value of the currency.</span></p>
<p id="c04-para-0040"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.117.1">The automatic adjustment mechanisms of the gold standard had always provided a constant measuring rod against which all economic activity was measured, but the floating currencies gave the world economy imbalances. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.117.2">The International Monetary Fund's role was to perform an impossible balancing act between all the world's governments to attempt to find some form of stability or “equilibrium” in this mess, keeping exchange rates within some arbitrary range of predetermined values while trade and capital flows were moving and altering them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.117.3">But without a stable unit of account for the global economy, this was a task as hopeless as attempting to build a house with an elastic measuring tape whose own length varied every time it was used.</span></p>
<p id="c04-para-0041"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.118.1">Along with the establishment of the World Bank and IMF in Bretton Woods, the United States and its allies wanted to establish another international financial institution to specialize in arranging trade policy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.118.2">The initial attempt to establish an International Trade Organization failed after the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.118.3">Congress refused to ratify the treaty, but a replacement was sought in the General Agreement on Trade and Tariffs, commencing in 1948. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.118.4">GATT was meant to help the IMF in the impossible task of balancing budgets and trade to ensure financial stability—in other words, centrally planning global trade and fiscal and monetary policy to remain in balance, as if such a thing were possible.</span></p>
<p id="c04-para-0042"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.119.1">An important, but often overlooked, aspect of the Bretton Woods system was that most of the member countries had moved large amounts of their gold reserves to the United States and received dollars in exchange, at a rate of $35 per ounce. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.119.2">The rationale was that the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.119.3">dollar would be the global currency for</span><span epub:type="pagebreak" title="58" id="Page_58"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.120.1"> trade and central banks would trade through it and settle their accounts in it, obviating the need for the physical movement of gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.120.2">In essence, this system was akin to the entire world economy being run as one country on a gold standard, with the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.120.3">Federal Reserve acting as the world's central bank and all the world's central banks as regional banks, the main difference being that the monetary discipline of the gold standard was almost entirely lost in this world where there were no effective controls on all central banks in expanding the money supply, because no citizens could redeem their government money for gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.120.4">Only governments could redeem their dollars in gold from the United States, but that was to prove far more complicated than expected. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.120.5">Today, each ounce of gold for which foreign central banks received $35 is worth in excess of $1,200.</span></p>
<p id="c04-para-0043"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.121.1">Monetary expansionism became the new global norm, and the tenuous link that the system had to gold proved powerless to stop the debauching of global currencies and the constant balance of payment crises affecting most countries. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.121.2">The United States, however, was put in a remarkable position, similar to, though massively exceeding in scope, the Roman Empire's pillaging and inflating the money supply used by most of the Old World. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.121.3">With its currency distributed all over the world, and central banks having to hold it as a reserve to trade with one another, the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.121.4">government could accrue significant seniorage from expanding the supply of dollars, and also had no reason to worry about running a balance of payment deficit. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.121.5">French economist Jacques Reuff coined the phrase “deficit without tears” to describe the new economic reality that the United States inhabited, where it could purchase whatever it wanted from the world and finance it through debt monetized by inflating the currency that the entire world used.</span></p>
<p id="c04-para-0044"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.122.1">The relative fiscal restraint of the first few years after World War II soon gave way to the politically irresistible temptation of buying free lunches through inflation, particularly to the warfare and welfare states. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.122.2">The military industry that prospered during World War II grew into what President Eisenhower called the Military–Industrial Complex—an enormous conglomerate of industries that was powerful enough to demand ever more funding from the government, and drive U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.122.3">foreign policy toward an endless series of expensive conflicts with no rational end goal or clear objective. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.122.4">The doctrine of violent militant Keynesianism claimed this spending would</span><span epub:type="pagebreak" title="59" id="Page_59"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.123.1"> be good for the economy, which made the millions of lives it destroyed easier to stomach for the American electorate.</span></p>
<p id="c04-para-0045"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.124.1">This war machine was also made more palatable for the American people because it came from the same politicians who intensified government welfare in various shapes and forms. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.124.2">From The Great Society to affordable housing, education, and healthcare, fiat money allowed the American electorate to ignore the laws of economics and believe that a free lunch, or at least a perpetually discounted one, was somehow possible. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.124.3">In the absence of gold convertibility and with the ability to disperse the costs of inflation on the rest of the world, the only winning political formula consisted of increasing government spending financed by inflation, and every single presidential term in the postwar era witnessed a growth in government expenditure and the national debt and a loss of the purchasing power of the dollar. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.124.4">In the presence of fiat money to finance government, political differences between parties disappear as politics no longer contains trade‐offs and every candidate can champion every cause.</span></p></section>
<section><span id="c04-sec-0005"/>
<h2 id="head-2-12"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.125.1">Government Money's Track Record</span></h2>
<p id="c04-para-0046"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.126.1">The tenuous link of gold exchangeability was an annoying detail for the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.126.2">government's inflationism, and it manifested in two symptoms: first, the global gold market was always seeking to reflect the reality of inflationism through a higher gold price. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.126.3">This was addressed through the establishment of the London Gold Pool, which sought to drop the price of gold by offloading some of the gold reserves that governments held onto the market. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.126.4">This worked only temporarily, but in 1968, the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.126.5">dollar had to start getting revalued compared to gold to acknowledge the years of inflation it had suffered. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.126.6">The second problem was that some countries started trying to repatriate their gold reserves from the United States as they started to recognize the diminishing purchasing power of their paper money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.126.7">French president Charles de Gaulle even sent a French military carrier to New York to get his nation's gold back, but when the Germans attempted to repatriate their gold, the United States had decided it had had enough. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.126.8">Gold reserves were running low, and on August 15, 1971, President Richard Nixon announced the end of dollar convertibility to gold, thus letting</span><span epub:type="pagebreak" title="60" id="Page_60"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.127.1"> the gold price float in the market freely. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.127.2">In effect, the United States had defaulted on its commitment to redeem its dollars in gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.127.3">The fixed exchange rates between the world's currencies, which the IMF was tasked with maintaining, had now been let loose to be determined by the movement of goods and capital across borders and in ever‐more‐sophisticated foreign exchange markets.</span></p>
<p id="c04-para-0047"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.1">Freed from the final constraints of the pretense of gold redemption, the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.2">government expanded its monetary policy in unprecedented scale, causing a large drop in the purchasing power of the dollar, and a rise in prices across the board. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.3">Everyone and everything was blamed for the rise in prices by the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.4">government and its economists, except for the one actual source of the price rises, the increase in the supply of the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.5">dollar. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.6">Most other currencies fared even worse, as they were the victim of inflation of the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.128.7">dollars backing them, as well as the inflation by the central banks issuing them.</span></p>
<p id="c04-para-0048"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.129.1">This move by President Nixon completed the process begun with World War I, transforming the world economy from a global gold standard to a standard based on several government‐issued currencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.129.2">For a world that was growing increasingly globalized along with advancements in transportation and telecommunications, freely fluctuating exchange rates constituted what Hoppe termed “a system of partial barter.”</span><sup><a id="fn-13" href="#fn13"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.130.1">13</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.1"> Buying things from people who lived on the other side of imaginary lines in the sand now required utilizing more than one medium of exchange and reignited the age‐old problem of lack of coincidence of wants. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.2">The seller does not want the currency held by the buyer, and so the buyer must purchase another currency first, and incur conversion costs. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.3">As advances in transportation and telecommunications continue to increase global economic integration, the cost of these inefficiencies just keeps getting bigger. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.131.4">The market for foreign exchange, at $5 trillion of daily volume, exists purely as a result of this inefficiency of the absence of a single global homogeneous international currency.</span></p>
<p id="c04-para-0049"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.1">While most governments produce their own currencies, the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.2">government was the one that produced the prime reserve currency with which other governments backed theirs. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.132.3">This</span><span epub:type="pagebreak" title="61" id="Page_61"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.133.1"> was the first time in human history that the entire planet had run on government money, and while such an idea is considered normal and unquestionable in most academic circles, it is well worth examining the soundness of this predominant form of money.</span></p>
<p id="c04-para-0050"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.1">It is theoretically possible to create an artificially scarce asset to endow it with a monetary role. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.2">Governments around the world did this after abandoning the gold standard, as did Bitcoin's creator, with contrasting results. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.3">After the link between fiat money and gold was severed, paper monies have had a higher growth in their supply rate than gold, and as a result have seen a collapse in their value compared to gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.4">The total U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.5">M2 measure of the money supply in 1971 was around $600 billion, while today it is in excess of $12 trillion, growing at an average annual rate of 6.7%. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.134.6">Correspondingly, in 1971, 1 ounce of gold was worth $35, and today it is worth more than $1,200.</span></p>
<p id="c04-para-0051"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.1">Looking at the track record of government money paints a mixed picture about the stock‐to‐flow ratio of different currencies across time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.135.2">The relatively stable and strong currencies of the developed countries have usually had growth rates in the single digits, but with a much higher variance, including contractions of the supply during deflationary recessions.</span><sup><a id="fn-14" href="#fn14"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.136.1">14</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.1"> Developing country currencies have at many times experienced supply growth rates closer to those of consumable commodities, leading to disastrous hyperinflation and the destruction of the wealth of holders. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.2">The World Bank provides data on broad money growth for 167 countries for the period between 1960 and 2015. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.137.3">The data for the annual average for all countries is plotted in </span><a id="R_c04-fig-0002" href="#c04-fig-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.138.1">Figure 6</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.139.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.139.2">While the data is not complete for all countries and all years, the average growth of money supply is 32.16% per year per country.</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.140.1"><img alt="Graphical illustration of broad money average annual growth rate percentage for 167 currencies, 1960–2015." src="images/c04f002.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c04-fig-0002" id="c04-fig-0002"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.141.1">Figure 6</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.142.1"> Broad money average annual growth rate for 167 currencies, 1960–2015.</span></p></figcaption></figure>
<p id="c04-para-0052"><span epub:type="pagebreak" title="62" id="Page_62"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.1">The 32.16% figure does not include several hyperinflationary years during which a currency is completely destroyed and replaced by a new one, and so the results of this analysis cannot definitively tell us which currencies fared worst, as some of the most significant data cannot be compared. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.143.2">But a look at the countries that</span><span epub:type="pagebreak" title="63" id="Page_63"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.144.1"> have had the highest average increase of the money supply will show a list of countries that had several highly publicized episodes of inflationary struggle throughout the period covered. </span><a id="R_c04-tbl-0002" href="#c04-tbl-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.145.1">Table 3</span></a><sup><a id="fn-15" href="#fn15"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.146.1">15</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.1"> shows the ten countries with the highest annual average increase in the money supply.</span></p>
<figure><figcaption>
