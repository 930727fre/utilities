<p id="c04-para-0053"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.172.1">During hyperinflationary periods, people in developing countries sell their national currency and buy durable items, commodities, gold, and foreign currencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.172.2">International</span><span epub:type="pagebreak" title="64" id="Page_64"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.1"> reserve currencies, such as the dollar, euro, yen, and Swiss franc, are available in most of the world, even if in black markets, and meet a significantly high portion of the global demand for a store of value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.2">The reason for that becomes apparent when one examines the rates of growth of their supply, which have been relatively low over time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.3">Seeing as they constitute the main store‐of‐value options available for most people around the world, it is worth examining their supply growth rates separately from the less stable currencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.4">The current ten largest currencies in the foreign exchange markets are listed in </span><a id="R_c04-tbl-0004" href="#c04-tbl-0004"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.1">Table 4</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.175.1">, along with their annual broad money supply increase for the periods between 1960–2015 and 1990–2015.</span><sup><a id="fn-16" href="#fn16"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.176.1">16</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.1"> The average for the ten most internationally liquid currencies is 11.13% for the period 1960–2015, and only 7.79% for the period between 1990 and 2015. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.2">This shows that the currencies that are most accepted worldwide, and have the highest salability globally, have a higher stock‐to‐flow ratio than the other currencies, as this book's analysis would predict.</span></p>

<p id="c04-para-0054"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.215.1">The period of the 1970s and 1980s, which contained the beginning of the floating national currencies era, was one in which most countries experienced high inflation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.215.2">Things got better after 1990, and average supply growth rates</span><span epub:type="pagebreak" title="65" id="Page_65"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.216.1"> dropped. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.216.2">OECD data shows that for OECD countries over the period between 1990 and 2015, annual broad money supply growth rate averaged 7.17%.</span></p>
<p id="c04-para-0055"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.217.1">We can see that the world's major national currencies generally have their supply grow at predictably low rates. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.217.2">Developed economies have had slower increases in the supply of their currencies than developing economies, which have witnessed faster price rises and several hyperinflationary episodes in recent history. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.217.3">The advanced economies have had their broad money grow at rates usually between 2% and 8%, averaging around 5%, and rarely climbing into double digits or dropping into negative territory. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.217.4">Developing countries have far more erratic growth rates, which fluctuate into the double digits, sometimes triple digits, and sometimes even quadruple digits, while occasionally dropping into negative territory, reflecting the higher financial instability in these countries and currencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.217.5">(See </span><a id="R_c04-fig-0003" href="#c04-fig-0003"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.218.1">Figure 7</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.219.1">.</span><sup><a id="fn-17" href="#fn17"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.220.1">17</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.221.1">)</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.222.1"><img alt="Graphical illustration of annual broad money growth rate percentage in Japan, United Kingdom, United States, and Euro area." src="images/c04f003.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c04-fig-0003" id="c04-fig-0003"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.223.1">Figure 7</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.224.1"> Annual broad money growth rate in Japan, U.K., United States, and Euro area.</span></p></figcaption></figure>
<p id="c04-para-0056"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.225.1">Growth at 5% per year may not sound like much, but it will double the money supply of a country in only 15 years. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.225.2">This was the reason silver lost out in the monetary race</span><span epub:type="pagebreak" title="66" id="Page_66"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.226.1"> to gold, whose lower supply growth rate meant a far slower erosion of purchasing power.</span></p>
<p id="c04-para-0057"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.227.1">Hyperinflation is a form of economic disaster unique to government money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.227.2">There was never an example of hyperinflation with economies that operated a gold or silver standard, and even when artifact money like seashells and beads lost its monetary role over time, it usually lost it slowly, with replacements taking over more and more of the purchasing power of the outgoing money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.227.3">But with government money, whose cost of production tends to zero, it has become quite possible for an entire society to witness all of its savings in the form of money disappear in the space of a few months or even weeks.</span></p>
<p id="c04-para-0058"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.1">Hyperinflation is a far more pernicious phenomenon than just the loss of a lot of economic value by a lot of people; it constitutes a complete breakdown of the structure of economic production of a society built up over centuries and millennia. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.2">With the collapse of money, it becomes impossible to trade, produce, or engage in anything other than scraping for the bare essentials of life. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.3">As the structures of production and trade that societies have developed over centuries break down due to the inability of consumers, producers, and workers to pay one another, the goods which humans take for granted begin to disappear. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.4">Capital is destroyed and sold off to finance consumption. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.5">First go the luxury goods, but soon follow the basic essentials of survival, until humans are brought back to a barbaric state wherein they need to fend for themselves and struggle to secure the most basic needs of survival. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.6">As the individual's quality of life degenerates markedly, despair begins to turn to anger, scapegoats are sought, and the most demagogic and opportunistic politicians take advantage of this situation, stoking people's anger to gain power. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.228.7">The most vivid example of this is inflation of the Weimar Republic in the 1920s, which not only led to the destruction and breakdown of one of the world's most advanced and prosperous economies, but also fueled the rise of Adolf Hitler to power.</span></p>
<p id="c04-para-0059"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.229.1">Even if the textbooks were correct about the benefits of government management of the money supply, the damage from one episode of hyperinflation anywhere in the world far outweighs them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.229.2">And the century of government money had far more than one of these calamitous episodes.</span></p>
<p id="c04-para-0060"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.230.1">As these lines are written, it is</span><span epub:type="pagebreak" title="67" id="Page_67"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.231.1"> Venezuela's turn to go through this travesty and witness the ravages of the destruction of money, but this is a process that has occurred 56 times since the end of World War I, according to research by Steve Hanke and Charles Bushnell, who define hyperinflation as a 50% increase in the price level over a period of a month. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.231.2">Hanke and Bushnell have been able to verify 57 episodes of hyperinflation in history,</span><sup><a id="fn-18" href="#fn18"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.232.1">18</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.233.1"> only one of which occurred before the era of monetary nationalism, and that was the inflation in France in 1795, in the wake of the Mississippi Bubble, which was also produced through government money and engineered by the honorary father of modern government money, John Law.</span></p>
<p id="c04-para-0061"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.234.1">The problem with government‐provided money is that its hardness depends entirely on the ability of those in charge to not inflate its supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.234.2">Only political constraints provide hardness, and there are no physical, economic, or natural constraints on how much money government can produce. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.234.3">Cattle, silver, gold, and seashells all require serious effort to produce them and can never be generated in large quantities at the drop of a hat, but government money requires only the fiat of the government. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.234.4">The constantly increasing supply means a continuous devaluation of the currency, expropriating the wealth of the holders to benefit those who print the currency, and those who receive it earliest.</span><sup><a id="fn-19" href="#fn19"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.235.1">19</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.236.1"> History has shown that governments will inevitably succumb to the temptation of inflating the money supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.236.2">Whether it's because of downright graft, “national emergency,” or an infestation of inflationist schools of economics, government will always find a reason and a way to print more money, expanding government power while reducing the wealth of the currency holders. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.236.3">This is no different from copper producers mining more copper in response to monetary demand for copper; it rewards the producers of the monetary good, but punishes those</span><span epub:type="pagebreak" title="68" id="Page_68"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.237.1"> who choose to put their savings in copper.</span></p>
<p id="c04-para-0062"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.238.1">Should a currency credibly demonstrate its supply cannot be expanded, it would immediately gain value significantly. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.238.2">In 2003, when the United States invaded Iraq, aerial bombardment destroyed the Iraqi central bank and with it the capability of the Iraqi government to print new Iraqi dinars. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.238.3">This led to the dinar drastically appreciating overnight as Iraqis became more confident in the currency given that no central bank could print it anymore.</span><sup><a id="fn-20" href="#fn20"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.239.1">20</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.240.1"> A similar story happened to Somali shillings after their central bank was destroyed.</span><sup><a id="fn-21" href="#fn21"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.241.1">21</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.242.1"> Money is more desirable when demonstrably scarce than when liable to being debased.</span></p>
<p id="c04-para-0063"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.1">A few reasons keep government money as the prime money of our time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.2">First, governments mandate that taxes are paid in government money, which means individuals are highly likely to accept it, giving it an edge in its salability. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.3">Second, government control and regulation of the banking system means that banks can only open accounts and transact in government‐sanctioned money, thus giving government money a much higher degree of salability than any other potential competitor. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.4">Third, legal tender laws make it illegal in many countries to use other forms of money for payment. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.5">Fourth, all government moneys are still backed by gold reserves, or backed by currencies backed by gold reserves. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.6">According to data from the World Gold Council, central banks currently have around 33,000 tons of gold in their reserves. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.7">Central bank gold reserves rose quickly in the early part of the twentieth century as many governments confiscated their people's and banks' gold and forced them to use their money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.8">In the late 1960s, with the Bretton Woods system straining under the pressure of increased money supply, governments began to offload some of their gold reserves. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.9">But in 2008 that trend reversed and central banks returned to buying gold and the global supply has increased. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.10">It is ironic, and very telling, that in the era of government money, governments themselves own far more gold in their official reserves than they did under the international gold standard of 1871–1914. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.243.11">Gold has clearly not lost its monetary role; it remains the only final extinguisher</span><span epub:type="pagebreak" title="69" id="Page_69"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.244.1"> of debt, the one money whose value is not a liability of anyone else, and the prime global asset which carries no counterparty risk. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.244.2">Access to its monetary role, however, has been restricted to central banks, while individuals have been directed toward using government money.</span></p>
<p id="c04-para-0064"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.245.1">Central banks' large reserves of gold can be used as an emergency supply to sell or lease on the gold market to prevent the price of gold from rising during periods of increased demand, to protect the monopoly role of government money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.245.2">As Alan Greenspan once explained: “Central banks stand ready to lease gold in increasing quantities should the price rise.”</span><sup><a id="fn-22" href="#fn22"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.246.1">22</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.247.1"> (See </span><a id="R_c03-fig-0004" href="c03.xhtml#c03-fig-0004"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.248.1">Figure 4</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.249.1">.</span><sup><a id="fn-23" href="#fn23"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.250.1">23</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.251.1">)</span></p>
<p id="c04-para-0065"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.252.1">As technology has progressed to allow for ever‐more‐sophisticated forms of money, including paper money that is easy to carry around, a new problem of salability has been introduced, and that is the ability of the seller to sell her good without the intervention of any third parties that might place restraints on the salability of that money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.252.2">This is not an issue that exists with commodity moneys, whose market value is emergent from the market and cannot be dictated by third parties to the transaction: cattle, salt, gold, and silver all have a market and willing buyers. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.252.3">But with government‐issued money with negligible value as a commodity, salability can be compromised by the governments that issued it, declaring it no longer suitable as legal tender. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.252.4">Indians who woke up on November 8, 2016, to hear that their government had suspended the legal tender status of 500 and 1,000 rupee notes can certainly relate. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.252.5">In the blink of an eye, what was highly salable money lost its value and had to be exchanged at banks with very long lines. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.252.6">And as more of the world heads toward reducing its reliance on cash, more of people's money is being placed in government‐supervised banks, making it vulnerable to confiscation or capital controls. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.252.7">The fact that these procedures generally happen during times of economic crisis, when individuals need that money most, is a major impediment to the salability of government‐issued money.</span></p>
<p id="c04-para-0066"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.253.1">Government control of money</span><span epub:type="pagebreak" title="70" id="Page_70"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.254.1"> has turned money from being the reward for producing value to the reward for obedience to government officials. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.254.2">It is impractical for anyone to develop wealth in government money without government acceptance. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.254.3">Government can confiscate money from the banking monopolies it controls, inflate the currency to devalue holders' wealth and reward it to the most loyal of its subjects, impose draconian taxes and punish those who avoid them, and even confiscate bills.</span></p>
<p id="c04-para-0067"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.255.1">Whereas in Austrian economist Menger's time the criteria for determining what is the best money revolved around understanding salability and what the market would choose as money, in the twentieth century, government control of money has meant a new and very important criterion being added to salability, and that is the salability of money according to the will of its holder and not some other party. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.255.2">Combining these criteria together formulates a complete understanding of the term </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.256.1">sound money</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.257.1"> as the money that is chosen by the market freely and the money completely under the control of the person who earned it legitimately on the free market and not any other third party.</span></p>
<p id="c04-para-0068"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.258.1">While a staunch defender of the role of gold as money during his time, Ludwig von Mises understood that this monetary role was not something inherent or intrinsic to gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.258.2">As one of the deans of the Austrian tradition in economics, Mises well understood that value does not exist outside of human consciousness, and that metals and substances had nothing inherent to them that could assign to them a monetary role. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.258.3">For Mises, gold's monetary status was due to its fulfillment of the criteria for sound money as he understood them:
</span></p>
<blockquote>
<p id="c04-para-0069"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.259.1">[T]he sound money principle has two aspects. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.259.2">It is affirmative in approving the market's choice of a commonly used medium of exchange. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.259.3">It is negative in obstructing the government's propensity to meddle with the currency system.</span><sup><a id="fn-24" href="#fn24"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.260.1">24</span></a></sup></p></blockquote>
<p id="c04-para-0070"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.261.1">Sound money, then, according to Mises, is what the market freely chooses to be money, and what remains under the control of its owner, safe from coercive meddling and</span><span epub:type="pagebreak" title="71" id="Page_71"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.262.1"> intervention. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.262.2">For as long as the money was controlled by anyone other than the owner, whoever controlled it would always face too strong an incentive to pilfer the value of the money through inflation or confiscation, and to use it as a political tool to achieve their political goals at the expanse of the holders. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.262.3">This, in effect, takes wealth away from people who produce it and gives it to people who specialize in the control of money without actually producing things valued by society, in the same way European traders could pilfer African society by flooding them with cheap beads as mentioned in </span><a href="c02.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.263.1">Chapter 2</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.264.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.264.2">No society could prosper when such an avenue for riches remained open, at the cost of impoverishing those who seek productive avenues for wealth. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.264.3">A sound money, on the other hand, makes service valuable to others the only avenue open for prosperity to anyone, thus concentrating society's efforts on production, cooperation, capital accumulation, and trade.</span></p>
<p id="c04-para-0071"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.265.1">The twentieth century was the century of unsound money and the omnipotent state, as a market choice in money was denied by government diktat, and government‐issued paper money was forced on people with the threat of violence. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.265.2">As time passed, governments moved away from sound money ever more as their spending and deficits increased, their currencies continuously devalued, and an ever‐larger share of national income was controlled by the government. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.265.3">With government increasing its meddling in all aspects of life, it increasingly controlled the educational system and used it to imprint in people's minds the fanciful notion that the rules of economics did not apply to governments, which would prosper the more they spent. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.265.4">The work of monetary cranks like John Maynard Keynes taught in modern universities the notion that government spending only has benefits, never costs. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.265.5">The government, after all, can always print money and so faces no real constraints on its spending, which it can use to achieve whichever goal the electorate sets for it.</span></p>
<p id="c04-para-0072"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.266.1">For those who worship government power and take joy in totalitarian control, such as the many totalitarian and mass‐murdering regimes of the twentieth century, this monetary arrangement was a godsend. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.266.2">But for those who valued human liberty, peace, and cooperation among humans, it was a depressing time with the prospects of economic reform receding ever more with time and the prospects of the political process ever returning us to monetary sanity</span><span epub:type="pagebreak" title="72" id="Page_72"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.267.1"> becoming an increasingly fanciful dream. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.267.2">As Friedrich Hayek put it:
</span></p>
<blockquote>
<p id="c04-para-0073"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.268.1">I don't believe we shall ever have a good money again before we take the thing out of the hands of government, that is, we can't take it violently out of the hands of government, all we can do is by some sly roundabout way introduce something that they can't stop.</span><sup><a id="fn-25" href="#fn25"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.269.1">25</span></a></sup></p></blockquote>
<p id="c04-para-0074"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.270.1">Speaking in 1984, completely oblivious to the actual form of this “something they can't stop”, Friedrich Hayek's prescience sounds outstanding today. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.270.2">Three decades after he uttered these words, and a whole century after governments destroyed the last vestige of sound money that was the gold standard, individuals worldwide have the chance to save and transact with a new form of money, chosen freely on the market and outside government control. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.270.3">In its infancy, Bitcoin already appears to satisfy all the requirements of Menger, Mises, and Hayek: it is a highly salable free‐market option that is resistant to government meddling.</span></p>
</section>
</section>

<aside class="noteEntry" epub:type="rearnote"><a id="fn2" href="#fn-2"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.276.1">2</span></a> <i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.277.1">Source</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.278.1">: George Hall, “Exchange Rates and Casualties During the First World War,” </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.279.1">Journal of Monetary Economics</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.280.1">.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn3" href="#fn-3"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.281.1">3</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.282.1"> I have wondered if the proximity of Germany and Austria to Switzerland, and the close relations between these populations, may have led to more Germans and Austrians exchanging their currencies for the Swiss Franc, which hastened the fall of these currencies, stretching the economic resources of the governments, and playing a decisive role in the outcome of World War I. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.282.2">I have never come across any research on this question, but if you do, dear reader, please do get in touch.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn4" href="#fn-4"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.283.1">4</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.284.1"> From July 1914 to November 1918. </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.285.1">Source</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.286.1">: George Hall, “Exchange Rates and Casualties During the First World War,” </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.287.1">Journal of Monetary Economics</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.288.1">.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn5" href="#fn-5"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.289.1">5</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.290.1"> Friedrich Hayek, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.291.1">Monetary Nationalism and International Stability</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.292.1"> (Fairfield, NJ: Augustus Kelley, 1989 [1937]).</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn6" href="#fn-6"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.293.1">6</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.294.1"> A thorough accounting of Hoover's interventionist policies can be found in Murray Rothbard's </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.295.1">America's Great Depression</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.296.1">.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn7" href="#fn-7"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.297.1">7</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.298.1"> Quoted in Henry Hazlitt, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.299.1">The Failure of the New Economics</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.300.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.300.2">p. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.300.3">277.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn8" href="#fn-8"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.301.1">8</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.302.1"> Otto Mallery, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.303.1">Economic Union and Durable Peace</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.304.1"> (Harper and Brothers, 1943), p. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.304.2">10.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn9" href="#fn-9"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.305.1">9</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.306.1"> Robert Higgs, “World War II and the Triumph of Keynesianism” (2001), Independent Institute research article. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.306.2">Available at </span><a href="http://www.independent.org/publications/article.asp?id=317"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.307.1">http://www.independent.org/publications/article.asp?id=317</span></a></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn10" href="#fn-10"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.308.1">10</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.309.1"> Paul Samuelson, “Full Employment after the War,” in Seymour Harris, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.310.1">Postwar Economic Problems</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.311.1"> (New York: McGraw‐Hill, 1943).</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn11" href="#fn-11"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.312.1">11</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.313.1"> After being investigated and testifying in front of Congress, White suffered two heart attacks and died from an overdose of medication, which may have been suicide. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.313.2">A good treatment of this episode can be found in Benn Steil's </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.314.1">The Battle of Bretton Woods</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.315.1">, which pushes the view that White was a Soviet spy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.315.2">An alternative reading of the situation can produce a more nuanced perspective, though hardly more flattering. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.315.3">The links between American progressives and Russian Communists precede the 1917 Russian putsch, and included significant U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.315.4">funding to the Bolsheviks to depose the Russian monarchy, as thoroughly detailed by British–American historian Antony Sutton. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.315.5">Wilsonian American progressives, who were behind the League of Nations and later the United Nations, had sought a global democratic progressive technocratic managerial world government, and sought cooperation with global forces that would be supportive of this goal, and to depose reactionary monarchies that would not cooperate with this world order. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.315.6">Hence, American interests played a leading role in promoting the Bolsheviks and helping them take power, particularly through Leon Trotsky, who was in New York during the revolution, channeling funding and arms to his comrades in Russia. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.315.7">Whereas Trotsky was an internationalist socialist who would have cooperated with American interests, he was not to gain power in Russia, and instead Stalin was to succeed Lenin, and head in a more parochial direction, prioritizing socialism at home over global cooperation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.315.8">From then on, American progressives maintained contact with Russian interests, attempting to sway Russia back into cooperation with American progressive interests, but to no avail. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.315.9">We can thus better understand White not as a Communist spy, but as an American progressive who sought cooperation with Russian Bolsheviks for the grand project of the postwar economic order the American progressives sought.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn12" href="#fn-12"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.316.1">12</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.317.1"> U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.317.2">Department of State, “Volume I” in </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.318.1">Proceedings and Documents of the United Nations Monetary and Financial Conference</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.319.1">, Bretton Woods, New Hampshire, July 1–22, 1944.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn13" href="#fn-13"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.320.1">13</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.321.1"> Hans‐Hermann Hoppe, “How Is Fiat Money Possible?” </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.322.1">Review of Austrian Economics</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.323.1">, vol. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.323.2">7, no. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.323.3">2 (1994).</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn14" href="#fn-14"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.324.1">14</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.325.1"> This is an important but often underappreciated feature of government money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.325.2">Because banks create money when they issue loans, the repayment of loans or the bankruptcy of the borrower leads to a reduction in the money supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.325.3">Money can have its supply increase or decrease depending on a variety of government and central bank decisions.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn15" href="#fn-15"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.326.1">15</span></a> <i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.327.1">Source</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.328.1">: World Bank.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn16" href="#fn-16"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.329.1">16</span></a> <i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.330.1">Source</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.331.1">: World Bank for all countries, and OECD.Stat for Euro area.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn17" href="#fn-17"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.332.1">17</span></a> <i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.333.1">Source</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.334.1">: OECD.Stat.</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn18" href="#fn-18"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.335.1">18</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.336.1"> Steve Hanke and Charles Bushnell, “Venezuela Enters the Record Book: The 57th Entry in the Hanke‐Krus World Hyperinflation Table,” </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.337.1">Studies in Applied Economics</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.338.1">, no. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.338.2">69 (December 2016).</span></aside>
<aside class="noteEntry" epub:type="rearnote"><a id="fn19" href="#fn-19"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.339.1">19</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.340.1"> This is termed the Cantillon Effect, after the Irish‐French economist Richard Cantillon, who explained it in the eighteenth century. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.340.2">According to Cantillon, the beneficiaries from the expansion of the money supply are the first recipients of the new money, who are able to spend it before it has caused prices to rise. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.340.3">Whoever receives it from them is then able to spend it facing a small increase in the price level. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.340.4">As the money is spent more, the price level rises, until the later recipients suffer a reduction in their real purchasing power. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.340.5">This is the best explanation for why inflation hurts the poorest and helps the richest in the modern economy. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.340.6">Those who benefit from it most are the ones with the best access to government credit, and the ones who are hurt the most are those on fixed incomes or minimum wages.</span></aside>
