<section epub:type="chapter">
<header>
<h1><span epub:type="pagebreak" title="17" id="Page_17"/><a id="c03"/><span class="chapterNumber"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.1.1">Chapter 3</span></span><br/><span class="chapterTitle"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.2.1">Monetary Metals</span></span></h1>
</header>
<section><span id="c03-sec-0001"/>
<p id="c03-para-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.1">As human technical capacity for the production of goods became more sophisticated, and our utilization of metals and commodities grew, many metals started getting produced at large enough quantities and were in large enough demand to make them highly salable and suited for being used as monetary media. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.2">These metals' density and relatively high value made moving them around easy, easier than salt or cattle, making them highly salable across space. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.3">The production of metals was initially not easy, making it hard to increase their supply quickly and giving them good salability across time.</span></p>
<p id="c03-para-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.1">Due to their durability and physical properties, as well as their relative abundance in earth, some metals were more valuable than others. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.2">Iron and copper, because of their relatively high abundance and their susceptibility to corrosion, could be produced in increasing quantities. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.3">Existing stockpiles would be dwarfed by new production, destroying the value in them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.4">These metals developed a relatively low market value and would be used for smaller transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.5">Rarer metals such as silver and gold, on the other hand, were more durable and less likely to corrode or ruin, making them more salable across time</span><span epub:type="pagebreak" title="18" id="Page_18"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.5.1"> and useful as a store of value into the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.5.2">Gold's virtual indestructibility, in particular, allowed humans to store value across generations, thus allowing us to develop a longer time horizon orientation.</span></p>
<p id="c03-para-0003"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.1">Initially, metals were bought and sold in terms of their weight,</span><sup><a id="fn-1" href="#fn1"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.7.1">1</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.1"> but over time, as metallurgy advanced, it became possible to mint them into uniform coins and brand them with their weight, making them far more salable by saving people from having to weigh and assess the metals every time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.2">The three metals most widely used for this role were gold, silver, and copper, and their use as coins was the prime form of money for around 2,500 years, from the time of the Greek king Croesus, who was the first recorded to have minted gold coins, to the early twentieth century. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.3">Gold coins were the goods most salable across time, because they could hold their value over time and resist decay and ruin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.4">They were also the goods most salable across space, because they carried a lot of value in small weights, allowing for easy transportation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.5">Silver coins, on the other hand, had the advantage of being the most salable good across scales, because their lower value per weight unit compared to gold allowed for them to conveniently serve as a medium of exchange for small transactions, while bronze coins would be useful for the least valuable transactions. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.6">By standardizing values into easily identifiable units, coins allowed for the creation of large markets, increasing the scope of specialization and trade worldwide. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.7">While the best monetary system technologically possible at the time, it still had two major drawbacks: the first was that the existence of two or three metals as the monetary standard created economic problems from the fluctuation of their values over time due to the ebbs of supply and demand, and created problems for owners of these coins, particularly silver, which experienced declines in value due to increases in production and drops in demand. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.8">The second, more serious flaw was that governments and counterfeiters could, and frequently did, reduce the precious metal content in these coins, causing their value to decline by transferring a fraction of their purchasing power to the counterfeiters or the government. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.9">The reduction in the metal content of the coins compromised the purity and soundness of the money.</span></p>
<p id="c03-para-0004"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.1">By the nineteenth century, however,</span><span epub:type="pagebreak" title="19" id="Page_19"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.1"> with the development of modern banking and the improvement in methods of communication, individuals could transact with paper money and checks backed by gold in the treasuries of their banks and central banks. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.2">This made gold‐backed transactions possible at any scale, thus obviating the need for silver's monetary role, and gathering all essential monetary salability properties in the gold standard. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.3">The gold standard allowed for unprecedented global capital accumulation and trade by uniting the majority of the planet's economy on one sound market‐based choice of money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.4">Its tragic flaw, however, was that by centralizing the gold in the vaults of banks, and later central banks, it made it possible for banks and governments to increase the supply of money beyond the quantity of gold they held, devaluing the money and transferring part of its value from the money's legitimate holders to the governments and banks.</span></p></section>
<section><span id="c03-sec-0002"/>
<h2 id="head-2-3"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.11.1">Why Gold?</span></h2>
<p id="c03-para-0005"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.1">To understand how commodity money emerges, we return in more detail to the easy money trap we first introduced in </span><a href="c01.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.1">Chapter 1</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.14.1">, and begin by differentiating between a good's </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.15.1">market demand</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.16.1"> (demand for consuming or holding the good for its own sake) and its </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.17.1">monetary demand</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.1"> (demand for a good as a medium of exchange and store of value). </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.2">Any time a person chooses a good as a store of value, she is effectively increasing the demand for it beyond the regular market demand, which will cause its price to rise. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.3">For example, market demand for copper in its various industrial uses is around 20 million tons per year, at a price of around $5,000 per ton, and a total market valued around $100 billion. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.4">Imagine a billionaire deciding he would like to store $10 billion of his wealth in copper. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.5">As his bankers run around trying to buy 10% of annual global copper production, they would inevitably cause the price of copper to increase. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.6">Initially, this sounds like a vindication of the billionaire's monetary strategy: the asset he decided to buy has already appreciated before he has even completed his purchase. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.7">Surely, he reasons, this appreciation will cause more people to buy more copper as a store of value, bringing the price up even more.</span></p>
<p id="c03-para-0006"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.19.1">But even if more people join him in</span><span epub:type="pagebreak" title="20" id="Page_20"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.1"> monetizing copper, our hypothetical copper‐obsessed billionaire is in trouble. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.2">The rising price makes copper a lucrative business for workers and capital across the world. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.3">The quantity of copper under the earth is beyond our ability to even measure, let alone extract through mining, so practically speaking, the only binding restraint on how much copper can be produced is how much labor and capital is dedicated to the job. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.4">More copper can always be made with a higher price, and the price and quantity will continue to rise until they satisfy the monetary investors' demand; let's assume that happens at 10 million extra tons and $10,000 per ton. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.5">At some point, monetary demand must subside, and some holders of copper will want to offload some of their stockpiles to purchase other goods, because, after all, that was the point of buying copper.</span></p>
<p id="c03-para-0007"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.1">After the monetary demand subsides, all else being equal, the copper market would go back to its original supply‐and‐demand conditions, with 20 million annual tons selling for $5,000 each. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.2">But as the holders begin to sell their accumulated stocks of copper, the price will drop significantly below that. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.3">The billionaire will have lost money in this process; as he was driving the price up, he bought most of his stock for more than $5,000 a ton, but now his entire stock is valued below $5,000 a ton. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.4">The others who joined him later bought at even higher prices and will have lost even more money than the billionaire himself.</span></p>
<p id="c03-para-0008"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.1">This model is applicable for all consumable commodities such as copper, zinc, nickel, brass, or oil, which are primarily consumed and destroyed, not stockpiled. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.2">Global stockpiles of these commodities at any moment in time are around the same order of magnitude as new annual production. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.3">New supply is constantly being generated to be consumed. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.4">Should savers decide to store their wealth in one of these commodities, their wealth will only buy a fraction of global supply before bidding the price up enough to absorb all their investment, because they are competing with the consumers of this commodity who use it productively in industry. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.5">As the revenue to the producers of the good increases, they can then invest in increasing their production, bringing the price crashing down again, robbing the savers of their wealth. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.6">The net effect of this entire episode is the transfer of the wealth of the misguided savers to the producers of the commodity they purchased.</span></p>
<p id="c03-para-0009"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.1">This is the anatomy of a market</span><span epub:type="pagebreak" title="21" id="Page_21"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.1"> bubble: increased demand causes a sharp rise in prices, which drives further demand, raising prices further, incentivizing increased production and increased supply, which inevitably brings prices down, punishing everyone who bought at a price higher than the usual market price. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.2">Investors in the bubble are fleeced while producers of the asset benefit. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.3">For copper and almost every other commodity in the world, this dynamic has held true for most of recorded history, consistently punishing those who choose these commodities as money by devaluing their wealth and impoverishing them in the long run, and returning the commodity to its natural role as a market good, and not a medium of exchange.</span></p>
<p id="c03-para-0010"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.1">For anything to function as a good store of value, it has to beat this trap: it has to appreciate when people demand it as a store of value, but its producers have to be constrained from inflating the supply significantly enough to bring the price down. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.2">Such an asset will reward those who choose it as their store of value, increasing their wealth in the long run as it becomes the prime store of value, because those who chose other commodities will either reverse course by copying the choice of their more successful peers, or will simply lose their wealth.</span></p>
<p id="c03-para-0011"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.1">The clear winner in this race throughout human history has been gold, which maintains its monetary role due to two unique physical characteristics that differentiate it from other commodities: first, gold is so chemically stable that it is virtually impossible to destroy, and second, gold is impossible to synthesize from other materials (alchemists' claims notwithstanding) and can only be extracted from its unrefined ore, which is extremely rare in our planet.</span></p>
<p id="c03-para-0012"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.27.1">The chemical stability of gold implies that virtually all of the gold ever mined by humans is still more or less owned by people around the world. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.27.2">Humanity has been accumulating an ever‐growing hoard of gold in jewelry, coins, and bars, which is never consumed and never rusts or disintegrates. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.27.3">The impossibility of synthesizing gold from other chemicals means that the only way to increase the supply of gold is by mining gold from the earth, an expensive, toxic, and uncertain process in which humans have been engaged for thousands of years with ever‐diminishing returns. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.27.4">This all means that the existing stockpile of gold held by people around the world is the product of thousands of years of gold production, and is orders of magnitude larger than new annual production. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.27.5">Over the past seven decades with relatively</span><span epub:type="pagebreak" title="22" id="Page_22"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.28.1"> reliable statistics, this growth rate has always been around 1.5%, never exceeding 2%. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.28.2">(See </span><a id="R_c03-fig-0001" href="#c03-fig-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.1">Figure 1</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.1">.</span><sup><a id="fn-2" href="#fn2"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.31.1">2</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.1">)</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.1"><img alt="Graphical illustration of global gold stockpiles and annual stockpile growth rate." src="images/c03f001.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c03-fig-0001" id="c03-fig-0001"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.34.1">Figure 1</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.1"> Global gold stockpiles and annual stockpile growth rate.</span></p></figcaption></figure>
<p id="c03-para-0013"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.1">To understand the difference between gold and any consumable commodity, imagine the effect of a large increase in demand for it as a store of value that causes the price to spike and annual production to double. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.2">For any consumable commodity, this doubling of output will dwarf any existing stockpiles, bringing the price crashing down and hurting the holders. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.3">For gold, a price spike that causes a doubling of annual production will be insignificant, increasing stockpiles by 3% rather than 1.5%. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.4">If the new increased pace of production is maintained, the stockpiles grow faster, making new increases less significant. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.5">It remains practically impossible for goldminers to mine quantities of gold large enough to depress the price significantly.</span></p>
<p id="c03-para-0014"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.1">Only silver comes close to gold in this regard, with an annual supply growth rate historically around 5–10%, rising to around 20% in the modern day. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.2">This is higher than that of gold for two reasons: First, silver does corrode and can be consumed in industrial processes, which means the existing stockpiles are not as large relative to annual production as gold's stockpiles are relative to its annual production. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.3">Second, silver is less rare than gold in the crust of the earth and easier to refine. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.4">Because of having the second highest stock‐to‐flow ratio, and its lower value per unit of weight than gold, silver served for millennia as the main money used for smaller transactions, complementing gold, whose high value meant dividing it into smaller units, which was not very practical. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.5">The adoption of the international gold standard allowed for payments in paper backed by gold at any scale, as will be discussed in more detail later in this chapter, which obviated silver's monetary role. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.6">With silver no longer required for smaller transactions, it soon lost its monetary role and became an industrial metal, losing value compared to gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.7">Silver may maintain its sporting connotation for second place, but as nineteenth‐century technology made payments possible without having to move the monetary unit itself, second place in monetary competition was equivalent to losing out.</span></p>
<p id="c03-para-0015"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.1">This explains why the silver bubble has popped before and will pop again if it ever inflates: as soon as significant monetary investment flows into silver, it is not as difficult for producers to increase the supply significantly and bring the price crashing down, taking the savers' wealth in the process. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.2">The best‐known example of the easy‐money trap comes from silver itself, of all commodities. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.3">Back in the late 1970s, the very affluent Hunt brothers decided to bring about the remonetization of silver and started buying enormous quantities of silver, driving the price up. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.4">Their rationale was that as the price rose, more people would want to buy, which would keep the price rising, which in turn would lead to people wanting to be paid in silver. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.5">Yet, no matter how much the Hunt brothers bought, their wealth was no match for the ability of miners and holders of silver to keep selling silver onto the market. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.6">The price of silver eventually crashed and the Hunt brothers lost over $1bn, probably the highest price ever paid for learning the importance of the stock‐to‐flow ratio, and why not all that glitters is gold.</span><sup><a id="fn-3" href="#fn3"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.1">3</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.1"> (See </span><a id="R_c03-fig-0002" href="#c03-fig-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.1">Figure 2</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.1">.</span><sup><a id="fn-4" href="#fn4"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.1">4</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.44.1">)</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.45.1"><img alt="Bar graph representation of existing stockpiles as a multiple of annual production." src="images/c03f002.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c03-fig-0002" id="c03-fig-0002"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.46.1">Figure 2</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.47.1"> Existing stockpiles as a multiple of annual production.</span></p></figcaption></figure>
<p id="c03-para-0016"><span epub:type="pagebreak" title="23" id="Page_23"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.1">It is this consistently low rate of supply of gold that is the fundamental reason it has maintained its monetary role throughout human history, a role it continues to hold today as central banks continue to hold significant supplies of gold to protect their paper currencies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.2">Official central bank reserves are at around 33,000 tons, or a sixth of total above‐ground gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.3">The high</span><span epub:type="pagebreak" title="24" id="Page_24"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.1"> stock‐to‐flow ratio of gold makes it the commodity with the lowest </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.50.1">price elasticity of supply</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.1">, which is defined as the percentage increase in quantity supplied over the percentage increase in price. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.2">Given that the existing supply of gold held by people everywhere is the product of thousands of years of production, an </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.1">X</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.1">% increase in price may cause an increase in new mining production, but that increase will be trivial compared to existing stockpiles. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.2">For instance, the year 2006 witnessed a 36% rise in the spot price of gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.3">For any other commodity, this would be expected to increase mining output significantly to flood markets and bring the price down. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.4">Instead, annual production in 2006 was 2,370 tons, 100 tons less than in 2005, and it would drop a further 10 tons in 2007. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.5">Whereas the new supply was 1.67% of existing stockpiles in 2005, it was 1.58% of existing stockpiles in 2006, and 1.54% of existing stockpiles in 2007. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.6">Even a 35% rise in price can lead to no appreciable increase in the supply of new gold onto the market. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.7">According to the U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.8">Geological Survey, the single biggest annual increase in production was around 15% in the year 1923, which translated to an increase in stockpiles around only 1.5%. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.9">Even if production were to double, the likely increase in stockpiles would only be around 3–4%. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.10">The highest annual increase in global stockpiles happened in 1940, when stockpiles rose by around 2.6%. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.11">Not once has the annual stockpile growth exceeded that number, and not once since 1942 has it exceeded 2%.</span></p>
<p id="c03-para-0017"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.54.1">As the production of metals</span><span epub:type="pagebreak" title="25" id="Page_25"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.1"> began to proliferate, ancient civilizations in China, India, and Egypt began to use copper, and later silver, as money, as these two were relatively hard to manufacture at the time and allowed for good salability across time and space. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.2">Gold was highly prized in these civilizations, but its rarity meant its salability for transactions was limited. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.3">It was in Greece, the birthplace of modern civilization, where gold was first minted into regular coins for trade, under King Croesus. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.4">This invigorated global trade as gold's global appeal saw the coin spread far and wide. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.5">Since then, the turns of human history have been closely intertwined with the soundness of money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.6">Human civilization flourished in times and places where sound money was widely adopted, while unsound money all too frequently coincided with civilizational decline and societal collapse.</span></p></section>
<section><span id="c03-sec-0003"/>
<h2 id="head-2-4"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.1">Roman Golden Age and Decline</span></h2>
<p id="c03-para-0018"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.1">The denarius was the silver coin that traded at the time of the Roman Republic, containing 3.9 grams of silver, while gold became the most valuable money in the civilized areas of the world at the time and gold coins were becoming more widespread. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.2">Julius Caesar, the last dictator of the Roman Republic, created the aureus coin, which contained around 8 grams of gold and was widely accepted across Europe and the Mediterranean, increasing the scope of trade and specialization in the Old World. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.3">Economic stability reigned for 75 years, even through the political upheaval of his assassination, which saw the Republic transformed into an Empire under his chosen successor, Augustus. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.4">This continued until the reign of the infamous emperor Nero, who was the first to engage in the Roman habit of “coin clipping,” wherein the Emperor would collect the coins of the population and mint them into newer coins with less gold or silver content.</span></p>
<p id="c03-para-0019"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.58.1">For as long as Rome could conquer new lands with significant wealth, its soldiers and emperors could enjoy spending their loot, and emperors even decided to buy themselves popularity by mandating artificially low prices of grains and other staples, sometimes even granting them for free. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.58.2">Instead of working for a living in the countryside, many peasants would leave their farms to move to Rome, where they could live better lives</span><span epub:type="pagebreak" title="26" id="Page_26"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.59.1"> for free. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.59.2">With time, the Old World no longer had prosperous lands to be conquered, the ever‐increasing lavish lifestyle and growing military required some new source of financing, and the number of unproductive citizens living off the emperor's largesse and price controls increased. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.59.3">Nero, who ruled from 54–68 AD, had found the formula to solve this, which was highly similar to Keynes's solution to Britain's and the U.S.'s problems after World War I: devaluing the currency would at once reduce the real wages of workers, reduce the burden of the government in subsidizing staples, and provide increased money for financing other government expenditure.</span></p>
<p id="c03-para-0020"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.1">The aureus coin was reduced from 8 to 7.2 grams, while the denarius's silver content was reduced from 3.9 to 3.41g. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.2">This provided some temporary relief, but had set in motion the highly destructive self‐reinforcing cycle of popular anger, price controls, coin debasement, and price rises, following one another with the predictable regularity of the four seasons.</span><sup><a id="fn-5" href="#fn5"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.1">5</span></a></sup></p>
<p id="c03-para-0021"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.1">Under the reign of Caracalla (AD 211–217), the gold content was further reduced to 6.5 grams, and under Diocletian (AD 284–305) it was further reduced to 5.5g, before he introduced a replacement coin called the solidus, with only 4.5 grams of gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.2">On Diocletian's watch, the denarius only had traces of silver to cover its bronze core, and the silver would disappear quite quickly with wear and tear, ending the denarius as a silver coin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.3">As inflationism intensified in the third and fourth centuries, with it came the misguided attempts of the emperors to hide their inflation by placing price controls on basic goods. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.4">As market forces sought to adjust prices upward in response to the debasement of the currency, price ceilings prevented these price adjustments, making it unprofitable for producers to engage in production. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.5">Economic production would come to a standstill until a new edict allowed for the liberalization of prices upward.</span></p>
<p id="c03-para-0022"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.1">With this fall in the value of its money, the long process of terminal decline of the empire resulted in a cycle that might appear familiar to modern readers: coin clipping reduced the aureus's real value, increasing the money supply, allowing the</span><span epub:type="pagebreak" title="27" id="Page_27"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.1"> emperor to continue imprudent overspending, but eventually resulting in inflation and economic crises, which the misguided emperors would attempt to ameliorate via further coin clipping. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.2">Ferdinand Lips summarizes this process with a lesson to modern readers:
</span></p>
<blockquote>
<p id="c03-para-0023"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.65.1">It should be of interest to modern Keynesian economists, as well as to the present generation of investors, that although the emperors of Rome frantically tried to “manage” their economies, they only succeeded in making matters worse. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.65.2">Price and wage controls and legal tender laws were passed, but it was like trying to hold back the tides. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.65.3">Rioting, corruption, lawlessness and a mindless mania for speculation and gambling engulfed the empire like a plague. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.65.4">With money so unreliable and debased, speculation in commodities became far more attractive than producing them.</span><sup><a id="fn-6" href="#fn6"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.1">6</span></a></sup></p></blockquote>
<p id="c03-para-0024"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.1">The long‐term consequences for the Roman Empire were devastating. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.2">Although Rome up until the second century AD may not be characterized as a full‐fledged free market capitalist economy, because it still had plenty of government restraints on economic activity, with the aureus it nonetheless established what was then the largest market in human history with the largest and most productive division of labor the world had ever known.</span><sup><a id="fn-7" href="#fn7"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.1">7</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.1"> Citizens of Rome and the major cities obtained their basic necessities by trade with the far‐flung corners of the empire, and this helps explain the growth in prosperity, and the devastating collapse the empire suffered when this division of labor fell apart. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.2">As taxes increased and inflation made price controls unworkable, the urbanites of the cities started fleeing to empty plots of land where they could at least have a chance of living in self‐sufficiency, where their lack of income spared them having to pay taxes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.3">The intricate civilizational edifice of the Roman Empire and the large division of labor across Europe and the Mediterranean began to crumble, and its descendants became self‐sufficient peasants scattered in isolation and would soon turn into serfs living under feudal lords.</span></p></section>
<section><span id="c03-sec-0004"/>
<h2 id="head-2-5"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.70.1">Byzantium and the Bezant</span></h2>
<p id="c03-para-0025"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.1">The emperor Diocletian has forever</span><span epub:type="pagebreak" title="28" id="Page_28"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.1"> had his name associated with fiscal and monetary chicanery, and the Empire reached a nadir under his rule. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.2">A year after he abdicated, however, Constantine the Great took over the reins of the empire and reversed its fortunes by adopting economically responsible polices and reforms. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.3">Constantine, who was the first Christian emperor, committed to maintaining the solidus at 4.5 grams of gold without clipping or debasement and started minting it in large quantities in 312 AD. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.4">He moved east and established Constantinople at the meeting point of Asia and Europe, birthing the Eastern Roman Empire, which took the solidus as its coin. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.5">While Rome continued its economic, social, and cultural deterioration, finally collapsing in 476 AD, Byzantium survived for 1,123 years while the solidus became the longest‐serving sound currency in human history.</span></p>
<p id="c03-para-0026"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.1">The legacy of Constantine in maintaining the integrity of the solidus made it the world's most recognizable and widely accepted currency, and it came to be known as the </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.1">bezant</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.1">. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.2">While Rome burned under bankrupt emperors who could no longer afford to pay their soldiers as their currencies collapsed, Constantinople thrived and prospered for many more centuries with fiscal and monetary responsibility. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.3">While the Vandals and the Visigoths ran rampage in Rome, Constantinople remained prosperous and free from invasion for centuries. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.4">As with Rome, the fall of Constantinople happened only after its rulers had started devaluing the currency, a process that historians believe began in the reign of Constantine IX Monomachos (1042–1055).</span><sup><a id="fn-8" href="#fn8"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.1">8</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.1"> Along with monetary decline came the fiscal, military, cultural, and spiritual decline of the Empire, as it trudged on with increasing crises until it was overtaken by the Ottomans in 1453.</span></p>
<p id="c03-para-0027"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.78.1">Even after it was debased and its empire fell, the bezant lived on by inspiring another form of sound money that continues to circulate widely to this day in spite of not being the official currency of any nation anymore, and that is the Islamic dinar. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.78.2">As Islam rose during the golden age of Byzantium, the bezant and coins similar to it in weight and size were circulating in the regions to which</span><span epub:type="pagebreak" title="29" id="Page_29"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.1"> Islam had spread. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.2">The Umayyad Caliph Abdul‐Malik ibn Marwan defined the weight and value of the Islamic dinar and imprinted it with the Islamic </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.1">shahada</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.1"> creed in 697 AD. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.2">The Umayyad dynasty fell, and after it several other Islamic states, and yet the dinar continues to be held and to circulate widely in Islamic regions in the original weight and size specifications of the bezant, and is used in dowries, gifts, and various religious and traditional customs to this day. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.3">Unlike the Romans and the Byzantines, Arab and Muslim civilizations' collapse was not linked to the collapse of their money as they maintained the integrity of their currencies for centuries. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.4">The solidus, first minted by Diocletian in AD 301, has changed its name to the bezant and the Islamic dinar, but it continues to circulate today. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.5">Seventeen centuries of people the world over have used this coin for transactions, emphasizing the salability of gold across time.</span></p></section>
<section><span id="c03-sec-0005"/>
<h2 id="head-2-6"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.82.1">The Renaissance</span></h2>
<p id="c03-para-0028"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.1">After the economic and military collapse of the Roman Empire, feudalism emerged as the prime mode of organizing society. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.2">The destruction of sound money was pivotal in turning the former citizens of the Roman Empire into serfs under the mercy of their local feudal lords. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.3">Gold was concentrated in the hands of the feudal lords, and the main forms of money available for the peasantry of Europe at the time were copper and bronze coins, whose supply was easy to inflate as industrial production of these metals continued to become easier with the advance of metallurgy, making them terrible stores of value, as well as silver coins that were usually debased, cheated, and nonstandardized across the continent, giving them poor salability across space and limiting the scope of trade across the continent.</span></p>
<p id="c03-para-0029"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.1">Taxation and inflation had destroyed the wealth and savings of the people of Europe. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.2">New generations of Europeans came to the world with no accumulated wealth passed on from their elders, and the absence of a widely accepted sound monetary standard severely restricted the scope for trade, closing societies off from one another and enhancing parochialism as once‐prosperous and civilized trading societies fell into the Dark Ages of serfdom, diseases, closed‐mindedness, and religious persecution.</span></p>
<p id="c03-para-0030"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.1">While it is widely recognized</span><span epub:type="pagebreak" title="30" id="Page_30"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.1"> that the rise of the city‐states dragged Europe out of the Dark Ages and into the Renaissance, the role of sound money in this rise is less recognized. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.2">It was in the city‐states that humans could live with the freedom to work, produce, trade, and flourish, and that was to a large extent the result of these city‐states adopting a sound monetary standard. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.3">It all began in Florence in 1252, when the city minted the florin, the first major European sound coinage since Julius Caesar's aureus. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.4">Florence's rise made it the commercial center of Europe, with its florin becoming the prime European medium of exchange, allowing its banks to flourish across the entire continent. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.5">Venice was the first to follow Florence's example with its minting of the ducat, of the same specifications as the florin</span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.1">,</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.1"> in 1270, and by the end of the fourteenth century more than 150 European cities and states had minted coins of the same specifications as the florin, allowing their citizens the dignity and freedom to accumulate wealth and trade with a sound money that was highly salable across time and space, and divided into small coins, allowing for easy divisibility. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.2">With the economic liberation of the European peasantry came the political, scientific, intellectual, and cultural flourishing of the Italian city‐states, which later spread across the European continent. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.3">Whether in Rome, Constantinople, Florence, or Venice, history shows that a sound monetary standard is a necessary prerequisite for human flourishing, without which society stands on the precipice of barbarism and destruction.</span></p>
<p id="c03-para-0031"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.1">Although the period following the introduction of the florin witnessed an improvement in the soundness of money, with more and more Europeans able to adopt gold and silver for saving and trade, and the extent of markets expanding across Europe and the world, the situation was far from perfect. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.2">There were still many periods during which various sovereigns would debase their people's currency to finance war or lavish expenditure. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.3">Given that they were used physically, silver and gold complemented each other: gold's high stock‐to‐flow ratio meant it was ideal as a long‐term store of value and a means of large payments, but silver's lower value per unit of weight made it easily divisible into quantities suitable for smaller transactions and for being held for shorter durations. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.4">While this arrangement had benefits, it had one major drawback: the fluctuating rate of exchange between gold and silver created trade and calculation problems. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.5">Attempts to fix the price of the two currencies relative to one another were</span><span epub:type="pagebreak" title="31" id="Page_31"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.90.1"> continuously self‐defeating, but gold's monetary edge was to win out.</span></p>
<p id="c03-para-0032"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.1">As sovereigns set an exchange rate between the two commodities, they would change holders' incentives to hold or spend them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.91.2">This inconvenient bimetallism continued for centuries across Europe and the world, but as with the move from salt, cattle, and seashells to metals, the inexorable advance of technology was to provide a solution to it.</span></p>
<p id="c03-para-0033"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.92.1">Two particular technological advancements would move Europe and the world away from physical coins and in turn help bring about the demise of silver's monetary role: the telegraph, first deployed commercially in 1837, and the growing network of trains, allowing transportation across Europe. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.92.2">With these two innovations, it became increasingly feasible for banks to communicate with each other, sending payments efficiently across space when needed and debiting accounts instead of having to send physical payments. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.92.3">This led to the increased use of bills, checks, and paper receipts as monetary media instead of physical gold and silver coins.</span></p>
<p id="c03-para-0034"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.1">More nations began to switch to a monetary standard of paper fully backed by, and instantly redeemable into, precious metals held in vaults. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.2">Some nations would choose gold, and others would choose silver, in a fateful decision that was to have enormous consequences. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.3">Britain was the first to adopt a modern gold standard in 1717, under the direction of physicist Isaac Newton, who was the warden of the Royal Mint, and the gold standard would play a great role in it advancing its trade across its empire worldwide. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.4">Britain would remain under a gold standard until 1914, although it would suspend it during the Napoleonic wars from 1797 to 1821. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.5">The economic supremacy of Britain was intricately linked to its being on a superior monetary standard, and other European countries began to follow it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.6">The end of the Napoleonic wars heralded the beginning of the golden age of Europe, as, one by one, the major European nations began adopting the gold standard. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.93.7">The more nations officially adopted the gold standard, the more marketable gold became and the larger the incentive became for other nations to join.</span></p>
<p id="c03-para-0035"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.94.1">Further, instead of individuals having to carry gold and silver coins for large and small transactions, respectively, they could now store their wealth in gold in banks while using paper receipts, bills, and checks to make payments of any size. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.94.2">The holders of paper receipts could just use them to make payment themselves; bills</span><span epub:type="pagebreak" title="32" id="Page_32"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.1"> were discounted by banks and used for clearance and checks could be cashed from the banks that issued them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.95.2">This solved the problem of gold's salability across scales, making gold the best monetary medium—for as long as the banks hoarding people's gold would not increase the supply of papers they issued as receipts.</span></p>
<p id="c03-para-0036"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.96.1">With these media being backed by physical gold in the vaults and allowing payment in whichever quantity or size, there was no longer a real need for silver's role in small payments. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.96.2">The death knell for silver's monetary role was the end of the Franco‐Prussian war, when Germany extracted an indemnity of £200 million in gold from France and used it to switch to a gold standard. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.96.3">With Germany now joining Britain, France, Holland, Switzerland, Belgium, and others on a gold standard, the monetary pendulum had swung decisively in favor of gold, leading to individuals and nations worldwide who used silver to witness a progressive loss of their purchasing power and a stronger incentive to shift to gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.96.4">India finally switched from silver to gold in 1898, while China and Hong Kong were the last economies in the world to abandon the silver standard in 1935.</span></p>
<p id="c03-para-0037"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.1">For as long as gold and silver were used for payment directly, they both had a monetary role to play and their price relative to one another remained largely constant across time, at a ratio between 12 and 15 ounces of silver per ounce of gold, in the same range as their relative scarcity in the crust of the earth and the relative difficulty and cost of extracting them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.2">But as paper and financial instruments backed by these metals became more and more popular, there was no more justification for silver's monetary role, and individuals and nations shifted to holding gold, leading to a significant collapse in the price of silver, from which it would not recover. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.3">The average ratio between the two over the twentieth century was 47:1, and in 2017, it stood at 75:1. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.4">While gold still has a monetary role to play, as evidenced by central banks' hoarding of it, silver has arguably lost its monetary role. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.97.5">(See </span><a id="R_c03-fig-0003" href="#c03-fig-0003"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.98.1">Figure 3</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.99.1">.</span><sup><a id="fn-9" href="#fn9"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.100.1">9</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.101.1">)</span></p>
<figure>
<span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.102.1"><img alt="Graphical illustration of the price of gold in silver ounces, 1697–2017." src="images/c03f003.jpg"/></span>
<figcaption>
<p><span class="figureLabel"><a href="#R_c03-fig-0003" id="c03-fig-0003"><b><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.103.1">Figure 3</span></b></a></span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.104.1"> Price of gold in silver ounces, 1687–2017.</span></p></figcaption></figure>
<p id="c03-para-0038"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.1">The demonetization of silver had a significantly negative effect on the nations that were using it as a monetary standard at the time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.105.2">India witnessed a continuous devaluation of its rupee compared to gold‐based </span><span epub:type="pagebreak" title="33" id="Page_33"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.1">European countries, which led the British colonial government to increase taxes to finance its operation, leading to growing unrest and resentment of British colonialism. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.2">By the time India shifted the backing of its rupee to the gold‐backed pound sterling in 1898, the silver backing its rupee had lost 56% of its value in the 27 years since the end of the Franco‐Prussian War. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.3">For China, which stayed on the silver standard until 1935, its silver (in various names and forms) lost 78% of its value over the period. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.4">It is the author's opinion that the history of China and India, and their failure to catch up to the West during the twentieth century, is inextricably linked to this massive destruction of wealth and capital brought about by the demonetization of the monetary metal these countries utilized. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.5">The demonetization of silver in effect left the Chinese and Indians in a situation similar to west Africans holding aggri beads as Europeans arrived: domestic hard money was easy money for foreigners, and was being driven out by foreign hard money, which allowed foreigners to control and own increasing quantities of the capital and resources of China and India during the period. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.6">This is a historical lesson of immense significance, and should be kept in mind by anyone who thinks his refusal of Bitcoin means he doesn't have to deal with it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.106.7">History shows it is not</span><span epub:type="pagebreak" title="34" id="Page_34"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.107.1"> possible to insulate yourself from the consequences of others holding money that is harder than yours.</span></p>
<p id="c03-para-0039"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.108.1">With gold in the hands of increasingly centralized banks, it gained salability across time, scales, and location, but lost its property as cash money, making payments in it subject to the agreement of the financial and political authorities issuing receipts, clearing checks, and hoarding the gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.108.2">Tragically, the only way gold was able to solve the problems of salability across scales, space, and time was by being centralized and thus falling prey to the major problem of sound money emphasized by the economists of the twentieth century: individual sovereignty over money and its resistance to government centralized control. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.108.3">We can thus understand why nineteenth‐century sound money economists like Menger focused their understanding of money's soundness on its salability as a market good, whereas twentieth‐century sound money economists, like Mises, Hayek, Rothbard, and Salerno, focused their analysis of money's soundness on its resistance to control by a sovereign. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.108.4">Because the Achilles heel of 20th century money was its centralization in the hands of the government, we will see later how the money invented in the twenty‐first century, Bitcoin, was designed primarily to avoid centralized control.</span></p></section>
<section><span id="c03-sec-0006"/>
<h2 id="head-2-7"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.109.1">La Belle Époque</span></h2>
<p id="c03-para-0040"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.110.1">The end of the Franco‐Prussian War in 1871, and the consequent shift of all major European powers onto the same monetary standard, namely gold, led to a period of prosperity and flourishing that continues to appear more amazing with time and in retrospect. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.110.2">A case can be made for the nineteenth century—in particular, the second half of it—being the greatest period for human flourishing, innovation, and achievement that the world had ever witnessed, and the monetary role of gold was pivotal to it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.110.3">With silver and other media of exchange increasingly demonetized, the majority of the planet used the same golden monetary standard, allowing the improvements in telecommunications and transportation to foster global capital accumulation and trade like never before.</span></p>
<p id="c03-para-0041"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.111.1">Different currencies were simply different weights of physical gold, and the exchange rate between one nation's currency and the other was the simple conversion between</span><span epub:type="pagebreak" title="35" id="Page_35"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.1"> different weight units, as straightforward as converting inches to centimeters. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.2">The British pound was defined as 7.3 grams of gold, while the French franc was 0.29 grams of gold and the Deutschmark 0.36 grams, meaning the exchange rate between them was necessarily fixed at 26.28 French francs and 24.02 Deutschmark per pound. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.3">In the same way metric and imperial units are just a way to measure the underlying length, national currencies were just a way to measure economic value as represented in the universal store of value, gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.4">Some countries' gold coins were fairly salable in other countries, as they were just gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.5">Each country's money supply was not a metric to be determined by central planning committees stocked with Ph.D. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.6">holders, but the natural working of the market system. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.112.7">People held as much money as they pleased and spent as much as they desired on local or foreign production, and the actual money supply was not even easily measurable.</span></p>
<p id="c03-para-0042"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.113.1">The soundness of money was reflected in free trade across the world, but perhaps more importantly, was increasing savings rates across most advanced societies that were on the gold standard, allowing for capital accumulation to finance industrialization, urbanization, and the technological improvements that have shaped our modern life. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.113.2">(See </span><a id="R_c03-tbl-0001" href="#c03-tbl-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.114.1">Table 1</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.115.1">.</span><sup><a id="fn-10" href="#fn10"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.116.1">10</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.117.1">)</span></p>
