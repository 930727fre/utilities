<p id="c03-para-0043"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.1">By 1900, around 50 nations were officially on the gold standard, including all industrialized nations, while the nations that were not on an official gold standard still had gold coins being used as the main medium of exchange. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.147.2">Some of the most important</span><span epub:type="pagebreak" title="36" id="Page_36"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.148.1"> technological, medical, economic, and artistic human achievements were invented during the era of the gold standard, which partly explains why it was known as </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.149.1">la belle époque</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.150.1">, or the beautiful era, across Europe. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.150.2">Britain witnessed the peak years of Pax Britannica, where the British Empire expanded worldwide and was not engaged in large military conflicts. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.150.3">In 1899, when American writer Nellie Bly set out on her record‐breaking journey around the world in 72 days, she carried British gold coins and Bank of England notes with her.</span><sup><a id="fn-11" href="#fn11"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.151.1">11</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.152.1"> It was possible to circumnavigate the globe and use one form of money everywhere Nellie went.</span></p>
<p id="c03-para-0044"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.153.1">In the United States this era was called the Gilded Age, where economic growth boomed after the restoration of the gold standard in 1879 in the wake of the American Civil War. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.153.2">It was only interrupted by one episode of monetary insanity, which was effectively the last dying pang of silver as money, discussed in </span><a href="c06.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.154.1">Chapter 6</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.155.1">, when the Treasury tried to remonetize silver by mandating it as money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.155.2">This caused a large increase in the money supply and a bank run by those seeking to sell Treasury notes and silver to gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.155.3">The result was the recession of 1893, after which U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.155.4">economic growth resumed.</span></p>
<p id="c03-para-0045"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.1">With the majority of the world on one sound monetary unit, there was never a period that witnessed as much capital accumulation, global trade, restraint on government, and transformation of living standards worldwide. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.2">Not only were the economies of the west far freer back then, the societies themselves were far freer. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.3">Governments had very few bureaucracies focused on micromanaging the lives of citizens. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.156.4">As Mises described it:
</span></p>
<blockquote>
<p id="c03-para-0046"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.157.1">The gold standard was the world standard of the age of capitalism, increasing welfare, liberty, and democracy, both political and economic. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.157.2">In the eyes of the free traders its main eminence was precisely the fact that it was an international standard as required by international trade and the transactions of the international money and capital markets. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.157.3">It was the medium of exchange by means of which Western industrialism and Western capital had borne Western civilization to the remotest parts of the earth's surface, everywhere destroying the fetters of old‐aged prejudices and superstitions, sowing the seeds of new life and new well‐being,</span><span epub:type="pagebreak" title="37" id="Page_37"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.158.1"> freeing minds and souls, and creating riches unheard of before. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.158.2">It accompanied the triumphal unprecedented progress of Western liberalism ready to unite all nations into a community of free nations peacefully cooperating with one another.</span></p>
<p id="c03-para-0047"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.159.1">It is easy to understand why people viewed the gold standard as the symbol of this greatest and most beneficial of all historical changes.</span><sup><a id="fn-12" href="#fn12"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.160.1">12</span></a></sup></p></blockquote>
<p id="c03-para-0048"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.161.1">This world came crashing down in the catastrophic year 1914, which was not only the year of the outbreak of World War I, but the year that the world's major economies went off of the gold standard and replaced it with unsound government money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.161.2">Only Switzerland and Sweden, who remained neutral during World War I, were to remain on a gold standard into the 1930s. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.161.3">The era of government‐controlled money was to commence globally after that, with unmitigated disastrous consequences.</span></p>
<p id="c03-para-0049"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.162.1">While the gold standard of the nineteenth century was arguably the closest thing that the world had ever seen to an ideal sound money, it nonetheless had its flaws. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.162.2">First, governments and banks were always creating media of exchange beyond the quantity of gold in their reserves. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.162.3">Second, many countries used not just gold in their reserves, but also currencies of other countries. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.162.4">Britain, as the global superpower at that time, had benefited from having its money used as a reserve currency all around the world, resulting in its reserves of gold being a tiny fraction of its outstanding money supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.162.5">With growing international trade relying on settlement of large quantities of money across the world, the Bank of England's banknotes became, in the minds of many at the time, “as good as gold.” </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.162.6">While gold was very hard money, the instruments used for settlements of payments between central banks, although nominally redeemable in gold, ended up in practice being easier to produce than gold.</span></p>
<p id="c03-para-0050"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.163.1">These two flaws meant that the gold standard was always vulnerable to a run on gold in any country where circumstances might lead a large enough percentage of the population to demand redemption of their paper money in gold. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.163.2">The fatal flaw of the gold standard at the heart of these two problems was that settlement in physical gold is cumbersome, expensive, and insecure,</span><span epub:type="pagebreak" title="38" id="Page_38"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.164.1"> which meant it had to rely on centralizing physical gold reserves in a few locations—banks and central banks—leaving them vulnerable to being taken over by governments. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.164.2">As the number of payments and settlements conducted in physical gold became an infinitely smaller fraction of all payments, the banks and central banks holding the gold could create money unbacked by physical gold and use it for settlement. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.164.3">The network of settlement became valuable enough that its owners' credit was effectively monetized. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.164.4">As the ability to run a bank started to imply money creation, governments naturally gravitated to taking over the banking sector through central banking. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.164.5">The temptation was always too strong, and the virtually infinite financial wealth this secured could not only silence dissent, but also finance propagandists to promote such ideas. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.164.6">Gold offered no mechanism for restraining the sovereigns, and had to rely on trust in them not abusing the gold standard and the population remaining eternally vigilant against them doing so. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.164.7">This might have been feasible when the population was highly educated and knowledgeable about the dangers of unsound money, but with every passing generation displaying the intellectual complacence that tends to accompany wealth,</span><sup><a id="fn-13" href="#fn13"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.165.1">13</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.166.1"> the siren song of con artists and court‐jester economists would prove increasingly irresistible for more of the population, leaving only a minority of knowledgeable economists and historians fighting an uphill battle to convince people that wealth can't be generated by tampering with the money supply, that allowing a sovereign the control of the money can only lead to them increasing their control of everyone's life, and that civilized human living itself rests on the integrity of money providing a solid foundation for trade and capital accumulation.</span></p>
<p id="c03-para-0051"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.167.1">Gold being centralized made it vulnerable to having its monetary role usurped by its enemies, and gold simply had too many enemies, as Mises himself well understood:
</span></p>
<blockquote>
<p id="c03-para-0052"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.1">The nationalists are fighting the gold standard because they want to sever their countries from the world market and to establish national autarky as far as possible. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.168.2">Interventionist governments and pressure groups are fighting the gold standard because they consider it the most serious obstacle to their endeavours</span><span epub:type="pagebreak" title="39" id="Page_39"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.169.1"> to manipulate prices and wage rates. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.169.2">But the most fanatical attacks against gold are made by those intent upon credit expansion. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.169.3">With them credit expansion is the panacea for all economic ills.</span><sup><a id="fn-14" href="#fn14"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.170.1">14</span></a></sup></p>
<p id="c03-para-0053"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.171.1">The gold standard removes the determination of cash‐induced changes in purchasing power from the political arena. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.171.2">Its general acceptance requires the acknowledgement of the truth that one cannot make all people richer by printing money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.171.3">The abhorrence of the gold standard is inspired by the superstition that omnipotent governments can create wealth out of little scraps of paper […] The governments were eager to destroy it, because they were committed to the fallacies that credit expansion is an appropriate means of lowering the rate of interest and of “improving” the balance of trade […] People fight the gold standard because they want to substitute national autarky for free trade, war for peace, totalitarian government omnipotence for liberty.</span><sup><a id="fn-15" href="#fn15"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.172.1">15</span></a></sup></p></blockquote>
<p id="c03-para-0054"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.1">The twentieth century began with governments bringing their citizens' gold under their control through the invention of the modern central bank on the gold standard. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.2">As World War I started, the centralization of these reserves allowed these governments to expand the money supply beyond their gold reserves, reducing the value of their currency. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.3">Yet central banks continued to confiscate and accumulate more gold until the 1960s, where the move toward a U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.4">dollar global standard began to shape up. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.5">Although gold was supposedly demonetized fully in 1971, central banks continued to hold significant gold reserves, and only disposed of them slowly, before returning to buying gold in the last decade. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.6">Even as central banks repeatedly declared the end of gold's monetary role, their actions in maintaining their gold reserves ring truer. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.7">From a monetary competition perspective, keeping gold reserves is a perfectly rational decision. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.8">Keeping reserves in foreign governments' easy money only will cause the value of the country's currency to devalue along with the reserve currencies, while the seniorage accrues to the issuer of the reserve currency, not the nation's central bank. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.173.9">Further, should central banks sell all their gold holdings (estimated at around 20% of global gold stockpiles), the most likely impact is that </span><span epub:type="pagebreak" title="40" id="Page_40"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.1">gold, being highly prized for its industrial and aesthetic uses, would be bought up very quickly with little depreciation of its price and the central banks would be left without any gold reserves. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.2">The monetary competition between easy government money and hard gold will likely result in one winner in the long‐run. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.3">Even in a world of government money, governments have not been able to decree gold's monetary role away, as their actions speak louder than their words. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.174.4">(See </span><a id="R_c03-fig-0004" href="#c03-fig-0004"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.175.1">Figure 4</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.176.1">.</span><sup><a id="fn-16" href="#fn16"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.177.1">16</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.178.1">)</span></p>
