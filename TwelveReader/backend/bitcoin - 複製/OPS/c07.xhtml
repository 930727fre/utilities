<section epub:type="chapter">
<header>
<h1><span epub:type="pagebreak" title="135" id="Page_135"/><a id="c07"/><span class="chapterNumber"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.1.1">Chapter 7</span></span><br/><span class="chapterTitle"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.2.1">Sound Money and Individual Freedom</span></span></h1>
</header>
<section><span id="c07-sec-0001"/>
<blockquote>
<p id="c07-para-0002"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.1">“[G]overnments believe that … when there is a choice between an unpopular tax and a very popular expenditure, there is a way out for them—the way toward inflation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.3.2">This illustrates the problem of going away from the gold standard.”</span></p>
<p class="right"><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.4.1">—Ludwig von Mises</span><sup><a id="fn-1" href="#fn1"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.5.1">1</span></a></sup></i></p>
</blockquote>
<p id="c07-para-0003"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.1">Under a sound monetary system, government had to function in a way that is unimaginable to generations reared on the twentieth‐century news cycle: they had to be fiscally responsible. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.6.2">Without a central bank capable of increasing the money supply to pay off the government debt, government budgets had to obey the regular rules of financial responsibility which apply to every healthy normal entity, and which monetary nationalism</span><span epub:type="pagebreak" title="136" id="Page_136"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.7.1"> has attempted to repeal and state education attempted to obfuscate.</span></p>
<p id="c07-para-0004"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.1">For those of us alive today, raised on the propaganda of the omnipotent governments of the twentieth century, it is often hard to imagine a world in which individual freedom and responsibility supersede government authority. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.2">Yet such was the state of the world during the periods of greatest human progress and freedom: government was restrained to the scope of protection of national borders, private property, and individual freedoms, while leaving to individuals a very large magnitude of freedom to make their own choices and reap the benefits or bear the costs. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.8.3">We start by critically examining the question of whether the money supply needs to be managed by the government in the first place, before moving to consider the consequences of what happens when it is.</span></p></section>
<section><span id="c07-sec-0002"/>
<h2 id="head-2-23"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.9.1">Should Government Manage the Money Supply?</span></h2>
<p id="c07-para-0005"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.1">The fundamental scam of modernity is the idea that government needs to manage the money supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.2">It is an unquestioned starting assumption of all mainstream economic schools of thought and political parties. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.3">There isn't a shred of real‐world evidence to support this contention, and every attempt to manage the money supply has ended with economic disaster. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.4">Money supply management is the problem masquerading as its solution; the triumph of emotional hope over hard‐headed reason; the root of all political free lunches sold to gullible voters. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.5">It functions like a highly addictive and destructive drug, such as crystal meth or sugar: it causes a beautiful high at the beginning, fooling its victims into feeling invincible, but as soon as the effect subsides, the come‐down is devastating and has the victim begging for more. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.10.6">This is when the hard choice needs to be made: either suffer the withdrawal effects of ceasing the addiction, or take another hit, delay the reckoning by a day, and sustain severe long‐term damage.</span></p>
<p id="c07-para-0006"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.11.1">For Keynesian and Marxist economists, and other proponents of the state theory of money, money is whatever the state says is money, and therefore it is the prerogative of the state to do with it as it pleases, which is going to inevitably mean printing it to spend on achieving state objectives. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.11.2">The aim of economic research, then, is to decide how best to expand the money supply and to what</span><span epub:type="pagebreak" title="137" id="Page_137"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.1"> ends. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.2">But the fact that gold has been used as money for thousands of years, from before nation states were ever invented, is itself enough refutation of this theory. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.3">The fact that central banks still hold large amounts of gold reserves and are still accumulating more of it testifies to gold's enduring monetary nature, in spite of no government mandating it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.12.4">But whatever historical quibbles the proponents of the state theory of money may have with these facts, their theory has been obliterated before our very eyes over the last decade by the continued success and growth of Bitcoin, which has achieved monetary status and gained value exceeding that of most state‐backed currencies, purely due to its reliable salability in spite of no authority mandating its use as money.</span><sup><a id="fn-2" href="#fn2"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.13.1">2</span></a></sup></p>
<p id="c07-para-0007"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.14.1">There are today two main government‐approved mainstream schools of economic thought: Keynesians and Monetarists. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.14.2">While these two schools have widely disparate methodologies and analytical frameworks, and while they are engaged in bitter academic fights accusing each other of not caring about the poor, the children, the environment, inequality, or the buzzword </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.15.1">du jour</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.16.1">, they both agree on two unquestionable truths: first, the government has to expand the money supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.16.2">Second, both schools deserve more government funding to continue researching really important Big Questions which will lead them to find ever‐more‐creative ways of arriving at the first truth.</span></p>
<p id="c07-para-0008"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.17.1">It's important to understand the different rationales for the two schools of thought in order to understand how they can both arrive at the same conclusion and be equally wrong. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.17.2">Keynes was a failed investor and statistician who never studied economics but was so well‐connected with the ruling class in Britain that the embarrassing drivel he wrote in his most famous book, </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.18.1">The General Theory of Employment, Money, and Interest</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.19.1">, was immediately elevated into the status of founding truths of macroeconomics. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.19.2">His theory begins with the (completely unfounded and unwarranted) assumption that the most important metric in determining the state of the economy is the level of aggregate spending across society. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.19.3">When</span><span epub:type="pagebreak" title="138" id="Page_138"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.1"> society collectively spends a lot, the spending incentivizes producers to create more products, thus employing more workers and reaching full‐employment equilibrium. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.2">If spending rises too much, beyond the capacity of producers to keep up, it would lead to inflation and a rise in the overall price level. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.20.3">On the other hand, when society spends too little, producers reduce their production, firing workers and increasing unemployment, resulting in a recession.</span></p>
<p id="c07-para-0009"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.1">Recessions, for Keynes, are caused by abrupt reductions in the aggregate level of spending. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.21.2">Keynes was not very good with grasping the concept of causality and logical explanations, so he never quite bothered to explain </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.22.1">why</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.1"> it is that spending levels might suddenly drop, instead just coining another of his famous clumsy and utterly meaningless figures of speech to save him the hassle of an explanation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.2">He blamed it on the flagging of “animal spirits.” </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.3">To this day, nobody knows exactly what these animal spirits are or why they might suddenly flag, but that of course has only meant that an entire cottage industry of state‐funded economists have made a career out of attempting to explain them or finding real‐world data that can correlate to them. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.4">This research has been very good for academic careers, but is of no value to anyone actually trying to understand business cycles. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.23.5">Put bluntly, pop psychology is no substitute for capital theory.</span><sup><a id="fn-3" href="#fn3"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.24.1">3</span></a></sup></p>
<p id="c07-para-0010"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.1">Freed from the restraint of having to find a cause of the recession, Keynes can then happily recommend the solution he is selling. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.2">Whenever there is a recession, or a rise in the unemployment level, the cause is a drop in the aggregate level of spending and the solution is for the government to stimulate spending, which will in turn increase production and reduce unemployment. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.3">There are three ways of stimulating aggregate spending: increasing the money supply, increasing government spending, or reducing taxes. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.4">Reducing taxes is generally frowned upon by Keynesians. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.5">It is viewed as the least effective method, because people will not spend all the taxes they don't have to pay—some of that money will be saved, and Keynes absolutely detested saving. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.25.6">Saving would reduce spending, and reducing spending would be the worst thing imaginable for an economy seeking</span><span epub:type="pagebreak" title="139" id="Page_139"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.1"> recovery. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.2">It was government's role to impose high time preference on society by spending more or printing money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.3">Seeing as it is hard to raise taxes during a recession, government spending would effectively translate to increasing the money supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.4">This, then, was the Keynesian Holy Grail: whenever the economy was not at full employment, an increase of the money supply would fix the problem. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.5">There is no point worrying about inflation, because as Keynes had “showed” (i.e., baselessly assumed) inflation only happens when spending is too high, and because unemployment is high, that means spending is too low. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.26.6">There may be consequences in the long run, but there was no point worrying about long‐term consequences, because “in the long run, we are all dead,”</span><sup><a id="fn-4" href="#fn4"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.27.1">4</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.28.1"> as Keynes's most famous defense of high‐time‐preference libertine irresponsibility famously stated.</span></p>
<p id="c07-para-0011"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.1">The Keynesian view of the economy is, of course, at complete odds with reality. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.2">If Keynes's model had any truth to it, it would then necessarily follow that there can be no example of a society experiencing high inflation and high unemployment at the same time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.3">But this has in fact happened many times, most notably in the United States in the 1970s, when, in spite of the assurances of Keynesian economists to the contrary, and in spite of the entire U.S. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.4">establishment, from President Nixon down to “free market economist” Milton Friedman, adopting the refrain, “We're all Keynesians now” as the government took it upon itself to eliminate unemployment with increased inflation, unemployment kept on rising as inflation soared, destroying the theory that there is a trade‐off between these two. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.5">In any sane society, Keynes's ideas should have been removed from the economics textbooks and confined to the realm of academic comedy, but in a society where government controls academia to a very large degree, the textbooks continued to preach the Keynesian mantra that justified ever more money printing. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.29.6">Having the ability to print money, literally and figuratively, increases</span><span epub:type="pagebreak" title="140" id="Page_140"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.30.1"> the power of any government, and any government looks for anything that gives it more power.</span></p>
<p id="c07-para-0012"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.31.1">The other main school of government‐approved economic thought in our day and age is the Monetarist school, whose intellectual father is Milton Friedman. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.31.2">Monetarists are best understood as the battered wives of the Keynesians: they are there to provide a weak, watered‐down strawman version of a free market argument to create the illusion of a climate of intellectual debate, and to be constantly and comprehensively rebutted to safely prevent the intellectually curious from thinking of free markets seriously. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.31.3">The percentage of economists who are actually Monetarists is minuscule compared to Keynesians, but they are given far too much space to express their ideas as if there are two equal sides. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.31.4">Monetarists largely agree with Keynesians on the basic assumptions of the Keynesian models, but find elaborate and sophisticated mathematical quibbles with some conclusions of the model, which exceptions always lead them to dare to suggest a slightly reduced role for government in the macroeconomy, which immediately gets them dismissed as heartless evil capitalist scum who do not care about the poor.</span></p>
<p id="c07-para-0013"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.1">Monetarists generally oppose Keynesian efforts to spend money to eliminate unemployment, arguing that in the long run, the effect on unemployment will be eliminated while causing inflation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.2">Instead, Monetarists prefer tax cuts to stimulate the economy, because they argue that the free market will better allocate resources than government spending. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.3">While this debate over tax cuts versus spending increases rages on, the reality is that both policies result in increased government deficits which can only be financed with monetized debt, effectively an increase in the money supply. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.4">However, the central tenet of Monetarist thought is for the pressing need for governments to prevent collapses in the money supply and/or drops in the price level, which they view as the root of all economic problems. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.32.5">A decline in the price level, or </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.33.1">deflation</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.34.1"> as the Monetarists and Keynesians like to call it, would result in people hoarding their money, reducing their spending, causing increases in unemployment, causing a recession. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.34.2">Most worryingly for Monetarists, deflation is usually accompanied by collapses in the banking sector balance sheets, and because they, too, share an aversion for understanding cause and effect, it thus follows that central banks must do everything possible to ensure that deflation never happens. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.34.3">For the canonical treatment of why Monetarists are so scared of deflation, see a 2002 speech</span><span epub:type="pagebreak" title="141" id="Page_141"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.35.1"> by former Chairman of the Federal Reserve Ben Bernanke entitled </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.36.1">Deflation: Making Sure “It” Doesn't Happen Here</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.37.1">.</span><sup><a id="fn-5" href="#fn5"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.38.1">5</span></a></sup></p>
<p id="c07-para-0016"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.1">The sum total of the contribution of both these schools of thought is the consensus taught in undergraduate macroeconomics courses across the world: that the central bank should be in the business of expanding the money supply at a controlled pace, to encourage people to spend more and thus keep the unemployment level sufficiently low. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.39.2">Should a central bank contract the money supply, or fail to expand it adequately, then a deflationary spiral can take place, which would discourage people from spending their money and thus harm employment and cause an economic downturn.</span><sup><a id="fn-6" href="#fn6"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.40.1">6</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.1"> Such is the nature of this debate that most mainstream economists and textbooks do not even consider the question of whether the money supply should be increased at all, assuming that its increase is a given and discussing how central banks need to manage this increase and dictate its rates. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.2">The creed of Keynes, which is universally popular today, is the creed of consumption and spending to satisfy immediate wants. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.3">By constantly expanding the money supply, central banks' monetary policy makes saving and investment less attractive and thus it encourages people to save and invest less while consuming more. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.4">The real impact of this is the widespread culture of conspicuous consumption, where people live their lives to buy ever‐larger quantities of crap they do not need. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.5">When the alternative to spending money is witnessing your savings lose value over time, you might as well enjoy spending it before it loses its value. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.41.6">The financial decisions of people also reflect on all other aspects of their personality, engendering a high time preference in all aspects of life: depreciating currency causes less saving, more borrowing, more short‐termism in economic production and in artistic and cultural endeavors, and perhaps most damagingly, the depletion of the soil of its nutrients, leading to ever‐lower levels of nutrients in food.</span></p>
<p id="c07-para-0017"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.1">In contrast to these two schools of thought stands the classical tradition of economics, which is the culmination of hundreds of years of scholarship from around the world. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.42.2">Commonly</span><span epub:type="pagebreak" title="142" id="Page_142"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.1"> referred to today as the Austrian school, in honor of the last great generation of economists from Austria in its golden age pre‐World War I, this school draws on the work of Classical Scottish, French, Spanish, Arab, and Ancient Greek economists in explicating its understanding of economics. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.43.2">Unlike Keynesian and Monetarist fixation on rigorous numerical analysis and mathematical sophistry, the Austrian school is focused on establishing an </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.44.1">understanding</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.45.1"> of phenomena in a causal manner and logically deducing implications from demonstrably true axioms.</span></p>
<p id="c07-para-0018"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.46.1">The Austrian theory of money posits that money emerges in a market as the most marketable commodity and most salable asset, the one asset whose holders can sell with the most ease, in favorable conditions.</span><sup><a id="fn-7" href="#fn7"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.47.1">7</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.1"> An asset that holds its value is preferable to an asset that loses value, and savers who want to choose a medium of exchange will gravitate toward assets that hold value over time as monetary assets. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.2">Network effects mean that eventually only one, or a few, assets can emerge as media of exchange. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.48.3">For Mises, the absence of control by government is a necessary condition for the soundness of money, seeing as government will have the temptation to debase its money whenever it begins to accrue wealth as savers invest in it.</span></p>
<p id="c07-para-0019"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.49.1">By placing a hard cap on the total supply of bitcoins, as discussed in </span><a href="c08.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.50.1">Chapter 8</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.1">, Nakamoto was clearly unpersuaded by the arguments of the standard macroeconomics textbook and more influenced by the Austrian school, which argues that the quantity of money itself is irrelevant, that any supply of money is sufficient to run an economy of any size, because the currency units are infinitely divisible, and because it is only the purchasing power of money in terms of real goods and services that matters, and not its numerical quantity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.51.2">As Ludwig von Mises put it:</span><sup><a id="fn-8" href="#fn8"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.52.1">8</span></a></sup></p>
<blockquote>
<p id="c07-para-0020"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.1">The services money renders are conditioned by the height of its purchasing power. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.2">Nobody wants to have in his cash holding a definite number of pieces of money or a definite weight of money; he wants to keep a cash holding of a definite amount of purchasing power. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.53.3">As the operation of the market tends to determine the final state of money's purchasing power at a height at which the supply of and the demand for money coincide, there can never be an excess</span><span epub:type="pagebreak" title="143" id="Page_143"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.54.1"> or a deficiency of money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.54.2">Each individual and all individuals together always enjoy fully the advantages which they can derive from indirect exchange and the use of money, no matter whether the total quantity of money is great or small … the services which money renders can be neither improved nor impaired by changing the supply of money…. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.54.3">The quantity of money available in the whole economy is always sufficient to secure for everybody all that money does and can do.</span></p>
</blockquote>
<p><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.55.1">Murray Rothbard concurs with Mises:</span><sup><a id="fn-9" href="#fn9"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.56.1">9</span></a></sup></p>
<blockquote>
<p id="c07-para-0022"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.57.1">A world of constant money supply would be one similar to that of much of the eighteenth and nineteenth centuries, marked by the successful flowering of the Industrial Revolution with increased capital investment increasing the supply of goods and with falling prices for those goods as well as falling costs of production.</span></p></blockquote>
<p id="c07-para-0023"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.58.1">According to the Austrian view, if the money supply is fixed, then economic growth will cause prices of real goods and services to drop, allowing people to purchase increasing quantities of goods and services with their money in the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.58.2">Such a world would indeed discourage immediate consumption as the Keynesians fear, but encourage saving and investment for the future where more consumption can happen. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.58.3">For a school of thought steeped in high time preference, it is understandable that Keynes could not understand that increased savings' impact on consumption in any present moment is more than outweighed by the increases in spending caused by the increased savings of the past. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.58.4">A society which constantly defers consumption will actually end up being a society that consumes more in the long run than a low savings society, since the low‐time‐preference society invests more, thus producing more income for its members. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.58.5">Even with a larger percentage of their income going to savings, the low‐time‐preference societies will end up having higher levels of consumption in the long run as well as a larger capital stock.</span></p>
<p id="c07-para-0024"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.59.1">If society were a little girl in that marshmallow experiment, Keynesian economics seeks to alter the experiment so that waiting would punish the girl by giving her half a</span><span epub:type="pagebreak" title="144" id="Page_144"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.1"> marshmallow instead of two, making the entire concept of self‐control and low time preference appear counterproductive. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.2">Indulging immediate pleasures is the more likely course of action economically, and that will then reflect on culture and society at large. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.60.3">The Austrian school, on the other hand, by preaching sound money, recognizes the reality of the trade‐off that nature provides humans, and that if the child waits, there will be more reward for her, making her happier in the long run, encouraging her to defer her gratification to increase it.</span></p>
<p id="c07-para-0025"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.1">When the value of money appreciates, people are likely to be far more discerning with their consumption and to save far more of their income for the future. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.2">The culture of conspicuous consumption, of shopping as therapy, of always needing to replace cheap plastic crap with newer, flashier cheap plastic crap will not have a place in a society with a money which appreciates in value over time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.3">Such a world would cause people to develop a lower time preference, as their monetary decisions will orient their actions toward the future, teaching them to value the future more and more. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.61.4">We can thus see how such a society would cause people not only to save and invest more, but also to be morally, artistically, and culturally oriented toward the long‐term future.</span></p>
<p id="c07-para-0026"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.1">A currency that appreciates in value incentivizes saving, as savings gain purchasing power over time. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.2">Hence, it encourages deferred consumption, resulting in lower time preference. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.3">A currency that depreciates in value, on the other hand, leaves citizens constantly searching for returns to beat inflation, returns that must come with a risk, and so leads to an increase in investment in risky projects and an increased risk tolerance among investors, leading to increased losses. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.62.4">Societies with money of stable value generally develop a low time preference, learning to save and think of the future, while societies with high inflation and depreciating economies will develop high time preference as people lose track of the importance of saving and concentrate on immediate enjoyment.</span></p>
<p id="c07-para-0027"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.1">Further, an economy with an appreciating currency would witness investment only in projects that offer a positive real return over the rate of appreciation of money, meaning that only projects expected to increase society's capital stock will tend to get funded. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.2">By contrast, an economy with a depreciating currency incentivizes individuals to invest in projects that offer positive returns in terms of the depreciating currency, but negative real returns. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.63.3">The projects that</span><span epub:type="pagebreak" title="145" id="Page_145"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.1"> beat inflation but do not offer positive real returns effectively reduce society's capital stock, but are nonetheless a rational alternative for investors because they reduce their capital slower than the depreciating currency. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.64.2">These investments are what Ludwig von Mises terms </span><i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.65.1">malinvestments</span></i><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.1">—unprofitable projects and investments that only appear profitable during the period of inflation and artificially low interest rates, and whose unprofitability will be exposed as soon as inflation rates drop and interest rates rise, causing the bust part of the boom‐and‐bust cycle. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.66.2">As Mises puts it, “The boom squanders through malinvestment scarce factors of production and reduces the stock available through overconsumption; its alleged blessings are paid for by impoverishment.”</span><sup><a id="fn-10" href="#fn10"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.67.1">10</span></a></sup></p>
<p id="c07-para-0028"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.1">This exposition helps explain why Austrian school economists are more favorable to the use of gold as money while Keynesian mainstream economists support the government's issuance of elastic money that can be expanded at the government's behest. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.2">For Keynesians, the fact that the whole world's central banks run on fiat currencies is testament to the superiority of their ideas. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.3">For Austrians, on the other hand, the fact that governments have to resort to coercive measures of banning gold as money and enforcing payment in fiat currencies is at once testament to the inferiority of fiat money and its inability to succeed in a free market. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.4">It is also the root cause of all business cycles' booms and busts. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.68.5">While the Keynesian economists have no explanation for why recessions happen other than invoking “animal spirits,” Austrian school economists have developed the only coherent theory that explains the cause of business cycles: the Austrian Theory of the Business Cycle.</span><sup><a id="fn-11" href="#fn11"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.69.1">11</span></a></sup></p></section>
<section><span id="c07-sec-0003"/>
<h2 id="head-2-24"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.70.1">Unsound Money and Perpetual War</span></h2>
<p id="c07-para-0029"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.71.1">As discussed in </span><a href="c04.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.72.1">Chapter 4</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.1"> on the history of money, it was no coincidence that the era of central bank‐controlled money was inaugurated with the first world war in human history. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.73.2">There are three fundamental reasons that drive the relationship between</span><span epub:type="pagebreak" title="146" id="Page_146"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.1"> unsound money and war. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.2">First, unsound money is itself a barrier to trade between countries, because it distorts value between the countries and makes trade flows a political issue, creating animosity and enmity between governments and populations. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.3">Second, government having access to a printing press allows it to continue fighting until it completely destroys the value of its currency, and not just until it runs out of money. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.4">With sound money, the government's war effort was limited by the taxes it could collect. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.5">With unsound money, it is restrained by how much money it can create before the currency is destroyed, making it able to appropriate wealth far more easily. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.74.6">Third, individuals dealing with sound money develop a lower time preference, allowing them to think more of cooperation rather than conflict, as discussed in </span><a href="c05.xhtml"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.75.1">Chapter 5</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.76.1">.</span></p>
<p id="c07-para-0030"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.1">The larger the extent of the market with which individuals can trade, the more specialized they can be in their production, and the larger their gains from trade. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.2">The same amount of labor expended working in a primitive economy of 10 people would lead to a far lower material living standard than if it had been expended within a larger market of 1,000 or 1,000,000 people. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.3">The modern individual living in a free‐trading society is able to work for a few hours a day in a highly specialized job, and with the money she makes she is able to purchase the goods she wants from whichever producers in the entire planet make them with the lowest cost and best quality. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.4">To fully appreciate the gains from trade that accrue to you, just imagine trying to live your life in self‐sufficiency. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.77.5">Basic survival would become a very hard task for any of us, as our time is spent inefficiently and fruitlessly attempting to provide the very basics of survival to ourselves.</span></p>
<p id="c07-para-0031"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.78.1">Money is the medium through which trade takes place, and the only tool through which trade can expand beyond the scope of small communities with close personal relationships. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.78.2">For the price mechanism to work, prices need to be denominated in a sound form of money across the community that trades with it. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.78.3">The larger the area using a common currency, the easier and the larger the scope of trade within the area. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.78.4">Trade between peoples creates peaceful coexistence by giving them a vested interest in each other's prosperity. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.78.5">When communities use different kinds of unsound money, trade becomes more complicated, as prices vary along with the variation in the value of the currencies, making the terms of trade unpredictable, and making it</span><span epub:type="pagebreak" title="147" id="Page_147"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.79.1"> often counterproductive to plan economic activity across borders.</span></p>
<p id="c07-para-0032"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.1">Being predisposed to focus on the future, individuals with a low time preference are less likely to engage in conflict than those with a present orientation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.2">Conflict is by its very nature destructive, and in most cases, intelligent and future‐oriented people understand that there are no winners in violent conflict, because the winners will likely suffer more losses than if they had just abstained from taking part in the conflict in the first place. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.3">Civilized societies function on the premise that people respect one another's wills, and if there are conflicts, they attempt a peaceful resolution. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.4">Should an amicable solution not be found, people are more likely to part ways and avoid each other than continue to agitate and remain in conflict. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.80.5">This helps explain why prosperous civilized societies generally do not witness much crime, violence, or conflict.</span></p>
<p id="c07-para-0033"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.1">On a national level, nations using sound money are far more likely to stay peaceful, or to have limited conflict with one another, because sound money places real constraints on the ability of government to finance its military operations. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.2">In nineteenth‐century Europe, kings who wanted to fight each other had to tax their populations in order to finance their militaries. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.3">In the long run, such a strategy could only be profitable for kings who would employ their military defensively, not offensively. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.4">Defensive military action always has a stronger advantage than offensive military nature, because the defender is fighting on its own soil, near its people and its supply lines. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.5">A monarch who focused the military on defensive action would find his citizens willing to pay taxes to defend themselves from foreign invaders. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.81.6">But a monarch who engaged in protracted foreign adventures to enrich himself would likely face resentment from his population and incur significant costs in fighting other armies on their home soil.</span></p>
<p id="c07-para-0034"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.82.1">This can help explain why the twentieth century was the deadliest in recorded history. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.82.2">The 2005 United Nations Human Development Report</span><sup><a id="fn-12" href="#fn12"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.83.1">12</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.1"> analyzed death from conflicts over the past five centuries, and found the twentieth century to be the deadliest. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.84.2">Even when major European nations went to war with one another in the gold standard era, the wars were usually brief and fought</span><span epub:type="pagebreak" title="148" id="Page_148"/><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.1"> in battlefields between professional armies. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.2">A major war of the nineteenth century in Europe was the Franco‐Prussian war of 1870–1871, which lasted for 9 months and killed around 150,000 people, roughly an average week's tally in World War II, financed by the easy government money of the twentieth century. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.3">With the gold standard restricting them to finance war from taxation, European governments had to have their expenses prepared before battle, spend them on preparing their military as effectively as possible, and attempt a decisive victory. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.4">As soon as the tide of the battle began to turn against one of the armies, it was a logistically and economically losing battle to try to increase taxes to rearm the military and turn the tide—better to try to negotiate a peace with as few losses as possible. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.5">The deadliest wars of the nineteenth century were the Napoleonic wars, which were carried out before the gold standard was formally adopted across the continent, after the French revolution's foolish experiments with inflation. </span><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.85.6">(See </span><a id="R_c07-tbl-0001" href="#c07-tbl-0001"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.86.1">Table 5</span></a><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.87.1">.</span><sup><a id="fn-13" href="#fn13"><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.88.1">13</span></a></sup><span xmlns="http://www.w3.org/1999/xhtml" class="koboSpan" id="kobo.89.1">)</span></p>
